<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="peBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EF4444;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="url(#peBg)" rx="20"/>
  
  <!-- Decorative circles -->
  <circle cx="50" cy="50" r="30" fill="#FBBF24" opacity="0.3"/>
  <circle cx="350" cy="250" r="40" fill="#FB923C" opacity="0.3"/>
  
  <!-- Running track -->
  <ellipse cx="200" cy="200" rx="150" ry="80" fill="none" stroke="#92400E" stroke-width="20"/>
  <ellipse cx="200" cy="200" rx="150" ry="80" fill="none" stroke="#D97706" stroke-width="15"/>
  <!-- Lane lines -->
  <ellipse cx="200" cy="200" rx="130" ry="65" fill="none" stroke="#FDE68A" stroke-width="2" stroke-dasharray="10,5"/>
  <ellipse cx="200" cy="200" rx="110" ry="50" fill="none" stroke="#FDE68A" stroke-width="2" stroke-dasharray="10,5"/>
  
  <!-- Running child -->
  <g transform="translate(100, 170)">
    <!-- Body -->
    <circle cx="15" cy="0" r="12" fill="#FCD34D"/>
    <circle cx="12" cy="-3" r="2" fill="#1F2937"/>
    <circle cx="18" cy="-3" r="2" fill="#1F2937"/>
    <path d="M10 3 Q15 8 20 3" fill="none" stroke="#1F2937" stroke-width="2"/>
    <!-- Hair -->
    <path d="M5 -10 Q15 -20 25 -10" fill="none" stroke="#92400E" stroke-width="4"/>
    <!-- Body -->
    <rect x="8" y="12" width="14" height="20" fill="#3B82F6" rx="3"/>
    <!-- Arms running -->
    <line x1="0" y1="18" x2="-15" y2="5" stroke="#FCD34D" stroke-width="6" stroke-linecap="round"/>
    <line x1="22" y1="18" x2="37" y2="25" stroke="#FCD34D" stroke-width="6" stroke-linecap="round"/>
    <!-- Legs running -->
    <line x1="12" y1="32" x2="0" y2="50" stroke="#FCD34D" stroke-width="6" stroke-linecap="round"/>
    <line x1="18" y1="32" x2="30" y2="45" stroke="#FCD34D" stroke-width="6" stroke-linecap="round"/>
  </g>
  
  <!-- Soccer ball -->
  <circle cx="300" cy="120" r="25" fill="#FFFFFF"/>
  <path d="M300 95 L290 110 L300 120 L310 110 Z" fill="#1F2937"/>
  <path d="M285 115 L275 110 L280 125" fill="#1F2937"/>
  <path d="M315 115 L325 110 L320 125" fill="#1F2937"/>
  
  <!-- Basketball -->
  <circle cx="70" cy="120" r="22" fill="#EA580C"/>
  <path d="M70 98 L70 142" stroke="#1F2937" stroke-width="2"/>
  <path d="M48 120 L92 120" stroke="#1F2937" stroke-width="2"/>
  <path d="M52 102 Q70 120 88 102" fill="none" stroke="#1F2937" stroke-width="2"/>
  <path d="M52 138 Q70 120 88 138" fill="none" stroke="#1F2937" stroke-width="2"/>
  
  <!-- Jumping child -->
  <g transform="translate(280, 70)">
    <circle cx="15" cy="0" r="10" fill="#FCD34D"/>
    <circle cx="12" cy="-2" r="1.5" fill="#1F2937"/>
    <circle cx="18" cy="-2" r="1.5" fill="#1F2937"/>
    <path d="M12 2 Q15 5 18 2" fill="none" stroke="#1F2937" stroke-width="1.5"/>
    <path d="M5 -8 Q15 -15 25 -8" fill="none" stroke="#7C3AED" stroke-width="3"/>
    <rect x="8" y="10" width="14" height="15" fill="#22C55E" rx="2"/>
    <!-- Arms up -->
    <line x1="5" y1="15" x2="-8" y2="0" stroke="#FCD34D" stroke-width="5" stroke-linecap="round"/>
    <line x1="25" y1="15" x2="38" y2="0" stroke="#FCD34D" stroke-width="5" stroke-linecap="round"/>
    <!-- Legs -->
    <line x1="11" y1="25" x2="5" y2="40" stroke="#FCD34D" stroke-width="5" stroke-linecap="round"/>
    <line x1="19" y1="25" x2="25" y2="40" stroke="#FCD34D" stroke-width="5" stroke-linecap="round"/>
  </g>
  
  <!-- Medal -->
  <circle cx="350" cy="70" r="20" fill="#FCD34D"/>
  <circle cx="350" cy="70" r="15" fill="#FBBF24"/>
  <text x="350" y="77" font-family="Arial, sans-serif" font-size="18" fill="#92400E" text-anchor="middle" font-weight="bold">1</text>
  <path d="M340 50 L350 35 L360 50" fill="#EF4444"/>
  <line x1="350" y1="35" x2="350" y2="20" stroke="#EF4444" stroke-width="4"/>
  
  <!-- Whistle -->
  <ellipse cx="50" cy="220" rx="20" ry="15" fill="#4B5563"/>
  <rect x="40" y="205" width="20" height="15" fill="#6B7280"/>
  <circle cx="70" cy="220" r="5" fill="#374151"/>
  <circle cx="30" cy="220" r="4" fill="#1F2937"/>
  
  <!-- Energy burst -->
  <g stroke="#FDE68A" stroke-width="2" fill="none">
    <line x1="200" y1="30" x2="200" y2="10"/>
    <line x1="220" y1="35" x2="235" y2="20"/>
    <line x1="180" y1="35" x2="165" y2="20"/>
  </g>
  
  <!-- Stars -->
  <polygon points="130,50 134,58 143,58 136,64 139,73 130,67 121,73 124,64 117,58 126,58" fill="#FCD34D"/>
  <polygon points="350,180 354,188 363,188 356,194 359,203 350,197 341,203 344,194 337,188 346,188" fill="#FBBF24"/>
</svg>