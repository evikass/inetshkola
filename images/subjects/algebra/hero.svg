<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="curveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EF4444;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#bgGrad)" opacity="0.15"/>
  
  <!-- Coordinate system -->
  <line x1="30" y1="100" x2="170" y2="100" stroke="white" stroke-width="2" opacity="0.5"/>
  <line x1="100" y1="30" x2="100" y2="170" stroke="white" stroke-width="2" opacity="0.5"/>
  
  <!-- Axis arrows -->
  <polygon points="170,100 162,96 162,104" fill="white" opacity="0.7"/>
  <polygon points="100,30 96,38 104,38" fill="white" opacity="0.7"/>
  
  <!-- Parabola curve -->
  <path d="M 40 150 Q 70 40 100 80 Q 130 120 160 50" 
        stroke="url(#curveGrad)" stroke-width="4" fill="none" stroke-linecap="round"/>
  
  <!-- Sine wave -->
  <path d="M 30 100 Q 50 60 70 100 Q 90 140 110 100 Q 130 60 150 100 Q 170 140 180 100" 
        stroke="url(#lineGrad)" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.8"/>
  
  <!-- Math symbols floating -->
  <text x="45" y="55" font-family="Georgia, serif" font-size="24" font-style="italic" fill="#F59E0B">x²</text>
  <text x="140" y="65" font-family="Georgia, serif" font-size="20" font-style="italic" fill="#EF4444">∫</text>
  <text x="155" y="140" font-family="Georgia, serif" font-size="22" font-style="italic" fill="#10B981">f'</text>
  <text x="35" y="145" font-family="Georgia, serif" font-size="18" font-style="italic" fill="#06B6D4">dx</text>
  
  <!-- Triangle symbol for trigonometry -->
  <polygon points="70,45 85,75 55,75" fill="none" stroke="#FBBF24" stroke-width="2"/>
  <text x="62" y="70" font-family="Arial" font-size="10" fill="#FBBF24">θ</text>
  
  <!-- Infinity symbol -->
  <path d="M 130 155 C 145 145 155 145 160 155 C 165 165 155 165 140 155 C 125 145 115 145 120 155 C 125 165 135 165 140 155" 
        stroke="white" stroke-width="2" fill="none" opacity="0.6"/>
  
  <!-- Decorative dots -->
  <circle cx="50" cy="85" r="3" fill="#F59E0B" opacity="0.8"/>
  <circle cx="150" cy="85" r="3" fill="#10B981" opacity="0.8"/>
  <circle cx="85" cy="130" r="2" fill="#EF4444" opacity="0.8"/>
  <circle cx="120" cy="55" r="2" fill="#06B6D4" opacity="0.8"/>
  
  <!-- Main formula highlight -->
  <rect x="70" y="110" width="60" height="30" rx="8" fill="white" opacity="0.15"/>
  <text x="100" y="130" font-family="Georgia, serif" font-size="16" fill="white" text-anchor="middle" font-style="italic">
    sin²α
  </text>
</svg>