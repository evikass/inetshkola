<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="psychBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EC4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#DB2777;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="brainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FDA4AF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F472B6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#psychBg)" opacity="0.12"/>

  <!-- Brain (main element) -->
  <g transform="translate(40, 20)">
    <!-- Left hemisphere -->
    <path d="M 60 40
             Q 30 30 25 55
             Q 20 80 35 100
             Q 50 115 60 100
             Q 50 85 55 70
             Q 60 55 60 40"
          fill="url(#brainGrad)" stroke="#DB2777" stroke-width="2"/>
    <!-- Right hemisphere -->
    <path d="M 60 40
             Q 90 30 95 55
             Q 100 80 85 100
             Q 70 115 60 100
             Q 70 85 65 70
             Q 60 55 60 40"
          fill="url(#brainGrad)" stroke="#DB2777" stroke-width="2"/>
    <!-- Brain folds -->
    <path d="M 35 50 Q 45 55 40 65 Q 35 75 45 80" stroke="#DB2777" stroke-width="2" fill="none"/>
    <path d="M 75 45 Q 85 55 80 65 Q 75 75 85 85" stroke="#DB2777" stroke-width="2" fill="none"/>
    <path d="M 50 60 Q 55 70 50 80" stroke="#DB2777" stroke-width="2" fill="none"/>
    <path d="M 70 60 Q 65 70 70 80" stroke="#DB2777" stroke-width="2" fill="none"/>
    <!-- Cerebellum hint -->
    <ellipse cx="60" cy="105" rx="20" ry="10" fill="#F9A8D4" stroke="#DB2777" stroke-width="1.5"/>
  </g>

  <!-- Heart with EKG line -->
  <g transform="translate(15, 90)">
    <path d="M 25 10 Q 25 0 35 0 Q 45 0 45 15 Q 45 30 25 45 Q 5 30 5 15 Q 5 0 15 0 Q 25 0 25 10"
          fill="#EF4444" opacity="0.3"/>
    <!-- EKG line through heart -->
    <path d="M 0 25 L 15 25 L 20 15 L 25 35 L 30 20 L 35 25 L 50 25"
          stroke="#EF4444" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Emotion faces -->
  <g transform="translate(145, 80)">
    <!-- Happy face -->
    <circle cx="15" cy="15" r="15" fill="#FBBF24" opacity="0.8"/>
    <circle cx="10" cy="12" r="2" fill="#1F2937"/>
    <circle cx="20" cy="12" r="2" fill="#1F2937"/>
    <path d="M 8 20 Q 15 27 22 20" stroke="#1F2937" stroke-width="2" fill="none"/>
  </g>

  <g transform="translate(150, 130)">
    <!-- Thinking face -->
    <circle cx="15" cy="15" r="12" fill="#A78BFA" opacity="0.7"/>
    <circle cx="10" cy="12" r="1.5" fill="#1F2937"/>
    <circle cx="20" cy="12" r="1.5" fill="#1F2937"/>
    <line x1="8" y1="20" x2="22" y2="20" stroke="#1F2937" stroke-width="1.5"/>
    <!-- Thought bubble -->
    <circle cx="30" cy="5" r="5" fill="white" opacity="0.5"/>
    <circle cx="38" cy="0" r="3" fill="white" opacity="0.5"/>
  </g>

  <!-- Puzzle piece (understanding) -->
  <g transform="translate(130, 30)">
    <path d="M 0 15 L 0 0 L 15 0 L 15 5 Q 20 5 20 10 Q 20 15 15 15 L 15 30 L 30 30 L 30 25
             Q 25 25 25 20 Q 25 15 30 15 L 30 30 L 45 30 L 45 45 L 40 45 Q 40 40 35 40
             Q 30 40 30 45 L 15 45 L 15 40 Q 10 40 10 35 Q 10 30 15 30 L 15 15 Z"
          fill="#3B82F6" opacity="0.6" stroke="#2563EB" stroke-width="1"/>
  </g>

  <!-- Yin-Yang symbol (balance) -->
  <g transform="translate(25, 150)">
    <circle cx="20" cy="20" r="18" fill="#1F2937"/>
    <path d="M 20 2 Q 38 20 20 38 Q 2 20 20 2" fill="white"/>
    <circle cx="20" cy="11" r="5" fill="#1F2937"/>
    <circle cx="20" cy="29" r="5" fill="white"/>
  </g>

  <!-- Infinity symbol (mind) -->
  <g transform="translate(60, 155)">
    <path d="M 30 15 C 45 0 60 0 60 15 C 60 30 45 30 30 15 C 15 0 0 0 0 15 C 0 30 15 30 30 15"
          stroke="#EC4899" stroke-width="3" fill="none" opacity="0.6"/>
  </g>

  <!-- Light bulb (idea) -->
  <g transform="translate(100, 140)">
    <ellipse cx="20" cy="15" rx="15" ry="18" fill="#FBBF24" opacity="0.7"/>
    <rect x="14" y="30" width="12" height="8" rx="2" fill="#9CA3AF"/>
    <line x1="20" y1="0" x2="20" y2="-8" stroke="#FBBF24" stroke-width="2"/>
    <line x1="5" y1="10" x2="-2" y2="5" stroke="#FBBF24" stroke-width="2"/>
    <line x1="35" y1="10" x2="42" y2="5" stroke="#FBBF24" stroke-width="2"/>
  </g>

  <!-- Decorative elements -->
  <circle cx="85" cy="85" r="3" fill="#F472B6" opacity="0.4"/>
  <circle cx="115" cy="75" r="2" fill="#DB2777" opacity="0.5"/>
  <circle cx="175" cy="170" r="2.5" fill="#EC4899" opacity="0.5"/>
</svg>