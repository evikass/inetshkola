<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bioBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22C55E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#15803D;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dnaGrad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dnaGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EF4444;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#bioBg)" opacity="0.15"/>
  
  <!-- Cell structure -->
  <ellipse cx="70" cy="75" rx="40" ry="35" fill="#22C55E" opacity="0.2" stroke="#4ADE80" stroke-width="2"/>
  <ellipse cx="70" cy="75" rx="15" ry="12" fill="#15803D" opacity="0.6"/>
  <ellipse cx="70" cy="75" rx="8" ry="6" fill="#166534"/>
  <!-- Cell organelles -->
  <ellipse cx="55" cy="60" rx="8" ry="4" fill="#86EFAC" opacity="0.7"/>
  <ellipse cx="85" cy="85" rx="6" ry="3" fill="#86EFAC" opacity="0.7"/>
  <ellipse cx="60" cy="90" rx="5" ry="3" fill="#BBF7D0" opacity="0.6"/>
  
  <!-- DNA double helix -->
  <g transform="translate(115, 30)">
    <path d="M 0 0 Q 20 15 0 30 Q -20 45 0 60 Q 20 75 0 90 Q -20 105 0 120 Q 20 135 0 140" 
          stroke="url(#dnaGrad1)" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M 25 0 Q 5 15 25 30 Q 45 45 25 60 Q 5 75 25 90 Q 45 105 25 120 Q 5 135 25 140" 
          stroke="url(#dnaGrad2)" stroke-width="4" fill="none" stroke-linecap="round"/>
    <!-- DNA cross connections -->
    <line x1="5" y1="15" x2="20" y2="15" stroke="#60A5FA" stroke-width="2"/>
    <line x1="3" y1="45" x2="22" y2="45" stroke="#FBBF24" stroke-width="2"/>
    <line x1="5" y1="75" x2="20" y2="75" stroke="#60A5FA" stroke-width="2"/>
    <line x1="3" y1="105" x2="22" y2="105" stroke="#FBBF24" stroke-width="2"/>
  </g>
  
  <!-- Microscope -->
  <g transform="translate(25, 120)">
    <!-- Base -->
    <rect x="0" y="55" width="50" height="8" rx="2" fill="#6B7280"/>
    <!-- Stand -->
    <rect x="22" y="15" width="8" height="42" fill="#9CA3AF"/>
    <!-- Arm -->
    <rect x="15" y="10" width="30" height="8" rx="3" fill="#9CA3AF"/>
    <!-- Eyepiece -->
    <rect x="35" y="0" width="12" height="18" rx="2" fill="#4B5563"/>
    <circle cx="41" cy="0" r="5" fill="#374151"/>
    <!-- Objective lens -->
    <rect x="35" y="45" width="8" height="15" rx="1" fill="#4B5563"/>
    <circle cx="39" cy="60" r="6" fill="#1F2937"/>
    <!-- Stage -->
    <rect x="10" y="48" width="25" height="4" fill="#6B7280"/>
  </g>
  
  <!-- Leaf decoration -->
  <path d="M 160 55 Q 175 45 180 60 Q 185 75 170 80 Q 155 75 160 55" fill="#22C55E" opacity="0.6"/>
  <path d="M 165 60 L 170 70" stroke="#15803D" stroke-width="1.5"/>
  
  <!-- Bacteria/Microorganism -->
  <ellipse cx="165" cy="135" rx="18" ry="8" fill="#10B981" opacity="0.4" stroke="#34D399" stroke-width="1.5"/>
  <circle cx="150" cy="150" r="10" fill="#059669" opacity="0.3" stroke="#10B981" stroke-width="1"/>
  <circle cx="175" cy="145" r="7" fill="#059669" opacity="0.3"/>
  
  <!-- Atom symbol -->
  <g transform="translate(45, 45)">
    <circle cx="0" cy="0" r="3" fill="#F59E0B"/>
    <ellipse cx="0" cy="0" rx="15" ry="6" fill="none" stroke="#FBBF24" stroke-width="1.5" transform="rotate(60)"/>
    <ellipse cx="0" cy="0" rx="15" ry="6" fill="none" stroke="#FBBF24" stroke-width="1.5" transform="rotate(-60)"/>
    <ellipse cx="0" cy="0" rx="15" ry="6" fill="none" stroke="#FBBF24" stroke-width="1.5" transform="rotate(0)"/>
  </g>
  
  <!-- Magnifying glass effect -->
  <circle cx="100" cy="165" r="20" fill="none" stroke="white" stroke-width="2" opacity="0.3"/>
  <line x1="115" y1="180" x2="125" y2="190" stroke="white" stroke-width="3" opacity="0.3" stroke-linecap="round"/>
</svg>