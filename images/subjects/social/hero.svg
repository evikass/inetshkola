<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="socialBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1D4ED8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gavelGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#78350F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#92400E;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="scaleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FBBF24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D97706;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#socialBg)" opacity="0.12"/>
  
  <!-- Scales of Justice (main element) -->
  <g transform="translate(60, 35)">
    <!-- Stand -->
    <rect x="35" y="50" width="10" height="60" fill="#78350F"/>
    <rect x="25" y="105" width="30" height="8" rx="2" fill="#92400E"/>
    
    <!-- Balance beam -->
    <rect x="0" y="45" width="80" height="6" rx="2" fill="url(#scaleGrad)"/>
    
    <!-- Left pan -->
    <line x1="10" y1="51" x2="10" y2="70" stroke="#D97706" stroke-width="2"/>
    <path d="M 0 70 Q 10 80 20 70 L 0 70" fill="#FBBF24" stroke="#D97706" stroke-width="1.5"/>
    <ellipse cx="10" cy="72" rx="15" ry="5" fill="#FCD34D"/>
    <!-- Weight on left -->
    <rect x="5" y="62" width="10" height="8" rx="1" fill="#1F2937"/>
    
    <!-- Right pan -->
    <line x1="70" y1="51" x2="70" y2="75" stroke="#D97706" stroke-width="2"/>
    <path d="M 60 75 Q 70 85 80 75 L 60 75" fill="#FBBF24" stroke="#D97706" stroke-width="1.5"/>
    <ellipse cx="70" cy="77" rx="15" ry="5" fill="#FCD34D"/>
    <!-- Weight on right (equal) -->
    <rect x="65" y="67" width="10" height="8" rx="1" fill="#1F2937"/>
    
    <!-- Center pivot -->
    <circle cx="40" cy="48" r="8" fill="#F59E0B" stroke="#D97706" stroke-width="2"/>
  </g>
  
  <!-- Constitution/Book -->
  <g transform="translate(20, 130)">
    <rect x="0" y="0" width="50" height="40" rx="3" fill="#1E40AF" stroke="#1E3A8A" stroke-width="2"/>
    <rect x="3" y="3" width="44" height="34" fill="#DBEAFE" opacity="0.3"/>
    <line x1="25" y1="5" x2="25" y2="35" stroke="#1E40AF" stroke-width="2"/>
    <!-- Text lines -->
    <rect x="8" y="10" width="12" height="2" fill="white" opacity="0.6"/>
    <rect x="8" y="16" width="12" height="2" fill="white" opacity="0.6"/>
    <rect x="8" y="22" width="10" height="2" fill="white" opacity="0.6"/>
    <rect x="30" y="10" width="12" height="2" fill="white" opacity="0.6"/>
    <rect x="30" y="16" width="14" height="2" fill="white" opacity="0.6"/>
    <rect x="30" y="22" width="11" height="2" fill="white" opacity="0.6"/>
    <!-- Star on cover -->
    <polygon points="25,28 27,33 32,33 28,36 30,41 25,38 20,41 22,36 18,33 23,33" fill="#FBBF24"/>
  </g>
  
  <!-- Gavel -->
  <g transform="translate(130, 130)">
    <!-- Handle -->
    <rect x="30" y="35" width="8" height="35" rx="2" fill="url(#gavelGrad)" transform="rotate(-30, 34, 52)"/>
    <!-- Head -->
    <rect x="5" y="15" width="35" height="18" rx="3" fill="url(#gavelGrad)"/>
    <rect x="8" y="18" width="29" height="12" rx="2" fill="#78350F"/>
    <!-- Sound block -->
    <rect x="0" y="50" width="45" height="12" rx="3" fill="#92400E"/>
    <rect x="5" y="53" width="35" height="6" rx="1" fill="#78350F"/>
  </g>
  
  <!-- People silhouettes -->
  <g transform="translate(130, 45)">
    <!-- Person 1 -->
    <circle cx="10" cy="0" r="8" fill="#60A5FA"/>
    <path d="M 2 12 Q 10 10 18 12 L 20 35 L 0 35 Z" fill="#3B82F6"/>
    
    <!-- Person 2 -->
    <circle cx="45" cy="5" r="7" fill="#93C5FD"/>
    <path d="M 38 16 Q 45 14 52 16 L 53 35 L 37 35 Z" fill="#60A5FA"/>
  </g>
  
  <!-- Article symbol -->
  <g transform="translate(5, 60)">
    <rect x="0" y="0" width="35" height="45" rx="3" fill="white" opacity="0.15"/>
    <text x="17.5" y="18" font-family="Georgia, serif" font-size="10" fill="white" text-anchor="middle">Ст.</text>
    <text x="17.5" y="35" font-family="Georgia, serif" font-size="16" fill="white" text-anchor="middle" font-weight="bold">1</text>
  </g>
  
  <!-- Equality symbol -->
  <g transform="translate(85, 145)">
    <rect x="0" y="0" width="30" height="10" rx="2" fill="#FBBF24"/>
    <rect x="0" y="15" width="30" height="10" rx="2" fill="#FBBF24"/>
  </g>
  
  <!-- Handshake symbol -->
  <g transform="translate(100, 160)">
    <path d="M 0 15 Q 10 5 25 15 Q 40 25 50 15" stroke="white" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.5"/>
    <circle cx="5" cy="18" r="3" fill="white" opacity="0.4"/>
    <circle cx="45" cy="18" r="3" fill="white" opacity="0.4"/>
  </g>
  
  <!-- Decorative dots -->
  <circle cx="45" cy="25" r="2" fill="#FBBF24" opacity="0.6"/>
  <circle cx="155" cy="25" r="2" fill="#FBBF24" opacity="0.6"/>
  <circle cx="180" cy="100" r="1.5" fill="white" opacity="0.4"/>
  <circle cx="20" cy="115" r="1.5" fill="white" opacity="0.4"/>
</svg>