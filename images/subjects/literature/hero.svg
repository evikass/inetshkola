<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="litBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A855F7;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="url(#litBg)" rx="20"/>
  
  <!-- Decorative circles -->
  <circle cx="50" cy="50" r="30" fill="#A78BFA" opacity="0.4"/>
  <circle cx="350" cy="250" r="40" fill="#C4B5FD" opacity="0.4"/>
  
  <!-- Stack of books -->
  <rect x="100" y="180" width="200" height="25" fill="#EF4444" rx="3"/>
  <rect x="110" y="155" width="180" height="25" fill="#3B82F6" rx="3"/>
  <rect x="95" y="130" width="210" height="25" fill="#22C55E" rx="3"/>
  <rect x="120" y="105" width="160" height="25" fill="#F59E0B" rx="3"/>
  <rect x="105" y="80" width="190" height="25" fill="#EC4899" rx="3"/>
  
  <!-- Book spines details -->
  <line x1="150" y1="80" x2="150" y2="105" stroke="#BE185D" stroke-width="2"/>
  <line x1="200" y1="80" x2="200" y2="105" stroke="#BE185D" stroke-width="2"/>
  <line x1="250" y1="80" x2="250" y2="105" stroke="#BE185D" stroke-width="2"/>
  
  <!-- Open book with fairy tale -->
  <g transform="translate(160, 40)">
    <path d="M0 30 Q20 20 40 30 L40 0 Q20 10 0 0 Z" fill="#FEF3C7" stroke="#92400E"/>
    <path d="M40 30 Q60 20 80 30 L80 0 Q60 10 40 0 Z" fill="#FEF3C7" stroke="#92400E"/>
    <!-- Text lines -->
    <line x1="8" y1="10" x2="35" y2="12" stroke="#92400E" stroke-width="1" opacity="0.5"/>
    <line x1="8" y1="16" x2="35" y2="18" stroke="#92400E" stroke-width="1" opacity="0.5"/>
    <line x1="45" y1="12" x2="72" y2="10" stroke="#92400E" stroke-width="1" opacity="0.5"/>
    <line x1="45" y1="18" x2="72" y2="16" stroke="#92400E" stroke-width="1" opacity="0.5"/>
  </g>
  
  <!-- Quill pen -->
  <path d="M300 50 L320 120 L310 110 L305 130 L295 100 L285 110 Z" fill="#1F2937"/>
  <line x1="305" y1="130" x2="295" y2="170" stroke="#78350F" stroke-width="4"/>
  
  <!-- Ink bottle -->
  <rect x="275" y="170" width="40" height="35" fill="#1E3A8A" rx="5"/>
  <rect x="280" y="165" width="30" height="10" fill="#1E40AF" rx="3"/>
  <ellipse cx="295" cy="175" rx="10" ry="3" fill="#3B82F6"/>
  
  <!-- Stars/Magic sparkles -->
  <polygon points="50,100 55,110 65,110 57,117 60,127 50,120 40,127 43,117 35,110 45,110" fill="#FCD34D"/>
  <polygon points="350,80 354,88 363,88 356,94 359,103 350,97 341,103 344,94 337,88 346,88" fill="#FCD34D"/>
  <polygon points="70,220 73,226 80,226 75,230 77,237 70,233 63,237 65,230 60,226 67,226" fill="#FBBF24"/>
  <polygon points="330,180 333,186 340,186 335,190 337,197 330,193 323,197 325,190 320,186 327,186" fill="#FBBF24"/>
  
  <!-- Flying pages -->
  <g opacity="0.8">
    <rect x="30" y="140" width="30" height="40" fill="#FEF3C7" transform="rotate(-15 30 140)" rx="2"/>
    <line x1="35" y1="150" x2="55" y2="148" stroke="#92400E" stroke-width="1" opacity="0.4"/>
    <line x1="35" y1="158" x2="55" y2="156" stroke="#92400E" stroke-width="1" opacity="0.4"/>
    <line x1="35" y1="166" x2="50" y2="164" stroke="#92400E" stroke-width="1" opacity="0.4"/>
  </g>
  
  <!-- Castle (fairy tale element) -->
  <g transform="translate(320, 200)">
    <rect x="0" y="20" width="60" height="50" fill="#DDD6FE"/>
    <rect x="5" y="0" width="15" height="40" fill="#C4B5FD"/>
    <polygon points="12.5,-15 0,0 25,0" fill="#A78BFA"/>
    <rect x="40" y="10" width="15" height="30" fill="#C4B5FD"/>
    <polygon points="47.5,-5 35,10 60,10" fill="#A78BFA"/>
    <rect x="20" y="45" width="20" height="25" fill="#7C3AED"/>
    <polygon points="30,25 15,45 45,45" fill="#8B5CF6"/>
  </g>
  
  <!-- Feather/Magic wand -->
  <g transform="translate(40, 250)">
    <line x1="0" y1="0" x2="40" y2="30" stroke="#FCD34D" stroke-width="3"/>
    <polygon points="40,30 35,25 45,25" fill="#FCD34D"/>
    <circle cx="40" cy="30" r="5" fill="#FBBF24"/>
  </g>
</svg>