<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="prepWriteBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A855F7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EC4899;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="url(#prepWriteBg)" rx="20"/>
  
  <!-- Decorative circles -->
  <circle cx="50" cy="50" r="30" fill="#E9D5FF" opacity="0.3"/>
  <circle cx="350" cy="250" r="40" fill="#FBCFE8" opacity="0.3"/>
  
  <!-- Notebook/Paper -->
  <rect x="100" y="60" width="200" height="180" rx="10" fill="#FEF3C7" stroke="#D97706" stroke-width="3"/>
  
  <!-- Lines on paper -->
  <line x1="120" y1="100" x2="280" y2="100" stroke="#FCD34D" stroke-width="2" stroke-dasharray="5,5"/>
  <line x1="120" y1="130" x2="280" y2="130" stroke="#FCD34D" stroke-width="2" stroke-dasharray="5,5"/>
  <line x1="120" y1="160" x2="280" y2="160" stroke="#FCD34D" stroke-width="2" stroke-dasharray="5,5"/>
  <line x1="120" y1="190" x2="280" y2="190" stroke="#FCD34D" stroke-width="2" stroke-dasharray="5,5"/>
  
  <!-- Pencil -->
  <g transform="translate(280, 80) rotate(45)">
    <rect x="0" y="0" width="20" height="100" fill="#FCD34D" rx="2"/>
    <polygon points="10,100 0,130 20,130" fill="#FBBF24"/>
    <polygon points="10,130 5,145 15,145" fill="#F5D0A9"/>
    <rect x="0" y="0" width="20" height="15" fill="#EC4899" rx="2"/>
  </g>
  
  <!-- Letter A being traced -->
  <text x="150" y="150" font-family="Arial, sans-serif" font-size="60" font-weight="bold" fill="#DC2626" opacity="0.3">А</text>
  <text x="150" y="150" font-family="Arial, sans-serif" font-size="60" font-weight="bold" fill="#7C3AED" stroke="#7C3AED" stroke-width="1">А</text>
  
  <!-- Small stars -->
  <text x="60" y="180" font-size="20">⭐</text>
  <text x="320" y="120" font-size="16">✨</text>
</svg>