<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="obzhBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EF4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#DC2626;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FBBF24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F59E0B;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="fireGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#EF4444;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#F97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FBBF24;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#obzhBg)" opacity="0.12"/>
  
  <!-- Main shield -->
  <path d="M 100 25 L 155 50 L 155 100 Q 155 145 100 175 Q 45 145 45 100 L 45 50 Z" 
        fill="url(#shieldGrad)" stroke="#D97706" stroke-width="3"/>
  <path d="M 100 40 L 140 58 L 140 95 Q 140 130 100 155 Q 60 130 60 95 L 60 58 Z" 
        fill="#FEF3C7" opacity="0.3"/>
  
  <!-- Checkmark on shield -->
  <path d="M 75 100 L 95 120 L 130 75" stroke="#166534" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Traffic light -->
  <g transform="translate(10, 60)">
    <rect x="0" y="0" width="25" height="60" rx="4" fill="#1F2937"/>
    <circle cx="12.5" cy="12" r="7" fill="#EF4444"/>
    <circle cx="12.5" cy="30" r="7" fill="#FBBF24" opacity="0.5"/>
    <circle cx="12.5" cy="48" r="7" fill="#22C55E" opacity="0.5"/>
    <!-- Green active glow -->
    <circle cx="12.5" cy="48" r="9" fill="#22C55E" opacity="0.3"/>
  </g>
  
  <!-- Fire extinguisher -->
  <g transform="translate(165, 50)">
    <rect x="5" y="20" width="25" height="50" rx="5" fill="#DC2626"/>
    <rect x="10" y="10" width="15" height="12" rx="2" fill="#1F2937"/>
    <rect x="8" y="5" width="8" height="8" rx="1" fill="#4B5563"/>
    <line x1="15" y1="8" x2="15" y2="0" stroke="#374151" stroke-width="2"/>
    <rect x="15" y="-2" width="12" height="6" rx="1" fill="#1F2937"/>
    <!-- Label -->
    <rect x="10" y="35" width="15" height="20" rx="2" fill="#FEF2F2"/>
    <text x="17.5" y="48" font-family="Arial" font-size="10" fill="#DC2626" text-anchor="middle" font-weight="bold">О</text>
  </g>
  
  <!-- Fire symbol -->
  <g transform="translate(160, 130)">
    <path d="M 15 45 Q 0 30 10 20 Q 10 10 20 5 Q 15 15 25 20 Q 20 10 30 0 Q 35 15 40 20 Q 50 10 50 25 Q 45 30 50 35 Q 55 45 35 50 Q 25 55 20 50 Q 15 55 15 45" 
          fill="url(#fireGrad)" opacity="0.7"/>
  </g>
  
  <!-- Warning triangle -->
  <g transform="translate(5, 135)">
    <polygon points="20,0 40,35 0,35" fill="#FBBF24" stroke="#D97706" stroke-width="2"/>
    <text x="20" y="28" font-family="Arial" font-size="22" fill="#1F2937" text-anchor="middle" font-weight="bold">!</text>
  </g>
  
  <!-- First aid cross -->
  <g transform="translate(55, 145)">
    <circle cx="20" cy="20" r="18" fill="white" opacity="0.2"/>
    <rect x="15" y="5" width="10" height="30" rx="2" fill="#EF4444"/>
    <rect x="5" y="15" width="30" height="10" rx="2" fill="#EF4444"/>
  </g>
  
  <!-- Emergency phone number hint -->
  <g transform="translate(45, 15)">
    <rect x="0" y="0" width="45" height="20" rx="5" fill="white" opacity="0.15"/>
    <text x="22.5" y="14" font-family="Arial" font-size="12" fill="white" text-anchor="middle" font-weight="bold">112</text>
  </g>
  
  <!-- Stop/Warning icon -->
  <g transform="translate(120, 5)">
    <polygon points="15,0 30,8 30,24 15,32 0,24 0,8" fill="#EF4444" stroke="#DC2626" stroke-width="1"/>
    <text x="15" y="21" font-family="Arial" font-size="12" fill="white" text-anchor="middle" font-weight="bold">STOP</text>
  </g>
</svg>