<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="musBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06B6D4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="url(#musBg)" rx="20"/>
  
  <!-- Decorative circles -->
  <circle cx="50" cy="50" r="30" fill="#22D3EE" opacity="0.4"/>
  <circle cx="350" cy="250" r="40" fill="#A78BFA" opacity="0.4"/>
  
  <!-- Staff lines -->
  <g stroke="#1E3A8A" stroke-width="2" opacity="0.3">
    <line x1="30" y1="100" x2="370" y2="100"/>
    <line x1="30" y1="115" x2="370" y2="115"/>
    <line x1="30" y1="130" x2="370" y2="130"/>
    <line x1="30" y1="145" x2="370" y2="145"/>
    <line x1="30" y1="160" x2="370" y2="160"/>
  </g>
  
  <!-- Treble clef -->
  <text x="40" y="155" font-family="serif" font-size="80" fill="#1E3A8A">𝄞</text>
  
  <!-- Notes -->
  <!-- Quarter notes -->
  <g fill="#1E3A8A">
    <ellipse cx="120" cy="145" rx="10" ry="8" transform="rotate(-20 120 145)"/>
    <line x1="128" y1="143" x2="128" y2="95" stroke="#1E3A8A" stroke-width="3"/>
    
    <ellipse cx="160" cy="130" rx="10" ry="8" transform="rotate(-20 160 130)"/>
    <line x1="168" y1="128" x2="168" y2="80" stroke="#1E3A8A" stroke-width="3"/>
    
    <ellipse cx="200" cy="115" rx="10" ry="8" transform="rotate(-20 200 115)"/>
    <line x1="208" y1="113" x2="208" y2="65" stroke="#1E3A8A" stroke-width="3"/>
    
    <ellipse cx="240" cy="130" rx="10" ry="8" transform="rotate(-20 240 130)"/>
    <line x1="248" y1="128" x2="248" y2="80" stroke="#1E3A8A" stroke-width="3"/>
  </g>
  
  <!-- Eighth notes (connected) -->
  <g fill="#1E3A8A">
    <ellipse cx="290" cy="145" rx="10" ry="8" transform="rotate(-20 290 145)"/>
    <line x1="298" y1="143" x2="298" y2="95" stroke="#1E3A8A" stroke-width="3"/>
    
    <ellipse cx="330" cy="130" rx="10" ry="8" transform="rotate(-20 330 130)"/>
    <line x1="338" y1="128" x2="338" y2="80" stroke="#1E3A8A" stroke-width="3"/>
    
    <!-- Beam connecting notes -->
    <polygon points="298,95 338,80 342,88 302,103" fill="#1E3A8A"/>
  </g>
  
  <!-- Piano keys -->
  <g transform="translate(60, 200)">
    <!-- White keys -->
    <rect x="0" y="0" width="25" height="70" fill="#FFFFFF" stroke="#9CA3AF" rx="2"/>
    <rect x="25" y="0" width="25" height="70" fill="#FFFFFF" stroke="#9CA3AF" rx="2"/>
    <rect x="50" y="0" width="25" height="70" fill="#FFFFFF" stroke="#9CA3AF" rx="2"/>
    <rect x="75" y="0" width="25" height="70" fill="#FFFFFF" stroke="#9CA3AF" rx="2"/>
    <rect x="100" y="0" width="25" height="70" fill="#FFFFFF" stroke="#9CA3AF" rx="2"/>
    <rect x="125" y="0" width="25" height="70" fill="#FFFFFF" stroke="#9CA3AF" rx="2"/>
    <rect x="150" y="0" width="25" height="70" fill="#FFFFFF" stroke="#9CA3AF" rx="2"/>
    <!-- Black keys -->
    <rect x="18" y="0" width="15" height="45" fill="#1F2937" rx="1"/>
    <rect x="43" y="0" width="15" height="45" fill="#1F2937" rx="1"/>
    <rect x="93" y="0" width="15" height="45" fill="#1F2937" rx="1"/>
    <rect x="118" y="0" width="15" height="45" fill="#1F2937" rx="1"/>
    <rect x="143" y="0" width="15" height="45" fill="#1F2937" rx="1"/>
  </g>
  
  <!-- Guitar -->
  <g transform="translate(260, 180)">
    <!-- Body -->
    <ellipse cx="40" cy="60" rx="35" ry="45" fill="#D97706"/>
    <ellipse cx="40" cy="60" rx="28" ry="38" fill="#92400E"/>
    <circle cx="40" cy="60" r="10" fill="#1F2937"/>
    <!-- Neck -->
    <rect x="35" y="0" width="10" height="50" fill="#78350F"/>
    <!-- Head -->
    <rect x="32" y="-20" width="16" height="25" fill="#92400E" rx="3"/>
    <!-- Strings -->
    <line x1="36" y1="-10" x2="36" y2="90" stroke="#FDE68A" stroke-width="1"/>
    <line x1="39" y1="-10" x2="39" y2="90" stroke="#FDE68A" stroke-width="1"/>
    <line x1="42" y1="-10" x2="42" y2="90" stroke="#FDE68A" stroke-width="1"/>
    <line x1="45" y1="-10" x2="45" y2="90" stroke="#FDE68A" stroke-width="1"/>
  </g>
  
  <!-- Musical notes floating -->
  <text x="30" y="60" font-family="Arial, sans-serif" font-size="40" fill="#FCD34D">♪</text>
  <text x="90" y="45" font-family="Arial, sans-serif" font-size="35" fill="#FBBF24">♫</text>
  <text x="340" y="60" font-family="Arial, sans-serif" font-size="38" fill="#FCD34D">♪</text>
  <text x="280" y="50" font-family="Arial, sans-serif" font-size="32" fill="#FBBF24">♬</text>
  
  <!-- Headphones -->
  <g transform="translate(50, 30)">
    <path d="M10 30 Q10 0 50 0 Q90 0 90 30" fill="none" stroke="#1F2937" stroke-width="6"/>
    <ellipse cx="10" cy="35" rx="15" ry="20" fill="#374151"/>
    <ellipse cx="10" cy="35" rx="10" ry="15" fill="#4B5563"/>
    <ellipse cx="90" cy="35" rx="15" ry="20" fill="#374151"/>
    <ellipse cx="90" cy="35" rx="10" ry="15" fill="#4B5563"/>
  </g>
  
  <!-- Sound waves -->
  <g stroke="#22D3EE" stroke-width="2" fill="none" opacity="0.7">
    <path d="M370 150 Q380 160 370 170"/>
    <path d="M375 140 Q390 160 375 180"/>
    <path d="M380 130 Q400 160 380 190"/>
  </g>
  
  <!-- Stars -->
  <polygon points="200,50 204,58 213,58 206,64 209,73 200,67 191,73 194,64 187,58 196,58" fill="#FCD34D"/>
  <polygon points="130,250 133,256 140,256 135,260 137,267 130,263 123,267 125,260 120,256 127,256" fill="#FBBF24"/>
</svg>