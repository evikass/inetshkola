<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="geomBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A855F7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EC4899;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pyramidGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F97316;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="prismGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366F1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sphereGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#14B8A6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#geomBg)" opacity="0.12"/>
  
  <!-- 3D Pyramid -->
  <polygon points="50,140 90,75 130,140" fill="url(#pyramidGrad)" opacity="0.3" stroke="#F59E0B" stroke-width="2"/>
  <line x1="90" y1="75" x2="90" y2="140" stroke="#F59E0B" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.7"/>
  <polygon points="50,140 90,75 90,140" fill="#F59E0B" opacity="0.15"/>
  
  <!-- 3D Prism -->
  <polygon points="105,80 145,80 145,130 105,130" fill="url(#prismGrad)" opacity="0.25" stroke="#3B82F6" stroke-width="2"/>
  <polygon points="145,80 165,70 165,120 145,130" fill="#3B82F6" opacity="0.15" stroke="#6366F1" stroke-width="1.5"/>
  <polygon points="105,80 125,70 165,70 145,80" fill="#6366F1" opacity="0.2" stroke="#3B82F6" stroke-width="1.5"/>
  <line x1="125" y1="70" x2="125" y2="120" stroke="#6366F1" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
  
  <!-- Sphere/Circle -->
  <circle cx="45" cy="55" r="25" fill="url(#sphereGrad)" opacity="0.3" stroke="#10B981" stroke-width="2"/>
  <ellipse cx="45" cy="55" rx="25" ry="8" fill="none" stroke="#10B981" stroke-width="1" opacity="0.5"/>
  <ellipse cx="45" cy="55" rx="8" ry="25" fill="none" stroke="#10B981" stroke-width="1" opacity="0.5"/>
  
  <!-- Cone outline -->
  <path d="M 150 45 L 175 95 L 125 95 Z" fill="none" stroke="#EC4899" stroke-width="2" opacity="0.6"/>
  <ellipse cx="150" cy="95" rx="25" ry="8" fill="none" stroke="#EC4899" stroke-width="1.5" opacity="0.6"/>
  
  <!-- Compass tool -->
  <line x1="30" y1="160" x2="55" y2="130" stroke="white" stroke-width="3" opacity="0.7"/>
  <line x1="55" y1="130" x2="45" y2="165" stroke="white" stroke-width="3" opacity="0.7"/>
  <circle cx="55" cy="130" r="4" fill="#F59E0B"/>
  
  <!-- Ruler -->
  <rect x="130" y="155" width="55" height="12" rx="2" fill="white" opacity="0.2"/>
  <line x1="135" y1="155" x2="135" y2="160" stroke="white" stroke-width="1" opacity="0.5"/>
  <line x1="145" y1="155" x2="145" y2="158" stroke="white" stroke-width="1" opacity="0.5"/>
  <line x1="155" y1="155" x2="155" y2="160" stroke="white" stroke-width="1" opacity="0.5"/>
  <line x1="165" y1="155" x2="165" y2="158" stroke="white" stroke-width="1" opacity="0.5"/>
  <line x1="175" y1="155" x2="175" y2="160" stroke="white" stroke-width="1" opacity="0.5"/>
  
  <!-- Angle arc -->
  <path d="M 70 140 Q 75 125 85 130" fill="none" stroke="#FBBF24" stroke-width="2"/>
  <text x="78" y="122" font-family="Georgia, serif" font-size="12" fill="#FBBF24" font-style="italic">α</text>
  
  <!-- Volume formula hint -->
  <rect x="65" y="45" width="55" height="22" rx="6" fill="white" opacity="0.12"/>
  <text x="92" y="61" font-family="Georgia, serif" font-size="13" fill="white" text-anchor="middle" font-style="italic">
    V = S·h
  </text>
  
  <!-- Decorative elements -->
  <circle cx="100" cy="155" r="2" fill="white" opacity="0.5"/>
  <circle cx="110" cy="158" r="1.5" fill="white" opacity="0.4"/>
  <circle cx="90" cy="160" r="1.5" fill="white" opacity="0.4"/>
  
  <!-- Pi symbol -->
  <text x="170" y="50" font-family="Georgia, serif" font-size="20" fill="white" opacity="0.6" font-style="italic">π</text>
  
  <!-- Right angle symbol -->
  <rect x="48" y="130" width="8" height="8" fill="none" stroke="#F59E0B" stroke-width="1.5" opacity="0.8"/>
</svg>