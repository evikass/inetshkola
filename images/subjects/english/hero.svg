<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="engBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="url(#engBg)" rx="20"/>
  
  <!-- Decorative circles -->
  <circle cx="50" cy="50" r="30" fill="#60A5FA" opacity="0.3"/>
  <circle cx="350" cy="250" r="40" fill="#818CF8" opacity="0.3"/>
  
  <!-- ABC letters floating -->
  <text x="30" y="100" font-family="Arial Black, sans-serif" font-size="60" fill="#FCD34D" font-weight="bold" opacity="0.9">A</text>
  <text x="90" y="80" font-family="Arial Black, sans-serif" font-size="45" fill="#34D399" font-weight="bold" opacity="0.8">B</text>
  <text x="150" y="110" font-family="Arial Black, sans-serif" font-size="55" fill="#F472B6" font-weight="bold" opacity="0.85">C</text>
  <text x="220" y="85" font-family="Arial Black, sans-serif" font-size="50" fill="#22D3EE" font-weight="bold" opacity="0.9">D</text>
  <text x="280" y="100" font-family="Arial Black, sans-serif" font-size="48" fill="#FB923C" font-weight="bold" opacity="0.85">E</text>
  <text x="340" y="90" font-family="Arial Black, sans-serif" font-size="42" fill="#A78BFA" font-weight="bold" opacity="0.8">F</text>
  
  <!-- Speech bubble -->
  <path d="M80 150 Q80 130 120 130 L200 130 Q220 130 220 150 L220 200 Q220 220 200 220 L140 220 L120 250 L130 220 L120 220 Q80 220 80 200 Z" fill="#FFFFFF" opacity="0.95"/>
  <text x="95" y="170" font-family="Arial, sans-serif" font-size="24" fill="#1F2937">Hello!</text>
  <text x="100" y="200" font-family="Arial, sans-serif" font-size="16" fill="#6B7280">Привет!</text>
  
  <!-- Globe -->
  <circle cx="320" cy="170" r="50" fill="#3B82F6"/>
  <ellipse cx="320" cy="170" rx="20" ry="50" fill="none" stroke="#60A5FA" stroke-width="3"/>
  <line x1="270" y1="170" x2="370" y2="170" stroke="#60A5FA" stroke-width="3"/>
  <line x1="320" y1="120" x2="320" y2="220" stroke="#60A5FA" stroke-width="3"/>
  <!-- Continents simplified -->
  <ellipse cx="305" cy="155" rx="15" ry="20" fill="#22C55E" opacity="0.7"/>
  <ellipse cx="340" cy="175" rx="12" ry="18" fill="#22C55E" opacity="0.7"/>
  
  <!-- Flag bunting -->
  <g>
    <polygon points="50,30 70,50 50,70 30,50" fill="#EF4444"/>
    <polygon points="90,30 110,50 90,70 70,50" fill="#FFFFFF"/>
    <polygon points="130,30 150,50 130,70 110,50" fill="#3B82F6"/>
    
    <polygon points="250,30 270,50 250,70 230,50" fill="#22C55E"/>
    <polygon points="290,30 310,50 290,70 270,50" fill="#FFFFFF"/>
    <polygon points="330,30 350,50 330,70 310,50" fill="#EF4444"/>
  </g>
  
  <!-- Word cards -->
  <g transform="translate(80, 260)">
    <rect x="0" y="0" width="70" height="30" fill="#FEF3C7" rx="5" stroke="#F59E0B"/>
    <text x="10" y="22" font-family="Arial, sans-serif" font-size="16" fill="#1F2937">Cat 🐱</text>
  </g>
  <g transform="translate(160, 260)">
    <rect x="0" y="0" width="70" height="30" fill="#DBEAFE" rx="5" stroke="#3B82F6"/>
    <text x="10" y="22" font-family="Arial, sans-serif" font-size="16" fill="#1F2937">Dog 🐕</text>
  </g>
  <g transform="translate(240, 260)">
    <rect x="0" y="0" width="80" height="30" fill="#DCFCE7" rx="5" stroke="#22C55E"/>
    <text x="10" y="22" font-family="Arial, sans-serif" font-size="16" fill="#1F2937">Bird 🐦</text>
  </g>
  
  <!-- Stars -->
  <polygon points="380,100 384,108 393,108 386,114 389,123 380,117 371,123 374,114 367,108 376,108" fill="#FCD34D"/>
  <polygon points="20,200 24,208 33,208 26,214 29,223 20,217 11,223 14,214 7,208 16,208" fill="#FCD34D"/>
</svg>