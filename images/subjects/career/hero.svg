<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="careerBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6D28D9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pathGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#A78BFA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#careerBg)" opacity="0.12"/>

  <!-- Career path/road -->
  <path d="M 100 180 Q 60 150 80 120 Q 100 90 70 60 Q 50 40 80 25" stroke="#A78BFA" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.3"/>

  <!-- Briefcase -->
  <g transform="translate(120, 30)">
    <rect x="0" y="15" width="50" height="35" rx="5" fill="#6B7280"/>
    <rect x="5" y="20" width="40" height="25" rx="3" fill="#9CA3AF"/>
    <rect x="15" y="8" width="20" height="10" rx="2" fill="#4B5563"/>
    <rect x="20" y="30" width="10" height="8" rx="2" fill="#374151"/>
    <circle cx="25" cy="30" r="2" fill="#F59E0B"/>
  </g>

  <!-- Person with graduation cap -->
  <g transform="translate(30, 50)">
    <!-- Head -->
    <circle cx="25" cy="0" r="12" fill="#FBBF24"/>
    <!-- Body -->
    <rect x="15" y="15" width="20" height="30" rx="5" fill="#3B82F6"/>
    <!-- Graduation cap -->
    <polygon points="25,-18 5,-10 25,-2 45,-10" fill="#1F2937"/>
    <rect x="20" y="-12" width="10" height="3" fill="#1F2937"/>
    <line x1="40" y1="-10" x2="40" y2="-18" stroke="#FBBF24" stroke-width="2"/>
    <circle cx="40" cy="-18" r="3" fill="#FBBF24"/>
  </g>

  <!-- Laptop/Computer -->
  <g transform="translate(130, 100)">
    <!-- Screen -->
    <rect x="0" y="0" width="45" height="30" rx="3" fill="#1F2937"/>
    <rect x="3" y="3" width="39" height="24" rx="2" fill="#3B82F6" opacity="0.7"/>
    <!-- Code lines -->
    <rect x="8" y="8" width="15" height="3" fill="#10B981" opacity="0.8"/>
    <rect x="8" y="14" width="25" height="3" fill="#60A5FA" opacity="0.8"/>
    <rect x="8" y="20" width="20" height="3" fill="#F59E0B" opacity="0.8"/>
    <!-- Base -->
    <rect x="5" y="30" width="35" height="5" rx="2" fill="#374151"/>
    <ellipse cx="22.5" cy="35" rx="15" ry="3" fill="#4B5563"/>
  </g>

  <!-- Tools (wrench and gear) -->
  <g transform="translate(25, 120)">
    <!-- Gear -->
    <circle cx="25" cy="25" r="18" fill="#6B7280"/>
    <circle cx="25" cy="25" r="8" fill="#374151"/>
    <g fill="#9CA3AF">
      <rect x="23" y="2" width="4" height="10" rx="1"/>
      <rect x="23" y="38" width="4" height="10" rx="1"/>
      <rect x="2" y="23" width="10" height="4" rx="1"/>
      <rect x="38" y="23" width="10" height="4" rx="1"/>
      <rect x="8" y="8" width="8" height="4" rx="1" transform="rotate(45, 12, 10)"/>
      <rect x="34" y="34" width="8" height="4" rx="1" transform="rotate(45, 38, 36)"/>
      <rect x="34" y="8" width="8" height="4" rx="1" transform="rotate(-45, 38, 10)"/>
      <rect x="8" y="34" width="8" height="4" rx="1" transform="rotate(-45, 12, 36)"/>
    </g>
  </g>

  <!-- Target/Goal -->
  <g transform="translate(70, 145)">
    <circle cx="30" cy="30" r="25" fill="none" stroke="#EF4444" stroke-width="3"/>
    <circle cx="30" cy="30" r="18" fill="none" stroke="#EF4444" stroke-width="3"/>
    <circle cx="30" cy="30" r="10" fill="none" stroke="#EF4444" stroke-width="3"/>
    <circle cx="30" cy="30" r="4" fill="#EF4444"/>
    <!-- Arrow in target -->
    <line x1="45" y1="15" x2="32" y2="28" stroke="#1F2937" stroke-width="3"/>
    <polygon points="50,12 42,18 46,22" fill="#1F2937"/>
  </g>

  <!-- Arrows pointing up (growth) -->
  <g transform="translate(150, 170)">
    <polygon points="15,0 25,15 20,15 20,25 10,25 10,15 5,15" fill="#10B981"/>
  </g>

  <!-- Stars for achievements -->
  <polygon points="165,65 168,73 177,73 170,79 173,87 165,82 157,87 160,79 153,73 162,73" fill="#FBBF24"/>
  <polygon points="175,130 177,135 182,135 178,139 180,144 175,141 170,144 172,139 168,135 173,135" fill="#FBBF24" opacity="0.7"/>

  <!-- Decorative dots -->
  <circle cx="95" cy="40" r="3" fill="#A78BFA" opacity="0.6"/>
  <circle cx="105" cy="55" r="2" fill="#A78BFA" opacity="0.4"/>
  <circle cx="115" cy="70" r="2.5" fill="#7C3AED" opacity="0.5"/>
</svg>