<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="rusBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#DC2626;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EA580C;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bookGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FEF3C7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FDE68A;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="url(#rusBg)" rx="20"/>
  
  <!-- Decorative elements -->
  <circle cx="60" cy="60" r="35" fill="#FCA5A5" opacity="0.3"/>
  <circle cx="340" cy="240" r="45" fill="#FDBA74" opacity="0.3"/>
  
  <!-- Open book -->
  <path d="M80 80 Q120 60 200 80 L200 220 Q120 200 80 220 Z" fill="url(#bookGrad)" stroke="#B45309" stroke-width="2"/>
  <path d="M200 80 Q280 60 320 80 L320 220 Q280 200 200 220 Z" fill="url(#bookGrad)" stroke="#B45309" stroke-width="2"/>
  <line x1="200" y1="80" x2="200" y2="220" stroke="#B45309" stroke-width="2"/>
  
  <!-- Text lines on book -->
  <line x1="100" y1="110" x2="180" y2="105" stroke="#92400E" stroke-width="2" opacity="0.5"/>
  <line x1="100" y1="130" x2="180" y2="125" stroke="#92400E" stroke-width="2" opacity="0.5"/>
  <line x1="100" y1="150" x2="180" y2="145" stroke="#92400E" stroke-width="2" opacity="0.5"/>
  <line x1="100" y1="170" x2="180" y2="165" stroke="#92400E" stroke-width="2" opacity="0.5"/>
  <line x1="100" y1="190" x2="160" y2="186" stroke="#92400E" stroke-width="2" opacity="0.5"/>
  
  <line x1="220" y1="105" x2="300" y2="110" stroke="#92400E" stroke-width="2" opacity="0.5"/>
  <line x1="220" y1="125" x2="300" y2="130" stroke="#92400E" stroke-width="2" opacity="0.5"/>
  <line x1="220" y1="145" x2="300" y2="150" stroke="#92400E" stroke-width="2" opacity="0.5"/>
  <line x1="220" y1="165" x2="300" y2="170" stroke="#92400E" stroke-width="2" opacity="0.5"/>
  <line x1="220" y1="185" x2="280" y2="190" stroke="#92400E" stroke-width="2" opacity="0.5"/>
  
  <!-- Letters floating -->
  <text x="50" y="140" font-family="Georgia, serif" font-size="40" fill="#FDE68A" font-weight="bold">А</text>
  <text x="340" y="100" font-family="Georgia, serif" font-size="36" fill="#FEF3C7" font-weight="bold">Б</text>
  <text x="30" y="260" font-family="Georgia, serif" font-size="38" fill="#FCD34D" font-weight="bold">В</text>
  <text x="350" y="170" font-family="Georgia, serif" font-size="34" fill="#FBBF24" font-weight="bold">Г</text>
  
  <!-- Pencil -->
  <rect x="280" y="240" width="80" height="14" fill="#FCD34D" transform="rotate(-30 280 240)"/>
  <polygon points="363,168 380,158 380,178" fill="#FECACA" transform="rotate(-30 363 168)"/>
  <rect x="275" y="237" width="15" height="14" fill="#F472B6" transform="rotate(-30 275 237)"/>
  
  <!-- Stars -->
  <polygon points="70,280 75,290 85,290 77,297 80,307 70,300 60,307 63,297 55,290 65,290" fill="#FCD34D"/>
  <polygon points="330,60 334,68 343,68 336,74 339,83 330,77 321,83 324,74 317,68 326,68" fill="#FCD34D"/>
  
  <!-- ABC label -->
  <text x="175" y="290" font-family="Arial, sans-serif" font-size="24" fill="#FEF3C7" font-weight="bold">АБВ</text>
</svg>