<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 90">
  <defs>
    <linearGradient id="lBg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22C55E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#14B8A6;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="120" height="90" fill="url(#lBg3)" rx="10"/>
  
  <!-- Snowflake -->
  <g transform="translate(30, 45)">
    <line x1="0" y1="0" x2="30" y2="0" stroke="white" stroke-width="2"/>
    <line x1="15" y1="-15" x2="15" y2="15" stroke="white" stroke-width="2"/>
    <line x1="3" y1="-12" x2="27" y2="12" stroke="white" stroke-width="2"/>
    <line x1="27" y1="-12" x2="3" y2="12" stroke="white" stroke-width="2"/>
    <circle cx="15" cy="0" r="4" fill="white"/>
  </g>
  
  <!-- Winter items -->
  <text x="80" y="30" font-size="20">❄️</text>
  <text x="95" y="55" font-size="20">⛄</text>
  <text x="75" y="80" font-size="20">🧣</text>
  
  <!-- Snow dots -->
  <circle cx="10" cy="15" r="2" fill="white"/>
  <circle cx="50" cy="10" r="2" fill="white"/>
  <circle cx="70" cy="20" r="1.5" fill="white"/>
  <circle cx="55" cy="75" r="2" fill="white"/>
</svg>