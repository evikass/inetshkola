<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 90">
  <defs>
    <linearGradient id="lBg6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22C55E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#14B8A6;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="120" height="90" fill="url(#lBg6)" rx="10"/>
  
  <!-- Sun -->
  <circle cx="30" cy="30" r="18" fill="#FCD34D"/>
  <g stroke="#FCD34D" stroke-width="2" stroke-linecap="round">
    <line x1="30" y1="8" x2="30" y2="2"/>
    <line x1="30" y1="52" x2="30" y2="58"/>
    <line x1="8" y1="30" x2="2" y2="30"/>
    <line x1="52" y1="30" x2="58" y2="30"/>
    <line x1="15" y1="15" x2="11" y2="11"/>
    <line x1="45" y1="45" x2="49" y2="49"/>
    <line x1="45" y1="15" x2="49" y2="11"/>
    <line x1="15" y1="45" x2="11" y2="49"/>
  </g>
  
  <!-- Flower -->
  <g transform="translate(85, 55)">
    <circle cx="0" cy="0" r="8" fill="#F9A8D4"/>
    <circle cx="0" cy="0" r="4" fill="#FCD34D"/>
    <line x1="0" y1="8" x2="0" y2="25" stroke="#16A34A" stroke-width="2"/>
  </g>
  
  <!-- Butterflies -->
  <g transform="translate(70, 25) scale(0.6)">
    <ellipse cx="0" cy="0" rx="10" ry="6" fill="#E879F9" transform="rotate(-20)"/>
    <ellipse cx="0" cy="0" rx="10" ry="6" fill="#E879F9" transform="rotate(20)"/>
  </g>
  
  <!-- Cloud -->
  <ellipse cx="55" cy="15" rx="15" ry="10" fill="white" opacity="0.8"/>
  <ellipse cx="70" cy="12" rx="12" ry="8" fill="white" opacity="0.8"/>
  
  <!-- Grass -->
  <path d="M0 85 Q30 75 60 85 Q90 95 120 85 L120 90 L0 90 Z" fill="#16A34A"/>
