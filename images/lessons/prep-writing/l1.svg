<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 90">
  <defs>
    <linearGradient id="lBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A855F7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EC4899;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="120" height="90" fill="url(#lBg)" rx="10"/>
  
  <!-- Dotted circle -->
  <circle cx="40" cy="45" r="25" fill="none" stroke="#FEF3C7" stroke-width="3" stroke-dasharray="6,4"/>
  
  <!-- Arrow showing tracing direction -->
  <path d="M60 30 A25 25 0 0 1 65 50" fill="none" stroke="white" stroke-width="2"/>
  <polygon points="65,50 70,42 60,45" fill="white"/>
  
  <!-- Pencil -->
  <g transform="translate(75, 25) rotate(45)">
    <rect x="0" y="0" width="6" height="30" fill="#FCD34D" rx="1"/>
    <polygon points="3,30 0,40 6,40" fill="#FBBF24"/>
    <rect x="0" y="0" width="6" height="5" fill="#EC4899" rx="1"/>
  </g>
  
  <!-- Star reward -->
  <text x="95" y="75" font-size="18">⭐</text>
</svg>