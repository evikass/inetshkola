<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bgart" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7b1fa2"/>
      <stop offset="100%" style="stop-color:#9c27b0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bgart)"/>
  
  <!-- Палитра -->
  <ellipse cx="250" cy="250" rx="100" ry="80" fill="#d7ccc8" opacity="0.9"/>
  <circle cx="200" cy="220" r="15" fill="#f44336"/>
  <circle cx="250" cy="200" r="15" fill="#ffeb3b"/>
  <circle cx="300" cy="220" r="15" fill="#2196f3"/>
  <circle cx="280" cy="270" r="15" fill="#4caf50"/>
  <circle cx="220" cy="280" r="15" fill="#ff9800"/>
  <ellipse cx="320" cy="250" rx="20" ry="15" fill="#7b1fa2"/>
  
  <!-- Кисть -->
  <rect x="450" y="150" width="15" height="150" fill="#8d6e63"/>
  <path d="M 450 150 Q 457 130 465 150" fill="#1a237e" opacity="0.8"/>
  
  <!-- Холст -->
  <rect x="550" y="150" width="180" height="130" fill="#ffffff" opacity="0.9"/>
  <rect x="560" y="160" width="160" height="110" fill="#fff8e1"/>
  <!-- Пейзаж на холсте -->
  <rect x="560" y="200" width="160" height="70" fill="#81d4fa" opacity="0.5"/>
  <circle cx="620" cy="180" r="15" fill="#ffeb3b" opacity="0.7"/>
  <polygon points="700,270 730,200 760,270" fill="#81c784" opacity="0.6"/>
  
  <!-- Цветовые круги -->
  <circle cx="150" cy="420" r="40" fill="none" stroke="#e1bee7" stroke-width="3"/>
  <circle cx="150" cy="420" r="25" fill="none" stroke="#ce93d8" stroke-width="2"/>
  
  <text x="400" y="480" text-anchor="middle" font-family="Georgia, serif" font-size="24" font-weight="bold" fill="#ffffff">Искусство</text>
</svg>