<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bgmus" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00695c"/>
      <stop offset="100%" style="stop-color:#00897b"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bgmus)"/>
  
  <!-- Нотный стан -->
  <g transform="translate(50, 150)">
    <line x1="0" y1="0" x2="700" y2="0" stroke="#ffffff" stroke-width="2" opacity="0.5"/>
    <line x1="0" y1="20" x2="700" y2="20" stroke="#ffffff" stroke-width="2" opacity="0.5"/>
    <line x1="0" y1="40" x2="700" y2="40" stroke="#ffffff" stroke-width="2" opacity="0.5"/>
    <line x1="0" y1="60" x2="700" y2="60" stroke="#ffffff" stroke-width="2" opacity="0.5"/>
    <line x1="0" y1="80" x2="700" y2="80" stroke="#ffffff" stroke-width="2" opacity="0.5"/>
  </g>
  
  <!-- Скрипичный ключ -->
  <text x="80" y="240" font-family="Georgia, serif" font-size="120" fill="#ffffff" opacity="0.8">𝄞</text>
  
  <!-- Ноты -->
  <ellipse cx="250" cy="190" rx="15" ry="12" fill="#ffffff" transform="rotate(-20 250 190)"/>
  <line x1="265" y1="190" x2="265" y2="130" stroke="#ffffff" stroke-width="3"/>
  
  <ellipse cx="350" cy="230" rx="15" ry="12" fill="#ffffff" transform="rotate(-20 350 230)"/>
  <line x1="365" y1="230" x2="365" y2="170" stroke="#ffffff" stroke-width="3"/>
  
  <ellipse cx="450" cy="210" rx="15" ry="12" fill="#ffffff" transform="rotate(-20 450 210)"/>
  <line x1="465" y1="210" x2="465" y2="150" stroke="#ffffff" stroke-width="3"/>
  
  <ellipse cx="550" cy="250" rx="15" ry="12" fill="#ffffff" transform="rotate(-20 550 250)"/>
  <line x1="565" y1="250" x2="565" y2="190" stroke="#ffffff" stroke-width="3"/>
  
  <!-- Гитара (силуэт) -->
  <ellipse cx="180" cy="400" rx="50" ry="60" fill="#8d6e63" opacity="0.6"/>
  <ellipse cx="180" cy="400" rx="30" ry="40" fill="#5d4037" opacity="0.7"/>
  <rect x="175" y="300" width="10" height="60" fill="#6d4c41" opacity="0.6"/>
  
  <!-- Ноты внизу -->
  <text x="600" y="420" font-family="Georgia, serif" font-size="50" fill="#ffffff" opacity="0.4">♪♫♪</text>
  
  <text x="400" y="480" text-anchor="middle" font-family="Georgia, serif" font-size="24" font-weight="bold" fill="#ffffff">Музыка</text>
</svg>