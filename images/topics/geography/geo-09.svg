<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="sky9" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87ceeb"/>
      <stop offset="100%" style="stop-color:#98fb98"/>
    </linearGradient>
  </defs>
  
  <!-- Sky background -->
  <rect width="400" height="300" fill="url(#sky9)" rx="12"/>
  
  <!-- Sun -->
  <circle cx="350" cy="50" r="30" fill="#ffd700"/>
  
  <!-- TUNDRA section -->
  <rect x="0" y="60" width="100" height="80" fill="#e0ffff" opacity="0.7"/>
  <text x="50" y="75" text-anchor="middle" font-size="10" fill="#333" font-weight="bold">ТУНДРА</text>
  <!-- Moss/lichen -->
  <ellipse cx="30" cy="120" rx="15" ry="5" fill="#8fbc8f"/>
  <ellipse cx="60" cy="115" rx="12" ry="4" fill="#9acd32"/>
  <!-- Reindeer -->
  <ellipse cx="50" cy="100" rx="12" ry="8" fill="#8b4513"/>
  <circle cx="60" cy="92" r="5" fill="#8b4513"/>
  <line x1="40" y1="108" x2="38" y2="120" stroke="#654321" stroke-width="2"/>
  <line x1="55" y1="108" x2="57" y2="120" stroke="#654321" stroke-width="2"/>
  
  <!-- TAIGA section -->
  <rect x="100" y="60" width="100" height="80" fill="#228b22" opacity="0.5"/>
  <text x="150" y="75" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">ТАЙГА</text>
  <!-- Coniferous trees -->
  <polygon points="120,130 130,90 140,130" fill="#006400"/>
  <polygon points="140,130 150,85 160,130" fill="#006400"/>
  <polygon points="160,130 170,95 180,130" fill="#006400"/>
  <!-- Bear -->
  <ellipse cx="150" cy="115" rx="10" ry="8" fill="#8b4513"/>
  <circle cx="158" cy="108" r="5" fill="#8b4513"/>
  <circle cx="156" cy="107" r="1" fill="#000"/>
  
  <!-- STEPPE section -->
  <rect x="200" y="60" width="100" height="80" fill="#f0e68c" opacity="0.7"/>
  <text x="250" y="75" text-anchor="middle" font-size="10" fill="#333" font-weight="bold">СТЕПЬ</text>
  <!-- Grass -->
  <line x1="210" y1="130" x2="210" y2="110" stroke="#9acd32" stroke-width="2"/>
  <line x1="220" y1="130" x2="220" y2="115" stroke="#9acd32" stroke-width="2"/>
  <line x1="230" y1="130" x2="230" y2="108" stroke="#9acd32" stroke-width="2"/>
  <line x1="270" y1="130" x2="270" y2="112" stroke="#9acd32" stroke-width="2"/>
  <line x1="280" y1="130" x2="280" y2="110" stroke="#9acd32" stroke-width="2"/>
  <line x1="290" y1="130" x2="290" y2="115" stroke="#9acd32" stroke-width="2"/>
  <!-- Steppe eagle -->
  <path d="M 250 95 L 240 100 L 250 98 L 260 100 Z" fill="#8b4513"/>
  
  <!-- DESERT section -->
  <rect x="300" y="60" width="100" height="80" fill="#f4a460" opacity="0.7"/>
  <text x="350" y="75" text-anchor="middle" font-size="10" fill="#333" font-weight="bold">ПУСТЫНЯ</text>
  <!-- Sand dunes -->
  <ellipse cx="320" cy="125" rx="15" ry="8" fill="#daa520"/>
  <ellipse cx="350" cy="120" rx="20" ry="10" fill="#cd853f"/>
  <ellipse cx="380" cy="125" rx="15" ry="6" fill="#daa520"/>
  <!-- Cactus -->
  <rect x="370" y="100" width="8" height="25" fill="#228b22" rx="4"/>
  <rect x="378" y="105" width="6" height="12" fill="#228b22" rx="3"/>
  
  <!-- Forest landscape (lower section) -->
  <rect x="0" y="150" width="200" height="80" fill="#2e8b57"/>
  <!-- Mixed forest trees -->
  <polygon points="30,220 45,170 60,220" fill="#228b22"/>
  <circle cx="90" cy="180" r="20" fill="#228b22"/>
  <rect x="85" y="195" width="10" height="25" fill="#8b4513"/>
  <polygon points="120,220 135,175 150,220" fill="#006400"/>
  <circle cx="170" cy="185" r="18" fill="#2e8b57"/>
  <rect x="165" y="198" width="10" height="22" fill="#8b4513"/>
  
  <!-- Animals in forest -->
  <!-- Moose -->
  <ellipse cx="70" cy="210" rx="15" ry="10" fill="#8b4513"/>
  <circle cx="85" cy="200" r="6" fill="#8b4513"/>
  <path d="M 78 194 L 75 180 L 78 185" fill="#8b4513"/>
  <path d="M 82 194 L 85 180 L 82 185" fill="#8b4513"/>
  
  <!-- Squirrel -->
  <circle cx="150" cy="195" r="5" fill="#cd853f"/>
  <path d="M 145 195 Q 135 185 140 180" fill="#cd853f" stroke="#cd853f" stroke-width="3"/>
  
  <!-- Tropical rainforest -->
  <rect x="200" y="150" width="200" height="80" fill="#228b22"/>
  <!-- Palm trees -->
  <rect x="230" y="180" width="8" height="40" fill="#8b4513"/>
  <path d="M 234 180 Q 210 170 200 175" fill="#228b22" stroke="#228b22" stroke-width="2"/>
  <path d="M 234 180 Q 220 160 215 155" fill="#228b22" stroke="#228b22" stroke-width="2"/>
  <path d="M 234 180 Q 250 160 255 155" fill="#228b22" stroke="#228b22" stroke-width="2"/>
  <path d="M 234 180 Q 260 170 270 175" fill="#228b22" stroke="#228b22" stroke-width="2"/>
  
  <rect x="330" y="175" width="8" height="45" fill="#8b4513"/>
  <path d="M 334 175 Q 310 165 300 170" fill="#228b22" stroke="#228b22" stroke-width="2"/>
  <path d="M 334 175 Q 320 155 315 150" fill="#228b22" stroke="#228b22" stroke-width="2"/>
  <path d="M 334 175 Q 350 155 355 150" fill="#228b22" stroke="#228b22" stroke-width="2"/>
  <path d="M 334 175 Q 360 165 370 170" fill="#228b22" stroke="#228b22" stroke-width="2"/>
  
  <!-- Parrot -->
  <ellipse cx="280" cy="190" rx="8" ry="5" fill="#ff6347"/>
  <circle cx="275" cy="186" r="4" fill="#ff6347"/>
  <polygon points="270,185 265,187 270,189" fill="#ffd700"/>
  
  <!-- Text label -->
  <text x="200" y="290" text-anchor="middle" font-size="18" fill="#333" font-weight="bold">Природные зоны</text>
</svg>