<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="sky8" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87ceeb"/>
      <stop offset="100%" style="stop-color:#f0e68c"/>
    </linearGradient>
  </defs>
  
  <!-- Sky background -->
  <rect width="400" height="300" fill="url(#sky8)" rx="12"/>
  
  <!-- Sun -->
  <circle cx="350" cy="60" r="40" fill="#ffd700"/>
  <line x1="350" y1="10" x2="350" y2="0" stroke="#ffd700" stroke-width="4"/>
  <line x1="350" y1="110" x2="350" y2="120" stroke="#ffd700" stroke-width="4"/>
  <line x1="300" y1="60" x2="290" y2="60" stroke="#ffd700" stroke-width="4"/>
  <line x1="400" y1="60" x2="395" y2="60" stroke="#ffd700" stroke-width="4"/>
  <line x1="315" y1="25" x2="308" y2="18" stroke="#ffd700" stroke-width="4"/>
  <line x1="385" y1="95" x2="392" y2="102" stroke="#ffd700" stroke-width="4"/>
  
  <!-- Clouds -->
  <ellipse cx="80" cy="50" rx="30" ry="15" fill="#ffffff" opacity="0.9"/>
  <ellipse cx="100" cy="45" rx="25" ry="18" fill="#ffffff" opacity="0.9"/>
  <ellipse cx="120" cy="55" rx="20" ry="12" fill="#ffffff" opacity="0.9"/>
  
  <ellipse cx="220" cy="70" rx="25" ry="12" fill="#ffffff" opacity="0.8"/>
  <ellipse cx="240" cy="65" rx="20" ry="15" fill="#ffffff" opacity="0.8"/>
  
  <!-- Rain cloud -->
  <ellipse cx="80" cy="100" rx="25" ry="15" fill="#a0a0a0"/>
  <ellipse cx="100" cy="95" rx="20" ry="12" fill="#808080"/>
  <!-- Rain drops -->
  <line x1="60" y1="115" x2="55" y2="130" stroke="#4a90d9" stroke-width="2"/>
  <line x1="80" y1="120" x2="75" y2="135" stroke="#4a90d9" stroke-width="2"/>
  <line x1="100" y1="115" x2="95" y2="130" stroke="#4a90d9" stroke-width="2"/>
  
  <!-- Mountains with snow caps -->
  <polygon points="0,250 80,150 160,250" fill="#6b8e23"/>
  <polygon points="80,150 50,180 110,180" fill="#ffffff"/>
  
  <polygon points="120,250 200,130 280,250" fill="#228b22"/>
  <polygon points="200,130 160,170 240,170" fill="#ffffff"/>
  
  <polygon points="240,250 320,160 400,250" fill="#6b8e23"/>
  <polygon points="320,160 290,190 350,190" fill="#ffffff"/>
  
  <!-- Thermometer -->
  <rect x="30" y="120" width="20" height="80" fill="#ffffff" rx="10" stroke="#333" stroke-width="2"/>
  <circle cx="40" cy="190" r="15" fill="#ff0000" stroke="#333" stroke-width="2"/>
  <rect x="35" y="140" width="10" height="50" fill="#ff0000"/>
  <!-- Temperature marks -->
  <line x1="50" y1="130" x2="60" y2="130" stroke="#333" stroke-width="1"/>
  <text x="65" y="133" font-size="8" fill="#333">40°</text>
  <line x1="50" y1="160" x2="60" y2="160" stroke="#333" stroke-width="1"/>
  <text x="65" y="163" font-size="8" fill="#333">20°</text>
  
  <!-- Wind arrows -->
  <path d="M 280 100 Q 320 90 350 100" fill="none" stroke="#333" stroke-width="3"/>
  <polygon points="350,100 340,95 342,102" fill="#333"/>
  
  <!-- Climate zones indicator -->
  <rect x="280" y="180" width="110" height="80" fill="#ffffff" opacity="0.9" rx="5"/>
  <text x="335" y="195" text-anchor="middle" font-size="10" fill="#333" font-weight="bold">Климат. зоны</text>
  <rect x="290" y="205" width="90" height="10" fill="#ff6b6b"/>
  <text x="335" y="213" text-anchor="middle" font-size="8" fill="#fff">тропики</text>
  <rect x="290" y="220" width="90" height="10" fill="#ffd700"/>
  <text x="335" y="228" text-anchor="middle" font-size="8" fill="#333">умеренный</text>
  <rect x="290" y="235" width="90" height="10" fill="#87ceeb"/>
  <text x="335" y="243" text-anchor="middle" font-size="8" fill="#333">арктический</text>
  
  <!-- Text label -->
  <text x="200" y="290" text-anchor="middle" font-size="18" fill="#333" font-weight="bold">Климатообразующие факторы</text>
</svg>