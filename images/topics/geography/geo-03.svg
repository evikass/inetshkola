<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#2d5a87"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="url(#bg3)" rx="12"/>
  
  <!-- Sun (left side) -->
  <circle cx="60" cy="80" r="35" fill="#ffd700"/>
  <line x1="60" y1="35" x2="60" y2="20" stroke="#ffd700" stroke-width="4"/>
  <line x1="60" y1="125" x2="60" y2="140" stroke="#ffd700" stroke-width="4"/>
  <line x1="15" y1="80" x2="0" y2="80" stroke="#ffd700" stroke-width="4"/>
  <line x1="105" y1="80" x2="120" y2="80" stroke="#ffd700" stroke-width="4"/>
  
  <!-- Earth with axis tilt -->
  <ellipse cx="200" cy="140" rx="60" ry="60" fill="#4a90d9"/>
  <ellipse cx="200" cy="140" rx="60" ry="20" fill="none" stroke="#6bb3f0" stroke-width="2" opacity="0.5"/>
  
  <!-- Continents -->
  <ellipse cx="180" cy="120" rx="18" ry="15" fill="#5cb85c" opacity="0.8"/>
  <ellipse cx="215" cy="145" rx="15" ry="12" fill="#5cb85c" opacity="0.8"/>
  
  <!-- Tilted axis -->
  <line x1="200" y1="60" x2="200" y2="220" stroke="#ffffff" stroke-width="3" stroke-dasharray="5,3" transform="rotate(23.5 200 140)"/>
  <text x="225" y="65" font-size="12" fill="#ffffff">Ось</text>
  
  <!-- Rotation arrows -->
  <path d="M 260 100 Q 280 140 260 180" fill="none" stroke="#ffffff" stroke-width="2"/>
  <polygon points="258,180 265,170 255,172" fill="#ffffff"/>
  
  <!-- Day/Night division -->
  <path d="M 200 80 Q 230 140 200 200" fill="none" stroke="#ffd700" stroke-width="2"/>
  
  <!-- Seasons indicators -->
  <g transform="translate(50, 200)">
    <!-- Winter -->
    <circle cx="30" cy="20" r="15" fill="#87ceeb"/>
    <text x="30" y="55" text-anchor="middle" font-size="10" fill="#ffffff">Зима</text>
    <polygon points="30,10 35,25 25,25" fill="#ffffff"/>
  </g>
  
  <g transform="translate(120, 200)">
    <!-- Spring -->
    <circle cx="30" cy="20" r="15" fill="#90ee90"/>
    <text x="30" y="55" text-anchor="middle" font-size="10" fill="#ffffff">Весна</text>
    <path d="M 25 25 Q 30 15 35 25" fill="none" stroke="#228b22" stroke-width="2"/>
  </g>
  
  <g transform="translate(190, 200)">
    <!-- Summer -->
    <circle cx="30" cy="20" r="15" fill="#ffd700"/>
    <text x="30" y="55" text-anchor="middle" font-size="10" fill="#ffffff">Лето</text>
    <circle cx="30" cy="15" r="8" fill="#ffa500"/>
  </g>
  
  <g transform="translate(260, 200)">
    <!-- Autumn -->
    <circle cx="30" cy="20" r="15" fill="#daa520"/>
    <text x="30" y="55" text-anchor="middle" font-size="10" fill="#ffffff">Осень</text>
    <ellipse cx="30" cy="18" rx="6" ry="4" fill="#8b4513" transform="rotate(30 30 18)"/>
  </g>
  
  <!-- Orbit arrow around sun -->
  <path d="M 140 80 Q 200 40 260 80" fill="none" stroke="#ffd700" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="260,80 250,75 252,82" fill="#ffd700"/>
  
  <!-- Text label -->
  <text x="200" y="280" text-anchor="middle" font-size="16" fill="#ffffff" font-weight="bold">Движения Земли</text>
</svg>