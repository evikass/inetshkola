<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f5dc"/>
      <stop offset="100%" style="stop-color:#e8e8d0"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="url(#bg4)" rx="12"/>
  
  <!-- Rolled map -->
  <rect x="30" y="40" width="150" height="100" fill="#f4e4bc" stroke="#8b4513" stroke-width="2" rx="3"/>
  <line x1="30" y1="60" x2="180" y2="60" stroke="#8b4513" stroke-width="1"/>
  <line x1="30" y1="80" x2="180" y2="80" stroke="#8b4513" stroke-width="1"/>
  <line x1="30" y1="100" x2="180" y2="100" stroke="#8b4513" stroke-width="1"/>
  <line x1="30" y1="120" x2="180" y2="120" stroke="#8b4513" stroke-width="1"/>
  
  <!-- Grid on map -->
  <line x1="60" y1="40" x2="60" y2="140" stroke="#8b4513" stroke-width="1" opacity="0.5"/>
  <line x1="90" y1="40" x2="90" y2="140" stroke="#8b4513" stroke-width="1" opacity="0.5"/>
  <line x1="120" y1="40" x2="120" y2="140" stroke="#8b4513" stroke-width="1" opacity="0.5"/>
  <line x1="150" y1="40" x2="150" y2="140" stroke="#8b4513" stroke-width="1" opacity="0.5"/>
  
  <!-- Continents on map -->
  <ellipse cx="100" cy="70" rx="30" ry="15" fill="#5cb85c" opacity="0.7"/>
  <ellipse cx="70" cy="100" rx="20" ry="12" fill="#5cb85c" opacity="0.7"/>
  <ellipse cx="140" cy="90" rx="15" ry="20" fill="#5cb85c" opacity="0.7"/>
  
  <!-- Compass rose -->
  <circle cx="280" cy="90" r="50" fill="#fff" stroke="#8b4513" stroke-width="3"/>
  <polygon points="280,45 288,85 280,75 272,85" fill="#e74c3c"/>
  <polygon points="280,135 272,95 280,105 288,95" fill="#333"/>
  <polygon points="235,90 275,82 265,90 275,98" fill="#333"/>
  <polygon points="325,90 285,98 295,90 285,82" fill="#333"/>
  <text x="280" y="38" text-anchor="middle" font-size="14" fill="#e74c3c" font-weight="bold">N</text>
  <text x="280" y="150" text-anchor="middle" font-size="14" fill="#333" font-weight="bold">S</text>
  <text x="340" y="95" text-anchor="middle" font-size="14" fill="#333" font-weight="bold">E</text>
  <text x="220" y="95" text-anchor="middle" font-size="14" fill="#333" font-weight="bold">W</text>
  
  <!-- Scale bar -->
  <rect x="220" y="170" width="120" height="15" fill="#fff" stroke="#333" stroke-width="1"/>
  <rect x="220" y="170" width="30" height="15" fill="#333"/>
  <rect x="280" y="170" width="30" height="15" fill="#333"/>
  <text x="220" y="200" font-size="10" fill="#333">0</text>
  <text x="280" y="200" font-size="10" fill="#333">500</text>
  <text x="340" y="200" font-size="10" fill="#333">1000 км</text>
  
  <!-- Map symbols legend -->
  <g transform="translate(30, 170)">
    <circle cx="10" cy="10" r="5" fill="#4a90d9"/>
    <text x="25" y="15" font-size="10" fill="#333">— город</text>
    
    <path d="M 5 30 Q 10 25 15 30" fill="none" stroke="#4a90d9" stroke-width="2"/>
    <text x="25" y="35" font-size="10" fill="#333">— река</text>
    
    <polygon points="10,50 5,60 15,60" fill="#5cb85c"/>
    <text x="25" y="58" font-size="10" fill="#333">— гора</text>
  </g>
  
  <!-- Magnifying glass -->
  <circle cx="370" cy="230" r="20" fill="none" stroke="#8b4513" stroke-width="4"/>
  <line x1="385" y1="245" x2="395" y2="255" stroke="#8b4513" stroke-width="6" stroke-linecap="round"/>
  
  <!-- Text label -->
  <text x="200" y="280" text-anchor="middle" font-size="18" fill="#333" font-weight="bold">Географическая карта</text>
</svg>