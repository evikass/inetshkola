<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="ocean5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e90ff"/>
      <stop offset="100%" style="stop-color:#4169e1"/>
    </linearGradient>
  </defs>
  
  <!-- Ocean background -->
  <rect width="400" height="300" fill="url(#ocean5)" rx="12"/>
  
  <!-- Wave pattern -->
  <path d="M 0 280 Q 50 270 100 280 Q 150 290 200 280 Q 250 270 300 280 Q 350 290 400 280 L 400 300 L 0 300 Z" fill="#4169e1" opacity="0.5"/>
  
  <!-- Eurasia -->
  <path d="M 180 40 Q 220 35 280 50 Q 320 70 340 100 Q 330 130 300 140 Q 260 145 220 130 Q 180 115 160 90 Q 150 60 180 40" fill="#5cb85c" stroke="#3d8b3d" stroke-width="2"/>
  <text x="250" y="90" font-size="11" fill="#fff" font-weight="bold">Евразия</text>
  
  <!-- Africa -->
  <path d="M 180 145 Q 200 140 215 160 Q 225 200 210 240 Q 190 250 170 235 Q 160 200 165 170 Q 170 150 180 145" fill="#f4a460" stroke="#cd853f" stroke-width="2"/>
  <text x="185" y="195" font-size="10" fill="#fff" font-weight="bold">Африка</text>
  
  <!-- North America -->
  <path d="M 30 50 Q 60 40 90 55 Q 110 80 100 110 Q 80 130 50 120 Q 25 100 30 70 Q 30 55 30 50" fill="#9acd32" stroke="#6b8e23" stroke-width="2"/>
  <text x="55" y="85" font-size="8" fill="#fff" font-weight="bold">Сев. Америка</text>
  
  <!-- South America -->
  <path d="M 60 160 Q 80 155 95 175 Q 100 210 85 245 Q 65 255 55 235 Q 50 200 60 175 Q 60 165 60 160" fill="#ffd700" stroke="#daa520" stroke-width="2"/>
  <text x="65" y="205" font-size="8" fill="#333" font-weight="bold">Юж. Америка</text>
  
  <!-- Australia -->
  <ellipse cx="340" cy="210" rx="30" ry="22" fill="#ff6347" stroke="#cd5c5c" stroke-width="2"/>
  <text x="340" y="215" font-size="9" fill="#fff" font-weight="bold">Австралия</text>
  
  <!-- Antarctica -->
  <path d="M 100 275 Q 200 265 300 275 Q 350 280 350 285 Q 300 295 200 295 Q 100 295 50 285 Q 50 280 100 275" fill="#ffffff" stroke="#e0e0e0" stroke-width="2"/>
  <text x="200" y="288" font-size="9" fill="#333" font-weight="bold">Антарктида</text>
  
  <!-- Greenland -->
  <ellipse cx="55" cy="35" rx="18" ry="12" fill="#98fb98" stroke="#3cb371" stroke-width="1"/>
  
  <!-- Madagascar -->
  <ellipse cx="235" cy="210" rx="8" ry="15" fill="#dda0dd" stroke="#ba55d3" stroke-width="1"/>
  
  <!-- Japan -->
  <ellipse cx="320" cy="75" rx="8" ry="15" fill="#ff69b4" stroke="#ff1493" stroke-width="1" transform="rotate(20 320 75)"/>
  
  <!-- Great Britain -->
  <ellipse cx="145" cy="60" rx="8" ry="12" fill="#87ceeb" stroke="#4682b4" stroke-width="1"/>
  
  <!-- Labels -->
  <text x="200" y="20" text-anchor="middle" font-size="16" fill="#ffffff" font-weight="bold">Шесть материков</text>
</svg>