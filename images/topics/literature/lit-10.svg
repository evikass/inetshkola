<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg10" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8F5E9"/>
      <stop offset="100%" style="stop-color:#C8E6C9"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg10)" rx="20"/>
  
  <!-- Forest/nature background -->
  <g opacity="0.3">
    <ellipse cx="100" cy="300" rx="60" ry="100" fill="#4CAF50"/>
    <ellipse cx="700" cy="280" rx="70" ry="120" fill="#66BB6A"/>
    <ellipse cx="200" cy="350" rx="40" ry="80" fill="#81C784"/>
  </g>
  
  <!-- Turgenev portrait -->
  <g transform="translate(60, 80)">
    <rect x="0" y="0" width="150" height="180" fill="#4CAF50" rx="5"/>
    <rect x="8" y="8" width="134" height="164" fill="#FFFEF9"/>
    <!-- Face -->
    <ellipse cx="75" cy="60" rx="30" ry="40" fill="#FFCCBC"/>
    <!-- Hair (white/grey) -->
    <ellipse cx="75" cy="30" rx="35" ry="20" fill="#ECEFF1"/>
    <!-- Beard -->
    <path d="M50 80 Q75 130 100 80" fill="#CFD8DC"/>
    <!-- Eyes -->
    <circle cx="60" cy="55" r="4" fill="#1A1A1A"/>
    <circle cx="90" cy="55" r="4" fill="#1A1A1A"/>
    <!-- Glasses -->
    <circle cx="60" cy="55" r="12" stroke="#5D4037" stroke-width="2" fill="none"/>
    <circle cx="90" cy="55" r="12" stroke="#5D4037" stroke-width="2" fill="none"/>
    <line x1="72" y1="55" x2="78" y2="55" stroke="#5D4037" stroke-width="2"/>
    <!-- Collar/jacket -->
    <rect x="45" y="100" width="60" height="50" fill="#1A1A1A"/>
    <polygon points="75,95 60,115 75,105 90,115" fill="#FFFEF9"/>
  </g>
  
  <!-- Mumu (dog) -->
  <g transform="translate(500, 280)">
    <!-- Body -->
    <ellipse cx="0" cy="30" rx="40" ry="30" fill="#A1887F"/>
    <!-- Head -->
    <ellipse cx="-35" cy="10" rx="25" ry="22" fill="#8D6E63"/>
    <!-- Ears -->
    <ellipse cx="-50" cy="-5" rx="10" ry="18" fill="#795548"/>
    <ellipse cx="-20" cy="-5" rx="10" ry="18" fill="#795548"/>
    <!-- Eyes -->
    <circle cx="-40" cy="5" r="5" fill="white"/>
    <circle cx="-25" cy="5" r="5" fill="white"/>
    <circle cx="-40" cy="5" r="2" fill="#4A148C"/>
    <circle cx="-25" cy="5" r="2" fill="#4A148C"/>
    <!-- Nose -->
    <ellipse cx="-50" cy="15" rx="6" ry="5" fill="#1A1A1A"/>
    <!-- Tail -->
    <path d="M35 20 Q55 10 50 40" stroke="#8D6E63" stroke-width="12" fill="none" stroke-linecap="round"/>
    <!-- Legs -->
    <rect x="-25" y="55" width="12" height="25" fill="#8D6E63" rx="4"/>
    <rect x="15" y="55" width="12" height="25" fill="#8D6E63" rx="4"/>
  </g>
  
  <!-- Gerasim (big strong figure) -->
  <g transform="translate(350, 200)">
    <!-- Body (large) -->
    <rect x="-30" y="30" width="60" height="80" fill="#455A64"/>
    <!-- Head -->
    <circle cx="0" cy="10" r="30" fill="#FFCCBC"/>
    <!-- Hair -->
    <ellipse cx="0" cy="-10" rx="28" ry="15" fill="#5D4037"/>
    <!-- Eyes (simple, kind) -->
    <circle cx="-10" cy="5" r="4" fill="#1A1A1A"/>
    <circle cx="10" cy="5" r="4" fill="#1A1A1A"/>
    <!-- Gentle smile -->
    <path d="M-8 20 Q0 28 8 20" stroke="#795548" stroke-width="2" fill="none"/>
    <!-- Arms (strong) -->
    <rect x="-50" y="40" width="20" height="50" fill="#FFCCBC" rx="8"/>
    <rect x="30" y="40" width="20" height="50" fill="#FFCCBC" rx="8"/>
    <!-- Legs -->
    <rect x="-20" y="110" width="15" height="40" fill="#37474F"/>
    <rect x="5" y="110" width="15" height="40" fill="#37474F"/>
  </g>
  
  <!-- Hunter's gun -->
  <g transform="translate(600, 150) rotate(30)">
    <rect x="0" y="0" width="10" height="100" fill="#5D4037"/>
    <rect x="0" y="0" width="10" height="20" fill="#78909C"/>
    <rect x="-5" y="85" width="20" height="30" fill="#8D6E63"/>
  </g>
  
  <!-- Fire/campfire (Beghin Lug) -->
  <g transform="translate(150, 350)">
    <!-- Logs -->
    <rect x="-30" y="20" width="60" height="10" fill="#5D4037" rx="3"/>
    <rect x="-25" y="25" width="50" height="10" fill="#795548" rx="3" transform="rotate(30)"/>
    <!-- Fire -->
    <ellipse cx="0" cy="0" rx="20" ry="30" fill="#FF5722"/>
    <ellipse cx="0" cy="-5" rx="12" ry="20" fill="#FF9800"/>
    <ellipse cx="0" cy="-10" rx="6" ry="12" fill="#FFEB3B"/>
  </g>
  
  <!-- Birds (quails) in grass -->
  <g transform="translate(700, 400)">
    <ellipse cx="0" cy="0" rx="15" ry="10" fill="#8D6E63"/>
    <circle cx="12" cy="-5" r="8" fill="#A1887F"/>
    <polygon points="18,-8 28,-5 18,-2" fill="#FF9800"/>
  </g>
  
  <!-- Title -->
  <rect x="280" y="430" width="240" height="50" fill="rgba(76,175,80,0.9)" rx="10"/>
  <text x="400" y="462" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="white">И.С. Тургенев</text>
</svg>