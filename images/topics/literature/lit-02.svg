<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8D5E8"/>
      <stop offset="100%" style="stop-color:#D4B8D4"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg2)" rx="20"/>
  
  <!-- Magical castle in background -->
  <g transform="translate(550, 120)">
    <rect x="0" y="100" width="120" height="150" fill="#9C27B0" opacity="0.6"/>
    <polygon points="60,30 0,100 120,100" fill="#7B1FA2" opacity="0.7"/>
    <!-- Towers -->
    <rect x="-20" y="60" width="40" height="190" fill="#8E24AA" opacity="0.6"/>
    <polygon points="0,20 -25,60 25,60" fill="#6A1B9A" opacity="0.7"/>
    <rect x="100" y="60" width="40" height="190" fill="#8E24AA" opacity="0.6"/>
    <polygon points="120,20 95,60 145,60" fill="#6A1B9A" opacity="0.7"/>
    <!-- Windows -->
    <rect x="40" y="130" width="25" height="40" fill="#FFD700" opacity="0.8" rx="12"/>
    <rect x="40" y="200" width="25" height="40" fill="#FFD700" opacity="0.8" rx="12"/>
  </g>
  
  <!-- Magical tree -->
  <g transform="translate(100, 150)">
    <rect x="20" y="150" width="30" height="100" fill="#5D4037"/>
    <ellipse cx="35" cy="100" rx="70" ry="80" fill="#4CAF50" opacity="0.8"/>
    <ellipse cx="60" cy="80" rx="50" ry="60" fill="#66BB6A" opacity="0.7"/>
    <!-- Magic sparkles on tree -->
    <circle cx="20" cy="60" r="5" fill="#FFD700"/>
    <circle cx="60" cy="40" r="4" fill="#FFD700"/>
    <circle cx="40" cy="100" r="6" fill="#FFD700"/>
    <circle cx="80" cy="70" r="4" fill="#FFD700"/>
  </g>
  
  <!-- Frog prince -->
  <g transform="translate(300, 320)">
    <ellipse cx="0" cy="20" rx="35" ry="25" fill="#4CAF50"/>
    <ellipse cx="0" cy="-5" rx="28" ry="22" fill="#66BB6A"/>
    <!-- Eyes -->
    <circle cx="-12" cy="-15" r="10" fill="white"/>
    <circle cx="12" cy="-15" r="10" fill="white"/>
    <circle cx="-12" cy="-15" r="5" fill="#1A1A1A"/>
    <circle cx="12" cy="-15" r="5" fill="#1A1A1A"/>
    <!-- Crown -->
    <polygon points="-20,-35 -15,-50 -10,-35 -5,-55 0,-35 5,-55 10,-35 15,-50 20,-35" fill="#FFD700" stroke="#DAA520" stroke-width="1"/>
    <!-- Mouth -->
    <path d="M-15 5 Q0 15 15 5" stroke="#2E7D32" stroke-width="2" fill="none"/>
  </g>
  
  <!-- Golden egg -->
  <g transform="translate(420, 350)">
    <ellipse cx="0" cy="0" rx="25" ry="35" fill="#FFD700"/>
    <ellipse cx="0" cy="0" rx="25" ry="35" fill="url(#eggGrad)" opacity="0.5"/>
    <ellipse cx="-8" cy="-10" rx="8" ry="12" fill="white" opacity="0.4"/>
  </g>
  <defs>
    <radialGradient id="eggGrad">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#FFD700"/>
    </radialGradient>
  </defs>
  
  <!-- Magic wand with stars -->
  <g transform="translate(650, 350) rotate(-30)">
    <rect x="0" y="0" width="8" height="100" fill="#5D4037" rx="4"/>
    <polygon points="4,-30 -10,-15 4,0 18,-15" fill="#FFD700"/>
    <circle cx="-15" cy="-20" r="4" fill="#FFD700"/>
    <circle cx="20" cy="-25" r="3" fill="#FFD700"/>
    <circle cx="5" cy="-40" r="3" fill="#FFD700"/>
  </g>
  
  <!-- Floating stars -->
  <g fill="#FFD700" opacity="0.8">
    <polygon points="50,80 53,90 63,90 55,97 58,107 50,100 42,107 45,97 37,90 47,90"/>
    <polygon points="750,150 752,157 760,157 754,162 756,170 750,165 744,170 746,162 740,157 748,157" transform="scale(0.9)"/>
    <polygon points="200,450 203,460 213,460 205,467 208,477 200,470 192,477 195,467 187,460 197,460" transform="scale(0.7)"/>
  </g>
  
  <!-- Title -->
  <rect x="300" y="420" width="200" height="50" fill="rgba(156,39,176,0.9)" rx="10"/>
  <text x="400" y="453" text-anchor="middle" font-family="Georgia, serif" font-size="24" font-weight="bold" fill="white">Сказка</text>
</svg>