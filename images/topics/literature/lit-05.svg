<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F3E5F5"/>
      <stop offset="100%" style="stop-color:#E1BEE7"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg5)" rx="20"/>
  
  <!-- Portrait frame -->
  <g transform="translate(80, 80)">
    <rect x="0" y="0" width="180" height="220" fill="#5D4037" rx="5"/>
    <rect x="10" y="10" width="160" height="200" fill="#FFFEF9"/>
    
    <!-- Pushkin silhouette -->
    <ellipse cx="90" cy="60" rx="35" ry="45" fill="#3E2723"/>
    <!-- Sideburns/curly hair -->
    <ellipse cx="55" cy="55" rx="15" ry="25" fill="#3E2723"/>
    <ellipse cx="125" cy="55" rx="15" ry="25" fill="#3E2723"/>
    <!-- Collar/jacket -->
    <path d="M50 100 L90 130 L130 100 L130 180 L50 180 Z" fill="#1A237E"/>
    <!-- White collar -->
    <path d="M70 105 L90 120 L110 105 L100 130 L80 130 Z" fill="#FFFEF9"/>
  </g>
  
  <!-- Quill and paper -->
  <g transform="translate(500, 150)">
    <!-- Paper -->
    <rect x="0" y="0" width="200" height="250" fill="#FFFEF9" transform="rotate(-5)"/>
    <rect x="0" y="0" width="200" height="250" fill="none" stroke="#DAA520" stroke-width="3" transform="rotate(-5)"/>
    <!-- Text lines -->
    <g transform="rotate(-5)">
      <line x1="20" y1="40" x2="180" y2="40" stroke="#333" stroke-width="1" opacity="0.4"/>
      <line x1="25" y1="60" x2="175" y2="60" stroke="#333" stroke-width="1" opacity="0.4"/>
      <line x1="20" y1="80" x2="160" y2="80" stroke="#333" stroke-width="1" opacity="0.4"/>
      <text x="30" y="120" font-family="Georgia, serif" font-size="14" fill="#4A148C" font-style="italic">"Я помню чудное</text>
      <text x="30" y="140" font-family="Georgia, serif" font-size="14" fill="#4A148C" font-style="italic">мгновенье..."</text>
    </g>
    <!-- Quill -->
    <g transform="translate(160, 180) rotate(45)">
      <path d="M0 0 L15 80 L8 75 L3 85 L0 0" fill="#4A3728"/>
      <ellipse cx="0" cy="0" rx="6" ry="4" fill="#1A1A1A"/>
    </g>
  </g>
  
  <!-- Golden sun (reference to "Солнце русской поэзии") -->
  <g transform="translate(400, 80)">
    <circle cx="0" cy="0" r="40" fill="#FFD700"/>
    <g stroke="#FFD700" stroke-width="3">
      <line x1="0" y1="-55" x2="0" y2="-70"/>
      <line x1="39" y1="-39" x2="49" y2="-49"/>
      <line x1="55" y1="0" x2="70" y2="0"/>
      <line x1="39" y1="39" x2="49" y2="49"/>
      <line x1="0" y1="55" x2="0" y2="70"/>
      <line x1="-39" y1="39" x2="-49" y2="49"/>
      <line x1="-55" y1="0" x2="-70" y2="0"/>
      <line x1="-39" y1="-39" x2="-49" y2="-49"/>
    </g>
  </g>
  
  <!-- Cat (reference to "У лукоморья") -->
  <g transform="translate(650, 350)">
    <!-- Body -->
    <ellipse cx="0" cy="20" rx="30" ry="25" fill="#FFA726"/>
    <!-- Head -->
    <circle cx="25" cy="-5" r="22" fill="#FFB74D"/>
    <!-- Ears -->
    <polygon points="40,-25 50,-5 30,-10" fill="#FFB74D"/>
    <polygon points="15,-25 5,-5 25,-10" fill="#FFB74D"/>
    <!-- Eyes -->
    <ellipse cx="18" cy="-10" rx="5" ry="6" fill="#4CAF50"/>
    <ellipse cx="32" cy="-10" rx="5" ry="6" fill="#4CAF50"/>
    <ellipse cx="18" cy="-10" rx="2" ry="4" fill="#1A1A1A"/>
    <ellipse cx="32" cy="-10" rx="2" ry="4" fill="#1A1A1A"/>
    <!-- Whiskers -->
    <line x1="45" y1="0" x2="65" y2="-5" stroke="#795548" stroke-width="1.5"/>
    <line x1="45" y1="5" x2="65" y2="5" stroke="#795548" stroke-width="1.5"/>
    <!-- Tail -->
    <path d="M-25 20 Q-50 0 -40 -30 Q-30 -45 -15 -35" stroke="#FFA726" stroke-width="12" fill="none" stroke-linecap="round"/>
    <!-- Oak tree (Лукоморье) -->
    <rect x="-80" y="50" width="20" height="60" fill="#795548"/>
    <ellipse cx="-70" cy="20" rx="50" ry="45" fill="#4CAF50"/>
    <!-- Gold chain -->
    <path d="M-50 50 Q-40 30 -50 10" stroke="#FFD700" stroke-width="4" fill="none"/>
  </g>
  
  <!-- Title -->
  <rect x="280" y="430" width="240" height="50" fill="rgba(74,20,140,0.9)" rx="10"/>
  <text x="400" y="462" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="white">А.С. Пушкин</text>
</svg>