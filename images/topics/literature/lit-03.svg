<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF8E1"/>
      <stop offset="100%" style="stop-color:#FFECB3"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg3)" rx="20"/>
  
  <!-- Fox (Лиса) - representing fable animals -->
  <g transform="translate(150, 200)">
    <!-- Body -->
    <ellipse cx="0" cy="50" rx="50" ry="35" fill="#E65100"/>
    <!-- Head -->
    <ellipse cx="-40" cy="20" rx="30" ry="25" fill="#F57C00"/>
    <!-- Ears -->
    <polygon points="-60,0 -50,-25 -40,5" fill="#F57C00"/>
    <polygon points="-20,0 -30,-25 -40,5" fill="#F57C00"/>
    <polygon points="-58,2 -50,-18 -42,2" fill="#FFCC80"/>
    <polygon points="-22,2 -30,-18 -38,2" fill="#FFCC80"/>
    <!-- Snout -->
    <ellipse cx="-60" cy="25" rx="15" ry="12" fill="#FFCC80"/>
    <!-- Nose -->
    <ellipse cx="-70" cy="25" rx="5" ry="4" fill="#1A1A1A"/>
    <!-- Eyes -->
    <circle cx="-50" cy="15" r="6" fill="white"/>
    <circle cx="-50" cy="15" r="3" fill="#1A1A1A"/>
    <!-- Tail -->
    <path d="M45 50 Q100 30 110 70 Q90 90 50 70" fill="#F57C00"/>
    <path d="M90 60 Q100 80 85 85" fill="white"/>
    <!-- Legs -->
    <rect x="-30" y="80" width="15" height="30" fill="#E65100" rx="5"/>
    <rect x="15" y="80" width="15" height="30" fill="#E65100" rx="5"/>
  </g>
  
  <!-- Crow with cheese (Ворона) -->
  <g transform="translate(550, 120)">
    <!-- Body -->
    <ellipse cx="0" cy="30" rx="35" ry="30" fill="#37474F"/>
    <!-- Head -->
    <circle cx="-5" cy="-5" r="22" fill="#455A64"/>
    <!-- Beak -->
    <polygon points="15,-10 45,-5 15,5" fill="#FF9800"/>
    <!-- Eye -->
    <circle cx="5" cy="-10" r="6" fill="white"/>
    <circle cx="5" cy="-10" r="3" fill="#1A1A1A"/>
    <!-- Wing -->
    <ellipse cx="10" cy="35" rx="30" ry="20" fill="#37474F"/>
    <!-- Cheese in beak -->
    <polygon points="45,-5 55,5 50,15 40,10" fill="#FFC107"/>
    <circle cx="48" cy="3" r="3" fill="#FFEB3B"/>
    <!-- Legs -->
    <line x1="-10" y1="55" x2="-15" y2="80" stroke="#FF9800" stroke-width="3"/>
    <line x1="10" y1="55" x2="15" y2="80" stroke="#FF9800" stroke-width="3"/>
    <!-- Tree branch -->
    <rect x="-80" y="75" width="160" height="12" fill="#795548" rx="6"/>
  </g>
  
  <!-- Ant (Муравей) -->
  <g transform="translate(400, 380)">
    <!-- Body segments -->
    <ellipse cx="-20" cy="0" rx="15" ry="12" fill="#5D4037"/>
    <ellipse cx="0" cy="0" rx="12" ry="10" fill="#6D4C41"/>
    <ellipse cx="18" cy="0" rx="10" ry="8" fill="#795548"/>
    <!-- Head -->
    <circle cx="-35" cy="-2" r="10" fill="#5D4037"/>
    <!-- Eyes -->
    <circle cx="-38" cy="-5" r="3" fill="white"/>
    <circle cx="-38" cy="-5" r="1.5" fill="#1A1A1A"/>
    <!-- Antennae -->
    <line x1="-40" y1="-10" x2="-50" y2="-25" stroke="#5D4037" stroke-width="2"/>
    <line x1="-35" y1="-10" x2="-30" y2="-25" stroke="#5D4037" stroke-width="2"/>
    <!-- Legs -->
    <line x1="-15" y1="10" x2="-20" y2="30" stroke="#5D4037" stroke-width="2"/>
    <line x1="5" y1="8" x2="10" y2="28" stroke="#5D4037" stroke-width="2"/>
    <line x1="15" y1="6" x2="25" y2="25" stroke="#5D4037" stroke-width="2"/>
  </g>
  
  <!-- Dragonfly (Стрекоза) -->
  <g transform="translate(620, 350)">
    <!-- Body -->
    <ellipse cx="0" cy="0" rx="40" ry="8" fill="#00BCD4"/>
    <ellipse cx="-30" cy="-5" rx="15" ry="10" fill="#26C6DA"/>
    <!-- Eyes -->
    <circle cx="-38" cy="-8" r="6" fill="#00ACC1"/>
    <circle cx="-38" cy="-2" r="6" fill="#00ACC1"/>
    <!-- Wings -->
    <ellipse cx="5" cy="-25" rx="35" ry="15" fill="#80DEEA" opacity="0.6"/>
    <ellipse cx="5" cy="25" rx="35" ry="15" fill="#80DEEA" opacity="0.6"/>
    <ellipse cx="25" cy="-20" rx="25" ry="12" fill="#80DEEA" opacity="0.5"/>
    <ellipse cx="25" cy="20" rx="25" ry="12" fill="#80DEEA" opacity="0.5"/>
  </g>
  
  <!-- Scroll with "Мораль" -->
  <g transform="translate(50, 380)">
    <rect x="0" y="0" width="100" height="60" fill="#FFF8E1"/>
    <ellipse cx="0" cy="30" rx="10" ry="35" fill="#FFE082"/>
    <ellipse cx="100" cy="30" rx="10" ry="35" fill="#FFE082"/>
    <text x="50" y="40" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#5D4037">Мораль</text>
  </g>
  
  <!-- Title -->
  <rect x="320" y="440" width="160" height="45" fill="rgba(230,81,0,0.9)" rx="10"/>
  <text x="400" y="470" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="white">Басня</text>
</svg>