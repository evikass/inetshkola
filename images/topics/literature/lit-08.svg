<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg8" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EFEBE9"/>
      <stop offset="100%" style="stop-color:#D7CCC8"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg8)" rx="20"/>
  
  <!-- Russian field/steppe background -->
  <rect x="0" y="300" width="800" height="200" fill="#8BC34A" opacity="0.3"/>
  
  <!-- Three Bogatyrs silhouette -->
  <!-- Left bogatyr (Dobrynya) -->
  <g transform="translate(150, 150)">
    <!-- Horse -->
    <ellipse cx="0" cy="80" rx="50" ry="30" fill="#5D4037"/>
    <ellipse cx="-40" cy="60" rx="20" ry="15" fill="#5D4037"/>
    <rect x="-55" y="50" width="15" height="40" fill="#5D4037"/>
    <rect x="30" y="50" width="15" height="40" fill="#5D4037"/>
    <!-- Rider -->
    <circle cx="0" cy="20" r="18" fill="#D7CCC8"/>
    <ellipse cx="0" cy="0" rx="20" ry="12" fill="#795548"/>
    <!-- Helmet -->
    <ellipse cx="0" cy="0" rx="15" ry="18" fill="#B0BEC5"/>
    <polygon points="0,-20 -5,-10 5,-10" fill="#D4AF37"/>
    <!-- Armor -->
    <rect x="-12" y="35" width="24" height="30" fill="#607D8B"/>
    <!-- Shield -->
    <ellipse cx="-25" cy="50" rx="15" ry="20" fill="#8D6E63"/>
  </g>
  
  <!-- Center bogatyr (Ilya) -->
  <g transform="translate(400, 120)">
    <!-- Horse -->
    <ellipse cx="0" cy="100" rx="60" ry="40" fill="#6D4C41"/>
    <ellipse cx="-50" cy="75" rx="25" ry="20" fill="#6D4C41"/>
    <rect x="-65" y="65" width="18" height="50" fill="#6D4C41"/>
    <rect x="40" y="65" width="18" height="50" fill="#6D4C41"/>
    <!-- Rider - taller -->
    <circle cx="0" cy="25" r="22" fill="#D7CCC8"/>
    <ellipse cx="0" cy="5" rx="25" ry="15" fill="#4E342E"/>
    <!-- Helmet -->
    <ellipse cx="0" cy="0" rx="18" ry="22" fill="#78909C"/>
    <polygon points="0,-25 -6,-12 6,-12" fill="#D4AF37"/>
    <!-- Beard -->
    <path d="M-10 30 Q0 50 10 30" fill="#5D4037"/>
    <!-- Armor -->
    <rect x="-15" y="45" width="30" height="40" fill="#546E7A"/>
    <!-- Spear -->
    <rect x="35" y="-30" width="6" height="130" fill="#795548"/>
    <polygon points="38,-30 30,-50 46,-50" fill="#B0BEC5"/>
    <!-- Shield -->
    <ellipse cx="-30" cy="60" rx="18" ry="25" fill="#A1887F"/>
    <circle cx="-30" cy="60" r="8" fill="#D4AF37"/>
  </g>
  
  <!-- Right bogatyr (Alyosha) -->
  <g transform="translate(650, 160)">
    <!-- Horse -->
    <ellipse cx="0" cy="80" rx="50" ry="30" fill="#795548"/>
    <ellipse cx="40" cy="60" rx="20" ry="15" fill="#795548"/>
    <rect x="25" y="50" width="15" height="40" fill="#795548"/>
    <rect x="-45" y="50" width="15" height="40" fill="#795548"/>
    <!-- Rider -->
    <circle cx="0" cy="20" r="18" fill="#D7CCC8"/>
    <ellipse cx="0" cy="0" rx="20" ry="12" fill="#5D4037"/>
    <!-- Helmet -->
    <ellipse cx="0" cy="0" rx="15" ry="18" fill="#90A4AE"/>
    <polygon points="0,-20 -5,-10 5,-10" fill="#D4AF37"/>
    <!-- Armor -->
    <rect x="-12" y="35" width="24" height="30" fill="#607D8B"/>
    <!-- Bow -->
    <path d="M-35 20 Q-50 50 -35 80" stroke="#795548" stroke-width="4" fill="none"/>
    <line x1="-35" y1="20" x2="-35" y2="80" stroke="#CFD8DC" stroke-width="2"/>
  </g>
  
  <!-- Ancient Russian city (Kiev) in background -->
  <g transform="translate(50, 50)">
    <!-- Kremlin walls -->
    <rect x="0" y="100" width="120" height="60" fill="#8D6E63"/>
    <!-- Towers -->
    <rect x="10" y="70" width="25" height="90" fill="#A1887F"/>
    <polygon points="22,50 10,70 35,70" fill="#6D4C41"/>
    <rect x="85" y="70" width="25" height="90" fill="#A1887F"/>
    <polygon points="97,50 85,70 110,70" fill="#6D4C41"/>
    <!-- Onion domes -->
    <ellipse cx="60" cy="50" rx="20" ry="30" fill="#D4AF37"/>
    <rect x="55" y="50" width="10" height="50" fill="#8D6E63"/>
    <polygon points="60,20 55,35 65,35" fill="#D4AF37"/>
  </g>
  
  <!-- Stone with inscription -->
  <g transform="translate(380, 380)">
    <ellipse cx="0" cy="30" rx="70" ry="35" fill="#9E9E9E"/>
    <ellipse cx="0" cy="25" rx="60" ry="25" fill="#BDBDBD"/>
    <text x="0" y="30" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#424242">Как пряму ехать —</text>
    <text x="0" y="42" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#424242">живу не бывати...</text>
  </g>
  
  <!-- Guzli/gusli (musical instrument) -->
  <g transform="translate(80, 380)">
    <ellipse cx="0" cy="0" rx="40" ry="20" fill="#8D6E63"/>
    <rect x="-30" y="-50" width="60" height="50" fill="#A1887F" rx="10"/>
    <line x1="-20" y1="-45" x2="-20" y2="0" stroke="#FFECB3" stroke-width="1"/>
    <line x1="-10" y1="-45" x2="-10" y2="0" stroke="#FFECB3" stroke-width="1"/>
    <line x1="0" y1="-45" x2="0" y2="0" stroke="#FFECB3" stroke-width="1"/>
    <line x1="10" y1="-45" x2="10" y2="0" stroke="#FFECB3" stroke-width="1"/>
    <line x1="20" y1="-45" x2="20" y2="0" stroke="#FFECB3" stroke-width="1"/>
  </g>
  
  <!-- Title -->
  <rect x="310" y="440" width="180" height="50" fill="rgba(93,64,42,0.9)" rx="10"/>
  <text x="400" y="472" text-anchor="middle" font-family="Georgia, serif" font-size="24" font-weight="bold" fill="#FFECB3">Былины</text>
</svg>