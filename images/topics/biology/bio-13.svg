<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Background -->
  <rect width="400" height="300" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="200" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#475569">Птицы: полёт и перья</text>
  
  <!-- Bird silhouette -->
  <g transform="translate(80, 60)">
    <!-- Body -->
    <ellipse cx="120" cy="80" rx="60" ry="35" fill="#3b82f6"/>
    
    <!-- Head -->
    <circle cx="60" cy="60" r="25" fill="#60a5fa"/>
    
    <!-- Beak -->
    <path d="M35 65 L10 60 L35 70 Z" fill="#f59e0b"/>
    
    <!-- Eye -->
    <circle cx="55" cy="55" r="6" fill="white"/>
    <circle cx="55" cy="55" r="3" fill="#1e293b"/>
    
    <!-- Wing -->
    <path d="M100 60 Q140 30 200 50 Q160 70 140 80" fill="#2563eb"/>
    
    <!-- Tail -->
    <path d="M180 80 L230 60 L230 100 Z" fill="#2563eb"/>
    
    <!-- Legs -->
    <line x1="100" y1="115" x2="90" y2="150" stroke="#f59e0b" stroke-width="3"/>
    <line x1="140" y1="115" x2="150" y2="150" stroke="#f59e0b" stroke-width="3"/>
    <line x1="80" y1="150" x2="100" y2="150" stroke="#f59e0b" stroke-width="2"/>
    <line x1="140" y1="150" x2="160" y2="150" stroke="#f59e0b" stroke-width="2"/>
  </g>
  
  <!-- Feather structure -->
  <g transform="translate(20, 170)">
    <rect x="0" y="0" width="150" height="100" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
    <text x="75" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#92400e">Строение пера</text>
    
    <!-- Feather -->
    <line x1="30" y1="30" x2="30" y2="90" stroke="#78350f" stroke-width="3"/>
    <path d="M30 35 Q50 45 30 55 Q50 65 30 75" fill="#d97706" stroke="#92400e" stroke-width="1"/>
    <path d="M30 35 Q10 45 30 55 Q10 65 30 75" fill="#d97706" stroke="#92400e" stroke-width="1"/>
    
    <!-- Labels -->
    <text x="80" y="45" font-family="Arial, sans-serif" font-size="9" fill="#78350f">стержень</text>
    <text x="80" y="65" font-family="Arial, sans-serif" font-size="9" fill="#78350f">опахало</text>
    <text x="80" y="85" font-family="Arial, sans-serif" font-size="9" fill="#78350f">бородки</text>
  </g>
  
  <!-- Features -->
  <g transform="translate(190, 170)">
    <rect x="0" y="0" width="190" height="100" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
    <text x="95" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1e40af">Особенности птиц:</text>
    
    <text x="15" y="40" font-family="Arial, sans-serif" font-size="9" fill="#2563eb">• Перья — теплоизоляция, полёт</text>
    <text x="15" y="55" font-family="Arial, sans-serif" font-size="9" fill="#2563eb">• Полые кости — лёгкость</text>
    <text x="15" y="70" font-family="Arial, sans-serif" font-size="9" fill="#2563eb">• Киль — мышцы крыльев</text>
    <text x="15" y="85" font-family="Arial, sans-serif" font-size="9" fill="#2563eb">• 4-камерное сердце → теплокровные</text>
  </g>
</svg>