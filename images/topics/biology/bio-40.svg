<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250">
  <defs>
    <linearGradient id="bg40" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9"/>
      <stop offset="100%" style="stop-color:#c8e6c9"/>
    </linearGradient>
  </defs>
  <rect width="400" height="250" fill="url(#bg40)" rx="20"/>
  <text x="200" y="30" font-family="Arial" font-size="18" font-weight="bold" fill="#2e7d32" text-anchor="middle">Биотические факторы</text>
  <!-- Взаимодействия организмов -->
  <!-- Хищник-жертва -->
  <rect x="30" y="50" width="100" height="80" fill="#fff" stroke="#ff5722" stroke-width="2" rx="8"/>
  <text x="80" y="70" font-family="Arial" font-size="10" font-weight="bold" fill="#e64a19" text-anchor="middle">Хищник-жертва</text>
  <ellipse cx="60" cy="100" rx="15" ry="10" fill="#8d6e63"/>
  <ellipse cx="100" cy="105" rx="10" ry="6" fill="#a1887f"/>
  <!-- Симбиоз -->
  <rect x="150" y="50" width="100" height="80" fill="#fff" stroke="#4caf50" stroke-width="2" rx="8"/>
  <text x="200" y="70" font-family="Arial" font-size="10" font-weight="bold" fill="#2e7d32" text-anchor="middle">Симбиоз</text>
  <circle cx="180" cy="100" r="12" fill="#81c784"/>
  <circle cx="220" cy="100" r="12" fill="#a5d6a7"/>
  <text x="200" y="115" font-family="Arial" font-size="8" fill="#388e3c" text-anchor="middle">Взаимовыгодно</text>
  <!-- Конкуренция -->
  <rect x="270" y="50" width="100" height="80" fill="#fff" stroke="#f44336" stroke-width="2" rx="8"/>
  <text x="320" y="70" font-family="Arial" font-size="10" font-weight="bold" fill="#c62828" text-anchor="middle">Конкуренция</text>
  <circle cx="300" cy="100" r="10" fill="#ef9a9a"/>
  <circle cx="340" cy="100" r="10" fill="#ef9a9a"/>
  <text x="320" y="115" font-family="Arial" font-size="8" fill="#c62828" text-anchor="middle">Борьба за ресурсы</text>
  <!-- Паразитизм -->
  <rect x="90" y="150" width="100" height="80" fill="#fff" stroke="#9c27b0" stroke-width="2" rx="8"/>
  <text x="140" y="170" font-family="Arial" font-size="10" font-weight="bold" fill="#7b1fa2" text-anchor="middle">Паразитизм</text>
  <ellipse cx="140" cy="200" rx="20" ry="12" fill="#ce93d8"/>
  <circle cx="130" cy="195" r="5" fill="#7b1fa2"/>
  <text x="140" y="215" font-family="Arial" font-size="8" fill="#7b1fa2" text-anchor="middle">Один за счёт другого</text>
  <!-- Паразитизм -->
  <rect x="210" y="150" width="100" height="80" fill="#fff" stroke="#2196f3" stroke-width="2" rx="8"/>
  <text x="260" y="170" font-family="Arial" font-size="10" font-weight="bold" fill="#1565c0" text-anchor="middle">Комменсализм</text>
  <ellipse cx="260" cy="200" rx="18" ry="10" fill="#90caf9"/>
  <circle cx="275" cy="195" r="5" fill="#1976d2"/>
  <text x="260" y="215" font-family="Arial" font-size="8" fill="#1565c0" text-anchor="middle">Один выгоды, др. нейтрален</text>
</svg>