<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Background -->
  <rect width="400" height="300" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="200" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#475569">Строение клетки</text>
  
  <!-- Main cell -->
  <g transform="translate(70, 50)">
    <!-- Cell membrane -->
    <ellipse cx="130" cy="110" rx="120" ry="100" fill="#fef3c7" stroke="#f59e0b" stroke-width="4"/>
    
    <!-- Cytoplasm -->
    <ellipse cx="130" cy="110" rx="110" ry="90" fill="#fef9c3" opacity="0.5"/>
    
    <!-- Nucleus -->
    <ellipse cx="130" cy="100" rx="45" ry="40" fill="#8b5cf6" stroke="#6d28d9" stroke-width="3"/>
    <circle cx="130" cy="95" r="15" fill="#a78bfa"/>
    <text x="130" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">ядрышко</text>
    
    <!-- Mitochondria -->
    <ellipse cx="60" cy="70" rx="25" ry="12" fill="#ef4444" stroke="#dc2626" stroke-width="2" transform="rotate(-30, 60, 70)"/>
    <path d="M45 65 Q55 70 45 75" stroke="#fca5a5" stroke-width="2" fill="none"/>
    
    <ellipse cx="200" cy="140" rx="20" ry="10" fill="#ef4444" stroke="#dc2626" stroke-width="2" transform="rotate(20, 200, 140)"/>
    
    <!-- Endoplasmic reticulum -->
    <path d="M180 60 Q200 70 190 80 Q170 90 190 100" stroke="#3b82f6" stroke-width="3" fill="none"/>
    <circle cx="195" cy="65" r="4" fill="#3b82f6"/>
    <circle cx="185" cy="95" r="4" fill="#3b82f6"/>
    
    <!-- Ribosomes -->
    <circle cx="85" cy="140" r="5" fill="#22c55e"/>
    <circle cx="95" cy="150" r="5" fill="#22c55e"/>
    <circle cx="75" cy="155" r="5" fill="#22c55e"/>
    
    <!-- Golgi apparatus -->
    <g transform="translate(50, 170)">
      <path d="M0 0 Q20 5 0 10" stroke="#ec4899" stroke-width="3" fill="none"/>
      <path d="M5 12 Q25 17 5 22" stroke="#ec4899" stroke-width="3" fill="none"/>
      <path d="M10 24 Q30 29 10 34" stroke="#ec4899" stroke-width="3" fill="none"/>
    </g>
    
    <!-- Vacuole -->
    <ellipse cx="180" cy="170" rx="20" ry="15" fill="#60a5fa" opacity="0.5" stroke="#3b82f6" stroke-width="2"/>
    
    <!-- Chloroplast (for plant cell) -->
    <ellipse cx="80" cy="100" rx="18" ry="10" fill="#22c55e" stroke="#16a34a" stroke-width="2"/>
    <ellipse cx="80" cy="100" rx="10" ry="5" fill="#4ade80"/>
  </g>
  
  <!-- Legend -->
  <g transform="translate(30, 255)">
    <circle cx="10" cy="8" r="6" fill="#8b5cf6"/>
    <text x="22" y="12" font-family="Arial, sans-serif" font-size="9" fill="#475569">Ядро</text>
    
    <circle cx="70" cy="8" r="6" fill="#ef4444"/>
    <text x="82" y="12" font-family="Arial, sans-serif" font-size="9" fill="#475569">Митохондрии</text>
    
    <circle cx="160" cy="8" r="6" fill="#22c55e"/>
    <text x="172" y="12" font-family="Arial, sans-serif" font-size="9" fill="#475569">Рибосомы</text>
    
    <circle cx="240" cy="8" r="6" fill="#3b82f6"/>
    <text x="252" y="12" font-family="Arial, sans-serif" font-size="9" fill="#475569">ЭПС</text>
    
    <circle cx="290" cy="8" r="6" fill="#ec4899"/>
    <text x="302" y="12" font-family="Arial, sans-serif" font-size="9" fill="#475569">Гольджи</text>
    
    <circle cx="350" cy="8" r="6" fill="#f59e0b"/>
    <text x="362" y="12" font-family="Arial, sans-serif" font-size="9" fill="#475569">Мембрана</text>
  </g>
</svg>