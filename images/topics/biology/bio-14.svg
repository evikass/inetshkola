<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Background -->
  <rect width="400" height="300" fill="#fef2f2"/>
  
  <!-- Title -->
  <text x="200" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#475569">Млекопитающие 🐾</text>
  
  <!-- Mammal silhouette -->
  <g transform="translate(100, 50)">
    <!-- Body -->
    <ellipse cx="100" cy="80" rx="70" ry="45" fill="#78716c"/>
    
    <!-- Head -->
    <ellipse cx="30" cy="60" rx="30" ry="25" fill="#a8a29e"/>
    
    <!-- Ears -->
    <ellipse cx="15" cy="35" rx="10" ry="15" fill="#a8a29e"/>
    <ellipse cx="45" cy="35" rx="10" ry="15" fill="#a8a29e"/>
    
    <!-- Eyes -->
    <circle cx="20" cy="55" r="5" fill="#1e293b"/>
    <circle cx="45" cy="55" r="5" fill="#1e293b"/>
    
    <!-- Nose -->
    <ellipse cx="10" cy="70" rx="6" ry="4" fill="#292524"/>
    
    <!-- Legs -->
    <rect x="50" y="120" width="15" height="40" rx="5" fill="#a8a29e"/>
    <rect x="130" y="120" width="15" height="40" rx="5" fill="#a8a29e"/>
    
    <!-- Tail -->
    <path d="M170 80 Q200 70 210 90" stroke="#78716c" stroke-width="8" fill="none" stroke-linecap="round"/>
    
    <!-- Fur texture -->
    <g opacity="0.3">
      <line x1="60" y1="60" x2="65" y2="70" stroke="#57534e" stroke-width="1"/>
      <line x1="80" y1="50" x2="85" y2="60" stroke="#57534e" stroke-width="1"/>
      <line x1="100" y1="55" x2="105" y2="65" stroke="#57534e" stroke-width="1"/>
      <line x1="120" y1="60" x2="125" y2="70" stroke="#57534e" stroke-width="1"/>
    </g>
  </g>
  
  <!-- Key features -->
  <g transform="translate(20, 170)">
    <rect x="0" y="0" width="170" height="110" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
    <text x="85" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#92400e">Признаки млекопитающих:</text>
    
    <text x="15" y="40" font-family="Arial, sans-serif" font-size="10" fill="#b45309">🍼 Вскармливание молоком</text>
    <text x="15" y="58" font-family="Arial, sans-serif" font-size="10" fill="#b45309">🦴 Волосы/шерсть</text>
    <text x="15" y="76" font-family="Arial, sans-serif" font-size="10" fill="#b45309">❤️ 4-камерное сердце</text>
    <text x="15" y="94" font-family="Arial, sans-serif" font-size="10" fill="#b45309">🌡️ Теплокровность</text>
  </g>
  
  <!-- Examples -->
  <g transform="translate(210, 170)">
    <rect x="0" y="0" width="170" height="110" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
    <text x="85" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#166534">Группы:</text>
    
    <text x="15" y="42" font-family="Arial, sans-serif" font-size="10" fill="#15803d">🌿 Травоядные (корова, заяц)</text>
    <text x="15" y="60" font-family="Arial, sans-serif" font-size="10" fill="#15803d">🦁 Хищники (лев, волк)</text>
    <text x="15" y="78" font-family="Arial, sans-serif" font-size="10" fill="#15803d">🐭 Грызуны (мышь, бобр)</text>
    <text x="15" y="96" font-family="Arial, sans-serif" font-size="10" fill="#15803d">🦇 Летучие мыши, киты</text>
  </g>
</svg>