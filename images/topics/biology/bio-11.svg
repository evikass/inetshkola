<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Background -->
  <rect width="400" height="300" fill="#f0fdf4"/>
  
  <!-- Title -->
  <text x="200" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#475569">Эволюция 🧬</text>
  
  <!-- Evolution timeline -->
  <g transform="translate(30, 50)">
    <!-- Timeline line -->
    <line x1="0" y1="100" x2="340" y2="100" stroke="#22c55e" stroke-width="3"/>
    
    <!-- Single cell -->
    <circle cx="20" cy="100" r="15" fill="#a78bfa" stroke="#7c3aed" stroke-width="2"/>
    <circle cx="20" cy="100" r="5" fill="#7c3aed"/>
    <text x="20" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#475569">3.5 млрд лет</text>
    <text x="20" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#64748b">Первые клетки</text>
    
    <!-- Multicellular -->
    <g transform="translate(80, 75)">
      <circle cx="0" cy="0" r="8" fill="#60a5fa"/>
      <circle cx="15" cy="5" r="8" fill="#60a5fa"/>
      <circle cx="5" cy="20" r="8" fill="#60a5fa"/>
      <circle cx="20" cy="25" r="8" fill="#60a5fa"/>
    </g>
    <text x="90" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#475569">600 млн лет</text>
    <text x="90" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#64748b">Многоклеточные</text>
    
    <!-- Fish -->
    <g transform="translate(140, 85)">
      <ellipse cx="20" cy="15" rx="20" ry="10" fill="#3b82f6"/>
      <path d="M40 15 L55 5 L55 25 Z" fill="#2563eb"/>
    </g>
    <text x="160" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#475569">500 млн лет</text>
    <text x="160" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#64748b">Рыбы</text>
    
    <!-- Amphibians -->
    <g transform="translate(200, 75)">
      <ellipse cx="20" cy="20" rx="18" ry="12" fill="#22c55e"/>
      <circle cx="10" cy="12" r="5" fill="white"/>
      <circle cx="30" cy="12" r="5" fill="white"/>
    </g>
    <text x="220" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#475569">370 млн лет</text>
    <text x="220" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#64748b">Земноводные</text>
    
    <!-- Reptiles -->
    <g transform="translate(250, 80)">
      <ellipse cx="20" cy="15" rx="18" ry="10" fill="#f97316"/>
      <ellipse cx="5" cy="12" rx="8" ry="6" fill="#fb923c"/>
      <path d="M38 15 L55 10 L55 20 Z" fill="#ea580c"/>
    </g>
    <text x="270" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#475569">300 млн лет</text>
    <text x="270" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#64748b">Пресмыкающиеся</text>
    
    <!-- Mammals -->
    <g transform="translate(305, 70)">
      <ellipse cx="20" cy="25" rx="15" ry="20" fill="#78716c"/>
      <circle cx="20" cy="10" r="10" fill="#a8a29e"/>
    </g>
    <text x="325" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#475569">200 млн лет</text>
    <text x="325" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#64748b">Млекопитающие</text>
  </g>
  
  <!-- Darwin -->
  <g transform="translate(20, 160)">
    <rect x="0" y="0" width="175" height="80" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
    <text x="87" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#92400e">Чарльз Дарвин 🧭</text>
    <text x="87" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#b45309">Теория эволюции (1859)</text>
    <text x="87" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#b45309">"Происхождение видов"</text>
    <text x="87" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#d97706">Естественный отбор</text>
  </g>
  
  <!-- Key principles -->
  <g transform="translate(205, 160)">
    <rect x="0" y="0" width="175" height="80" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
    <text x="87" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#166534">Принципы:</text>
    <text x="15" y="40" font-family="Arial, sans-serif" font-size="9" fill="#15803d">• Изменчивость организмов</text>
    <text x="15" y="55" font-family="Arial, sans-serif" font-size="9" fill="#15803d">• Наследственность</text>
    <text x="15" y="70" font-family="Arial, sans-serif" font-size="9" fill="#15803d">• Естественный отбор</text>
  </g>
  
  <!-- Bottom text -->
  <rect x="20" y="255" width="360" height="35" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/>
  <text x="200" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#475569">
    💡 Выживают наиболее приспособленные!
  </text>
</svg>