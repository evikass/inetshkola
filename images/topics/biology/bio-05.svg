<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Background -->
  <rect width="400" height="300" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="200" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#475569">Фотосинтез</text>
  
  <!-- Sun -->
  <g transform="translate(200, 60)">
    <circle cx="0" cy="0" r="25" fill="#fbbf24"/>
    <line x1="0" y1="-35" x2="0" y2="-45" stroke="#f59e0b" stroke-width="3"/>
    <line x1="25" y1="-25" x2="32" y2="-32" stroke="#f59e0b" stroke-width="3"/>
    <line x1="35" y1="0" x2="45" y2="0" stroke="#f59e0b" stroke-width="3"/>
    <line x1="25" y1="25" x2="32" y2="32" stroke="#f59e0b" stroke-width="3"/>
    <line x1="-25" y1="-25" x2="-32" y2="-32" stroke="#f59e0b" stroke-width="3"/>
    <line x1="-35" y1="0" x2="-45" y2="0" stroke="#f59e0b" stroke-width="3"/>
    <line x1="-25" y1="25" x2="-32" y2="32" stroke="#f59e0b" stroke-width="3"/>
    <line x1="0" y1="35" x2="0" y2="45" stroke="#f59e0b" stroke-width="3"/>
  </g>
  
  <!-- Leaf -->
  <g transform="translate(140, 130)">
    <ellipse cx="60" cy="40" rx="55" ry="35" fill="#22c55e"/>
    <path d="M60 10 Q40 40 60 70" stroke="#166534" stroke-width="3" fill="none"/>
    <path d="M60 25 L45 35" stroke="#166534" stroke-width="2"/>
    <path d="M60 40 L48 50" stroke="#166534" stroke-width="2"/>
    <path d="M60 55 L52 62" stroke="#166534" stroke-width="2"/>
    
    <!-- Chloroplast -->
    <ellipse cx="50" cy="35" rx="15" ry="8" fill="#4ade80" stroke="#22c55e" stroke-width="2"/>
    <ellipse cx="70" cy="50" rx="12" ry="6" fill="#4ade80" stroke="#22c55e" stroke-width="2"/>
  </g>
  
  <!-- Arrows and inputs -->
  <g font-family="Arial, sans-serif" font-size="12">
    <!-- CO2 arrow -->
    <path d="M50 120 L100 150" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="30" y="110" fill="#475569">CO₂</text>
    <text x="20" y="125" fill="#94a3b8" font-size="10">углекислый газ</text>
    
    <!-- H2O arrow -->
    <path d="M50 200 L100 180" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="30" y="210" fill="#3b82f6">H₂O</text>
    <text x="20" y="225" fill="#60a5fa" font-size="10">вода</text>
    
    <!-- Light arrow -->
    <path d="M180 110 L180 130" stroke="#f59e0b" stroke-width="3" stroke-dasharray="5,3"/>
    <text x="160" y="105" fill="#f59e0b">hv</text>
    <text x="150" y="92" fill="#fbbf24" font-size="10">энергия света</text>
  </g>
  
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>
  
  <!-- Outputs -->
  <g font-family="Arial, sans-serif" font-size="12">
    <!-- O2 output -->
    <path d="M300 150 L350 130" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow2)"/>
    <text x="355" y="125" fill="#22c55e">O₂ ↑</text>
    <text x="355" y="140" fill="#16a34a" font-size="10">кислород</text>
    
    <!-- Glucose -->
    <path d="M300 180 L350 200" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow2)"/>
    <text x="355" y="205" fill="#f59e0b">C₆H₁₂O₆</text>
    <text x="355" y="220" fill="#d97706" font-size="10">глюкоза</text>
  </g>
  
  <defs>
    <marker id="arrow2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
  </defs>
  
  <!-- Equation box -->
  <rect x="50" y="250" width="300" height="40" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="200" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#92400e">
    6CO₂ + 6H₂O + hv → C₆H₁₂O₆ + 6O₂
  </text>
</svg>