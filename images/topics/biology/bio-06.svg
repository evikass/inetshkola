<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Background -->
  <rect width="400" height="300" fill="#f0f9ff"/>
  
  <!-- Title -->
  <text x="200" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#475569">Класс Рыбы 🐟</text>
  
  <!-- Fish body -->
  <g transform="translate(60, 80)">
    <!-- Body -->
    <ellipse cx="140" cy="70" rx="100" ry="45" fill="#3b82f6"/>
    
    <!-- Tail fin -->
    <path d="M240 70 L280 40 L280 100 Z" fill="#2563eb"/>
    
    <!-- Dorsal fin -->
    <path d="M100 25 L140 0 L180 25" fill="#2563eb"/>
    
    <!-- Pectoral fin -->
    <ellipse cx="80" cy="85" rx="25" ry="10" fill="#60a5fa" transform="rotate(30, 80, 85)"/>
    
    <!-- Pelvic fin -->
    <ellipse cx="100" cy="105" rx="15" ry="6" fill="#60a5fa" transform="rotate(20, 100, 105)"/>
    
    <!-- Head -->
    <ellipse cx="50" cy="70" rx="35" ry="40" fill="#3b82f6"/>
    
    <!-- Eye -->
    <circle cx="30" cy="60" r="12" fill="white"/>
    <circle cx="33" cy="58" r="6" fill="#1e293b"/>
    <circle cx="35" cy="56" r="2" fill="white"/>
    
    <!-- Mouth -->
    <ellipse cx="15" cy="80" rx="10" ry="5" fill="#1e40af"/>
    
    <!-- Gills -->
    <path d="M65 50 Q60 70 65 90" stroke="#1e40af" stroke-width="3" fill="none"/>
    
    <!-- Scales pattern -->
    <g opacity="0.3">
      <circle cx="100" cy="50" r="8" fill="white"/>
      <circle cx="120" cy="55" r="8" fill="white"/>
      <circle cx="140" cy="50" r="8" fill="white"/>
      <circle cx="160" cy="55" r="8" fill="white"/>
      <circle cx="180" cy="50" r="8" fill="white"/>
      <circle cx="200" cy="55" r="8" fill="white"/>
      <circle cx="110" cy="80" r="8" fill="white"/>
      <circle cx="130" cy="85" r="8" fill="white"/>
      <circle cx="150" cy="80" r="8" fill="white"/>
      <circle cx="170" cy="85" r="8" fill="white"/>
      <circle cx="190" cy="80" r="8" fill="white"/>
    </g>
    
    <!-- Lateral line -->
    <path d="M50 70 Q140 65 240 70" stroke="#1e40af" stroke-width="2" stroke-dasharray="5,3"/>
  </g>
  
  <!-- Labels -->
  <g font-family="Arial, sans-serif" font-size="10">
    <text x="95" y="175" fill="#1e40af">Жабры</text>
    <line x1="125" y1="175" x2="125" y2="155" stroke="#1e40af" stroke-width="1"/>
    
    <text x="240" y="60" fill="#1e40af">Спинной плавник</text>
    <line x1="240" y1="62" x2="200" y2="80" stroke="#1e40af" stroke-width="1"/>
    
    <text x="320" y="120" fill="#1e40af">Хвостовой</text>
    <text x="330" y="132" fill="#1e40af">плавник</text>
    
    <text x="20" y="130" fill="#1e40af">Грудной</text>
    <text x="20" y="142" fill="#1e40af">плавник</text>
    
    <text x="300" y="190" fill="#1e40af">Боковая линия</text>
    <text x="300" y="202" fill="#3b82f6" font-size="9">(орган чувств)</text>
  </g>
  
  <!-- Internal organs box -->
  <rect x="20" y="210" width="170" height="80" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="105" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1e40af">Внутренние органы:</text>
  <text x="30" y="250" font-family="Arial, sans-serif" font-size="10" fill="#3b82f6">• Жабры — дыхание в воде</text>
  <text x="30" y="265" font-family="Arial, sans-serif" font-size="10" fill="#3b82f6">• Плавательный пузырь — плавучесть</text>
  <text x="30" y="280" font-family="Arial, sans-serif" font-size="10" fill="#3b82f6">• Сердце — 2 камеры</text>
  
  <!-- Fun facts -->
  <rect x="210" y="210" width="170" height="80" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="295" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#92400e">Интересные факты:</text>
  <text x="220" y="250" font-family="Arial, sans-serif" font-size="10" fill="#b45309">• Холоднокровные</text>
  <text x="220" y="265" font-family="Arial, sans-serif" font-size="10" fill="#b45309">• Двухкамерное сердце</text>
  <text x="220" y="280" font-family="Arial, sans-serif" font-size="10" fill="#b45309">• Чешуя — защита тела</text>
</svg>