<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Background -->
  <rect width="400" height="300" fill="#fefce8"/>
  
  <!-- Title -->
  <text x="200" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#475569">Экосистема 🌍</text>
  
  <!-- Ecosystem diagram -->
  <g transform="translate(30, 45)">
    <!-- Sun -->
    <circle cx="50" cy="30" r="25" fill="#fbbf24"/>
    <g stroke="#f59e0b" stroke-width="2">
      <line x1="50" y1="0" x2="50" y2="-10"/>
      <line x1="75" y1="5" x2="82" y2="-2"/>
      <line x1="25" y1="5" x2="18" y2="-2"/>
    </g>
    
    <!-- Producers -->
    <rect x="100" y="50" width="80" height="60" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
    <text x="140" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#166534">Производители</text>
    <text x="140" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#15803d">🌿 Растения</text>
    <text x="140" y="102" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#16a34a">фотосинтез</text>
    
    <!-- Consumers -->
    <rect x="200" y="50" width="80" height="60" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
    <text x="240" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#92400e">Потребители</text>
    <text x="240" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#b45309">🐰 Травоядные</text>
    <text x="240" y="102" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#d97706">🦁 Хищники</text>
    
    <!-- Decomposers -->
    <rect x="300" y="50" width="70" height="60" rx="10" fill="#f3e8ff" stroke="#a855f7" stroke-width="2"/>
    <text x="335" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#6b21a8">Разлагатели</text>
    <text x="335" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#7c3aed">🍄 Грибы</text>
    <text x="335" y="102" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#8b5cf6">🦠 Бактерии</text>
    
    <!-- Arrows -->
    <path d="M75 40 L100 55" stroke="#f59e0b" stroke-width="2" marker-end="url(#arr)"/>
    <path d="M180 80 L200 80" stroke="#22c55e" stroke-width="2" marker-end="url(#arr)"/>
    <path d="M280 80 L300 80" stroke="#f59e0b" stroke-width="2" marker-end="url(#arr)"/>
    <path d="M335 110 L335 130 L140 130 L140 110" stroke="#a855f7" stroke-width="2" marker-end="url(#arr)"/>
  </g>
  
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>
  
  <!-- Food chain -->
  <g transform="translate(20, 190)">
    <rect x="0" y="0" width="360" height="90" rx="10" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
    <text x="180" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#166534">Пищевая цепь:</text>
    
    <text x="50" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="24">🌿</text>
    <text x="50" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#15803d">трава</text>
    
    <text x="100" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="18">→</text>
    
    <text x="150" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="24">🐰</text>
    <text x="150" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#b45309">травоядное</text>
    
    <text x="200" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="18">→</text>
    
    <text x="250" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="24">🦊</text>
    <text x="250" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#dc2626">хищник</text>
    
    <text x="300" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="18">→</text>
    
    <text x="340" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="24">🦠</text>
    <text x="340" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#7c3aed">разлагатели</text>
  </g>
</svg>