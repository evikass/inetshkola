<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0033"/>
      <stop offset="100%" style="stop-color:#330066"/>
    </linearGradient>
    <linearGradient id="pow1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b6b"/>
      <stop offset="100%" style="stop-color:#feca57"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg4)"/>
  
  <!-- Decorative power symbols -->
  <g transform="translate(400, 200)">
    <!-- x² -->
    <text x="-200" y="0" text-anchor="middle" font-family="Georgia, serif" font-size="80" font-weight="bold" fill="#ff6b6b">x</text>
    <text x="-145" y="-30" font-family="Georgia, serif" font-size="40" font-weight="bold" fill="#feca57">2</text>
    
    <!-- x³ -->
    <text x="0" y="0" text-anchor="middle" font-family="Georgia, serif" font-size="80" font-weight="bold" fill="#ff9f43">x</text>
    <text x="55" y="-30" font-family="Georgia, serif" font-size="40" font-weight="bold" fill="#feca57">3</text>
    
    <!-- xⁿ -->
    <text x="200" y="0" text-anchor="middle" font-family="Georgia, serif" font-size="80" font-weight="bold" fill="#feca57">x</text>
    <text x="255" y="-30" font-family="Georgia, serif" font-size="40" font-weight="bold" fill="#ff6b6b">n</text>
  </g>
  
  <!-- Properties -->
  <g transform="translate(400, 320)">
    <text x="0" y="0" text-anchor="middle" font-family="Georgia, serif" font-size="28" fill="#ffffff">aⁿ · aᵐ = aⁿ⁺ᵐ</text>
    <text x="0" y="50" text-anchor="middle" font-family="Georgia, serif" font-size="28" fill="#ffffff">aⁿ ÷ aᵐ = aⁿ⁻ᵐ</text>
    <text x="0" y="100" text-anchor="middle" font-family="Georgia, serif" font-size="28" fill="#ffffff">(aⁿ)ᵐ = aⁿ·ᵐ</text>
  </g>
  
  <!-- Decorative elements -->
  <circle cx="100" cy="100" r="40" fill="#ff6b6b" opacity="0.15"/>
  <circle cx="700" cy="400" r="50" fill="#feca57" opacity="0.1"/>
  <circle cx="650" cy="80" r="25" fill="#ff9f43" opacity="0.2"/>
  
  <!-- Multiplication dots -->
  <circle cx="150" cy="350" r="5" fill="#ff6b6b"/>
  <circle cx="170" cy="350" r="5" fill="#ff6b6b"/>
  <circle cx="190" cy="350" r="5" fill="#ff6b6b"/>
  
  <!-- Title -->
  <text x="400" y="480" text-anchor="middle" font-family="Georgia, serif" font-size="24" font-weight="bold" fill="#ffffff">Свойства степеней</text>
</svg>