<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#134e5e"/>
      <stop offset="100%" style="stop-color:#71b280"/>
    </linearGradient>
    <linearGradient id="root1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#11998e"/>
      <stop offset="100%" style="stop-color:#38ef7d"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg6)"/>
  
  <!-- Main square root symbol -->
  <g transform="translate(400, 180)">
    <!-- Radical symbol -->
    <path d="M -120 60 L -80 -40 L -40 80 L 160 80" fill="none" stroke="url(#root1)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Content under root -->
    <text x="40" y="60" text-anchor="middle" font-family="Georgia, serif" font-size="72" font-weight="bold" fill="#ffffff">a</text>
  </g>
  
  <!-- Properties -->
  <g transform="translate(400, 300)">
    <text x="-150" y="0" font-family="Georgia, serif" font-size="24" fill="#ffffff">√(a·b) = √a · √b</text>
    <text x="-150" y="50" font-family="Georgia, serif" font-size="24" fill="#ffffff">√(a/b) = √a / √b</text>
    <text x="-150" y="100" font-family="Georgia, serif" font-size="24" fill="#ffffff">(√a)² = a</text>
  </g>
  
  <!-- Examples -->
  <g transform="translate(500, 350)">
    <text x="0" y="0" font-family="Georgia, serif" font-size="28" fill="#38ef7d">√9 = 3</text>
    <text x="0" y="50" font-family="Georgia, serif" font-size="28" fill="#38ef7d">√144 = 12</text>
  </g>
  
  <!-- Perfect squares indicator -->
  <g transform="translate(650, 150)">
    <rect x="-60" y="-40" width="120" height="80" rx="10" fill="#ffffff" fill-opacity="0.1"/>
    <text x="0" y="0" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#38ef7d">a²</text>
    <text x="0" y="25" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#ffffff" opacity="0.7">квадрат</text>
  </g>
  
  <!-- Decorative elements -->
  <circle cx="100" cy="100" r="35" fill="#38ef7d" opacity="0.15"/>
  <circle cx="80" cy="400" r="45" fill="#11998e" opacity="0.2"/>
  
  <!-- Title -->
  <text x="400" y="480" text-anchor="middle" font-family="Georgia, serif" font-size="24" font-weight="bold" fill="#ffffff">Квадратные корни</text>
</svg>