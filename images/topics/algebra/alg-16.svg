<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg16" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1d4350"/>
      <stop offset="100%" style="stop-color:#a43931"/>
    </linearGradient>
    <linearGradient id="irr1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a43931"/>
      <stop offset="100%" style="stop-color:#fbc8d4"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg16)"/>
  
  <!-- Main equation -->
  <g transform="translate(400, 180)">
    <!-- Radical -->
    <path d="M -100 40 L -60 -40 L -20 60 L 160 60" fill="none" stroke="url(#irr1)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="80" y="45" text-anchor="middle" font-family="Georgia, serif" font-size="48" font-weight="bold" fill="#ffffff">x + a</text>
    <text x="220" y="40" font-family="Georgia, serif" font-size="48" font-weight="bold" fill="#fbc8d4">= b</text>
  </g>
  
  <!-- Solution method -->
  <text x="400" y="280" text-anchor="middle" font-family="Georgia, serif" font-size="28" fill="#ffffff">Метод возведения в квадрат:</text>
  <text x="400" y="330" text-anchor="middle" font-family="Georgia, serif" font-size="32" fill="#fbc8d4">(√(x+a))² = b²</text>
  
  <!-- Warning about checking -->
  <rect x="150" y="360" width="500" height="60" rx="10" fill="#a43931" fill-opacity="0.3" stroke="#fbc8d4" stroke-width="2"/>
  <text x="400" y="400" text-anchor="middle" font-family="Georgia, serif" font-size="20" fill="#ffffff">⚠ Проверка: подставь корни в исходное уравнение!</text>
  
  <!-- Example -->
  <g transform="translate(650, 150)">
    <rect x="-80" y="-50" width="160" height="100" rx="10" fill="#ffffff" fill-opacity="0.1"/>
    <text x="0" y="-15" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#fbc8d4">√(x−2) = 3</text>
    <text x="0" y="15" text-anchor="middle" font-family="Georgia, serif" font-size="20" fill="#ffffff">x−2 = 9</text>
    <text x="0" y="40" text-anchor="middle" font-family="Georgia, serif" font-size="20" fill="#a43931">x = 11 ✓</text>
  </g>
  
  <!-- Decorative elements -->
  <circle cx="100" cy="80" r="25" fill="#a43931" opacity="0.2"/>
  <circle cx="700" cy="420" r="35" fill="#fbc8d4" opacity="0.15"/>
  
  <!-- Title -->
  <text x="400" y="480" text-anchor="middle" font-family="Georgia, serif" font-size="24" font-weight="bold" fill="#ffffff">Иррациональные уравнения</text>
</svg>