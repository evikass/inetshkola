<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg11" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f2027"/>
      <stop offset="100%" style="stop-color:#203a43"/>
    </linearGradient>
    <linearGradient id="der1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00c6ff"/>
      <stop offset="100%" style="stop-color:#0072ff"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg11)"/>
  
  <!-- Coordinate axes -->
  <g stroke="#ffffff" stroke-width="1" opacity="0.3">
    <line x1="100" y1="350" x2="700" y2="350"/>
    <line x1="200" y1="100" x2="200" y2="400"/>
  </g>
  
  <!-- Curve -->
  <path d="M 150 300 Q 300 100 500 250 Q 600 320 700 200" fill="none" stroke="#00c6ff" stroke-width="3"/>
  
  <!-- Tangent line -->
  <line x1="250" y1="400" x2="500" y2="100" stroke="#0072ff" stroke-width="3" stroke-dasharray="10,5"/>
  
  <!-- Point of tangency -->
  <circle cx="400" cy="200" r="8" fill="#ffffff"/>
  
  <!-- Main derivative formula -->
  <text x="400" y="380" text-anchor="middle" font-family="Georgia, serif" font-size="56" font-weight="bold" fill="#ffffff">f'(x) = lim Δf/Δx</text>
  
  <!-- Geometric meaning -->
  <text x="550" y="150" font-family="Georgia, serif" font-size="20" fill="#0072ff">касательная</text>
  <text x="550" y="180" font-family="Georgia, serif" font-size="18" fill="#ffffff" opacity="0.7">tg α = f'(x₀)</text>
  
  <!-- Common derivatives -->
  <g transform="translate(150, 420)">
    <text x="0" y="0" font-family="Georgia, serif" font-size="18" fill="#00c6ff">(xⁿ)' = nxⁿ⁻¹</text>
    <text x="200" y="0" font-family="Georgia, serif" font-size="18" fill="#00c6ff">(sin x)' = cos x</text>
    <text x="400" y="0" font-family="Georgia, serif" font-size="18" fill="#00c6ff">(cos x)' = −sin x</text>
  </g>
  
  <!-- Decorative elements -->
  <circle cx="100" cy="80" r="25" fill="#00c6ff" opacity="0.2"/>
  <circle cx="700" cy="100" r="30" fill="#0072ff" opacity="0.15"/>
  
  <!-- Title -->
  <text x="400" y="480" text-anchor="middle" font-family="Georgia, serif" font-size="24" font-weight="bold" fill="#ffffff">Производная</text>
</svg>