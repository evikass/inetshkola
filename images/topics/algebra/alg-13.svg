<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg13" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="int1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00b09b"/>
      <stop offset="100%" style="stop-color:#96c93d"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg13)"/>
  
  <!-- Number line -->
  <g transform="translate(400, 250)">
    <!-- Main line -->
    <line x1="-350" y1="0" x2="350" y2="0" stroke="#ffffff" stroke-width="3"/>
    
    <!-- Points -->
    <circle cx="-200" cy="0" r="10" fill="#00b09b"/>
    <circle cx="100" cy="0" r="10" fill="#00b09b"/>
    
    <!-- Signs -->
    <text x="-270" y="60" text-anchor="middle" font-family="Georgia, serif" font-size="48" font-weight="bold" fill="#96c93d">+</text>
    <text x="-50" y="60" text-anchor="middle" font-family="Georgia, serif" font-size="48" font-weight="bold" fill="#ff6b6b">−</text>
    <text x="230" y="60" text-anchor="middle" font-family="Georgia, serif" font-size="48" font-weight="bold" fill="#96c93d">+</text>
    
    <!-- Interval highlighting -->
    <line x1="-350" y1="-30" x2="-200" y2="-30" stroke="#96c93d" stroke-width="6" opacity="0.5"/>
    <line x1="100" y1="-30" x2="340" y2="-30" stroke="#96c93d" stroke-width="6" opacity="0.5"/>
    
    <!-- Root labels -->
    <text x="-200" y="-30" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#ffffff">x₁</text>
    <text x="100" y="-30" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#ffffff">x₂</text>
  </g>
  
  <!-- Example -->
  <text x="400" y="350" text-anchor="middle" font-family="Georgia, serif" font-size="28" fill="#ffffff">(x − x₁)(x − x₂) &gt; 0</text>
  <text x="400" y="400" text-anchor="middle" font-family="Georgia, serif" font-size="24" fill="#96c93d">Ответ: (−∞, x₁) ∪ (x₂, +∞)</text>
  
  <!-- Method name -->
  <text x="400" y="150" text-anchor="middle" font-family="Georgia, serif" font-size="42" font-weight="bold" fill="url(#int1)">Метод интервалов</text>
  
  <!-- Decorative elements -->
  <circle cx="100" cy="80" r="25" fill="#00b09b" opacity="0.2"/>
  <circle cx="700" cy="420" r="35" fill="#96c93d" opacity="0.15"/>
  
  <!-- Title -->
  <text x="400" y="480" text-anchor="middle" font-family="Georgia, serif" font-size="24" font-weight="bold" fill="#ffffff">Метод интервалов</text>
</svg>