<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg14" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="100%" style="stop-color:#302b63"/>
    </linearGradient>
    <linearGradient id="trig1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ee0979"/>
      <stop offset="100%" style="stop-color:#ff6a00"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg14)"/>
  
  <!-- Unit circle -->
  <g transform="translate(400, 250)">
    <!-- Circle -->
    <circle cx="0" cy="0" r="150" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.3"/>
    
    <!-- Axes -->
    <line x1="-200" y1="0" x2="200" y2="0" stroke="#ffffff" stroke-width="2" opacity="0.5"/>
    <line x1="0" y1="-200" x2="0" y2="200" stroke="#ffffff" stroke-width="2" opacity="0.5"/>
    
    <!-- Angle -->
    <line x1="0" y1="0" x2="106" y2="-106" stroke="url(#trig1)" stroke-width="4"/>
    
    <!-- Angle arc -->
    <path d="M 40 0 A 40 40 0 0 0 28 -28" fill="none" stroke="#ee0979" stroke-width="2"/>
    
    <!-- Projection lines -->
    <line x1="106" y1="-106" x2="106" y2="0" stroke="#ff6a00" stroke-width="2" stroke-dasharray="5,5"/>
    <line x1="106" y1="-106" x2="0" y2="-106" stroke="#ee0979" stroke-width="2" stroke-dasharray="5,5"/>
    
    <!-- Point -->
    <circle cx="106" cy="-106" r="6" fill="#ffffff"/>
    
    <!-- sin and cos labels -->
    <text x="115" y="-50" font-family="Georgia, serif" font-size="20" fill="#ff6a00">sin α</text>
    <text x="50" y="-115" font-family="Georgia, serif" font-size="20" fill="#ee0979">cos α</text>
    
    <!-- α label -->
    <text x="55" y="-10" font-family="Georgia, serif" font-size="24" fill="#ffffff">α</text>
  </g>
  
  <!-- Main functions -->
  <g transform="translate(400, 60)">
    <text x="-180" y="0" font-family="Georgia, serif" font-size="36" font-weight="bold" fill="#ee0979">sin</text>
    <text x="-80" y="0" font-family="Georgia, serif" font-size="36" font-weight="bold" fill="#ff6a00">cos</text>
    <text x="20" y="0" font-family="Georgia, serif" font-size="36" font-weight="bold" fill="#ffffff">tg</text>
    <text x="100" y="0" font-family="Georgia, serif" font-size="36" font-weight="bold" fill="#ee0979">ctg</text>
  </g>
  
  <!-- Basic identity -->
  <text x="400" y="430" text-anchor="middle" font-family="Georgia, serif" font-size="32" fill="#ffffff">sin²α + cos²α = 1</text>
  
  <!-- Decorative elements -->
  <circle cx="100" cy="100" r="30" fill="#ee0979" opacity="0.15"/>
  <circle cx="700" cy="400" r="40" fill="#ff6a00" opacity="0.1"/>
  
  <!-- Title -->
  <text x="400" y="480" text-anchor="middle" font-family="Georgia, serif" font-size="24" font-weight="bold" fill="#ffffff">Тригонометрия</text>
</svg>