<svg viewBox="0 0 300 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="romeSky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FEE2E2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FECACA;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="stoneGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D6D3D1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A8A29E;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="colosseumGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E7E5E4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#78716C;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect x="0" y="0" width="300" height="140" fill="url(#romeSky)"/>

  <!-- Sun -->
  <circle cx="250" cy="40" r="25" fill="#FDE047" opacity="0.8"/>

  <!-- Ground -->
  <rect x="0" y="140" width="300" height="60" fill="#D6D3D1"/>

  <!-- Colosseum -->
  <g transform="translate(40, 45)">
    <!-- Main structure -->
    <ellipse cx="110" cy="90" rx="100" ry="25" fill="url(#colosseumGrad)"/>
    <path d="M 10 90 L 10 30 Q 110 -10 210 30 L 210 90" fill="#A8A29E"/>

    <!-- Arches - bottom row -->
    <g fill="#57534E">
      <path d="M 20 90 L 20 50 Q 30 40 40 50 L 40 90"/>
      <path d="M 50 90 L 50 50 Q 60 40 70 50 L 70 90"/>
      <path d="M 80 90 L 80 45 Q 90 35 100 45 L 100 90"/>
      <path d="M 110 90 L 110 45 Q 120 35 130 45 L 130 90"/>
      <path d="M 140 90 L 140 50 Q 150 40 160 50 L 160 90"/>
      <path d="M 170 90 L 170 50 Q 180 40 190 50 L 190 90"/>
    </g>

    <!-- Arches - middle row -->
    <g fill="#78716C">
      <rect x="25" y="30" width="20" height="25" rx="10" ry="10"/>
      <rect x="55" y="30" width="20" height="25" rx="10" ry="10"/>
      <rect x="85" y="25" width="20" height="28" rx="10" ry="10"/>
      <rect x="115" y="25" width="20" height="28" rx="10" ry="10"/>
      <rect x="145" y="30" width="20" height="25" rx="10" ry="10"/>
      <rect x="175" y="30" width="20" height="25" rx="10" ry="10"/>
    </g>

    <!-- Top decorative elements -->
    <g fill="#A8A29E">
      <rect x="20" y="15" width="15" height="18"/>
      <rect x="45" y="12" width="15" height="20"/>
      <rect x="70" y="10" width="15" height="22"/>
      <rect x="95" y="8" width="15" height="23"/>
      <rect x="120" y="8" width="15" height="23"/>
      <rect x="145" y="10" width="15" height="22"/>
      <rect x="170" y="12" width="15" height="20"/>
      <rect x="195" y="15" width="15" height="18"/>
    </g>

    <!-- Pillars between arches -->
    <g fill="#D6D3D1" stroke="#A8A29E" stroke-width="1">
      <rect x="38" y="30" width="5" height="60"/>
      <rect x="68" y="30" width="5" height="60"/>
      <rect x="98" y="25" width="5" height="65"/>
      <rect x="128" y="25" width="5" height="65"/>
      <rect x="158" y="30" width="5" height="60"/>
      <rect x="188" y="30" width="5" height="60"/>
    </g>
  </g>

  <!-- Roman Legionary Helmet -->
  <g transform="translate(10, 50)">
    <path d="M 30 10 Q 10 15 10 35 Q 10 50 20 55 L 40 55 Q 50 50 50 35 Q 50 15 30 10" fill="#B45309"/>
    <!-- Neck guard -->
    <path d="M 15 50 Q 5 55 8 65 L 30 60 L 52 65 Q 55 55 45 50" fill="#92400E"/>
    <!-- Cheek guards -->
    <path d="M 12 30 Q 5 35 8 45 Q 15 42 15 35" fill="#D97706"/>
    <path d="M 48 30 Q 55 35 52 45 Q 45 42 45 35" fill="#D97706"/>
    <!-- Plume -->
    <rect x="27" y="0" width="6" height="12" fill="#78350F"/>
    <path d="M 30 0 Q 20 -15 30 -20 Q 40 -15 30 0" fill="#DC2626"/>
    <path d="M 30 -5 L 30 -25" stroke="#DC2626" stroke-width="3"/>
    <!-- Visor line -->
    <line x1="15" y1="30" x2="45" y2="30" stroke="#78350F" stroke-width="2"/>
  </g>

  <!-- SPQR Banner -->
  <g transform="translate(230, 20)">
    <rect x="0" y="0" width="50" height="35" fill="#DC2626"/>
    <rect x="2" y="2" width="46" height="31" fill="#B91C1C"/>
    <!-- SPQR text -->
    <text x="25" y="15" font-family="Georgia, serif" font-size="10" fill="#FDE047" text-anchor="middle" font-weight="bold">SPQR</text>
    <!-- Roman eagle symbol -->
    <path d="M 25 25 L 20 32 L 25 30 L 30 32 Z" fill="#FDE047"/>
    <path d="M 18 28 Q 15 25 18 22 Q 20 24 20 27" fill="#FDE047"/>
    <path d="M 32 28 Q 35 25 32 22 Q 30 24 30 27" fill="#FDE047"/>
  </g>

  <!-- Laurel wreath -->
  <g transform="translate(255, 80)">
    <path d="M 15 5 Q 0 15 5 35 Q 10 45 20 50 Q 15 45 15 35 Q 10 20 20 10 Q 25 15 20 25 L 20 50 Q 30 45 35 35 Q 40 20 25 5" fill="#22C55E"/>
    <path d="M 15 5 Q 30 15 25 35 Q 20 45 10 50 Q 15 45 15 35 Q 20 20 10 10 Q 5 15 10 25 L 10 50 Q 0 45 -5 35 Q -10 20 5 5" fill="#16A34A"/>
  </g>

  <!-- Roman Shield -->
  <g transform="translate(5, 110)">
    <ellipse cx="20" cy="35" rx="18" ry="35" fill="#DC2626"/>
    <ellipse cx="20" cy="35" rx="14" ry="30" fill="#B91C1C"/>
    <!-- Shield boss -->
    <circle cx="20" cy="30" r="8" fill="#FDE047"/>
    <circle cx="20" cy="30" r="5" fill="#D97706"/>
    <!-- Decorative lines -->
    <line x1="20" y1="10" x2="20" y2="60" stroke="#FDE047" stroke-width="1"/>
    <line x1="8" y1="30" x2="32" y2="30" stroke="#FDE047" stroke-width="1"/>
  </g>

  <!-- Column -->
  <g transform="translate(280, 80)">
    <rect x="0" y="0" width="15" height="55" fill="#E7E5E4" stroke="#A8A29E" stroke-width="1"/>
    <!-- Base -->
    <rect x="-2" y="52" width="19" height="8" fill="#D6D3D1"/>
    <!-- Capital -->
    <rect x="-3" y="-5" width="21" height="8" fill="#E7E5E4" stroke="#A8A29E" stroke-width="1"/>
    <path d="M -5 -5 Q 0 -10 7.5 -8 Q 15 -10 20 -5" fill="#D6D3D1"/>
  </g>

  <!-- Road (Appian Way) -->
  <g transform="translate(100, 160)">
    <path d="M 0 10 L 100 10 L 95 25 L 5 25 Z" fill="#78716C"/>
    <!-- Stone pattern -->
    <rect x="10" y="12" width="15" height="8" fill="#A8A29E" rx="1"/>
    <rect x="30" y="12" width="15" height="8" fill="#A8A29E" rx="1"/>
    <rect x="50" y="12" width="15" height="8" fill="#A8A29E" rx="1"/>
    <rect x="70" y="12" width="15" height="8" fill="#A8A29E" rx="1"/>
  </g>

  <!-- Aqueduct hint (background) -->
  <g transform="translate(180, 100)" opacity="0.3">
    <rect x="0" y="0" width="8" height="40" fill="#A8A29E"/>
    <rect x="20" y="0" width="8" height="40" fill="#A8A29E"/>
    <rect x="40" y="0" width="8" height="40" fill="#A8A29E"/>
    <rect x="0" y="0" width="48" height="8" fill="#D6D3D1"/>
    <path d="M 8 8 Q 14 20 20 8" fill="none" stroke="#A8A29E" stroke-width="3"/>
    <path d="M 28 8 Q 34 20 40 8" fill="none" stroke="#A8A29E" stroke-width="3"/>
  </g>

  <!-- Title hint -->
  <text x="150" y="195" font-family="Georgia, serif" font-size="10" fill="#78716C" text-anchor="middle" font-style="italic">Древний Рим</text>
</svg>