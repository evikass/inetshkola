<svg viewBox="0 0 300 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="mongolSky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1F2937;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#374151;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="fireGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#EF4444;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#F97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FBBF24;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="smokeGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#6B7280;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#9CA3AF;stop-opacity:0" />
    </linearGradient>
  </defs>

  <!-- Dark sky -->
  <rect x="0" y="0" width="300" height="130" fill="url(#mongolSky)"/>

  <!-- Smoke clouds -->
  <ellipse cx="100" cy="40" rx="40" ry="25" fill="#6B7280" opacity="0.4"/>
  <ellipse cx="200" cy="50" rx="35" ry="20" fill="#9CA3AF" opacity="0.3"/>
  <ellipse cx="150" cy="25" rx="50" ry="20" fill="#4B5563" opacity="0.3"/>

  <!-- Ground -->
  <rect x="0" y="130" width="300" height="70" fill="#44403C"/>

  <!-- Burning city -->
  <g transform="translate(50, 50)">
    <!-- Building 1 burning -->
    <rect x="0" y="40" width="35" height="40" fill="#78350F"/>
    <polygon points="17.5,20 0,40 35,40" fill="#92400E"/>
    <rect x="10" y="50" width="8" height="15" fill="#1F2937"/>
    <!-- Fire -->
    <path d="M 5 40 Q 10 25 15 40 Q 20 20 25 40 Q 30 30 35 40" fill="url(#fireGrad)" opacity="0.8"/>
    <path d="M 10 35 Q 15 25 20 35" fill="#FDE047" opacity="0.6"/>

    <!-- Building 2 burning -->
    <rect x="45" y="50" width="30" height="30" fill="#78350F"/>
    <polygon points="60,35 45,50 75,50" fill="#92400E"/>
    <!-- Fire -->
    <path d="M 50 50 Q 55 35 60 50 Q 65 40 70 50" fill="url(#fireGrad)" opacity="0.7"/>

    <!-- Church dome -->
    <ellipse cx="100" cy="55" rx="15" ry="12" fill="#DC2626" opacity="0.5"/>
    <rect x="90" y="55" width="20" height="25" fill="#E7E5E4" opacity="0.5"/>
  </g>

  <!-- Mongol horsemen -->
  <g transform="translate(180, 85)">
    <!-- Horse 1 -->
    <ellipse cx="30" cy="25" rx="25" ry="10" fill="#78350F"/>
    <ellipse cx="55" cy="20" rx="8" ry="5" fill="#92400E"/>
    <circle cx="58" cy="17" r="2" fill="#1F2937"/>
    <rect x="15" y="30" width="4" height="15" fill="#78350F"/>
    <rect x="30" y="30" width="4" height="15" fill="#78350F"/>
    <rect x="45" y="30" width="4" height="12" fill="#78350F"/>
    <!-- Rider -->
    <ellipse cx="30" cy="12" rx="8" ry="10" fill="#1E40AF"/>
    <circle cx="30" cy="0" r="5" fill="#FBBF24"/>
    <!-- Helmet -->
    <ellipse cx="30" cy="-5" rx="6" ry="4" fill="#4B5563"/>
    <rect x="28" y="-10" width="4" height="5" fill="#DC2626"/>
    <!-- Bow -->
    <path d="M 45 5 Q 55 -5 45 -15" stroke="#78350F" stroke-width="2" fill="none"/>
    <line x1="45" y1="-15" x2="45" y2="5" stroke="#D97706" stroke-width="1"/>
    <!-- Arrow -->
    <line x1="50" y1="-5" x2="70" y2="-10" stroke="#78350F" stroke-width="2"/>
    <polygon points="70,-10 65,-12 65,-8" fill="#1F2937"/>
  </g>

  <!-- Second Mongol -->
  <g transform="translate(220, 100)">
    <ellipse cx="20" cy="20" rx="18" ry="8" fill="#92400E"/>
    <ellipse cx="38" cy="16" rx="6" ry="4" fill="#78350F"/>
    <rect x="8" y="25" width="3" height="12" fill="#92400E"/>
    <rect x="22" y="25" width="3" height="10" fill="#92400E"/>
    <!-- Rider -->
    <ellipse cx="20" cy="10" rx="6" ry="8" fill="#1E40AF"/>
    <circle cx="20" cy="0" r="4" fill="#FBBF24"/>
    <ellipse cx="20" cy="-4" rx="5" ry="3" fill="#4B5563"/>
    <!-- Flag -->
    <line x1="30" y1="5" x2="30" y2="-15" stroke="#78350F" stroke-width="2"/>
    <polygon points="30,-15 45,-10 30,-5" fill="#DC2626"/>
    <!-- Yoke symbol on flag -->
    <circle cx="36" cy="-10" r="3" fill="#FDE047"/>
  </g>

  <!-- Yoke/Mongol symbol -->
  <g transform="translate(10, 10)">
    <circle cx="20" cy="20" r="18" fill="#DC2626" opacity="0.7"/>
    <path d="M 12 15 L 28 15 M 20 10 L 20 25 M 15 20 L 25 20" stroke="#FDE047" stroke-width="3"/>
  </g>

  <!-- Fallen Russian shield -->
  <g transform="translate(130, 150)">
    <ellipse cx="15" cy="10" rx="15" ry="18" fill="#DC2626" transform="rotate(15)"/>
    <ellipse cx="15" cy="10" rx="10" ry="12" fill="#B91C1C" transform="rotate(15)"/>
    <circle cx="15" cy="10" r="5" fill="#FDE047" transform="rotate(15)"/>
  </g>

  <!-- Broken sword -->
  <g transform="translate(180, 155)">
    <rect x="0" y="0" width="4" height="25" fill="#D4D4D8" transform="rotate(-20)"/>
    <rect x="20" y="10" width="3" height="15" fill="#D4D4D8" transform="rotate(30)"/>
  </g>

  <!-- Sparks -->
  <g fill="#FDE047" opacity="0.8">
    <circle cx="80" cy="70" r="2"/>
    <circle cx="95" cy="55" r="1.5"/>
    <circle cx="110" cy="75" r="1"/>
    <circle cx="130" cy="60" r="1.5"/>
  </g>

  <!-- Dead tree -->
  <g transform="translate(5, 120)">
    <rect x="10" y="10" width="5" height="30" fill="#57534E"/>
    <line x1="12" y1="20" x2="5" y2="10" stroke="#57534E" stroke-width="2"/>
    <line x1="13" y1="25" x2="22" y2="15" stroke="#57534E" stroke-width="2"/>
  </g>

  <!-- Title hint -->
  <text x="150" y="195" font-family="Georgia, serif" font-size="10" fill="#78350F" text-anchor="middle" font-style="italic">Монгольское нашествие</text>
</svg>