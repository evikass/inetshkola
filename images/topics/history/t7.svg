<svg viewBox="0 0 300 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ivanSky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#DC2626;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#7F1D1D;stop-opacity:0.5" />
    </linearGradient>
    <linearGradient id="kremlinGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#DC2626;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#991B1B;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FDE047;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D97706;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect x="0" y="0" width="300" height="140" fill="#1F2937"/>
  <rect x="0" y="0" width="300" height="140" fill="url(#ivanSky)"/>

  <!-- Ground -->
  <rect x="0" y="140" width="300" height="60" fill="#44403C"/>

  <!-- Moscow Kremlin -->
  <g transform="translate(60, 30)">
    <!-- Kremlin wall -->
    <rect x="0" y="60" width="180" height="50" fill="#E7E5E4"/>

    <!-- Spasskaya Tower -->
    <rect x="70" y="15" width="40" height="95" fill="#E7E5E4"/>
    <!-- Tower top -->
    <polygon points="90,0 65,15 115,15" fill="url(#kremlinGrad)"/>
    <!-- Star on top -->
    <polygon points="90,2 88,8 82,8 87,12 85,18 90,14 95,18 93,12 98,8 92,8" fill="#EF4444"/>
    <!-- Clock -->
    <circle cx="90" cy="40" r="12" fill="#FEF3C7" stroke="#D97706" stroke-width="2"/>
    <line x1="90" y1="40" x2="90" y2="32" stroke="#1F2937" stroke-width="2"/>
    <line x1="90" y1="40" x2="96" y2="44" stroke="#1F2937" stroke-width="1.5"/>
    <!-- Tower windows -->
    <rect x="80" y="60" width="8" height="15" rx="4" fill="#1F2937"/>
    <rect x="92" y="60" width="8" height="15" rx="4" fill="#1F2937"/>

    <!-- Side towers -->
    <rect x="10" y="35" width="25" height="75" fill="#D4D4D8"/>
    <polygon points="22.5,20 5,35 40,35" fill="url(#kremlinGrad)"/>
    <circle cx="22.5" cy="22" r="3" fill="#EF4444"/>

    <rect x="145" y="35" width="25" height="75" fill="#D4D4D8"/>
    <polygon points="157.5,20 140,35 175,35" fill="url(#kremlinGrad)"/>
    <circle cx="157.5" cy="22" r="3" fill="#EF4444"/>

    <!-- Wall battlements -->
    <g fill="#D4D4D8">
      <rect x="40" y="55" width="8" height="10"/>
      <rect x="120" y="55" width="8" height="10"/>
    </g>
  </g>

  <!-- Ivan the Terrible -->
  <g transform="translate(15, 45)">
    <!-- Body -->
    <ellipse cx="30" cy="50" rx="18" ry="25" fill="#7C2D12"/>
    <!-- Robe decoration -->
    <ellipse cx="30" cy="45" rx="15" ry="20" fill="#DC2626"/>
    <!-- Fur collar -->
    <ellipse cx="30" cy="25" rx="16" ry="6" fill="#1F2937"/>
    <!-- Face -->
    <circle cx="30" cy="15" r="12" fill="#FBBF24"/>
    <!-- Eyes -->
    <ellipse cx="26" cy="13" rx="2" ry="2.5" fill="#1F2937"/>
    <ellipse cx="34" cy="13" rx="2" ry="2.5" fill="#1F2937"/>
    <!-- Eyebrows (angry) -->
    <line x1="23" y1="9" x2="29" y2="10" stroke="#78350F" stroke-width="1.5"/>
    <line x1="31" y1="10" x2="37" y2="9" stroke="#78350F" stroke-width="1.5"/>
    <!-- Beard -->
    <path d="M 20 22 Q 30 35 40 22" fill="#57534E"/>
    <!-- Crown (Monomakh's Cap) -->
    <ellipse cx="30" cy="0" rx="14" ry="5" fill="url(#goldGrad)"/>
    <polygon points="30,-15 18,0 42,0" fill="url(#goldGrad)"/>
    <circle cx="30" cy="-10" r="4" fill="#EF4444"/>
    <circle cx="24" cy="-5" r="2" fill="#22C55E"/>
    <circle cx="36" cy="-5" r="2" fill="#3B82F6"/>
    <!-- Scepter -->
    <line x1="50" y1="30" x2="50" y2="70" stroke="url(#goldGrad)" stroke-width="4"/>
    <circle cx="50" cy="28" r="5" fill="#FDE047"/>
    <!-- Cross on scepter -->
    <line x1="50" y1="22" x2="50" y2="15" stroke="#FDE047" stroke-width="2"/>
    <line x1="47" y1="19" x2="53" y2="19" stroke="#FDE047" stroke-width="2"/>
  </g>

  <!-- Oprichnik on horse -->
  <g transform="translate(200, 90)">
    <!-- Horse -->
    <ellipse cx="30" cy="25" rx="25" ry="10" fill="#1F2937"/>
    <ellipse cx="55" cy="18" rx="8" ry="5" fill="#374151"/>
    <circle cx="58" cy="15" r="2" fill="#EF4444"/>
    <rect x="15" y="32" width="4" height="15" fill="#1F2937"/>
    <rect x="30" y="32" width="4" height="15" fill="#1F2937"/>
    <rect x="45" y="32" width="4" height="12" fill="#1F2937"/>
    <!-- Rider -->
    <ellipse cx="30" cy="10" rx="8" ry="12" fill="#1F2937"/>
    <circle cx="30" cy="-3" r="6" fill="#FBBF24"/>
    <!-- Oprichnik hood -->
    <path d="M 24 -8 L 30 -20 L 36 -8" fill="#1F2937"/>
    <!-- Broom and dog head symbol -->
    <g transform="translate(55, -10)">
      <line x1="0" y1="0" x2="0" y2="25" stroke="#78350F" stroke-width="3"/>
      <path d="M -3 20 Q 0 30 3 20" fill="#92400E"/>
      <path d="M -2 22 Q 0 28 2 22" fill="#78350F"/>
    </g>
    <!-- Dog head -->
    <g transform="translate(65, 5)">
      <ellipse cx="8" cy="8" rx="8" ry="6" fill="#78350F"/>
      <circle cx="5" cy="6" r="1.5" fill="#1F2937"/>
      <circle cx="11" cy="6" r="1.5" fill="#1F2937"/>
      <ellipse cx="8" cy="10" rx="3" ry="2" fill="#1F2937"/>
    </g>
  </g>

  <!-- Lightning (mood) -->
  <polygon points="270,10 260,30 270,30 255,55 265,35 255,35" fill="#FDE047" opacity="0.6"/>

  <!-- Crown with cross -->
  <g transform="translate(240, 20)">
    <ellipse cx="20" cy="15" rx="15" ry="8" fill="#D97706"/>
    <polygon points="20,0 8,15 32,15" fill="url(#goldGrad)"/>
    <line x1="20" y1="0" x2="20" y2="-10" stroke="#D97706" stroke-width="3"/>
    <line x1="15" y1="-5" x2="25" y2="-5" stroke="#D97706" stroke-width="3"/>
  </g>

  <!-- Title hint -->
  <text x="150" y="195" font-family="Georgia, serif" font-size="10" fill="#DC2626" text-anchor="middle" font-style="italic">Иван Грозный</text>
</svg>