<svg viewBox="0 0 300 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="winterSky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#CBD5E1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E2E8F0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="statueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#78716C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#57534E;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect x="0" y="0" width="300" height="140" fill="url(#winterSky)"/>

  <!-- Snowflakes -->
  <g fill="white" opacity="0.9">
    <circle cx="20" cy="30" r="2"/>
    <circle cx="50" cy="15" r="1.5"/>
    <circle cx="90" cy="40" r="2"/>
    <circle cx="140" cy="20" r="1.5"/>
    <circle cx="190" cy="35" r="2"/>
    <circle cx="240" cy="25" r="1.5"/>
    <circle cx="280" cy="45" r="2"/>
  </g>

  <!-- Ground -->
  <rect x="0" y="140" width="300" height="60" fill="#E5E7EB"/>

  <!-- Senate Square with Bronze Horseman in background -->
  <g transform="translate(150, 50)" opacity="0.3">
    <!-- Pedestal -->
    <polygon points="0,90 -20,50 20,50" fill="#57534E"/>
    <rect x="-25" y="90" width="50" height="10" fill="#78716C"/>
    <!-- Horse -->
    <ellipse cx="0" cy="35" rx="20" ry="12" fill="#57534E"/>
    <!-- Rider -->
    <ellipse cx="-5" cy="20" rx="8" ry="12" fill="#57534E"/>
    <circle cx="-5" cy="8" r="6" fill="#57534E"/>
  </g>

  <!-- Senate building silhouette -->
  <g transform="translate(200, 60)" opacity="0.2">
    <rect x="0" y="40" width="80" height="40" fill="#6B7280"/>
    <rect x="30" y="20" width="20" height="60" fill="#9CA3AF"/>
    <!-- Columns -->
    <g fill="#D4D4D8">
      <rect x="10" y="45" width="4" height="30"/>
      <rect x="25" y="45" width="4" height="30"/>
      <rect x="50" y="45" width="4" height="30"/>
      <rect x="65" y="45" width="4" height="30"/>
    </g>
  </g>

  <!-- Decembrists in formation -->
  <g transform="translate(30, 85)">
    <!-- Officer 1 -->
    <ellipse cx="15" cy="35" rx="8" ry="14" fill="#1E40AF"/>
    <rect x="9" y="40" width="12" height="12" fill="#1F2937"/>
    <circle cx="15" cy="18" r="7" fill="#FBBF24"/>
    <!-- Hat -->
    <rect x="10" y="8" width="10" height="12" fill="#1F2937"/>
    <ellipse cx="15" cy="6" rx="6" ry="3" fill="#1F2937"/>
    <!-- Sword -->
    <line x1="25" y1="25" x2="35" y2="50" stroke="#D4D4D8" stroke-width="2"/>
    <rect x="32" y="45" width="6" height="4" fill="#D97706"/>

    <!-- Officer 2 -->
    <g transform="translate(35, 0)">
      <ellipse cx="15" cy="35" rx="8" ry="14" fill="#1E40AF"/>
      <rect x="9" y="40" width="12" height="12" fill="#1F2937"/>
      <circle cx="15" cy="18" r="7" fill="#FBBF24"/>
      <rect x="10" y="8" width="10" height="12" fill="#1F2937"/>
      <ellipse cx="15" cy="6" rx="6" ry="3" fill="#1F2937"/>
      <!-- Epaulettes -->
      <ellipse cx="8" cy="25" rx="5" ry="3" fill="#FDE047"/>
    </g>

    <!-- Officer 3 -->
    <g transform="translate(70, 0)">
      <ellipse cx="15" cy="35" rx="8" ry="14" fill="#1E40AF"/>
      <rect x="9" y="40" width="12" height="12" fill="#1F2937"/>
      <circle cx="15" cy="18" r="7" fill="#FBBF24"/>
      <rect x="10" y="8" width="10" height="12" fill="#1F2937"/>
      <ellipse cx="15" cy="6" rx="6" ry="3" fill="#1F2937"/>
      <!-- Raised hand -->
      <line x1="25" y1="20" x2="35" y2="5" stroke="#FBBF24" stroke-width="4"/>
      <!-- Flag -->
      <line x1="35" y1="5" x2="35" y2="-20" stroke="#78350F" stroke-width="2"/>
      <polygon points="35,-20 55,-15 35,-10" fill="#DC2626"/>
    </g>
  </g>

  <!-- Pestel or main leader -->
  <g transform="translate(140, 80)">
    <!-- Body -->
    <ellipse cx="18" cy="40" rx="12" ry="18" fill="#1E40AF"/>
    <ellipse cx="18" cy="38" rx="10" ry="15" fill="#1E3A8A"/>
    <rect x="10" y="48" width="16" height="12" fill="#1F2937"/>
    <!-- Face -->
    <circle cx="18" cy="20" r="10" fill="#FBBF24"/>
    <!-- Eyes -->
    <circle cx="15" cy="18" r="2" fill="#1F2937"/>
    <circle cx="21" cy="18" r="2" fill="#1F2937"/>
    <!-- Hair -->
    <ellipse cx="18" cy="12" rx="10" ry="6" fill="#57534E"/>
    <!-- Hat -->
    <rect x="10" y="5" width="16" height="10" fill="#1F2937"/>
    <ellipse cx="18" cy="3" rx="10" ry="5" fill="#374151"/>
    <!-- Sash -->
    <line x1="8" y1="30" x2="28" y2="50" stroke="#DC2626" stroke-width="3"/>
    <!-- Document/Constitution -->
    <g transform="translate(32, 20)">
      <rect x="0" y="0" width="25" height="35" fill="#FEF3C7"/>
      <line x1="5" y1="8" x2="20" y2="8" stroke="#78350F" stroke-width="1"/>
      <line x1="5" y1="15" x2="18" y2="15" stroke="#78350F" stroke-width="1"/>
      <line x1="5" y1="22" x2="20" y2="22" stroke="#78350F" stroke-width="1"/>
      <line x1="5" y1="29" x2="15" y2="29" stroke="#78350F" stroke-width="1"/>
    </g>
  </g>

  <!-- Government troops (opposing) -->
  <g transform="translate(230, 95)" opacity="0.5">
    <g transform="translate(0, 0)">
      <ellipse cx="10" cy="28" rx="7" ry="12" fill="#16A34A"/>
      <circle cx="10" cy="12" r="6" fill="#FBBF24"/>
      <rect x="5" y="3" width="10" height="10" fill="#1F2937"/>
    </g>
    <g transform="translate(25, 0)">
      <ellipse cx="10" cy="28" rx="7" ry="12" fill="#16A34A"/>
      <circle cx="10" cy="12" r="6" fill="#FBBF24"/>
      <rect x="5" y="3" width="10" height="10" fill="#1F2937"/>
    </g>
  </g>

  <!-- Cannon (government) -->
  <g transform="translate(260, 130)">
    <ellipse cx="15" cy="8" rx="12" ry="6" fill="#374151"/>
    <rect x="0" y="5" width="30" height="6" fill="#6B7280"/>
    <circle cx="8" cy="14" r="4" fill="#78350F"/>
    <circle cx="22" cy="14" r="4" fill="#78350F"/>
  </g>

  <!-- Date -->
  <g transform="translate(5, 5)">
    <rect x="0" y="0" width="80" height="22" rx="5" fill="#DC2626" opacity="0.8"/>
    <text x="40" y="16" font-family="Georgia, serif" font-size="11" fill="white" text-anchor="middle" font-weight="bold">14 дек. 1825</text>
  </g>

  <!-- Chains (symbol) -->
  <g transform="translate(5, 35)" opacity="0.3">
    <ellipse cx="10" cy="10" rx="8" ry="4" fill="none" stroke="#78350F" stroke-width="3"/>
    <ellipse cx="18" cy="15" rx="8" ry="4" fill="none" stroke="#78350F" stroke-width="3"/>
    <ellipse cx="10" cy="20" rx="8" ry="4" fill="none" stroke="#78350F" stroke-width="3"/>
  </g>

  <!-- Title hint -->
  <text x="150" y="195" font-family="Georgia, serif" font-size="10" fill="#1E40AF" text-anchor="middle" font-style="italic">Восстание декабристов</text>
</svg>