<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Background -->
  <rect width="400" height="300" fill="#f8fafc"/>
  
  <!-- Mole concept -->
  <g transform="translate(50, 50)">
    <!-- Large container -->
    <rect x="0" y="0" width="180" height="180" rx="10" fill="#f1f5f9" stroke="#64748b" stroke-width="2"/>
    
    <!-- Many small particles -->
    <circle cx="20" cy="20" r="6" fill="#8b5cf6"/>
    <circle cx="45" cy="25" r="6" fill="#8b5cf6"/>
    <circle cx="70" cy="20" r="6" fill="#8b5cf6"/>
    <circle cx="95" cy="25" r="6" fill="#8b5cf6"/>
    <circle cx="120" cy="20" r="6" fill="#8b5cf6"/>
    <circle cx="145" cy="25" r="6" fill="#8b5cf6"/>
    <circle cx="30" cy="45" r="6" fill="#8b5cf6"/>
    <circle cx="55" cy="50" r="6" fill="#8b5cf6"/>
    <circle cx="80" cy="45" r="6" fill="#8b5cf6"/>
    <circle cx="105" cy="50" r="6" fill="#8b5cf6"/>
    <circle cx="130" cy="45" r="6" fill="#8b5cf6"/>
    <circle cx="155" cy="50" r="6" fill="#8b5cf6"/>
    <circle cx="20" cy="70" r="6" fill="#8b5cf6"/>
    <circle cx="45" cy="75" r="6" fill="#8b5cf6"/>
    <circle cx="70" cy="70" r="6" fill="#8b5cf6"/>
    <circle cx="95" cy="75" r="6" fill="#8b5cf6"/>
    <circle cx="120" cy="70" r="6" fill="#8b5cf6"/>
    <circle cx="145" cy="75" r="6" fill="#8b5cf6"/>
    <circle cx="30" cy="95" r="6" fill="#8b5cf6"/>
    <circle cx="55" cy="100" r="6" fill="#8b5cf6"/>
    <circle cx="80" cy="95" r="6" fill="#8b5cf6"/>
    <circle cx="105" cy="100" r="6" fill="#8b5cf6"/>
    <circle cx="130" cy="95" r="6" fill="#8b5cf6"/>
    <circle cx="155" cy="100" r="6" fill="#8b5cf6"/>
    <circle cx="20" cy="120" r="6" fill="#8b5cf6"/>
    <circle cx="45" cy="125" r="6" fill="#8b5cf6"/>
    <circle cx="70" cy="120" r="6" fill="#8b5cf6"/>
    <circle cx="95" cy="125" r="6" fill="#8b5cf6"/>
    <circle cx="120" cy="120" r="6" fill="#8b5cf6"/>
    <circle cx="145" cy="125" r="6" fill="#8b5cf6"/>
    <circle cx="30" cy="145" r="6" fill="#8b5cf6"/>
    <circle cx="55" cy="150" r="6" fill="#8b5cf6"/>
    <circle cx="80" cy="145" r="6" fill="#8b5cf6"/>
    <circle cx="105" cy="150" r="6" fill="#8b5cf6"/>
    <circle cx="130" cy="145" r="6" fill="#8b5cf6"/>
    <circle cx="155" cy="150" r="6" fill="#8b5cf6"/>
    <circle cx="20" cy="165" r="6" fill="#8b5cf6"/>
    <circle cx="45" cy="170" r="6" fill="#8b5cf6"/>
    <circle cx="70" cy="165" r="6" fill="#8b5cf6"/>
    <circle cx="95" cy="170" r="6" fill="#8b5cf6"/>
    <circle cx="120" cy="165" r="6" fill="#8b5cf6"/>
    <circle cx="145" cy="170" r="6" fill="#8b5cf6"/>
    
    <!-- Ellipsis -->
    <text x="90" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#64748b">...</text>
  </g>
  
  <!-- Number -->
  <text x="280" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#475569">6,02 × 10²³</text>
  <text x="280" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#7c3aed">частиц</text>
  
  <!-- Avogadro's number box -->
  <rect x="250" y="120" width="120" height="80" rx="10" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="2"/>
  <text x="310" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#6d28d9">Число Авогадро</text>
  <text x="310" y="165" text-anchor="middle" font-family="Arial, sans-serif font-size="14" fill="#7c3aed">N<tspan font-size="10" baseline-shift="sub">A</tspan></text>
  <text x="310" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">1 моль</text>
  
  <!-- Molar mass -->
  <rect x="250" y="210" width="120" height="60" rx="10" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="310" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#16a34a">Молярная масса</text>
  <text x="310" y="255" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#22c55e">M = г/моль</text>
  
  <!-- Title -->
  <text x="140" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#475569">Моль — единица количества вещества</text>
</svg>