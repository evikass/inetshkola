<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="combineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="300" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="200" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#475569">Реакция соединения</text>
  
  <!-- Left molecules -->
  <g transform="translate(60, 100)">
    <circle cx="30" cy="30" r="25" fill="#3b82f6"/>
    <text x="30" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="white">A</text>
    
    <circle cx="90" cy="30" r="25" fill="#ef4444"/>
    <text x="90" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="white">B</text>
  </g>
  
  <!-- Plus sign -->
  <text x="170" y="135" font-family="Arial, sans-serif" font-size="30" fill="#64748b">+</text>
  
  <!-- Arrow -->
  <path d="M200 130 L260 130" stroke="#475569" stroke-width="3" marker-end="url(#arrowhead)"/>
  <defs><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
  </marker></defs>
  
  <!-- Result molecule -->
  <g transform="translate(280, 100)">
    <rect x="0" y="0" width="100" height="60" rx="10" fill="url(#combineGrad)"/>
    <text x="50" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="white">AB</text>
  </g>
  
  <!-- Example -->
  <text x="200" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#64748b">Пример:</text>
  <text x="200" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#16a34a">S + O₂ → SO₂</text>
  
  <!-- Description -->
  <text x="200" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8">Из простых веществ — сложное</text>
</svg>