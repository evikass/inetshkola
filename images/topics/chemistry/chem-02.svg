<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="solidGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="liquidGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="300" fill="#f8fafc"/>
  
  <!-- Solid - Ice cube -->
  <g transform="translate(40, 80)">
    <rect x="0" y="0" width="80" height="80" rx="8" fill="url(#solidGrad)" stroke="#2563eb" stroke-width="2"/>
    <path d="M10 20 L30 10 L50 20 L30 30 Z" fill="#93c5fd" opacity="0.5"/>
    <path d="M40 40 L60 30 L70 50 L50 60 Z" fill="#93c5fd" opacity="0.5"/>
    <text x="40" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1e40af">Лёд</text>
    <text x="40" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#3b82f6">Твёрдое</text>
  </g>
  
  <!-- Arrow 1 -->
  <path d="M130 120 L155 120" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
  <defs><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
  </marker></defs>
  
  <!-- Liquid - Water -->
  <g transform="translate(160, 80)">
    <rect x="0" y="0" width="80" height="80" rx="8" fill="none" stroke="#0891b2" stroke-width="2" stroke-dasharray="4,2"/>
    <path d="M0 30 Q20 20, 40 30 Q60 40, 80 30 L80 80 L0 80 Z" fill="url(#liquidGrad)" opacity="0.8"/>
    <text x="40" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0e7490">Вода</text>
    <text x="40" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#06b6d4">Жидкое</text>
  </g>
  
  <!-- Arrow 2 -->
  <path d="M250 120 L275 120" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Gas - Steam -->
  <g transform="translate(280, 80)">
    <rect x="0" y="0" width="80" height="80" rx="8" fill="none" stroke="#6b7280" stroke-width="2" stroke-dasharray="4,2"/>
    <!-- Steam bubbles -->
    <circle cx="25" cy="50" r="10" fill="#e5e7eb" opacity="0.8"/>
    <circle cx="50" cy="35" r="12" fill="#f3f4f6" opacity="0.7"/>
    <circle cx="60" cy="60" r="8" fill="#e5e7eb" opacity="0.6"/>
    <circle cx="35" cy="25" r="6" fill="#f9fafb" opacity="0.5"/>
    <text x="40" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#4b5563">Пар</text>
    <text x="40" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#9ca3af">Газообразное</text>
  </g>
  
  <!-- Temperature scale -->
  <rect x="40" y="230" width="320" height="20" rx="10" fill="#e2e8f0"/>
  <rect x="40" y="230" width="100" height="20" rx="10" fill="#3b82f6"/>
  <rect x="140" y="230" width="100" height="20" fill="#06b6d4"/>
  <rect x="240" y="230" width="120" height="20" rx="10" fill="#9ca3af"/>
  <text x="90" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1e40af">0°C</text>
  <text x="190" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#0e7490">100°C</text>
  <text x="320" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#4b5563">>100°C</text>
</svg>