<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Background -->
  <rect width="400" height="300" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="200" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#475569">Углеводы</text>
  
  <!-- Glucose molecule -->
  <g transform="translate(30, 50)">
    <text x="90" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#16a34a">Глюкоза C₆H₁₂O₆</text>
    
    <!-- Hexagon ring -->
    <polygon points="90,50 120,70 120,110 90,130 60,110 60,70" fill="none" stroke="#475569" stroke-width="2"/>
    
    <!-- Oxygen in ring -->
    <circle cx="90" cy="50" r="12" fill="#ef4444"/>
    <text x="90" y="54" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">O</text>
    
    <!-- CH2OH group -->
    <circle cx="90" cy="145" r="15" fill="#3b82f6"/>
    <text x="90" y="149" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="white">CH₂OH</text>
    
    <!-- OH groups -->
    <circle cx="45" cy="100" r="10" fill="#ef4444"/>
    <circle cx="135" cy="100" r="10" fill="#ef4444"/>
    <circle cx="55" cy="60" r="10" fill="#ef4444"/>
    <circle cx="125" cy="60" r="10" fill="#ef4444"/>
  </g>
  
  <!-- Fructose molecule -->
  <g transform="translate(200, 50)">
    <text x="90" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0891b2">Фруктоза C₆H₁₂O₆</text>
    
    <!-- Pentagon ring -->
    <polygon points="90,50 115,75 105,110 75,110 65,75" fill="none" stroke="#475569" stroke-width="2"/>
    
    <!-- Oxygen in ring -->
    <circle cx="90" cy="50" r="12" fill="#ef4444"/>
    <text x="90" y="54" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">O</text>
    
    <!-- CH2OH groups -->
    <circle cx="50" cy="60" r="12" fill="#3b82f6"/>
    <circle cx="130" cy="60" r="12" fill="#3b82f6"/>
    <circle cx="90" cy="125" r="15" fill="#3b82f6"/>
    
    <!-- OH groups -->
    <circle cx="55" cy="110" r="10" fill="#ef4444"/>
    <circle cx="125" cy="110" r="10" fill="#ef4444"/>
  </g>
  
  <!-- Reactions box -->
  <rect x="30" y="200" width="340" height="85" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="200" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#166534">Реакции глюкозы:</text>
  <text x="200" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#15803d">Горение: C₆H₁₂O₆ + 6O₂ → 6CO₂ + 6H₂O</text>
  <text x="200" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#15803d">Брожение: C₆H₁₂O₆ → 2C₂H₅OH + 2CO₂</text>
</svg>