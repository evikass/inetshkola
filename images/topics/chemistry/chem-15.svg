<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Background -->
  <rect width="400" height="300" fill="#f8fafc"/>
  
  <!-- Methane CH4 -->
  <g transform="translate(30, 60)">
    <text x="50" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#475569">Метан</text>
    <circle cx="50" cy="50" r="15" fill="#475569"/>
    <text x="50" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">C</text>
    <!-- H atoms -->
    <line x1="35" y1="40" x2="25" y2="30" stroke="#94a3b8" stroke-width="2"/>
    <circle cx="20" cy="25" r="8" fill="#60a5fa"/>
    <text x="20" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="white">H</text>
    <line x1="65" y1="40" x2="75" y2="30" stroke="#94a3b8" stroke-width="2"/>
    <circle cx="80" cy="25" r="8" fill="#60a5fa"/>
    <line x1="35" y1="60" x2="25" y2="70" stroke="#94a3b8" stroke-width="2"/>
    <circle cx="20" cy="75" r="8" fill="#60a5fa"/>
    <line x1="65" y1="60" x2="75" y2="70" stroke="#94a3b8" stroke-width="2"/>
    <circle cx="80" cy="75" r="8" fill="#60a5fa"/>
    <text x="50" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#64748b">CH₄</text>
  </g>
  
  <!-- Ethane C2H6 -->
  <g transform="translate(130, 60)">
    <text x="50" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#475569">Этан</text>
    <circle cx="35" cy="50" r="15" fill="#475569"/>
    <text x="35" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">C</text>
    <circle cx="65" cy="50" r="15" fill="#475569"/>
    <text x="65" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">C</text>
    <line x1="50" y1="50" x2="50" y2="50" stroke="#64748b" stroke-width="3"/>
    <text x="50" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#64748b">C₂H₆</text>
  </g>
  
  <!-- Ethene C2H4 -->
  <g transform="translate(230, 60)">
    <text x="50" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#475569">Этен</text>
    <circle cx="35" cy="50" r="15" fill="#475569"/>
    <text x="35" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">C</text>
    <circle cx="65" cy="50" r="15" fill="#475569"/>
    <text x="65" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">C</text>
    <line x1="38" y1="45" x2="62" y2="45" stroke="#64748b" stroke-width="2"/>
    <line x1="38" y1="55" x2="62" y2="55" stroke="#64748b" stroke-width="2"/>
    <text x="50" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#64748b">C₂H₄</text>
  </g>
  
  <!-- Ethyne C2H2 -->
  <g transform="translate(330, 60)">
    <text x="30" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#475569">Этин</text>
    <circle cx="15" cy="50" r="15" fill="#475569"/>
    <text x="15" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">C</text>
    <circle cx="45" cy="50" r="15" fill="#475569"/>
    <text x="45" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">C</text>
    <line x1="18" y1="43" x2="42" y2="43" stroke="#64748b" stroke-width="1"/>
    <line x1="18" y1="50" x2="42" y2="50" stroke="#64748b" stroke-width="1"/>
    <line x1="18" y1="57" x2="42" y2="57" stroke="#64748b" stroke-width="1"/>
    <text x="30" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#64748b">C₂H₂</text>
  </g>
  
  <!-- Functional groups -->
  <g transform="translate(30, 180)">
    <text x="170" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#475569">Функциональные группы</text>
    
    <!-- Alcohol -->
    <rect x="0" y="20" width="75" height="50" rx="5" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
    <text x="37" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#92400e">-OH</text>
    <text x="37" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#d97706">спирты</text>
    
    <!-- Carboxyl -->
    <rect x="85" y="20" width="75" height="50" rx="5" fill="#fee2e2" stroke="#ef4444" stroke-width="1"/>
    <text x="122" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#991b1b">-COOH</text>
    <text x="122" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#dc2626">кислоты</text>
    
    <!-- Amino -->
    <rect x="170" y="20" width="75" height="50" rx="5" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
    <text x="207" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1e40af">-NH₂</text>
    <text x="207" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#2563eb">амины</text>
    
    <!-- Aldehyde -->
    <rect x="255" y="20" width="75" height="50" rx="5" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
    <text x="292" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#166534">-CHO</text>
    <text x="292" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#16a34a">альдегиды</text>
  </g>
  
  <!-- Title -->
  <text x="200" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#475569">Углеводороды и функциональные группы</text>
</svg>