<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Background -->
  <rect width="400" height="300" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="200" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#475569">Альдегиды и кетоны</text>
  
  <!-- Aldehyde structure -->
  <g transform="translate(30, 60)">
    <text x="70" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#7c3aed">Альдегид R-CHO</text>
    
    <!-- R group -->
    <rect x="10" y="50" width="40" height="40" rx="5" fill="#64748b"/>
    <text x="30" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">R</text>
    
    <!-- C -->
    <circle cx="70" cy="70" r="18" fill="#475569"/>
    <text x="70" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">C</text>
    
    <!-- H -->
    <circle cx="45" cy="95" r="10" fill="#60a5fa"/>
    <text x="45" y="99" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="white">H</text>
    
    <!-- O double bond -->
    <circle cx="110" cy="70" r="15" fill="#ef4444"/>
    <text x="110" y="74" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">O</text>
    
    <!-- Bonds -->
    <line x1="50" y1="70" x2="52" y2="70" stroke="#94a3b8" stroke-width="2"/>
    <line x1="88" y1="70" x2="95" y2="70" stroke="#94a3b8" stroke-width="2"/>
    <line x1="88" y1="75" x2="95" y2="75" stroke="#94a3b8" stroke-width="2"/>
    <line x1="55" y1="85" x2="50" y2="90" stroke="#94a3b8" stroke-width="2"/>
    
    <text x="70" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#64748b">Формальдегид: HCHO</text>
  </g>
  
  <!-- Ketone structure -->
  <g transform="translate(200, 60)">
    <text x="90" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0891b2">Кетон R-CO-R'</text>
    
    <!-- R group -->
    <rect x="30" y="50" width="35" height="40" rx="5" fill="#64748b"/>
    <text x="47" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">R</text>
    
    <!-- C -->
    <circle cx="90" cy="70" r="18" fill="#475569"/>
    <text x="90" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">C</text>
    
    <!-- O double bond -->
    <circle cx="90" cy="110" r="15" fill="#ef4444"/>
    <text x="90" y="114" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">O</text>
    
    <!-- R' group -->
    <rect x="115" y="50" width="35" height="40" rx="5" fill="#94a3b8"/>
    <text x="132" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">R'</text>
    
    <!-- Bonds -->
    <line x1="65" y1="70" x2="72" y2="70" stroke="#94a3b8" stroke-width="2"/>
    <line x1="108" y1="70" x2="115" y2="70" stroke="#94a3b8" stroke-width="2"/>
    <line x1="85" y1="88" x2="85" y2="95" stroke="#94a3b8" stroke-width="2"/>
    <line x1="95" y1="88" x2="95" y2="95" stroke="#94a3b8" stroke-width="2"/>
    
    <text x="90" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#64748b">Ацетон: CH₃-CO-CH₃</text>
  </g>
  
  <!-- Silver mirror reaction -->
  <rect x="30" y="210" width="340" height="70" rx="10" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="2"/>
  <text x="200" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#6d28d9">Реакция "серебряного зеркала":</text>
  <text x="200" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#7c3aed">R-CHO + Ag₂O → R-COOH + 2Ag↓</text>
</svg>