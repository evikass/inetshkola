<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A855F7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EC4899;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="200" height="150" fill="url(#bg3)" rx="15"/>
  
  <!-- Hand -->
  <ellipse cx="100" cy="85" rx="35" ry="45" fill="#FDE68A"/>
  
  <!-- Fingers -->
  <ellipse cx="75" cy="50" rx="8" ry="25" fill="#FDE68A"/>
  <ellipse cx="90" cy="45" rx="7" ry="28" fill="#FDE68A"/>
  <ellipse cx="105" cy="43" rx="7" ry="30" fill="#FDE68A"/>
  <ellipse cx="120" cy="48" rx="7" ry="26" fill="#FDE68A"/>
  <ellipse cx="132" cy="60" rx="6" ry="20" fill="#FDE68A"/>
  
  <!-- Finger lines -->
  <line x1="75" y1="35" x2="75" y2="50" stroke="#F59E0B" stroke-width="2"/>
  <line x1="90" y1="30" x2="90" y2="45" stroke="#F59E0B" stroke-width="2"/>
  <line x1="105" y1="28" x2="105" y2="43" stroke="#F59E0B" stroke-width="2"/>
  <line x1="120" y1="33" x2="120" y2="48" stroke="#F59E0B" stroke-width="2"/>
  
  <!-- Stars for exercise -->
  <text x="40" y="130" font-size="16">⭐</text>
  <text x="90" y="140" font-size="16">✨</text>
  <text x="150" y="130" font-size="16">🌟</text>
  
  <!-- Motion lines -->
  <path d="M50 70 Q60 65 55 55" stroke="#FEF3C7" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M145 75 Q155 70 150 60" stroke="#FEF3C7" stroke-width="2" fill="none" stroke-linecap="round"/>
</svg>