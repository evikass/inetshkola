<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg20" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  
  <rect width="400" height="300" fill="url(#bg20)"/>
  
  <!-- Coordinate system -->
  <g transform="translate(60, 230)">
    <!-- Axes -->
    <line x1="0" y1="0" x2="280" y2="0" stroke="#7f8c8d" stroke-width="2"/>
    <line x1="0" y1="0" x2="0" y2="-180" stroke="#7f8c8d" stroke-width="2"/>
    
    <!-- Axis arrows -->
    <polygon points="280,0 270,-5 270,5" fill="#7f8c8d"/>
    <polygon points="0,-180 -5,-170 5,-170" fill="#7f8c8d"/>
    
    <!-- Labels -->
    <text x="270" y="20" font-family="Arial, sans-serif" font-size="12" fill="#7f8c8d">t</text>
    <text x="-20" y="-170" font-family="Arial, sans-serif" font-size="12" fill="#7f8c8d">v</text>
  </g>
  
  <!-- Velocity-time graph for uniformly accelerated motion -->
  <g transform="translate(60, 230)">
    <!-- v = v₀ + at line -->
    <line x1="20" y1="-80" x2="220" y2="-150" stroke="#2ecc71" stroke-width="3"/>
    
    <!-- Starting point -->
    <circle cx="20" cy="-80" r="5" fill="#3498db"/>
    <text x="30" y="-75" font-family="Arial, sans-serif" font-size="10" fill="#3498db">v₀</text>
    
    <!-- Area under curve (displacement) -->
    <polygon points="20,-80 220,-150 220,0 20,0" fill="#2ecc71" opacity="0.2"/>
    
    <!-- Acceleration arrow -->
    <line x1="120" y1="-115" x2="160" y2="-135" stroke="#f1c40f" stroke-width="2"/>
    <polygon points="160,-135 150,-132 154,-142" fill="#f1c40f"/>
    <text x="145" y="-145" font-family="Arial, sans-serif" font-size="10" fill="#f1c40f">a</text>
    
    <!-- Time markers -->
    <line x1="20" y1="0" x2="20" y2="5" stroke="#7f8c8d" stroke-width="1"/>
    <text x="20" y="18" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">0</text>
    <line x1="220" y1="0" x2="220" y2="5" stroke="#7f8c8d" stroke-width="1"/>
    <text x="220" y="18" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">t</text>
  </g>
  
  <!-- Formulas -->
  <g transform="translate(200, 50)">
    <rect x="-140" y="-20" width="90" height="40" rx="8" fill="#2c3e50" stroke="#2ecc71" stroke-width="2"/>
    <text x="-95" y="8" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#fff">v = v₀+at</text>
    
    <rect x="-40" y="-20" width="90" height="40" rx="8" fill="#2c3e50" stroke="#3498db" stroke-width="2"/>
    <text x="5" y="8" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#fff">S = v₀t+at²/2</text>
    
    <rect x="60" y="-20" width="80" height="40" rx="8" fill="#2c3e50" stroke="#f1c40f" stroke-width="2"/>
    <text x="100" y="8" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#fff">S = (v²-v₀²)/2a</text>
  </g>
  
  <!-- Title -->
  <text x="200" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ffffff">РАВНОУСКОРЕННОЕ ДВИЖЕНИЕ</text>
</svg>