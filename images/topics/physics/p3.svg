<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Background -->
  <rect width="400" height="300" fill="#0F172A"/>
  
  <!-- Hydraulic press cylinders -->
  <rect x="50" y="120" width="80" height="100" rx="5" fill="#1E293B" stroke="#475569" stroke-width="2"/>
  <rect x="270" y="80" width="80" height="140" rx="5" fill="#1E293B" stroke="#475569" stroke-width="2"/>
  
  <!-- Pistons -->
  <rect x="60" y="100" width="60" height="30" rx="3" fill="#3B82F6"/>
  <rect x="280" y="60" width="60" height="30" rx="3" fill="#3B82F6"/>
  
  <!-- Connecting tube -->
  <path d="M130,170 Q200,170 270,150" fill="none" stroke="#475569" stroke-width="8"/>
  <path d="M130,170 Q200,170 270,150" fill="none" stroke="#0EA5E9" stroke-width="4"/>
  
  <!-- Pressure arrows -->
  <polygon points="90,100 80,70 100,70" fill="#EF4444"/>
  <polygon points="310,60 295,30 325,30" fill="#EF4444"/>
  
  <!-- Force arrows small piston -->
  <line x1="90" y1="60" x2="90" y2="30" stroke="#EF4444" stroke-width="3"/>
  <polygon points="90,30 85,40 95,40" fill="#EF4444"/>
  <text x="100" y="40" fill="#FCA5A5" font-family="Arial" font-size="12">F₁</text>
  
  <!-- Force arrows large piston -->
  <line x1="310" y1="25" x2="310" y2="50" stroke="#10B981" stroke-width="3"/>
  <polygon points="310,50 305,40 315,40" fill="#10B981"/>
  <text x="330" y="45" fill="#6EE7B7" font-family="Arial" font-size="12">F₂</text>
  
  <!-- Labels -->
  <text x="90" y="240" text-anchor="middle" fill="#94A3B8" font-family="Arial" font-size="12">S₁ (малый)</text>
  <text x="310" y="240" text-anchor="middle" fill="#94A3B8" font-family="Arial" font-size="12">S₂ (большой)</text>
  
  <!-- Title -->
  <text x="200" y="280" text-anchor="middle" fill="#E2E8F0" font-family="Arial, sans-serif" font-size="16" font-weight="bold">Гидравлический пресс</text>
  
  <!-- Formula -->
  <text x="200" y="270" text-anchor="middle" fill="#94A3B8" font-family="Arial" font-size="14">F₁/S₁ = F₂/S₂</text>
</svg>