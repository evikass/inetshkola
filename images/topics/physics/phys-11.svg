<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg11" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  
  <rect width="400" height="300" fill="url(#bg11)"/>
  
  <!-- Wires with different properties -->
  
  <!-- Short thick wire - low R -->
  <g transform="translate(60, 80)">
    <rect x="0" y="20" width="60" height="30" rx="5" fill="#c0392b"/>
    <rect x="5" y="25" width="50" height="20" rx="3" fill="#e74c3c"/>
    <text x="30" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#fff">медь</text>
    <text x="30" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2ecc71">R мало</text>
  </g>
  
  <!-- Long thin wire - high R -->
  <g transform="translate(170, 60)">
    <rect x="0" y="30" width="150" height="15" rx="3" fill="#7f8c8d"/>
    <rect x="5" y="33" width="140" height="9" rx="2" fill="#95a5a6"/>
    <text x="75" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff">нихром</text>
    <text x="75" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e74c3c">R велико</text>
  </g>
  
  <!-- Comparison arrows -->
  <g transform="translate(30, 150)">
    <line x1="60" y1="0" x2="60" y2="20" stroke="#2ecc71" stroke-width="2"/>
    <polygon points="60,20 55,10 65,10" fill="#2ecc71"/>
    <text x="60" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#2ecc71">l короткий</text>
    
    <line x1="180" y1="0" x2="180" y2="20" stroke="#e74c3c" stroke-width="2"/>
    <polygon points="180,20 175,10 185,10" fill="#e74c3c"/>
    <text x="180" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#e74c3c">l длинный</text>
  </g>
  
  <g transform="translate(30, 160)">
    <line x1="60" y1="0" x2="80" y2="0" stroke="#2ecc71" stroke-width="2"/>
    <polygon points="80,0 70,-5 70,5" fill="#2ecc71"/>
    <text x="95" y="5" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#2ecc71">S большое</text>
    
    <line x1="180" y1="0" x2="200" y2="0" stroke="#e74c3c" stroke-width="2"/>
    <polygon points="200,0 190,-5 190,5" fill="#e74c3c"/>
    <text x="215" y="5" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#e74c3c">S малое</text>
  </g>
  
  <!-- Formula -->
  <g transform="translate(200, 220)">
    <rect x="-80" y="-20" width="160" height="40" rx="10" fill="#2c3e50" stroke="#e74c3c" stroke-width="2"/>
    <text x="0" y="8" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#fff">R = ρ · l/S</text>
  </g>
  
  <!-- Title -->
  <text x="200" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ffffff">СОПРОТИВЛЕНИЕ ПРОВОДНИКА</text>
  <text x="200" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#888">ρ — удельное сопротивление материала</text>
</svg>