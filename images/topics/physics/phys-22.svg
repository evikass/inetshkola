<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg22" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  
  <rect width="400" height="300" fill="url(#bg22)"/>
  
  <!-- Decay curve graph -->
  <g transform="translate(60, 230)">
    <!-- Axes -->
    <line x1="0" y1="0" x2="280" y2="0" stroke="#7f8c8d" stroke-width="2"/>
    <line x1="0" y1="0" x2="0" y2="-160" stroke="#7f8c8d" stroke-width="2"/>
    <polygon points="280,0 270,-5 270,5" fill="#7f8c8d"/>
    <polygon points="0,-160 -5,-150 5,-150" fill="#7f8c8d"/>
    
    <!-- Labels -->
    <text x="270" y="20" font-family="Arial, sans-serif" font-size="12" fill="#7f8c8d">t</text>
    <text x="-25" y="-145" font-family="Arial, sans-serif" font-size="12" fill="#7f8c8d">N</text>
    
    <!-- Exponential decay curve -->
    <path d="M0,-140 Q70,-100 140,-70 Q210,-35 280,-10" fill="none" stroke="#2ecc71" stroke-width="3"/>
    
    <!-- N₀ point -->
    <circle cx="0" cy="-140" r="4" fill="#3498db"/>
    <text x="-15" y="-140" font-family="Arial, sans-serif" font-size="10" fill="#3498db">N₀</text>
    
    <!-- Half-life markers -->
    <line x1="70" y1="0" x2="70" y2="-100" stroke="#e74c3c" stroke-width="1" stroke-dasharray="5,5"/>
    <circle cx="70" cy="-70" r="3" fill="#e74c3c"/>
    <text x="70" y="15" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e74c3c">T₁/₂</text>
    <text x="70" y="-105" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#fff">N₀/2</text>
    
    <line x1="140" y1="0" x2="140" y2="-70" stroke="#f1c40f" stroke-width="1" stroke-dasharray="5,5"/>
    <text x="140" y="15" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#f1c40f">2T₁/₂</text>
    <text x="140" y="-75" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#fff">N₀/4</text>
  </g>
  
  <!-- Radioactive atoms -->
  <g transform="translate(320, 100)">
    <!-- Stable atom -->
    <circle cx="0" cy="0" r="20" fill="#3498db" opacity="0.5"/>
    <circle cx="0" cy="0" r="8" fill="#3498db"/>
    <text x="0" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#3498db">стабильный</text>
    
    <!-- Unstable atom -->
    <circle cx="0" cy="70" r="20" fill="#e74c3c" opacity="0.5">
      <animate attributeName="opacity" values="0.5;0.8;0.5" dur="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="70" r="8" fill="#e74c3c">
      <animate attributeName="r" values="8;10;8" dur="0.5s" repeatCount="indefinite"/>
    </circle>
    <text x="0" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#e74c3c">радиоактивный</text>
    
    <!-- Radiation particles -->
    <circle cx="25" cy="65" r="3" fill="#f1c40f">
      <animate attributeName="cx" values="25;50;70" dur="1s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="65;50;40" dur="1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.5;0" dur="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="-20" cy="80" r="3" fill="#f1c40f">
      <animate attributeName="cx" values="-20;-50;-70" dur="1.2s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="80;90;100" dur="1.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.5;0" dur="1.2s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Formula -->
  <g transform="translate(200, 50)">
    <rect x="-70" y="-20" width="140" height="40" rx="10" fill="#2c3e50" stroke="#2ecc71" stroke-width="2"/>
    <text x="0" y="8" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#fff">N = N₀·2^(-t/T)</text>
  </g>
  
  <!-- Title -->
  <text x="200" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ffffff">ЗАКОН РАДИОАКТИВНОГО РАСПАДА</text>
</svg>