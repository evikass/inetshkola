<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Background -->
  <rect width="400" height="300" fill="#0F172A"/>
  
  <!-- Thermometer -->
  <rect x="180" y="40" width="40" height="200" rx="20" fill="#1E293B" stroke="#475569" stroke-width="2"/>
  <circle cx="200" cy="220" r="25" fill="#EF4444"/>
  <rect x="192" y="80" width="16" height="140" fill="#EF4444">
    <animate attributeName="height" values="80;140;80" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="y" values="140;80;140" dur="3s" repeatCount="indefinite"/>
  </rect>
  
  <!-- Temperature scale -->
  <line x1="225" y1="60" x2="235" y2="60" stroke="#94A3B8" stroke-width="2"/>
  <line x1="225" y1="100" x2="235" y2="100" stroke="#94A3B8" stroke-width="2"/>
  <line x1="225" y1="140" x2="235" y2="140" stroke="#94A3B8" stroke-width="2"/>
  <line x1="225" y1="180" x2="235" y2="180" stroke="#94A3B8" stroke-width="2"/>
  
  <text x="245" y="65" fill="#94A3B8" font-family="Arial" font-size="11">100°C</text>
  <text x="245" y="105" fill="#94A3B8" font-family="Arial" font-size="11">75°C</text>
  <text x="245" y="145" fill="#94A3B8" font-family="Arial" font-size="11">50°C</text>
  <text x="245" y="185" fill="#94A3B8" font-family="Arial" font-size="11">25°C</text>
  
  <!-- Heat waves -->
  <path d="M120,80 Q130,70 140,80 Q150,90 160,80" fill="none" stroke="#F97316" stroke-width="2" opacity="0.6">
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2s" repeatCount="indefinite"/>
  </path>
  <path d="M120,100 Q130,90 140,100 Q150,110 160,100" fill="none" stroke="#F97316" stroke-width="2" opacity="0.6">
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2s" repeatCount="indefinite" begin="0.5s"/>
  </path>
  <path d="M120,120 Q130,110 140,120 Q150,130 160,120" fill="none" stroke="#F97316" stroke-width="2" opacity="0.6">
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2s" repeatCount="indefinite" begin="1s"/>
  </path>
  
  <!-- Cold particles -->
  <circle cx="280" cy="100" r="4" fill="#60A5FA">
    <animate attributeName="cy" values="100;110;100" dur="1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="300" cy="130" r="4" fill="#60A5FA">
    <animate attributeName="cy" values="130;120;130" dur="1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="320" cy="160" r="4" fill="#60A5FA">
    <animate attributeName="cy" values="160;150;160" dur="1s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Title -->
  <text x="200" y="280" text-anchor="middle" fill="#E2E8F0" font-family="Arial, sans-serif" font-size="16" font-weight="bold">Тепловые явления</text>
</svg>