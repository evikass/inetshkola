<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  
  <rect width="400" height="300" fill="url(#bg2)"/>
  
  <!-- Ruler -->
  <g transform="translate(50, 100)">
    <rect x="0" y="0" width="120" height="25" rx="3" fill="#f1c40f"/>
    <rect x="0" y="0" width="120" height="8" fill="#f39c12"/>
    <!-- Markings -->
    <line x1="10" y1="0" x2="10" y2="15" stroke="#333" stroke-width="1"/>
    <line x1="30" y1="0" x2="30" y2="15" stroke="#333" stroke-width="1"/>
    <line x1="50" y1="0" x2="50" y2="15" stroke="#333" stroke-width="1"/>
    <line x1="70" y1="0" x2="70" y2="15" stroke="#333" stroke-width="1"/>
    <line x1="90" y1="0" x2="90" y2="15" stroke="#333" stroke-width="1"/>
    <line x1="110" y1="0" x2="110" y2="15" stroke="#333" stroke-width="1"/>
  </g>
  
  <!-- Clock -->
  <g transform="translate(200, 112)">
    <circle cx="0" cy="0" r="45" fill="#2c3e50" stroke="#3498db" stroke-width="3"/>
    <circle cx="0" cy="0" r="38" fill="#34495e"/>
    <!-- Hour marks -->
    <line x1="0" y1="-32" x2="0" y2="-28" stroke="#fff" stroke-width="2"/>
    <line x1="0" y1="32" x2="0" y2="28" stroke="#fff" stroke-width="2"/>
    <line x1="-32" y1="0" x2="-28" y2="0" stroke="#fff" stroke-width="2"/>
    <line x1="32" y1="0" x2="28" y2="0" stroke="#fff" stroke-width="2"/>
    <!-- Hands -->
    <line x1="0" y1="0" x2="0" y2="-25" stroke="#e74c3c" stroke-width="3" stroke-linecap="round">
      <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="60s" repeatCount="indefinite"/>
    </line>
    <line x1="0" y1="0" x2="15" y2="0" stroke="#ecf0f1" stroke-width="2" stroke-linecap="round">
      <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="5s" repeatCount="indefinite"/>
    </line>
    <circle cx="0" cy="0" r="4" fill="#e74c3c"/>
  </g>
  
  <!-- Scale/Weights -->
  <g transform="translate(320, 100)">
    <line x1="0" y1="0" x2="0" y2="30" stroke="#95a5a6" stroke-width="3"/>
    <line x1="-30" y1="30" x2="30" y2="30" stroke="#95a5a6" stroke-width="3"/>
    <!-- Left pan -->
    <ellipse cx="-25" cy="40" rx="20" ry="5" fill="#7f8c8d"/>
    <rect x="-15" y="30" width="6" height="15" fill="#3498db"/>
    <!-- Right pan -->
    <ellipse cx="25" cy="40" rx="20" ry="5" fill="#7f8c8d"/>
    <rect x="20" y="30" width="6" height="15" fill="#e74c3c"/>
  </g>
  
  <!-- Labels -->
  <text x="110" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#f1c40f">м (метр)</text>
  <text x="200" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#3498db">с (секунда)</text>
  <text x="320" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#95a5a6">кг (килограмм)</text>
  
  <!-- Title -->
  <text x="200" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#ffffff">ЕДИНИЦЫ ИЗМЕРЕНИЯ</text>
  <text x="200" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#888">Система СИ</text>
</svg>