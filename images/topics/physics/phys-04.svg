<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  
  <rect width="400" height="300" fill="url(#bg4)"/>
  
  <!-- Surface -->
  <rect x="50" y="180" width="120" height="20" fill="#7f8c8d"/>
  <rect x="230" y="180" width="120" height="20" fill="#7f8c8d"/>
  
  <!-- Nail - small area, high pressure -->
  <g transform="translate(110, 150)">
    <polygon points="0,0 8,0 8,30 4,40 4,30 0,30" fill="#bdc3c7"/>
    <rect x="-5" y="-15" width="18" height="20" rx="3" fill="#3498db"/>
    <text x="4" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e74c3c">P высокое</text>
    <!-- Arrow down -->
    <line x1="4" y1="-30" x2="4" y2="-18" stroke="#e74c3c" stroke-width="2"/>
    <polygon points="4,-18 0,-25 8,-25" fill="#e74c3c"/>
    <text x="4" y="-35" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff">F</text>
  </g>
  
  <!-- Ski - large area, low pressure -->
  <g transform="translate(290, 160)">
    <rect x="-40" y="0" width="80" height="8" rx="2" fill="#8e44ad"/>
    <rect x="-35" y="-5" width="70" height="8" rx="2" fill="#9b59b6"/>
    <text x="0" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2ecc71">P низкое</text>
    <!-- Arrow down -->
    <line x1="0" y1="-30" x2="0" y2="-10" stroke="#e74c3c" stroke-width="2"/>
    <polygon points="0,-10 -4,-17 4,-17" fill="#e74c3c"/>
    <text x="0" y="-35" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff">F</text>
  </g>
  
  <!-- Formula -->
  <g transform="translate(200, 70)">
    <rect x="-60" y="-25" width="120" height="50" rx="10" fill="#2c3e50" stroke="#9b59b6" stroke-width="2"/>
    <text x="0" y="8" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#fff">p = F / S</text>
  </g>
  
  <!-- Title -->
  <text x="200" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff">ДАВЛЕНИЕ</text>
  <text x="200" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#888">Паскаль (Па)</text>
</svg>