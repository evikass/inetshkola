<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="motionGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10B981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="300" fill="#0F172A"/>
  
  <!-- Inclined plane -->
  <polygon points="50,220 350,220 350,280" fill="#1E293B" stroke="#475569" stroke-width="2"/>
  
  <!-- Ball -->
  <circle cx="150" cy="195" r="25" fill="url(#motionGrad)">
    <animate attributeName="cx" values="150;300" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="195;240" dur="2s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Velocity arrows -->
  <line x1="180" y1="180" x2="230" y2="200" stroke="#F59E0B" stroke-width="3" marker-end="url(#arrowhead)"/>
  <polygon points="230,200 220,195 222,202" fill="#F59E0B"/>
  
  <!-- Force arrows -->
  <line x1="150" y1="195" x2="150" y2="240" stroke="#EF4444" stroke-width="3"/>
  <polygon points="150,240 145,230 155,230" fill="#EF4444"/>
  
  <line x1="150" y1="195" x2="190" y2="215" stroke="#3B82F6" stroke-width="3"/>
  <polygon points="190,215 180,215 185,205" fill="#3B82F6"/>
  
  <!-- Labels -->
  <text x="130" y="255" fill="#FCA5A5" font-family="Arial" font-size="12">mg</text>
  <text x="195" y="210" fill="#93C5FD" font-family="Arial" font-size="12">N</text>
  <text x="235" y="185" fill="#FCD34D" font-family="Arial" font-size="12">v</text>
  
  <!-- Title -->
  <text x="200" y="40" text-anchor="middle" fill="#E2E8F0" font-family="Arial, sans-serif" font-size="16" font-weight="bold">Механическое движение</text>
  
  <!-- Formula -->
  <text x="200" y="70" text-anchor="middle" fill="#94A3B8" font-family="Arial" font-size="14">v = s / t</text>
</svg>