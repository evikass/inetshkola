<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  
  <rect width="400" height="300" fill="url(#bg6)"/>
  
  <!-- Three types of heat transfer -->
  
  <!-- Conduction -->
  <g transform="translate(70, 100)">
    <rect x="0" y="30" width="60" height="10" fill="#e74c3c"/>
    <rect x="60" y="30" width="60" height="10" fill="#f39c12"/>
    <rect x="120" y="30" width="60" height="10" fill="#3498db"/>
    
    <!-- Heat particles moving -->
    <circle cx="30" cy="35" r="3" fill="#ff6b6b">
      <animate attributeName="cx" values="30;150" dur="2s" repeatCount="indefinite"/>
    </circle>
    
    <text x="90" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#f39c12">Теплопроводность</text>
  </g>
  
  <!-- Convection -->
  <g transform="translate(70, 170)">
    <rect x="30" y="20" width="120" height="60" rx="5" fill="none" stroke="#3498db" stroke-width="2"/>
    
    <!-- Convection currents -->
    <path d="M60,30 Q40,50 60,70" fill="none" stroke="#e74c3c" stroke-width="2">
      <animate attributeName="stroke-dasharray" values="0,100;100,0" dur="2s" repeatCount="indefinite"/>
    </path>
    <path d="M120,30 Q140,50 120,70" fill="none" stroke="#3498db" stroke-width="2">
      <animate attributeName="stroke-dasharray" values="0,100;100,0" dur="2s" repeatCount="indefinite"/>
    </path>
    
    <!-- Flame -->
    <ellipse cx="90" cy="25" rx="10" ry="15" fill="#e74c3c" opacity="0.8"/>
    <ellipse cx="90" cy="22" rx="6" ry="10" fill="#f39c12" opacity="0.9"/>
    
    <text x="90" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#3498db">Конвекция</text>
  </g>
  
  <!-- Radiation -->
  <g transform="translate(280, 130)">
    <!-- Sun -->
    <circle cx="0" cy="30" r="25" fill="#f1c40f"/>
    <circle cx="0" cy="30" r="18" fill="#f39c12"/>
    
    <!-- Rays -->
    <line x1="30" y1="30" x2="50" y2="30" stroke="#f1c40f" stroke-width="2">
      <animate attributeName="x2" values="50;55;50" dur="0.5s" repeatCount="indefinite"/>
    </line>
    <line x1="-30" y1="30" x2="-50" y2="30" stroke="#f1c40f" stroke-width="2">
      <animate attributeName="x2" values="-50;-55;-50" dur="0.5s" repeatCount="indefinite"/>
    </line>
    <line x1="0" y1="0" x2="0" y2="-20" stroke="#f1c40f" stroke-width="2">
      <animate attributeName="y2" values="-20;-25;-20" dur="0.5s" repeatCount="indefinite"/>
    </line>
    <line x1="0" y1="60" x2="0" y2="80" stroke="#f1c40f" stroke-width="2">
      <animate attributeName="y2" values="80;85;80" dur="0.5s" repeatCount="indefinite"/>
    </line>
    
    <text x="0" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#f1c40f">Излучение</text>
  </g>
  
  <!-- Title -->
  <text x="200" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff">ТЕПЛОПЕРЕДАЧА</text>
  <text x="200" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#888">Три способа передачи тепла</text>
</svg>