<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="atomGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="nucleusGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EF4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#DC2626;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="300" fill="#0F172A"/>
  
  <!-- Electron orbits -->
  <ellipse cx="200" cy="150" rx="120" ry="40" fill="none" stroke="url(#atomGrad)" stroke-width="2" opacity="0.6"/>
  <ellipse cx="200" cy="150" rx="100" ry="80" fill="none" stroke="url(#atomGrad)" stroke-width="2" opacity="0.6" transform="rotate(60, 200, 150)"/>
  <ellipse cx="200" cy="150" rx="100" ry="80" fill="none" stroke="url(#atomGrad)" stroke-width="2" opacity="0.6" transform="rotate(-60, 200, 150)"/>
  
  <!-- Nucleus -->
  <circle cx="200" cy="150" r="25" fill="url(#nucleusGrad)"/>
  <circle cx="190" cy="145" r="8" fill="#FCA5A5"/>
  <circle cx="210" cy="155" r="8" fill="#FCA5A5"/>
  
  <!-- Electrons -->
  <circle cx="320" cy="150" r="8" fill="#60A5FA">
    <animate attributeName="cx" values="320;200;80;200;320" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="150;110;150;190;150" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="200" cy="70" r="8" fill="#A78BFA">
    <animate attributeName="cx" values="200;280;200;120;200" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="70;150;230;150;70" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="100" cy="200" r="8" fill="#34D399">
    <animate attributeName="cx" values="100;200;300;200;100" dur="3.5s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="200;230;150;70;200" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Title -->
  <text x="200" y="280" text-anchor="middle" fill="#E2E8F0" font-family="Arial, sans-serif" font-size="16" font-weight="bold">Атомная модель</text>
</svg>