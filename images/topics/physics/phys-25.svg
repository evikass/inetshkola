<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg25" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  
  <rect width="400" height="300" fill="url(#bg25)"/>
  
  <!-- First Law of Thermodynamics visualization -->
  <g transform="translate(200, 120)">
    <!-- Energy flow diagram -->
    
    <!-- System box -->
    <rect x="-80" y="-60" width="160" height="100" rx="10" fill="#2c3e50" stroke="#3498db" stroke-width="2"/>
    <text x="0" y="-30" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#3498db">СИСТЕМА</text>
    
    <!-- Heat in (Q) -->
    <g transform="translate(-120, -10)">
      <ellipse cx="0" cy="0" rx="30" ry="20" fill="#e74c3c" opacity="0.7">
        <animate attributeName="opacity" values="0.7;1;0.7" dur="1s" repeatCount="indefinite"/>
      </ellipse>
      <text x="0" y="5" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#fff">Q</text>
      <line x1="30" y1="0" x2="-80" y2="0" stroke="#e74c3c" stroke-width="2"/>
      <polygon points="-80,0 -70,-5 -70,5" fill="#e74c3c"/>
    </g>
    <text x="-120" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e74c3c">тепло</text>
    
    <!-- Work out (A) -->
    <g transform="translate(120, -10)">
      <ellipse cx="0" cy="0" rx="30" ry="20" fill="#2ecc71" opacity="0.7">
        <animate attributeName="opacity" values="0.7;1;0.7" dur="1.2s" repeatCount="indefinite"/>
      </ellipse>
      <text x="0" y="5" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#fff">A</text>
      <line x1="-30" y1="0" x2="80" y2="0" stroke="#2ecc71" stroke-width="2"/>
      <polygon points="80,0 70,-5 70,5" fill="#2ecc71"/>
    </g>
    <text x="120" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2ecc71">работа</text>
    
    <!-- Internal energy (U) -->
    <circle cx="0" cy="0" r="30" fill="#f1c40f" opacity="0.8"/>
    <text x="0" y="5" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2c3e50">U</text>
    <text x="0" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#f1c40f">внутренняя энергия</text>
  </g>
  
  <!-- Formula -->
  <g transform="translate(200, 50)">
    <rect x="-80" y="-20" width="160" height="40" rx="10" fill="#2c3e50" stroke="#f1c40f" stroke-width="2"/>
    <text x="0" y="8" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#fff">Q = ΔU + A</text>
  </g>
  
  <!-- Title -->
  <text x="200" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ffffff">ПЕРВЫЙ ЗАКОН ТЕРМОДИНАМИКИ</text>
  <text x="200" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#888">Закон сохранения энергии для тепловых процессов</text>
</svg>