<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="magnetGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#EF4444;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#94A3B8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="300" fill="#0F172A"/>
  
  <!-- Horseshoe magnet -->
  <path d="M100,80 L100,180 Q100,220 140,220 L140,160 Q120,160 120,140 L120,80 Q120,60 140,60 L140,60 Q120,60 100,80" fill="#EF4444"/>
  <path d="M300,80 L300,180 Q300,220 260,220 L260,160 Q280,160 280,140 L280,80 Q280,60 260,60" fill="#3B82F6"/>
  <rect x="140" y="50" width="120" height="30" fill="#94A3B8"/>
  
  <!-- N and S labels -->
  <text x="110" y="200" fill="#E2E8F0" font-family="Arial" font-size="24" font-weight="bold">N</text>
  <text x="270" y="200" fill="#E2E8F0" font-family="Arial" font-size="24" font-weight="bold">S</text>
  
  <!-- Magnetic field lines -->
  <path d="M140,120 Q200,80 260,120" fill="none" stroke="#F59E0B" stroke-width="2" stroke-dasharray="5,3">
    <animate attributeName="stroke-dashoffset" values="0;-16" dur="1s" repeatCount="indefinite"/>
  </path>
  <path d="M140,150 Q200,100 260,150" fill="none" stroke="#F59E0B" stroke-width="2" stroke-dasharray="5,3">
    <animate attributeName="stroke-dashoffset" values="0;-16" dur="1s" repeatCount="indefinite"/>
  </path>
  <path d="M140,180 Q200,120 260,180" fill="none" stroke="#F59E0B" stroke-width="2" stroke-dasharray="5,3">
    <animate attributeName="stroke-dashoffset" values="0;-16" dur="1s" repeatCount="indefinite"/>
  </path>
  
  <!-- Compass needle -->
  <polygon points="200,220 195,240 200,260 205,240" fill="#EF4444"/>
  <polygon points="200,260 195,240 200,220 205,240" fill="#3B82F6"/>
  <circle cx="200" cy="240" r="5" fill="#E2E8F0"/>
  
  <!-- Field arrows -->
  <polygon points="200,85 195,75 205,75" fill="#F59E0B"/>
  <polygon points="140,130 135,125 135,135" fill="#F59E0B"/>
  <polygon points="260,130 265,125 265,135" fill="#F59E0B"/>
  
  <!-- Title -->
  <text x="200" y="280" text-anchor="middle" fill="#E2E8F0" font-family="Arial, sans-serif" font-size="16" font-weight="bold">Магнитное поле</text>
</svg>