<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg8" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  
  <rect width="400" height="300" fill="url(#bg8)"/>
  
  <!-- Container with water -->
  <rect x="100" y="100" width="200" height="100" rx="5" fill="none" stroke="#3498db" stroke-width="2"/>
  <rect x="102" y="150" width="196" height="48" fill="#3498db" opacity="0.3"/>
  
  <!-- Water surface with evaporation -->
  <path d="M102,150 Q150,145 200,150 Q250,155 298,150" fill="none" stroke="#3498db" stroke-width="2">
    <animate attributeName="d" values="M102,150 Q150,145 200,150 Q250,155 298,150;M102,150 Q150,155 200,150 Q250,145 298,150;M102,150 Q150,145 200,150 Q250,155 298,150" dur="2s" repeatCount="indefinite"/>
  </path>
  
  <!-- Evaporating molecules -->
  <g>
    <circle cx="150" cy="140" r="4" fill="#87ceeb">
      <animate attributeName="cy" values="140;60;40" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.5;0" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="200" cy="135" r="4" fill="#87ceeb">
      <animate attributeName="cy" values="135;50;30" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.5;0" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="250" cy="138" r="4" fill="#87ceeb">
      <animate attributeName="cy" values="138;70;45" dur="1.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.5;0" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="180" cy="142" r="3" fill="#87ceeb">
      <animate attributeName="cy" values="142;80;55" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.5;0" dur="3s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Labels -->
  <text x="200" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#3498db">Жидкость</text>
  <text x="200" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#87ceeb">Пар</text>
  
  <!-- Arrow -->
  <line x1="320" y1="150" x2="320" y2="90" stroke="#87ceeb" stroke-width="2"/>
  <polygon points="320,90 315,100 325,100" fill="#87ceeb"/>
  <text x="350" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#87ceeb">испарение</text>
  
  <!-- Formula -->
  <g transform="translate(200, 50)">
    <rect x="-60" y="-15" width="120" height="30" rx="8" fill="#2c3e50" stroke="#87ceeb" stroke-width="2"/>
    <text x="0" y="5" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#fff">Q = L · m</text>
  </g>
  
  <!-- Title -->
  <text x="200" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff">ИСПАРЕНИЕ</text>
  <text x="200" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#888">L — удельная теплота парообразования</text>
</svg>