<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg7" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  
  <rect width="400" height="300" fill="url(#bg7)"/>
  
  <!-- Ice cube -->
  <g transform="translate(80, 120)">
    <rect x="0" y="0" width="80" height="80" rx="5" fill="#3498db" opacity="0.7"/>
    <rect x="5" y="5" width="70" height="70" rx="3" fill="#85c1e9" opacity="0.5"/>
    <text x="40" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#fff">0°C</text>
    <text x="40" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#3498db">Лёд</text>
  </g>
  
  <!-- Arrow -->
  <g transform="translate(180, 150)">
    <line x1="0" y1="0" x2="40" y2="0" stroke="#f1c40f" stroke-width="3"/>
    <polygon points="40,0 30,-8 30,8" fill="#f1c40f"/>
    <text x="20" y="-15" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#f1c40f">+Q</text>
  </g>
  
  <!-- Water -->
  <g transform="translate(240, 120)">
    <rect x="0" y="0" width="80" height="80" rx="5" fill="#2980b9" opacity="0.7"/>
    <ellipse cx="40" cy="40" rx="30" ry="20" fill="#3498db" opacity="0.5"/>
    <!-- Waves -->
    <path d="M10,60 Q25,55 40,60 Q55,65 70,60" fill="none" stroke="#fff" stroke-width="1" opacity="0.5">
      <animate attributeName="d" values="M10,60 Q25,55 40,60 Q55,65 70,60;M10,60 Q25,65 40,60 Q55,55 70,60;M10,60 Q25,55 40,60 Q55,65 70,60" dur="2s" repeatCount="indefinite"/>
    </path>
    <text x="40" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#fff">0°C</text>
    <text x="40" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#3498db">Вода</text>
  </g>
  
  <!-- Formula -->
  <g transform="translate(200, 60)">
    <rect x="-70" y="-20" width="140" height="40" rx="10" fill="#2c3e50" stroke="#3498db" stroke-width="2"/>
    <text x="0" y="8" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#fff">Q = λ · m</text>
  </g>
  
  <!-- Title -->
  <text x="200" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ffffff">ПЛАВЛЕНИЕ И КРИСТАЛЛИЗАЦИЯ</text>
  <text x="200" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#888">λ — удельная теплота плавления</text>
</svg>