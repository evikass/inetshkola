<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150">
  <defs>
    <linearGradient id="worldBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22C55E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#14B8A6;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="200" height="150" fill="url(#worldBg)" rx="15"/>
  
  <!-- Snowflake - Winter -->
  <g transform="translate(35, 35)">
    <line x1="15" y1="0" x2="15" y2="30" stroke="white" stroke-width="2"/>
    <line x1="0" y1="15" x2="30" y2="15" stroke="white" stroke-width="2"/>
    <line x1="4" y1="4" x2="26" y2="26" stroke="white" stroke-width="2"/>
    <line x1="26" y1="4" x2="4" y2="26" stroke="white" stroke-width="2"/>
    <circle cx="15" cy="15" r="5" fill="white"/>
  </g>
  <text x="50" y="75" font-family="Arial" font-size="10" fill="white" text-anchor="middle">Зима</text>
  
  <!-- Flower - Spring -->
  <g transform="translate(85, 35)">
    <circle cx="15" cy="8" r="7" fill="#F9A8D4"/>
    <circle cx="8" cy="15" r="7" fill="#F9A8D4"/>
    <circle cx="22" cy="15" r="7" fill="#F9A8D4"/>
    <circle cx="10" cy="22" r="7" fill="#F9A8D4"/>
    <circle cx="20" cy="22" r="7" fill="#F9A8D4"/>
    <circle cx="15" cy="15" r="5" fill="#FCD34D"/>
  </g>
  <text x="100" y="75" font-family="Arial" font-size="10" fill="white" text-anchor="middle">Весна</text>
  
  <!-- Sun - Summer -->
  <g transform="translate(135, 35)">
    <circle cx="15" cy="15" r="12" fill="#FCD34D"/>
    <line x1="15" y1="0" x2="15" y2="-8" stroke="#FCD34D" stroke-width="3"/>
    <line x1="15" y1="30" x2="15" y2="38" stroke="#FCD34D" stroke-width="3"/>
    <line x1="0" y1="15" x2="-8" y2="15" stroke="#FCD34D" stroke-width="3"/>
    <line x1="30" y1="15" x2="38" y2="15" stroke="#FCD34D" stroke-width="3"/>
  </g>
  <text x="150" y="75" font-family="Arial" font-size="10" fill="white" text-anchor="middle">Лето</text>
  
  <!-- Leaf - Autumn -->
  <g transform="translate(20, 85)">
    <path d="M30 15 Q45 0 45 15 Q45 30 30 45 Q15 30 15 15 Q15 0 30 15" fill="#FB923C"/>
    <line x1="30" y1="15" x2="30" y2="50" stroke="#92400E" stroke-width="2"/>
  </g>
  <text x="50" y="140" font-family="Arial" font-size="10" fill="white" text-anchor="middle">Осень</text>
  
  <!-- Calendar showing seasons cycle -->
  <rect x="90" y="90" width="90" height="55" rx="8" fill="rgba(255,255,255,0.2)" stroke="white" stroke-width="1"/>
  <text x="135" y="105" font-family="Arial" font-size="10" fill="white" text-anchor="middle">Год</text>
  
  <!-- Cycle arrows -->
  <path d="M100 115 C100 130 125 140 160 130" fill="none" stroke="#FEF3C7" stroke-width="2"/>
  <path d="M160 130 C160 115 135 105 100 115" fill="none" stroke="#FEF3C7" stroke-width="2"/>
  
  <!-- Four seasons icons in cycle -->
  <text x="105" y="128" font-size="10">❄️</text>
  <text x="125" y="120" font-size="10">🌸</text>
  <text x="145" y="128" font-size="10">☀️</text>
  <text x="160" y="120" font-size="10">🍂</text>
</svg>