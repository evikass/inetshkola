<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150">
  <defs>
    <linearGradient id="worldBg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22C55E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#14B8A6;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="200" height="150" fill="url(#worldBg3)" rx="15"/>
  
  <!-- Cat -->
  <g transform="translate(30, 30)">
    <!-- Body -->
    <ellipse cx="35" cy="70" rx="30" ry="25" fill="#F97316"/>
    <!-- Head -->
    <circle cx="35" cy="35" r="25" fill="#F97316"/>
    <!-- Ears -->
    <polygon points="15,20 25,35 10,35" fill="#F97316"/>
    <polygon points="55,20 45,35 60,35" fill="#F97316"/>
    <!-- Inner ears -->
    <polygon points="17,24 23,33 13,33" fill="#FBBF24"/>
    <polygon points="53,24 47,33 57,33" fill="#FBBF24"/>
    <!-- Eyes -->
    <circle cx="25" cy="32" r="5" fill="#FEF3C7"/>
    <circle cx="45" cy="32" r="5" fill="#FEF3C7"/>
    <circle cx="26" cy="33" r="2" fill="black"/>
    <circle cx="46" cy="33" r="2" fill="black"/>
    <!-- Nose -->
    <ellipse cx="35" cy="42" rx="4" ry="3" fill="#EC4899"/>
    <!-- Whiskers -->
    <line x1="10" y1="40" x2="25" y2="42" stroke="#FEF3C7" stroke-width="1"/>
    <line x1="10" y1="45" x2="25" y2="45" stroke="#FEF3C7" stroke-width="1"/>
    <line x1="45" y1="42" x2="60" y2="40" stroke="#FEF3C7" stroke-width="1"/>
    <line x1="45" y1="45" x2="60" y2="45" stroke="#FEF3C7" stroke-width="1"/>
    <!-- Tail -->
    <path d="M65 70 Q85 50 70 40" fill="none" stroke="#F97316" stroke-width="8" stroke-linecap="round"/>
  </g>
  
  <!-- Dog -->
  <g transform="translate(100, 35)">
    <!-- Body -->
    <ellipse cx="35" cy="65" rx="32" ry="22" fill="#92400E"/>
    <!-- Head -->
    <circle cx="35" cy="35" r="22" fill="#92400E"/>
    <!-- Ears -->
    <ellipse cx="15" cy="25" rx="8" ry="15" fill="#78350F" transform="rotate(-20, 15, 25)"/>
    <ellipse cx="55" cy="25" rx="8" ry="15" fill="#78350F" transform="rotate(20, 55, 25)"/>
    <!-- Eyes -->
    <circle cx="27" cy="32" r="4" fill="#FEF3C7"/>
    <circle cx="43" cy="32" r="4" fill="#FEF3C7"/>
    <circle cx="28" cy="33" r="2" fill="black"/>
    <circle cx="44" cy="33" r="2" fill="black"/>
    <!-- Nose -->
    <ellipse cx="35" cy="42" rx="5" ry="4" fill="#1F2937"/>
    <!-- Mouth -->
    <path d="M30 48 Q35 52 40 48" fill="none" stroke="#1F2937" stroke-width="2"/>
    <!-- Tail -->
    <path d="M67 60 Q85 45 75 35" fill="none" stroke="#92400E" stroke-width="10" stroke-linecap="round"/>
  </g>
  
  <!-- Paw prints -->
  <g transform="translate(50, 120)">
    <circle cx="0" cy="0" r="6" fill="#FEF3C7" opacity="0.5"/>
    <ellipse cx="-5" cy="-8" rx="3" ry="4" fill="#FEF3C7" opacity="0.5"/>
    <ellipse cx="5" cy="-8" rx="3" ry="4" fill="#FEF3C7" opacity="0.5"/>
  </g>
  
  <g transform="translate(100, 125)">
    <circle cx="0" cy="0" r="5" fill="#FEF3C7" opacity="0.5"/>
    <ellipse cx="-4" cy="-6" rx="2" ry="3" fill="#FEF3C7" opacity="0.5"/>
    <ellipse cx="4" cy="-6" rx="2" ry="3" fill="#FEF3C7" opacity="0.5"/>
  </g>
</svg>