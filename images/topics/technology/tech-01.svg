<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bgtech" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5d4037"/>
      <stop offset="100%" style="stop-color:#795548"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bgtech)"/>
  
  <!-- Молоток -->
  <rect x="150" y="200" width="80" height="20" rx="3" fill="#78909c"/>
  <rect x="230" y="190" width="15" height="40" fill="#8d6e63"/>
  <rect x="245" y="180" width="60" height="60" rx="5" fill="#5d4037"/>
  
  <!-- Отвёртка -->
  <rect x="380" y="210" width="100" height="12" rx="2" fill="#ff7043"/>
  <polygon points="480,216 520,210 520,222" fill="#90a4ae"/>
  
  <!-- Зубчатые колёса -->
  <g transform="translate(600, 200)">
    <circle cx="0" cy="0" r="50" fill="none" stroke="#bcaaa4" stroke-width="15"/>
    <circle cx="0" cy="0" r="20" fill="#8d6e63"/>
  </g>
  <g transform="translate(660, 280)">
    <circle cx="0" cy="0" r="35" fill="none" stroke="#a1887f" stroke-width="12"/>
    <circle cx="0" cy="0" r="15" fill="#6d4c41"/>
  </g>
  
  <!-- Деревянная доска -->
  <rect x="100" y="350" width="200" height="30" rx="3" fill="#a1887f" opacity="0.7"/>
  <line x1="100" y1="360" x2="300" y2="360" stroke="#8d6e63" stroke-width="1" opacity="0.5"/>
  
  <!-- Измерительная линейка -->
  <rect x="400" y="350" width="250" height="25" fill="#ffcc80" opacity="0.8"/>
  <g transform="translate(410, 350)">
    <line x1="0" y1="20" x2="0" y2="25" stroke="#5d4037" stroke-width="1" opacity="0.7"/>
    <line x1="25" y1="22" x2="25" y2="25" stroke="#5d4037" stroke-width="1" opacity="0.5"/>
    <line x1="50" y1="20" x2="50" y2="25" stroke="#5d4037" stroke-width="1" opacity="0.7"/>
    <line x1="75" y1="22" x2="75" y2="25" stroke="#5d4037" stroke-width="1" opacity="0.5"/>
    <line x1="100" y1="20" x2="100" y2="25" stroke="#5d4037" stroke-width="1" opacity="0.7"/>
    <line x1="125" y1="22" x2="125" y2="25" stroke="#5d4037" stroke-width="1" opacity="0.5"/>
    <line x1="150" y1="20" x2="150" y2="25" stroke="#5d4037" stroke-width="1" opacity="0.7"/>
    <line x1="175" y1="22" x2="175" y2="25" stroke="#5d4037" stroke-width="1" opacity="0.5"/>
    <line x1="200" y1="20" x2="200" y2="25" stroke="#5d4037" stroke-width="1" opacity="0.7"/>
  </g>
  
  <text x="400" y="480" text-anchor="middle" font-family="Georgia, serif" font-size="24" font-weight="bold" fill="#ffffff">Технология</text>
</svg>