<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="physBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4F46E5;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="url(#physBg)" rx="20"/>
  
  <!-- Decorative circles -->
  <circle cx="50" cy="50" r="30" fill="#A78BFA" opacity="0.4"/>
  <circle cx="350" cy="250" r="40" fill="#818CF8" opacity="0.4"/>
  
  <!-- Atom model -->
  <g transform="translate(200, 130)">
    <circle cx="0" cy="0" r="15" fill="#FCD34D"/>
    <!-- Electron orbits -->
    <ellipse cx="0" cy="0" rx="60" ry="25" fill="none" stroke="#60A5FA" stroke-width="2" transform="rotate(0)"/>
    <ellipse cx="0" cy="0" rx="60" ry="25" fill="none" stroke="#60A5FA" stroke-width="2" transform="rotate(60)"/>
    <ellipse cx="0" cy="0" rx="60" ry="25" fill="none" stroke="#60A5FA" stroke-width="2" transform="rotate(120)"/>
    <!-- Electrons -->
    <circle cx="60" cy="0" r="6" fill="#3B82F6"/>
    <circle cx="-30" cy="52" r="6" fill="#3B82F6"/>
    <circle cx="-30" cy="-52" r="6" fill="#3B82F6"/>
  </g>
  
  <!-- Pendulum -->
  <g transform="translate(60, 30)">
    <line x1="40" y1="0" x2="40" y2="80" stroke="#9CA3AF" stroke-width="2"/>
    <line x1="40" y1="80" x2="80" y2="120" stroke="#F59E0B" stroke-width="3"/>
    <circle cx="80" cy="120" r="15" fill="#F59E0B"/>
    <circle cx="80" cy="120" r="10" fill="#FBBF24"/>
  </g>
  
  <!-- Light prism -->
  <g transform="translate(280, 60)">
    <polygon points="30,0 0,80 60,80" fill="#E0E7FF" stroke="#A5B4FC" stroke-width="2"/>
    <!-- Rainbow coming out -->
    <line x1="60" y1="50" x2="100" y2="30" stroke="#EF4444" stroke-width="3"/>
    <line x1="60" y1="55" x2="100" y2="40" stroke="#F97316" stroke-width="3"/>
    <line x1="60" y1="60" x2="100" y2="50" stroke="#FCD34D" stroke-width="3"/>
    <line x1="60" y1="65" x2="100" y2="60" stroke="#22C55E" stroke-width="3"/>
    <line x1="60" y1="70" x2="100" y2="70" stroke="#3B82F6" stroke-width="3"/>
    <line x1="60" y1="75" x2="100" y2="80" stroke="#8B5CF6" stroke-width="3"/>
  </g>
  
  <!-- Magnet -->
  <g transform="translate(40, 170)">
    <rect x="0" y="0" width="30" height="60" fill="#EF4444" rx="5"/>
    <rect x="30" y="0" width="30" height="60" fill="#3B82F6" rx="5"/>
    <text x="10" y="35" font-family="Arial" font-size="18" fill="#FFF" font-weight="bold">N</text>
    <text x="42" y="35" font-family="Arial" font-size="18" fill="#FFF" font-weight="bold">S</text>
    <!-- Field lines -->
    <path d="M15 70 Q30 90 45 70" fill="none" stroke="#9CA3AF" stroke-width="2"/>
    <path d="M10 80 Q30 105 50 80" fill="none" stroke="#9CA3AF" stroke-width="2"/>
  </g>
  
  <!-- Formulas floating -->
  <text x="150" y="50" font-family="serif" font-size="24" fill="#FDE68A" font-style="italic">E=mc²</text>
  <text x="300" y="170" font-family="serif" font-size="20" fill="#BFDBFE" font-style="italic">F=ma</text>
  <text x="280" y="200" font-family="serif" font-size="18" fill="#BBF7D0" font-style="italic">v=s/t</text>
  
  <!-- Light bulb -->
  <g transform="translate(330, 180)">
    <circle cx="20" cy="25" r="20" fill="#FCD34D"/>
    <rect x="15" y="45" width="10" height="10" fill="#9CA3AF"/>
    <line x1="12" y1="47" x2="28" y2="47" stroke="#6B7280" stroke-width="2"/>
    <line x1="12" y1="51" x2="28" y2="51" stroke="#6B7280" stroke-width="2"/>
    <line x1="12" y1="55" x2="28" y2="55" stroke="#6B7280" stroke-width="2"/>
    <!-- Light rays -->
    <line x1="20" y1="0" x2="20" y2="-10" stroke="#FBBF24" stroke-width="2"/>
    <line x1="5" y1="10" x2="-5" y2="0" stroke="#FBBF24" stroke-width="2"/>
    <line x1="35" y1="10" x2="45" y2="0" stroke="#FBBF24" stroke-width="2"/>
  </g>
  
  <!-- Gears -->
  <g transform="translate(130, 220)">
    <circle cx="25" cy="25" r="25" fill="#6B7280"/>
    <circle cx="25" cy="25" r="10" fill="#374151"/>
    <!-- Gear teeth -->
    <rect x="20" y="-5" width="10" height="10" fill="#6B7280"/>
    <rect x="20" y="45" width="10" height="10" fill="#6B7280"/>
    <rect x="-5" y="20" width="10" height="10" fill="#6B7280"/>
    <rect x="45" y="20" width="10" height="10" fill="#6B7280"/>
  </g>
  
  <!-- Stars -->
  <polygon points="120,100 123,106 130,106 125,110 127,117 120,113 113,117 115,110 110,106 117,106" fill="#FCD34D"/>
  <polygon points="270,250 273,256 280,256 275,260 277,267 270,263 263,267 265,260 260,256 267,256" fill="#FBBF24"/>
</svg>