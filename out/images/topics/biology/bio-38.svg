<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250">
  <defs>
    <linearGradient id="bg38" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e3f2fd"/>
      <stop offset="100%" style="stop-color:#bbdefb"/>
    </linearGradient>
  </defs>
  <rect width="400" height="250" fill="url(#bg38)" rx="20"/>
  <text x="200" y="30" font-family="Arial" font-size="18" font-weight="bold" fill="#1565c0" text-anchor="middle">Органеллы клетки</text>
  <!-- Клетка контур -->
  <ellipse cx="200" cy="130" rx="140" ry="80" fill="#fff" stroke="#64b5f6" stroke-width="3"/>
  <!-- Ядро -->
  <ellipse cx="200" cy="130" rx="40" ry="30" fill="#bbdefb" stroke="#1976d2" stroke-width="2"/>
  <text x="200" y="135" font-family="Arial" font-size="10" fill="#0d47a1" text-anchor="middle">Ядро</text>
  <!-- Митохондрии -->
  <ellipse cx="100" cy="110" rx="30" ry="12" fill="#fff9c4" stroke="#f9a825" stroke-width="2"/>
  <path d="M80 110 Q90 105 100 110 Q110 115 120 110" stroke="#ff8f00" stroke-width="1" fill="none"/>
  <ellipse cx="300" cy="150" rx="25" ry="10" fill="#fff9c4" stroke="#f9a825" stroke-width="2"/>
  <text x="100" y="135" font-family="Arial" font-size="8" fill="#e65100" text-anchor="middle">Митохондрии</text>
  <!-- Эндоплазматическая сеть -->
  <path d="M130 90 Q150 85 170 90 Q190 95 210 90" stroke="#81c784" stroke-width="4" fill="none"/>
  <path d="M150 100 Q170 95 190 100 Q210 105 230 100" stroke="#81c784" stroke-width="4" fill="none"/>
  <text x="180" y="80" font-family="Arial" font-size="8" fill="#2e7d32" text-anchor="middle">ЭПС</text>
  <!-- Рибосомы -->
  <circle cx="140" cy="150" r="5" fill="#e91e63"/>
  <circle cx="155" cy="145" r="4" fill="#e91e63"/>
  <circle cx="165" cy="155" r="5" fill="#e91e63"/>
  <circle cx="250" cy="100" r="4" fill="#e91e63"/>
  <circle cx="260" cy="110" r="5" fill="#e91e63"/>
  <text x="150" y="175" font-family="Arial" font-size="8" fill="#c2185b" text-anchor="middle">Рибосомы</text>
  <!-- Аппарат Гольджи -->
  <path d="M270 120 Q285 115 300 120 Q315 125 330 120" stroke="#9c27b0" stroke-width="3" fill="none"/>
  <path d="M275 130 Q290 125 305 130 Q320 135 335 130" stroke="#9c27b0" stroke-width="3" fill="none"/>
  <text x="300" y="145" font-family="Arial" font-size="8" fill="#7b1fa2" text-anchor="middle">Гольджи</text>
  <!-- Лизосомы -->
  <circle cx="320" cy="170" r="8" fill="#ef5350"/>
  <circle cx="335" cy="160" r="6" fill="#ef5350"/>
  <text x="330" y="185" font-family="Arial" font-size="8" fill="#c62828" text-anchor="middle">Лизосомы</text>
  <!-- Легенда -->
  <rect x="30" y="210" width="340" height="30" fill="#fff" stroke="#90caf9" stroke-width="1" rx="5"/>
  <text x="200" y="230" font-family="Arial" font-size="10" fill="#1565c0" text-anchor="middle">Органеллы — постоянные структуры клетки с определёнными функциями</text>
</svg>