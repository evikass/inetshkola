<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250">
  <defs>
    <linearGradient id="bg22" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f3e5f5"/>
      <stop offset="100%" style="stop-color:#e1bee7"/>
    </linearGradient>
  </defs>
  <rect width="400" height="250" fill="url(#bg22)" rx="20"/>
  <text x="200" y="30" font-family="Arial" font-size="18" font-weight="bold" fill="#7b1fa2" text-anchor="middle">Бактерии</text>
  <!-- Кокки (шаровидные) -->
  <circle cx="80" cy="80" r="20" fill="#ce93d8"/>
  <circle cx="60" cy="100" r="20" fill="#ba68c8"/>
  <circle cx="100" cy="100" r="20" fill="#ba68c8"/>
  <circle cx="80" cy="120" r="20" fill="#ab47bc"/>
  <text x="80" y="160" font-family="Arial" font-size="11" fill="#7b1fa2" text-anchor="middle">Кокки</text>
  <!-- Бациллы (палочковидные) -->
  <rect x="150" y="70" width="50" height="20" fill="#9575cd" rx="10"/>
  <rect x="160" y="100" width="50" height="20" fill="#7e57c2" rx="10"/>
  <rect x="145" y="130" width="50" height="20" fill="#673ab7" rx="10"/>
  <text x="175" y="160" font-family="Arial" font-size="11" fill="#512da8" text-anchor="middle">Бациллы</text>
  <!-- Спириллы (спиралевидные) -->
  <path d="M250 80 Q270 70 290 80 Q310 90 330 80" stroke="#9c27b0" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M250 120 Q270 110 290 120 Q310 130 330 120" stroke="#8e24aa" stroke-width="8" fill="none" stroke-linecap="round"/>
  <text x="290" y="160" font-family="Arial" font-size="11" fill="#6a1b9a" text-anchor="middle">Спириллы</text>
  <!-- Вибрионы (изогнутые) -->
  <path d="M60 200 Q80 180 100 200" stroke="#ab47bc" stroke-width="12" fill="none" stroke-linecap="round"/>
  <path d="M120 200 Q140 180 160 200" stroke="#9c27b0" stroke-width="12" fill="none" stroke-linecap="round"/>
  <text x="110" y="240" font-family="Arial" font-size="11" fill="#7b1fa2" text-anchor="middle">Вибрионы</text>
  <!-- Жгутики -->
  <path d="M340 180 Q350 175 360 180 Q370 185 380 180" stroke="#ce93d8" stroke-width="2" fill="none"/>
  <path d="M340 190 Q350 185 360 190 Q370 195 380 190" stroke="#ce93d8" stroke-width="2" fill="none"/>
  <ellipse cx="335" cy="185" rx="15" ry="10" fill="#ba68c8"/>
  <text x="360" y="220" font-family="Arial" font-size="10" fill="#7b1fa2" text-anchor="middle">Жгутики</text>
</svg>