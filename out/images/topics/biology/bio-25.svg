<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250">
  <defs>
    <linearGradient id="bg25" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9"/>
      <stop offset="100%" style="stop-color:#c8e6c9"/>
    </linearGradient>
    <linearGradient id="stem25" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#66bb6a"/>
      <stop offset="100%" style="stop-color:#43a047"/>
    </linearGradient>
  </defs>
  <rect width="400" height="250" fill="url(#bg25)" rx="20"/>
  <text x="200" y="30" font-family="Arial" font-size="18" font-weight="bold" fill="#2e7d32" text-anchor="middle">Цветковое растение</text>
  <!-- Корень -->
  <path d="M150 250 Q160 220 170 200" stroke="#8d6e63" stroke-width="8" fill="none"/>
  <path d="M170 200 Q175 180 180 170" stroke="#a1887f" stroke-width="5" fill="none"/>
  <path d="M170 200 Q160 190 155 175" stroke="#a1887f" stroke-width="3" fill="none"/>
  <!-- Стебель -->
  <rect x="165" y="120" width="20" height="80" fill="url(#stem25)" rx="5"/>
  <!-- Листья -->
  <ellipse cx="130" cy="150" rx="35" ry="15" fill="#81c784" transform="rotate(-30 130 150)"/>
  <line x1="100" y1="165" x2="155" y2="135" stroke="#4caf50" stroke-width="2"/>
  <ellipse cx="220" cy="140" rx="35" ry="15" fill="#81c784" transform="rotate(30 220 140)"/>
  <line x1="190" y1="125" x2="245" y2="155" stroke="#4caf50" stroke-width="2"/>
  <!-- Цветок -->
  <circle cx="175" cy="80" r="30" fill="#fff" stroke="#f48fb1" stroke-width="2"/>
  <ellipse cx="175" cy="50" rx="12" ry="20" fill="#f8bbd0"/>
  <ellipse cx="145" cy="80" rx="20" ry="12" fill="#f8bbd0"/>
  <ellipse cx="205" cy="80" rx="20" ry="12" fill="#f8bbd0"/>
  <ellipse cx="155" cy="105" rx="12" ry="20" fill="#f8bbd0"/>
  <ellipse cx="195" cy="105" rx="12" ry="20" fill="#f8bbd0"/>
  <!-- Тычинки и пестик -->
  <circle cx="175" cy="80" r="15" fill="#ffeb3b"/>
  <circle cx="175" cy="80" r="8" fill="#ffc107"/>
  <line x1="170" y1="65" x2="165" y2="50" stroke="#ff9800" stroke-width="2"/>
  <circle cx="165" cy="47" r="4" fill="#ff5722"/>
  <line x1="180" y1="65" x2="185" y2="50" stroke="#ff9800" stroke-width="2"/>
  <circle cx="185" cy="47" r="4" fill="#ff5722"/>
  <!-- Подписи -->
  <text x="70" y="190" font-family="Arial" font-size="10" fill="#5d4037">Корень</text>
  <text x="130" y="130" font-family="Arial" font-size="10" fill="#388e3c">Лист</text>
  <text x="200" y="60" font-family="Arial" font-size="10" fill="#c2185b">Цветок</text>
  <text x="175" y="240" font-family="Arial" font-size="10" fill="#2e7d32" text-anchor="middle">Стебель</text>
</svg>