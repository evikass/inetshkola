<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250">
  <defs>
    <linearGradient id="bg19" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff3e0"/>
      <stop offset="100%" style="stop-color:#ffe0b2"/>
    </linearGradient>
  </defs>
  <rect width="400" height="250" fill="url(#bg19)" rx="20"/>
  <text x="200" y="30" font-family="Arial" font-size="18" font-weight="bold" fill="#e65100" text-anchor="middle">Признаки живого</text>
  <!-- Рост - росток -->
  <circle cx="80" cy="100" r="40" fill="#c8e6c9"/>
  <path d="M80 130 L80 90" stroke="#4caf50" stroke-width="4"/>
  <ellipse cx="80" cy="80" rx="15" ry="25" fill="#81c784" transform="rotate(-15 80 80)"/>
  <ellipse cx="80" cy="80" rx="15" ry="25" fill="#a5d6a7" transform="rotate(15 80 80)"/>
  <text x="80" y="160" font-family="Arial" font-size="12" fill="#2e7d32" text-anchor="middle">Рост</text>
  <!-- Дыхание - легкие -->
  <circle cx="200" cy="100" r="40" fill="#bbdefb"/>
  <ellipse cx="185" cy="95" rx="18" ry="30" fill="#90caf9"/>
  <ellipse cx="215" cy="95" rx="18" ry="30" fill="#90caf9"/>
  <path d="M200 125 L200 135 L185 135 M200 135 L215 135" stroke="#64b5f6" stroke-width="3" fill="none"/>
  <text x="200" y="160" font-family="Arial" font-size="12" fill="#1565c0" text-anchor="middle">Дыхание</text>
  <!-- Питание - яблоко -->
  <circle cx="320" cy="100" r="40" fill="#ffcdd2"/>
  <circle cx="320" cy="100" r="25" fill="#ef5350"/>
  <path d="M320 75 Q330 65 325 55" stroke="#795548" stroke-width="3" fill="none"/>
  <ellipse cx="328" cy="60" rx="8" ry="5" fill="#81c784"/>
  <text x="320" y="160" font-family="Arial" font-size="12" fill="#c62828" text-anchor="middle">Питание</text>
  <!-- Размножение - клетки -->
  <circle cx="100" cy="210" r="25" fill="#e1bee7"/>
  <circle cx="85" cy="200" r="12" fill="#ce93d8"/>
  <circle cx="115" cy="220" r="12" fill="#ce93d8"/>
  <text x="100" y="245" font-family="Arial" font-size="12" fill="#7b1fa2" text-anchor="middle">Размножение</text>
  <!-- Развитие - бабочка -->
  <ellipse cx="200" cy="210" rx="30" ry="15" fill="#fff9c4"/>
  <ellipse cx="170" cy="200" rx="20" ry="15" fill="#fff176"/>
  <ellipse cx="230" cy="200" rx="20" ry="15" fill="#fff176"/>
  <ellipse cx="200" cy="210" rx="5" ry="20" fill="#8d6e63"/>
  <text x="200" y="245" font-family="Arial" font-size="12" fill="#f57f17" text-anchor="middle">Развитие</text>
  <!-- Обмен веществ - цикл -->
  <circle cx="320" cy="210" r="25" fill="none" stroke="#26a69a" stroke-width="4"/>
  <path d="M320 185 L330 195 L320 190 L310 200" fill="#26a69a"/>
  <text x="320" y="245" font-family="Arial" font-size="12" fill="#00796b" text-anchor="middle">Обмен веществ</text>
</svg>