<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250">
  <defs>
    <linearGradient id="bg35" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffebee"/>
      <stop offset="100%" style="stop-color:#ffcdd2"/>
    </linearGradient>
  </defs>
  <rect width="400" height="250" fill="url(#bg35)" rx="20"/>
  <text x="200" y="30" font-family="Arial" font-size="18" font-weight="bold" fill="#c62828" text-anchor="middle">Круги кровообращения</text>
  <!-- Сердце в центре -->
  <path d="M180 100 Q160 80 160 100 Q160 120 180 140 Q200 160 220 140 Q240 120 240 100 Q240 80 220 100 Q200 80 180 100" fill="#e53935"/>
  <path d="M175 95 Q165 85 165 95 Q165 105 175 115" fill="#ef5350"/>
  <path d="M225 95 Q235 85 235 95 Q235 105 225 115" fill="#ef5350"/>
  <!-- Малый круг (лёгкие) -->
  <ellipse cx="120" cy="90" rx="35" ry="45" fill="#bbdefb" stroke="#1976d2" stroke-width="2"/>
  <text x="120" y="95" font-family="Arial" font-size="10" fill="#0d47a1" text-anchor="middle">Лёгкие</text>
  <!-- Большой круг (тело) -->
  <ellipse cx="280" cy="130" rx="50" ry="70" fill="#c8e6c9" stroke="#388e3c" stroke-width="2"/>
  <text x="280" y="135" font-family="Arial" font-size="10" fill="#1b5e20" text-anchor="middle">Тело</text>
  <!-- Артерии (красные) -->
  <path d="M200 80 L120 60" stroke="#e53935" stroke-width="4" fill="none" marker-end="url(#arrRed)"/>
  <path d="M200 150 L280 170" stroke="#e53935" stroke-width="4" fill="none" marker-end="url(#arrRed)"/>
  <!-- Вены (синие) -->
  <path d="M120 130 L180 120" stroke="#1976d2" stroke-width="4" fill="none" marker-end="url(#arrBlue)"/>
  <path d="M280 60 L220 80" stroke="#1976d2" stroke-width="4" fill="none" marker-end="url(#arrBlue)"/>
  <!-- Легенды -->
  <rect x="30" y="200" width="150" height="35" fill="#e53935" rx="5"/>
  <text x="105" y="223" font-family="Arial" font-size="12" fill="#fff" text-anchor="middle">Артерии (от сердца)</text>
  <rect x="220" y="200" width="150" height="35" fill="#1976d2" rx="5"/>
  <text x="295" y="223" font-family="Arial" font-size="12" fill="#fff" text-anchor="middle">Вены (к сердцу)</text>
  <defs>
    <marker id="arrRed" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#e53935"/>
    </marker>
    <marker id="arrBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
</svg>