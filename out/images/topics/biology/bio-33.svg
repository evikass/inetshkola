<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250">
  <defs>
    <linearGradient id="bg33" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff3e0"/>
      <stop offset="100%" style="stop-color:#ffe0b2"/>
    </linearGradient>
  </defs>
  <rect width="400" height="250" fill="url(#bg33)" rx="20"/>
  <text x="200" y="30" font-family="Arial" font-size="18" font-weight="bold" fill="#e65100" text-anchor="middle">Биотехнология</text>
  <!-- Пробирка с ДНК -->
  <rect x="60" y="60" width="50" height="120" fill="#fff" stroke="#ff9800" stroke-width="3" rx="25"/>
  <rect x="65" y="100" width="40" height="75" fill="#bbdefb" rx="20"/>
  <!-- ДНК внутри -->
  <path d="M75 110 Q85 120 75 130 Q65 140 75 150 Q85 160 75 170" stroke="#1565c0" stroke-width="3" fill="none"/>
  <path d="M95 110 Q85 120 95 130 Q105 140 95 150 Q85 160 95 170" stroke="#2196f3" stroke-width="3" fill="none"/>
  <text x="85" y="200" font-family="Arial" font-size="10" fill="#e65100" text-anchor="middle">Рекомбинантная</text>
  <text x="85" y="215" font-family="Arial" font-size="10" fill="#e65100" text-anchor="middle">ДНК</text>
  <!-- Микроорганизм -->
  <ellipse cx="180" cy="120" rx="40" ry="30" fill="#c8e6c9" stroke="#4caf50" stroke-width="2"/>
  <circle cx="170" cy="115" r="5" fill="#2e7d32"/>
  <circle cx="190" cy="125" r="4" fill="#388e3c"/>
  <circle cx="175" cy="130" r="3" fill="#43a047"/>
  <!-- Плазмида -->
  <circle cx="180" cy="120" r="15" fill="none" stroke="#ff5722" stroke-width="3"/>
  <text x="180" y="170" font-family="Arial" font-size="10" fill="#2e7d32" text-anchor="middle">Трансформированный</text>
  <text x="180" y="185" font-family="Arial" font-size="10" fill="#2e7d32" text-anchor="middle">организм</text>
  <!-- Продукт - инсулин -->
  <g transform="translate(270, 70)">
    <ellipse cx="30" cy="30" rx="25" ry="20" fill="#ffccbc"/>
    <ellipse cx="50" cy="50" rx="20" ry="15" fill="#ffab91"/>
    <ellipse cx="35" cy="70" rx="22" ry="18" fill="#ff8a65"/>
    <!-- Дисульфидные связи -->
    <line x1="25" y1="40" x2="40" y2="60" stroke="#d32f2f" stroke-width="2"/>
    <line x1="45" y1="35" x2="55" y2="55" stroke="#d32f2f" stroke-width="2"/>
  </g>
  <text x="310" y="165" font-family="Arial" font-size="10" fill="#bf360c" text-anchor="middle">Инсулин</text>
  <text x="310" y="180" font-family="Arial" font-size="10" fill="#bf360c" text-anchor="middle">(белок)</text>
  <!-- Стрелки процесса -->
  <path d="M115 120 L135 120" stroke="#ff9800" stroke-width="3" marker-end="url(#arr33)"/>
  <path d="M225 120 L255 120" stroke="#ff9800" stroke-width="3" marker-end="url(#arr33)"/>
  <!-- Названия этапов -->
  <text x="125" y="110" font-family="Arial" font-size="8" fill="#e65100">введение</text>
  <text x="240" y="110" font-family="Arial" font-size="8" fill="#e65100">продукция</text>
  <!-- PCR машина -->
  <rect x="280" y="190" width="80" height="40" fill="#546e7a" rx="5"/>
  <rect x="290" y="200" width="15" height="20" fill="#263238" rx="2"/>
  <rect x="310" y="200" width="15" height="20" fill="#263238" rx="2"/>
  <rect x="330" y="200" width="15" height="20" fill="#263238" rx="2"/>
  <circle cx="297" cy="210" r="4" fill="#4caf50"/>
  <circle cx="317" cy="210" r="4" fill="#f44336"/>
  <circle cx="337" cy="210" r="4" fill="#2196f3"/>
  <text x="320" y="245" font-family="Arial" font-size="10" fill="#37474f" text-anchor="middle">ПЦР</text>
  <defs>
    <marker id="arr33" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#ff9800"/>
    </marker>
  </defs>
</svg>