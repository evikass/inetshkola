<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250">
  <defs>
    <linearGradient id="bg30" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0f7fa"/>
      <stop offset="100%" style="stop-color:#b2ebf2"/>
    </linearGradient>
  </defs>
  <rect width="400" height="250" fill="url(#bg30)" rx="20"/>
  <text x="200" y="30" font-family="Arial" font-size="18" font-weight="bold" fill="#00695c" text-anchor="middle">Экосистема</text>
  <!-- Солнце -->
  <circle cx="50" cy="50" r="25" fill="#ffeb3b"/>
  <line x1="50" y1="15" x2="50" y2="5" stroke="#ffc107" stroke-width="2"/>
  <line x1="25" y1="25" x2="15" y2="15" stroke="#ffc107" stroke-width="2"/>
  <line x1="75" y1="25" x2="85" y2="15" stroke="#ffc107" stroke-width="2"/>
  <!-- Растения (продуценты) -->
  <rect x="100" y="150" width="60" height="80" fill="#81c784"/>
  <ellipse cx="130" cy="140" rx="40" ry="30" fill="#4caf50"/>
  <rect x="180" y="170" width="40" height="60" fill="#66bb6a"/>
  <ellipse cx="200" cy="160" rx="30" ry="25" fill="#43a047"/>
  <text x="150" y="245" font-family="Arial" font-size="10" fill="#2e7d32" text-anchor="middle">Продуценты</text>
  <!-- Травоядные (консументы I) -->
  <ellipse cx="270" cy="140" rx="25" ry="18" fill="#8d6e63"/>
  <circle cx="255" cy="130" r="10" fill="#a1887f"/>
  <ellipse cx="310" cy="160" rx="20" ry="15" fill="#a1887f"/>
  <text x="290" y="195" font-family="Arial" font-size="9" fill="#5d4037" text-anchor="middle">Консументы I</text>
  <!-- Хищники (консументы II) -->
  <ellipse cx="350" cy="100" rx="20" ry="15" fill="#5d4037"/>
  <polygon points="335,95 320,90 335,100" fill="#5d4037"/>
  <circle cx="340" cy="92" r="8" fill="#795548"/>
  <text x="350" y="135" font-family="Arial" font-size="9" fill="#3e2723" text-anchor="middle">Консументы II</text>
  <!-- Редуценты -->
  <ellipse cx="70" cy="200" rx="20" ry="12" fill="#bcaaa4"/>
  <circle cx="70" cy="190" r="12" fill="#8d6e63"/>
  <ellipse cx="50" cy="220" rx="15" ry="10" fill="#a1887f"/>
  <ellipse cx="90" cy="215" rx="12" ry="8" fill="#8d6e63"/>
  <text x="70" y="245" font-family="Arial" font-size="9" fill="#5d4037" text-anchor="middle">Редуценты</text>
  <!-- Стрелки питания -->
  <path d="M60 55 L100 110" stroke="#ff9800" stroke-width="2" fill="none" marker-end="url(#arr30)"/>
  <path d="M160 140 L230 140" stroke="#4caf50" stroke-width="2" fill="none" marker-end="url(#arr30)"/>
  <path d="M320 150 L340 120" stroke="#795548" stroke-width="2" fill="none" marker-end="url(#arr30)"/>
  <path d="M350 115 L90 190" stroke="#8d6e63" stroke-width="2" fill="none" marker-end="url(#arr30)" stroke-dasharray="5,3"/>
  <defs>
    <marker id="arr30" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#5d4037"/>
    </marker>
  </defs>
</svg>