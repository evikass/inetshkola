<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250">
  <defs>
    <linearGradient id="bg26" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff8e1"/>
      <stop offset="100%" style="stop-color:#ffecb3"/>
    </linearGradient>
  </defs>
  <rect width="400" height="250" fill="url(#bg26)" rx="20"/>
  <text x="200" y="30" font-family="Arial" font-size="18" font-weight="bold" fill="#f57f17" text-anchor="middle">Фотосинтез</text>
  <!-- Солнце -->
  <circle cx="320" cy="60" r="35" fill="#ffeb3b"/>
  <circle cx="320" cy="60" r="28" fill="#fff59d"/>
  <line x1="320" y1="15" x2="320" y2="5" stroke="#ffc107" stroke-width="3"/>
  <line x1="355" y1="25" x2="365" y2="15" stroke="#ffc107" stroke-width="3"/>
  <line x1="365" y1="60" x2="375" y2="60" stroke="#ffc107" stroke-width="3"/>
  <line x1="355" y1="95" x2="365" y2="105" stroke="#ffc107" stroke-width="3"/>
  <line x1="285" y1="25" x2="275" y2="15" stroke="#ffc107" stroke-width="3"/>
  <!-- Лист -->
  <ellipse cx="180" cy="140" rx="100" ry="50" fill="#81c784"/>
  <ellipse cx="180" cy="140" rx="90" ry="40" fill="#a5d6a7"/>
  <!-- Жилки листа -->
  <line x1="100" y1="140" x2="260" y2="140" stroke="#4caf50" stroke-width="3"/>
  <path d="M140 140 Q160 120 200 130" stroke="#4caf50" stroke-width="2" fill="none"/>
  <path d="M140 140 Q160 160 200 150" stroke="#4caf50" stroke-width="2" fill="none"/>
  <path d="M200 140 Q220 125 250 135" stroke="#4caf50" stroke-width="2" fill="none"/>
  <path d="M200 140 Q220 155 250 145" stroke="#4caf50" stroke-width="2" fill="none"/>
  <!-- Хлоропласты -->
  <ellipse cx="150" cy="130" rx="15" ry="8" fill="#2e7d32"/>
  <ellipse cx="200" cy="145" rx="15" ry="8" fill="#388e3c"/>
  <ellipse cx="230" cy="135" rx="12" ry="6" fill="#2e7d32"/>
  <!-- Стрелки процесса -->
  <path d="M290 80 L250 110" stroke="#ff9800" stroke-width="3" fill="none" marker-end="url(#arrow26)"/>
  <text x="290" y="100" font-family="Arial" font-size="10" fill="#e65100">Свет</text>
  <!-- Устьице -->
  <ellipse cx="80" cy="200" rx="20" ry="8" fill="#66bb6a"/>
  <ellipse cx="75" cy="200" rx="4" ry="10" fill="#43a047"/>
  <ellipse cx="85" cy="200" rx="4" ry="10" fill="#43a047"/>
  <!-- CO2 и O2 -->
  <text x="50" y="230" font-family="Arial" font-size="11" fill="#795548">CO₂ →</text>
  <text x="100" y="230" font-family="Arial" font-size="11" fill="#2196f3">← O₂</text>
  <!-- Уравнение -->
  <text x="200" y="230" font-family="Arial" font-size="11" fill="#1b5e20" text-anchor="middle">6CO₂ + 6H₂O → C₆H₁₂O₆ + 6O₂</text>
  <defs>
    <marker id="arrow26" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#ff9800"/>
    </marker>
  </defs>
</svg>