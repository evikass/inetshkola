<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250">
  <defs>
    <linearGradient id="bg28" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f3e5f5"/>
      <stop offset="100%" style="stop-color:#e1bee7"/>
    </linearGradient>
  </defs>
  <rect width="400" height="250" fill="url(#bg28)" rx="20"/>
  <text x="200" y="30" font-family="Arial" font-size="18" font-weight="bold" fill="#6a1b9a" text-anchor="middle">Эволюция</text>
  <!-- Древо жизни -->
  <rect x="185" y="180" width="30" height="50" fill="#795548"/>
  <ellipse cx="200" cy="120" rx="120" ry="80" fill="#c8e6c9" opacity="0.5"/>
  <!-- Ветви эволюции -->
  <path d="M200 180 Q150 150 100 120" stroke="#4caf50" stroke-width="4" fill="none"/>
  <path d="M200 180 Q250 150 300 120" stroke="#4caf50" stroke-width="4" fill="none"/>
  <path d="M200 180 Q200 130 200 80" stroke="#4caf50" stroke-width="4" fill="none"/>
  <path d="M100 120 Q80 100 60 90" stroke="#81c784" stroke-width="3" fill="none"/>
  <path d="M100 120 Q110 90 120 70" stroke="#81c784" stroke-width="3" fill="none"/>
  <path d="M300 120 Q320 100 340 90" stroke="#81c784" stroke-width="3" fill="none"/>
  <path d="M300 120 Q290 90 280 70" stroke="#81c784" stroke-width="3" fill="none"/>
  <!-- Виды на ветвях -->
  <circle cx="60" cy="85" r="12" fill="#ff8a65"/>
  <circle cx="120" cy="65" r="10" fill="#ffab91"/>
  <circle cx="200" cy="75" r="14" fill="#a5d6a7"/>
  <circle cx="280" cy="65" r="10" fill="#90caf9"/>
  <circle cx="340" cy="85" r="12" fill="#81d4fa"/>
  <!-- Дарвин силуэт -->
  <ellipse cx="60" cy="220" rx="20" ry="25" fill="#5d4037"/>
  <circle cx="60" cy="190" r="15" fill="#8d6e63"/>
  <path d="M45 195 Q40 185 50 180" stroke="#5d4037" stroke-width="3" fill="none"/>
  <!-- Подписи -->
  <text x="60" y="255" font-family="Arial" font-size="10" fill="#5d4037" text-anchor="middle">Дарвин</text>
  <text x="200" y="55" font-family="Arial" font-size="11" fill="#2e7d32" text-anchor="middle">Общий предок</text>
  <text x="60" y="115" font-family="Arial" font-size="9" fill="#bf360c">Вид А</text>
  <text x="340" y="115" font-family="Arial" font-size="9" fill="#0277bd">Вид Б</text>
  <!-- Естественный отбор -->
  <rect x="250" y="200" width="130" height="40" fill="#fff" stroke="#7b1fa2" stroke-width="2" rx="5"/>
  <text x="315" y="225" font-family="Arial" font-size="11" fill="#6a1b9a" text-anchor="middle">Естественный отбор</text>
</svg>