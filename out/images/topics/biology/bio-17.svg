<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Background -->
  <rect width="400" height="300" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="200" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#475569">Кровь и её функции 🩸</text>
  
  <!-- Blood composition -->
  <g transform="translate(20, 45)">
    <rect x="0" y="0" width="160" height="140" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
    <text x="80" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#b91c1c">Состав крови</text>
    
    <!-- Plasma -->
    <rect x="15" y="35" width="130" height="25" rx="5" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
    <text x="80" y="52" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#92400e">Плазма (55%)</text>
    
    <!-- Erythrocytes -->
    <rect x="15" y="65" width="130" height="25" rx="5" fill="#ef4444" stroke="#dc2626" stroke-width="1"/>
    <text x="80" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">Эритроциты (44%)</text>
    
    <!-- Leukocytes -->
    <rect x="15" y="95" width="80" height="20" rx="5" fill="#3b82f6" stroke="#2563eb" stroke-width="1"/>
    <text x="55" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="white">Лейкоциты</text>
    
    <!-- Platelets -->
    <rect x="100" y="95" width="45" height="20" rx="5" fill="#a855f7" stroke="#9333ea" stroke-width="1"/>
    <text x="122" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="white">Тромбоциты</text>
    
    <!-- Cells icons -->
    <circle cx="35" cy="77" r="6" fill="#fca5a5"/>
    <circle cx="55" cy="75" r="6" fill="#fca5a5"/>
    <circle cx="75" cy="78" r="6" fill="#fca5a5"/>
    <circle cx="95" cy="76" r="6" fill="#fca5a5"/>
    <circle cx="115" cy="77" r="6" fill="#fca5a5"/>
    <circle cx="135" cy="76" r="6" fill="#fca5a5"/>
  </g>
  
  <!-- Blood cells detail -->
  <g transform="translate(200, 45)">
    <rect x="0" y="0" width="180" height="140" rx="10" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="2"/>
    <text x="90" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#0369a1">Клетки крови</text>
    
    <!-- Erythrocyte -->
    <ellipse cx="45" cy="55" rx="15" ry="8" fill="#ef4444"/>
    <ellipse cx="45" cy="55" rx="8" ry="4" fill="#fca5a5"/>
    <text x="45" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#dc2626">Эритроцит</text>
    <text x="45" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#ef4444">перенос O₂</text>
    
    <!-- Leukocyte -->
    <circle cx="110" cy="55" r="18" fill="#3b82f6"/>
    <circle cx="103" cy="50" r="4" fill="#60a5fa"/>
    <circle cx="117" cy="50" r="4" fill="#60a5fa"/>
    <circle cx="110" cy="62" r="3" fill="#60a5fa"/>
    <text x="110" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#1d4ed8">Лейкоцит</text>
    <text x="110" y="97" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#3b82f6">защита</text>
    
    <!-- Platelets -->
    <g transform="translate(145, 110)">
      <ellipse cx="10" cy="0" rx="6" ry="4" fill="#a855f7"/>
      <ellipse cx="22" cy="3" rx="6" ry="4" fill="#c084fc"/>
      <ellipse cx="15" cy="10" rx="5" ry="3" fill="#a855f7"/>
    </g>
    <text x="160" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#7c3aed">Тромбоциты</text>
  </g>
  
  <!-- Functions -->
  <rect x="20" y="200" width="360" height="85" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="200" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#92400e">Функции крови:</text>
  <g font-family="Arial, sans-serif" font-size="10">
    <text x="40" y="245" fill="#b45309">🔴 Транспорт O₂ и CO₂</text>
    <text x="40" y="265" fill="#b45309">🔵 Защита от инфекций</text>
    <text x="220" y="245" fill="#b45309">🟣 Свёртывание крови</text>
    <text x="220" y="265" fill="#b45309">🌡️ Терморегуляция</text>
  </g>
</svg>