<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250">
  <defs>
    <linearGradient id="bg36" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9"/>
      <stop offset="100%" style="stop-color:#c8e6c9"/>
    </linearGradient>
  </defs>
  <rect width="400" height="250" fill="url(#bg36)" rx="20"/>
  <text x="200" y="30" font-family="Arial" font-size="18" font-weight="bold" fill="#2e7d32" text-anchor="middle">Пищевые цепи и сети</text>
  <!-- Продуценты (растения) -->
  <rect x="30" y="180" width="60" height="50" fill="#81c784" rx="5"/>
  <text x="60" y="210" font-family="Arial" font-size="9" fill="#1b5e20" text-anchor="middle">Растения</text>
  <text x="60" y="222" font-family="Arial" font-size="8" fill="#2e7d32" text-anchor="middle">Продуценты</text>
  <!-- Травоядные -->
  <rect x="110" y="180" width="60" height="50" fill="#a1887f" rx="5"/>
  <text x="140" y="210" font-family="Arial" font-size="9" fill="#4e342e" text-anchor="middle">Травоядные</text>
  <text x="140" y="222" font-family="Arial" font-size="8" fill="#5d4037" text-anchor="middle">Консум. I</text>
  <!-- Хищники -->
  <rect x="190" y="180" width="60" height="50" fill="#ff8a65" rx="5"/>
  <text x="220" y="210" font-family="Arial" font-size="9" fill="#bf360c" text-anchor="middle">Хищники</text>
  <text x="220" y="222" font-family="Arial" font-size="8" fill="#e65100" text-anchor="middle">Консум. II</text>
  <!-- Редуценты -->
  <rect x="270" y="180" width="60" height="50" fill="#90a4ae" rx="5"/>
  <text x="300" y="210" font-family="Arial" font-size="9" fill="#37474f" text-anchor="middle">Бактерии</text>
  <text x="300" y="222" font-family="Arial" font-size="8" fill="#546e7a" text-anchor="middle">Редуценты</text>
  <!-- Стрелки -->
  <path d="M95 205 L105 205" stroke="#4caf50" stroke-width="3" marker-end="url(#arrG)"/>
  <path d="M175 205 L185 205" stroke="#795548" stroke-width="3" marker-end="url(#arrB)"/>
  <path d="M255 205 L265 205" stroke="#e65100" stroke-width="3" marker-end="url(#arrO)"/>
  <!-- Цикл возврата -->
  <path d="M300 175 Q300 160 200 160 Q100 160 60 175" stroke="#607d8b" stroke-width="2" fill="none" stroke-dasharray="5,3"/>
  <!-- Пример цепи -->
  <text x="200" y="70" font-family="Arial" font-size="12" fill="#1b5e20" text-anchor="middle">Пример: Трава → Кузнечик → Лягушка → Змея → Орёл</text>
  <!-- Пирамида -->
  <polygon points="60,150 120,150 90,100" fill="#a5d6a7"/>
  <polygon points="120,150 200,150 160,110" fill="#bcaaa4"/>
  <polygon points="200,150 280,150 240,120" fill="#ffab91"/>
  <polygon points="280,150 340,150 310,130" fill="#ef9a9a"/>
  <text x="90" y="140" font-family="Arial" font-size="8" fill="#2e7d32" text-anchor="middle">Растения</text>
  <text x="160" y="140" font-family="Arial" font-size="8" fill="#5d4037" text-anchor="middle">Травояд.</text>
  <text x="240" y="140" font-family="Arial" font-size="8" fill="#e65100" text-anchor="middle">Хищники</text>
  <text x="310" y="145" font-family="Arial" font-size="7" fill="#c62828" text-anchor="middle">Верхние</text>
  <defs>
    <marker id="arrG" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#4caf50"/>
    </marker>
    <marker id="arrB" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#795548"/>
    </marker>
    <marker id="arrO" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#e65100"/>
    </marker>
  </defs>
</svg>