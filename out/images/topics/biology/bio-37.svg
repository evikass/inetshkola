<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250">
  <defs>
    <linearGradient id="bg37" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff3e0"/>
      <stop offset="100%" style="stop-color:#ffe0b2"/>
    </linearGradient>
  </defs>
  <rect width="400" height="250" fill="url(#bg37)" rx="20"/>
  <text x="200" y="30" font-family="Arial" font-size="18" font-weight="bold" fill="#e65100" text-anchor="middle">Рудименты и атавизмы</text>
  <!-- Рудимент - аппендикс -->
  <rect x="50" y="70" width="140" height="130" fill="#fff" stroke="#ff9800" stroke-width="2" rx="10"/>
  <text x="120" y="90" font-family="Arial" font-size="14" font-weight="bold" fill="#e65100" text-anchor="middle">Рудимент</text>
  <text x="120" y="110" font-family="Arial" font-size="10" fill="#5d4037" text-anchor="middle">Орган, потерявший</text>
  <text x="120" y="125" font-family="Arial" font-size="10" fill="#5d4037" text-anchor="middle">своё значение</text>
  <!-- Примеры рудиментов -->
  <ellipse cx="100" cy="160" rx="25" ry="15" fill="#ffccbc"/>
  <text x="100" y="165" font-family="Arial" font-size="9" fill="#bf360c" text-anchor="middle">Аппендикс</text>
  <ellipse cx="140" cy="175" rx="20" ry="12" fill="#ffe0b2"/>
  <text x="140" y="180" font-family="Arial" font-size="8" fill="#e65100" text-anchor="middle">Копчик</text>
  <!-- Атавизм -->
  <rect x="210" y="70" width="140" height="130" fill="#fff" stroke="#7b1fa2" stroke-width="2" rx="10"/>
  <text x="280" y="90" font-family="Arial" font-size="14" font-weight="bold" fill="#7b1fa2" text-anchor="middle">Атавизм</text>
  <text x="280" y="110" font-family="Arial" font-size="10" fill="#4a148c" text-anchor="middle">Признак предков,</text>
  <text x="280" y="125" font-family="Arial" font-size="10" fill="#4a148c" text-anchor="middle">исчезнувший у вида</text>
  <!-- Примеры атавизмов -->
  <ellipse cx="260" cy="160" rx="25" ry="15" fill="#e1bee7"/>
  <text x="260" y="165" font-family="Arial" font-size="9" fill="#6a1b9a" text-anchor="middle">Волосатость</text>
  <ellipse cx="300" cy="175" rx="20" ry="12" fill="#d1c4e9"/>
  <text x="300" y="180" font-family="Arial" font-size="8" fill="#512da8" text-anchor="middle">Хвост</text>
  <!-- Стрелка эволюции -->
  <path d="M120 220 Q200 240 280 220" stroke="#4caf50" stroke-width="2" fill="none" stroke-dasharray="5,3"/>
  <text x="200" y="245" font-family="Arial" font-size="10" fill="#2e7d32" text-anchor="middle">Доказательства эволюции</text>
  <!-- Иконка Дарвина -->
  <circle cx="30" cy="220" r="15" fill="#8d6e63"/>
  <circle cx="30" cy="212" r="8" fill="#a1887f"/>
  <text x="30" y="240" font-family="Arial" font-size="8" fill="#5d4037" text-anchor="middle">Дарвин</text>
</svg>