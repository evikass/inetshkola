<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg41" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF8E7"/>
      <stop offset="100%" style="stop-color:#FFE4B5"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg41)" rx="20"/>
  
  <!-- Sun -->
  <circle cx="680" cy="80" r="50" fill="#FFD700" opacity="0.8"/>
  <circle cx="680" cy="80" r="40" fill="#FFA500"/>
  
  <!-- Ground/Savanna -->
  <ellipse cx="400" cy="450" rx="380" ry="80" fill="#DAA520" opacity="0.6"/>
  <ellipse cx="400" cy="460" rx="350" ry="60" fill="#D2691E" opacity="0.4"/>
  
  <!-- Giraffe -->
  <g transform="translate(580, 180)">
    <!-- Body -->
    <ellipse cx="0" cy="100" rx="35" ry="60" fill="#D2691E"/>
    <!-- Neck -->
    <rect x="-12" y="-60" width="24" height="140" fill="#D2691E" rx="10"/>
    <!-- Head -->
    <ellipse cx="0" cy="-80" rx="18" ry="25" fill="#D2691E"/>
    <!-- Spots -->
    <circle cx="-10" cy="50" r="8" fill="#8B4513"/>
    <circle cx="10" cy="80" r="7" fill="#8B4513"/>
    <circle cx="-5" cy="110" r="6" fill="#8B4513"/>
    <circle cx="8" cy="20" r="9" fill="#8B4513"/>
    <!-- Legs -->
    <rect x="-25" y="150" width="10" height="80" fill="#D2691E" rx="3"/>
    <rect x="15" y="150" width="10" height="80" fill="#D2691E" rx="3"/>
    <!-- Horns -->
    <line x1="-8" y1="-100" x2="-8" y2="-115" stroke="#8B4513" stroke-width="4" stroke-linecap="round"/>
    <line x1="8" y1="-100" x2="8" y2="-115" stroke="#8B4513" stroke-width="4" stroke-linecap="round"/>
  </g>
  
  <!-- Lion -->
  <g transform="translate(150, 280)">
    <!-- Body -->
    <ellipse cx="0" cy="40" rx="50" ry="35" fill="#CD853F"/>
    <!-- Head -->
    <circle cx="-50" cy="20" r="30" fill="#CD853F"/>
    <!-- Mane -->
    <circle cx="-50" cy="20" r="40" fill="#8B4513" opacity="0.7"/>
    <circle cx="-50" cy="20" r="25" fill="#CD853F"/>
    <!-- Ears -->
    <circle cx="-70" cy="-5" r="10" fill="#CD853F"/>
    <circle cx="-30" cy="-5" r="10" fill="#CD853F"/>
    <!-- Legs -->
    <rect x="-30" y="65" width="15" height="45" fill="#CD853F" rx="5"/>
    <rect x="15" y="65" width="15" height="45" fill="#CD853F" rx="5"/>
    <!-- Tail -->
    <path d="M45 40 Q80 30 90 50" stroke="#CD853F" stroke-width="8" fill="none" stroke-linecap="round"/>
    <circle cx="90" cy="50" r="8" fill="#8B4513"/>
  </g>
  
  <!-- Elephant -->
  <g transform="translate(380, 260)">
    <!-- Body -->
    <ellipse cx="0" cy="50" rx="60" ry="45" fill="#808080"/>
    <!-- Head -->
    <circle cx="-50" cy="30" r="35" fill="#808080"/>
    <!-- Ears -->
    <ellipse cx="-85" cy="20" rx="25" ry="35" fill="#A9A9A9"/>
    <ellipse cx="-85" cy="20" rx="18" ry="25" fill="#D3D3D3"/>
    <!-- Trunk -->
    <path d="M-80 50 Q-100 80 -90 120 Q-80 130 -70 120" stroke="#808080" stroke-width="18" fill="none" stroke-linecap="round"/>
    <!-- Legs -->
    <rect x="-40" y="85" width="20" height="55" fill="#808080" rx="6"/>
    <rect x="20" y="85" width="20" height="55" fill="#808080" rx="6"/>
    <!-- Tusks -->
    <path d="M-65 55 Q-75 80 -60 95" stroke="#FFFFF0" stroke-width="6" fill="none" stroke-linecap="round"/>
    <path d="M-50 55 Q-40 80 -55 95" stroke="#FFFFF0" stroke-width="6" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- Zebra -->
  <g transform="translate(80, 200)">
    <!-- Body -->
    <ellipse cx="0" cy="60" rx="40" ry="30" fill="#FFFFFF"/>
    <!-- Stripes on body -->
    <path d="M-30 45 Q0 40 30 45" stroke="#000000" stroke-width="4" fill="none"/>
    <path d="M-35 60 Q0 55 35 60" stroke="#000000" stroke-width="4" fill="none"/>
    <path d="M-30 75 Q0 70 30 75" stroke="#000000" stroke-width="4" fill="none"/>
    <!-- Neck -->
    <rect x="30" y="20" width="20" height="50" fill="#FFFFFF" rx="5"/>
    <line x1="35" y1="25" x2="35" y2="65" stroke="#000000" stroke-width="3"/>
    <line x1="45" y1="25" x2="45" y2="65" stroke="#000000" stroke-width="3"/>
    <!-- Head -->
    <ellipse cx="55" cy="20" rx="18" ry="15" fill="#FFFFFF"/>
    <line x1="50" y1="10" x2="50" y2="30" stroke="#000000" stroke-width="2"/>
    <line x1="60" y1="10" x2="60" y2="30" stroke="#000000" stroke-width="2"/>
    <!-- Mane -->
    <path d="M35 5 L40 15 L45 5 L50 15 L55 5" stroke="#000000" stroke-width="3" fill="none"/>
    <!-- Legs -->
    <rect x="-30" y="85" width="10" height="40" fill="#FFFFFF" rx="3"/>
    <rect x="20" y="85" width="10" height="40" fill="#FFFFFF" rx="3"/>
    <line x1="-25" y1="85" x2="-25" y2="125" stroke="#000000" stroke-width="2"/>
    <line x1="25" y1="85" x2="25" y2="125" stroke="#000000" stroke-width="2"/>
  </g>
  
  <!-- Trees (Acacia style) -->
  <g transform="translate(700, 200)">
    <rect x="-5" y="0" width="10" height="120" fill="#8B4513"/>
    <ellipse cx="0" cy="-20" rx="50" ry="25" fill="#228B22"/>
    <ellipse cx="-30" cy="-10" rx="30" ry="15" fill="#2E8B57"/>
    <ellipse cx="30" cy="-10" rx="30" ry="15" fill="#2E8B57"/>
  </g>
  
  <!-- Birds in sky -->
  <g fill="none" stroke="#333" stroke-width="2">
    <path d="M100 60 Q110 50 120 60 Q130 50 140 60"/>
    <path d="M200 90 Q210 80 220 90 Q230 80 240 90"/>
    <path d="M550 50 Q560 40 570 50 Q580 40 590 50"/>
  </g>
  
  <!-- Title area -->
  <rect x="250" y="420" width="300" height="50" fill="rgba(255,255,255,0.9)" rx="10"/>
  <text x="400" y="452" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2E8B57">Царство животных</text>
</svg>