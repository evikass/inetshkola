<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250">
  <defs>
    <linearGradient id="bg29" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8eaf6"/>
      <stop offset="100%" style="stop-color:#c5cae9"/>
    </linearGradient>
  </defs>
  <rect width="400" height="250" fill="url(#bg29)" rx="20"/>
  <text x="200" y="30" font-family="Arial" font-size="18" font-weight="bold" fill="#303f9f" text-anchor="middle">Генетика</text>
  <!-- ДНК двойная спираль -->
  <path d="M80 60 Q100 80 80 100 Q60 120 80 140 Q100 160 80 180 Q60 200 80 220" stroke="#5c6bc0" stroke-width="4" fill="none"/>
  <path d="M120 60 Q100 80 120 100 Q140 120 120 140 Q100 160 120 180 Q140 200 120 220" stroke="#7986cb" stroke-width="4" fill="none"/>
  <!-- Нуклеотиды -->
  <rect x="85" y="70" width="30" height="10" fill="#ef5350" rx="2"/>
  <rect x="85" y="110" width="30" height="10" fill="#4caf50" rx="2"/>
  <rect x="85" y="150" width="30" height="10" fill="#2196f3" rx="2"/>
  <rect x="85" y="190" width="30" height="10" fill="#ffeb3b" rx="2"/>
  <!-- Хромосома -->
  <path d="M180 70 Q160 90 180 110 Q200 130 180 150 Q160 170 180 190 Q200 210 180 230" stroke="#9c27b0" stroke-width="15" fill="none" stroke-linecap="round"/>
  <line x1="180" y1="140" x2="180" y2="160" stroke="#e1bee7" stroke-width="4"/>
  <!-- Пара хромосом -->
  <path d="M230 70 Q250 90 230 110 Q210 130 230 150 Q250 170 230 190 Q210 210 230 230" stroke="#ab47bc" stroke-width="12" fill="none" stroke-linecap="round"/>
  <line x1="230" y1="140" x2="230" y2="160" stroke="#e1bee7" stroke-width="3"/>
  <!-- Гены на хромосоме -->
  <circle cx="230" cy="90" r="5" fill="#e91e63"/>
  <circle cx="230" cy="120" r="5" fill="#4caf50"/>
  <circle cx="230" cy="180" r="5" fill="#2196f3"/>
  <circle cx="230" cy="210" r="5" fill="#ff9800"/>
  <!-- Решётка Пеннета -->
  <rect x="280" y="60" width="100" height="100" fill="#fff" stroke="#5c6bc0" stroke-width="2"/>
  <line x1="280" y1="110" x2="380" y2="110" stroke="#5c6bc0" stroke-width="1"/>
  <line x1="330" y1="60" x2="330" y2="160" stroke="#5c6bc0" stroke-width="1"/>
  <text x="305" y="95" font-family="Arial" font-size="12" fill="#e91e63" text-anchor="middle">A</text>
  <text x="355" y="95" font-family="Arial" font-size="12" fill="#e91e63" text-anchor="middle">a</text>
  <text x="305" y="135" font-family="Arial" font-size="12" fill="#2196f3" text-anchor="middle">A</text>
  <text x="305" y="150" font-family="Arial" font-size="12" fill="#2196f3" text-anchor="middle">a</text>
  <rect x="280" y="60" width="50" height="50" fill="#ffcdd2" opacity="0.5"/>
  <rect x="330" y="60" width="50" height="50" fill="#bbdefb" opacity="0.5"/>
  <rect x="280" y="110" width="50" height="50" fill="#c8e6c9" opacity="0.5"/>
  <!-- Подписи -->
  <text x="100" y="250" font-family="Arial" font-size="11" fill="#3949ab" text-anchor="middle">ДНК</text>
  <text x="205" y="250" font-family="Arial" font-size="11" fill="#7b1fa2" text-anchor="middle">Хромосомы</text>
  <text x="330" y="185" font-family="Arial" font-size="11" fill="#303f9f" text-anchor="middle">Решётка Пеннета</text>
</svg>