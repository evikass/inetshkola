<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>
    <linearGradient id="animalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#ea580c"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="300" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="200" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#475569">Биология — наука о жизни</text>
  
  <!-- Leaf icon (Botany) -->
  <g transform="translate(40, 60)">
    <ellipse cx="50" cy="60" rx="40" ry="50" fill="url(#leafGrad)" transform="rotate(-30, 50, 60)"/>
    <path d="M50 20 Q30 60 50 110" stroke="#15803d" stroke-width="3" fill="none"/>
    <path d="M50 40 L30 55" stroke="#15803d" stroke-width="2"/>
    <path d="M50 55 L35 70" stroke="#15803d" stroke-width="2"/>
    <path d="M50 70 L40 85" stroke="#15803d" stroke-width="2"/>
    <text x="50" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#16a34a">Ботаника</text>
  </g>
  
  <!-- Animal icon (Zoology) -->
  <g transform="translate(150, 60)">
    <ellipse cx="50" cy="55" rx="35" ry="45" fill="url(#animalGrad)"/>
    <circle cx="35" cy="40" r="8" fill="white"/>
    <circle cx="35" cy="40" r="4" fill="#1e293b"/>
    <ellipse cx="50" cy="70" rx="25" ry="20" fill="#fdba74"/>
    <circle cx="42" cy="68" r="3" fill="#1e293b"/>
    <circle cx="58" cy="68" r="3" fill="#1e293b"/>
    <text x="50" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#ea580c">Зоология</text>
  </g>
  
  <!-- Cell icon (Microbiology) -->
  <g transform="translate(260, 60)">
    <ellipse cx="50" cy="55" rx="40" ry="45" fill="#a78bfa" opacity="0.7"/>
    <ellipse cx="50" cy="55" rx="35" ry="40" fill="none" stroke="#7c3aed" stroke-width="2"/>
    <circle cx="50" cy="50" r="15" fill="#7c3aed"/>
    <circle cx="55" cy="45" r="5" fill="#c4b5fd"/>
    <circle cx="30" cy="70" r="6" fill="#22c55e" opacity="0.8"/>
    <circle cx="70" cy="60" r="5" fill="#ef4444" opacity="0.8"/>
    <text x="50" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#7c3aed">Микробиология</text>
  </g>
  
  <!-- Human icon (Anatomy) -->
  <g transform="translate(40, 160)">
    <circle cx="50" cy="20" r="15" fill="#64748b"/>
    <rect x="35" y="35" width="30" height="50" rx="5" fill="#64748b"/>
    <rect x="20" y="38" width="15" height="8" rx="3" fill="#64748b"/>
    <rect x="65" y="38" width="15" height="8" rx="3" fill="#64748b"/>
    <rect x="35" y="85" width="12" height="35" rx="3" fill="#64748b"/>
    <rect x="53" y="85" width="12" height="35" rx="3" fill="#64748b"/>
    <text x="50" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#475569">Анатомия</text>
  </g>
  
  <!-- Ecology icon -->
  <g transform="translate(150, 160)">
    <circle cx="50" cy="50" r="45" fill="#22c55e" opacity="0.2"/>
    <circle cx="50" cy="50" r="35" fill="#3b82f6" opacity="0.3"/>
    <circle cx="35" cy="40" r="12" fill="#22c55e"/>
    <circle cx="60" cy="35" r="10" fill="#22c55e"/>
    <circle cx="55" cy="60" r="8" fill="#22c55e"/>
    <circle cx="40" cy="65" r="6" fill="#f97316"/>
    <text x="50" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#16a34a">Экология</text>
  </g>
  
  <!-- DNA icon (Genetics) -->
  <g transform="translate(260, 160)">
    <path d="M30 20 Q50 35 70 20 Q90 5 110 20" stroke="#8b5cf6" stroke-width="4" fill="none"/>
    <path d="M30 35 Q50 50 70 35 Q90 20 110 35" stroke="#ec4899" stroke-width="4" fill="none"/>
    <path d="M30 50 Q50 65 70 50 Q90 35 110 50" stroke="#8b5cf6" stroke-width="4" fill="none"/>
    <path d="M30 65 Q50 80 70 65 Q90 50 110 65" stroke="#ec4899" stroke-width="4" fill="none"/>
    <path d="M30 80 Q50 95 70 80 Q90 65 110 80" stroke="#8b5cf6" stroke-width="4" fill="none"/>
    <line x1="40" y1="22" x2="40" y2="33" stroke="#94a3b8" stroke-width="2"/>
    <line x1="60" y1="32" x2="60" y2="53" stroke="#94a3b8" stroke-width="2"/>
    <line x1="80" y1="22" x2="80" y2="33" stroke="#94a3b8" stroke-width="2"/>
    <line x1="100" y1="32" x2="100" y2="53" stroke="#94a3b8" stroke-width="2"/>
    <text x="70" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#8b5cf6">Генетика</text>
  </g>
  
  <!-- Footer -->
  <text x="200" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8">Биос = жизнь, логос = наука</text>
</svg>