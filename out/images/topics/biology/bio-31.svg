  <line x1="178" y1="100" x2="100" y2="70" stroke="#1565c0" stroke-width="1"/>
  <text x="80" y="70" font-family="Arial" font-size="10" fill="#1565c0">Лёгкие</text>
  <line x1="200" y1="140" x2="300" y2="140" stroke="#9e9e9e" stroke-width="1"/>
  <text x="310" y="140" font-family="Arial" font-size="10" fill="#757575">Позвоночник</text>
