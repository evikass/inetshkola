  <!-- Сердце -->
  <path d="M195 110 Q185 100 190 110 Q195 120 200 115 Q205 120 210 110 Q215 100 205 110" fill="#e53935"/>
  <!-- Лёгкие -->
  <ellipse cx="180" cy="110" rx="15" ry="20" fill="#bbdefb" opacity="0.7"/>
  <ellipse cx="220" cy="110" rx="15" ry="20" fill="#bbdefb" opacity="0.7"/>
  <!-- Руки -->
  <rect x="140" y="95" width="25" height="60" fill="#ffccbc" rx="8"/>
  <rect x="235" y="95" width="25" height="60" fill="#ffccbc" rx="8"/>
  <!-- Кости рук -->
  <line x1="152" y1="95" x2="152" y2="150" stroke="#e0e0e0" stroke-width="3"/>
  <line x1="248" y1="95" x2="248" y2="150" stroke="#e0e0e0" stroke-width="3"/>
  <!-- Ноги -->
  <rect x="175" y="170" width="20" height="60" fill="#ffccbc" rx="5"/>
  <rect x="205" y="170" width="20" height="60" fill="#ffccbc" rx="5"/>
