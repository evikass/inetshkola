  <path d="M185 100 Q170 105 185 115" stroke="#bdbdbd" stroke-width="2" fill="none"/>
  <path d="M215 100 Q230 105 215 115" stroke="#bdbdbd" stroke-width="2" fill="none"/>
  <path d="M183 115 Q165 120 183 130" stroke="#bdbdbd" stroke-width="2" fill="none"/>
