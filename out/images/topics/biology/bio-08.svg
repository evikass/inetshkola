<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Background -->
  <rect width="400" height="300" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="200" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#475569">Скелет человека 🦴</text>
  
  <!-- Skeleton figure -->
  <g transform="translate(150, 40)">
    <!-- Skull -->
    <ellipse cx="50" cy="20" rx="25" ry="22" fill="#f5f5f4" stroke="#a8a29e" stroke-width="2"/>
    <ellipse cx="40" cy="22" rx="5" ry="4" fill="#292524"/>
    <ellipse cx="60" cy="22" rx="5" ry="4" fill="#292524"/>
    <ellipse cx="50" cy="32" rx="4" ry="3" fill="#a8a29e"/>
    <path d="M40 38 Q50 42 60 38" stroke="#78716c" stroke-width="2" fill="none"/>
    
    <!-- Spine -->
    <rect x="45" y="42" width="10" height="80" fill="#e7e5e4" stroke="#a8a29e" stroke-width="1"/>
    <line x1="50" y1="50" x2="50" y2="120" stroke="#78716c" stroke-width="1"/>
    
    <!-- Ribcage -->
    <ellipse cx="50" cy="65" rx="35" ry="25" fill="none" stroke="#a8a29e" stroke-width="3"/>
    <path d="M20 55 L30 70" stroke="#d6d3d1" stroke-width="2"/>
    <path d="M25 50 L35 70" stroke="#d6d3d1" stroke-width="2"/>
    <path d="M70 55 L60 70" stroke="#d6d3d1" stroke-width="2"/>
    <path d="M75 50 L65 70" stroke="#d6d3d1" stroke-width="2"/>
    
    <!-- Pelvis -->
    <path d="M20 120 Q50 140 80 120" fill="#e7e5e4" stroke="#a8a29e" stroke-width="2"/>
    
    <!-- Arms -->
    <line x1="15" y1="60" x2="-5" y2="90" stroke="#d6d3d1" stroke-width="6" stroke-linecap="round"/>
    <line x1="-5" y1="90" x2="-15" y2="130" stroke="#d6d3d1" stroke-width="5" stroke-linecap="round"/>
    <line x1="85" y1="60" x2="105" y2="90" stroke="#d6d3d1" stroke-width="6" stroke-linecap="round"/>
    <line x1="105" y1="90" x2="115" y2="130" stroke="#d6d3d1" stroke-width="5" stroke-linecap="round"/>
    
    <!-- Hands -->
    <circle cx="-18" cy="135" r="8" fill="#e7e5e4" stroke="#a8a29e" stroke-width="1"/>
    <circle cx="118" cy="135" r="8" fill="#e7e5e4" stroke="#a8a29e" stroke-width="1"/>
    
    <!-- Legs -->
    <line x1="35" y1="130" x2="25" y2="180" stroke="#d6d3d1" stroke-width="7" stroke-linecap="round"/>
    <line x1="25" y1="180" x2="20" y2="230" stroke="#d6d3d1" stroke-width="6" stroke-linecap="round"/>
    <line x1="65" y1="130" x2="75" y2="180" stroke="#d6d3d1" stroke-width="7" stroke-linecap="round"/>
    <line x1="75" y1="180" x2="80" y2="230" stroke="#d6d3d1" stroke-width="6" stroke-linecap="round"/>
    
    <!-- Feet -->
    <ellipse cx="15" cy="235" rx="15" ry="6" fill="#e7e5e4" stroke="#a8a29e" stroke-width="1"/>
    <ellipse cx="85" cy="235" rx="15" ry="6" fill="#e7e5e4" stroke="#a8a29e" stroke-width="1"/>
  </g>
  
  <!-- Labels -->
  <g font-family="Arial, sans-serif" font-size="9" fill="#57534e">
    <text x="280" y="55">Череп</text>
    <line x1="280" y1="57" x2="230" y2="60" stroke="#a8a29e" stroke-width="1"/>
    
    <text x="280" y="90">Позвоночник</text>
    <text x="280" y="100">(33-34 позвонка)</text>
    <line x1="280" y1="92" x2="210" y2="90" stroke="#a8a29e" stroke-width="1"/>
    
    <text x="280" y="125">Грудная клетка</text>
    <text x="280" y="135">(12 пар рёбер)</text>
    <line x1="280" y1="127" x2="220" y2="75" stroke="#a8a29e" stroke-width="1"/>
    
    <text x="60" y="150">Кости рук</text>
    <text x="50" y="160">(плечо, предплечье, кисть)</text>
    
    <text x="60" y="200">Кости ног</text>
    <text x="50" y="210">(бедро, голень, стопа)</text>
  </g>
  
  <!-- Fun fact -->
  <rect x="20" y="255" width="360" height="35" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="200" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#92400e">
    💡 У взрослого человека ~206 костей, у ребёнка — около 300!
  </text>
</svg>