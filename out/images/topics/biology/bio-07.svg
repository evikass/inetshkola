<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Background -->
  <rect width="400" height="300" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="200" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#475569">Земноводные vs Пресмыкающиеся</text>
  
  <!-- Frog (Amphibian) -->
  <g transform="translate(30, 50)">
    <text x="70" y="15" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#22c55e">Земноводные 🐸</text>
    
    <!-- Body -->
    <ellipse cx="70" cy="70" rx="45" ry="35" fill="#22c55e"/>
    
    <!-- Head -->
    <ellipse cx="70" cy="40" rx="30" ry="25" fill="#4ade80"/>
    
    <!-- Eyes -->
    <circle cx="50" cy="35" r="10" fill="white"/>
    <circle cx="90" cy="35" r="10" fill="white"/>
    <circle cx="50" cy="35" r="5" fill="#1e293b"/>
    <circle cx="90" cy="35" r="5" fill="#1e293b"/>
    
    <!-- Legs -->
    <path d="M30 90 Q10 110 20 120 L35 115 Q25 105 40 95" fill="#4ade80"/>
    <path d="M110 90 Q130 110 120 120 L105 115 Q115 105 100 95" fill="#4ade80"/>
    <path d="M45 100 L35 130 L50 125" fill="#22c55e"/>
    <path d="M95 100 L105 130 L90 125" fill="#22c55e"/>
    
    <!-- Skin texture (moist) -->
    <ellipse cx="70" cy="70" rx="35" ry="25" fill="none" stroke="#16a34a" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
    
    <!-- Water drops -->
    <circle cx="45" cy="80" r="3" fill="#60a5fa"/>
    <circle cx="90" cy="75" r="2" fill="#60a5fa"/>
    <circle cx="75" cy="90" r="2" fill="#60a5fa"/>
  </g>
  
  <!-- Lizard (Reptile) -->
  <g transform="translate(200, 50)">
    <text x="80" y="15" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#f97316">Пресмыкающиеся 🦎</text>
    
    <!-- Body -->
    <ellipse cx="80" cy="75" rx="40" ry="25" fill="#f97316"/>
    
    <!-- Head -->
    <ellipse cx="30" cy="70" rx="20" ry="18" fill="#fb923c"/>
    
    <!-- Eye -->
    <circle cx="22" cy="65" r="6" fill="white"/>
    <circle cx="22" cy="65" r="3" fill="#1e293b"/>
    
    <!-- Tail -->
    <path d="M120 75 Q150 65 170 80 Q160 85 155 75" fill="#f97316"/>
    
    <!-- Legs -->
    <path d="M50 95 L40 115 L55 110" fill="#fb923c"/>
    <path d="M90 95 L100 115 L85 110" fill="#fb923c"/>
    <path d="M60 100 L55 120 L65 115" fill="#fb923c"/>
    <path d="M100 100 L105 120 L95 115" fill="#fb923c"/>
    
    <!-- Scales pattern -->
    <g opacity="0.4">
      <circle cx="65" cy="70" r="5" fill="#ea580c"/>
      <circle cx="85" cy="65" r="5" fill="#ea580c"/>
      <circle cx="100" cy="75" r="5" fill="#ea580c"/>
      <circle cx="75" cy="85" r="5" fill="#ea580c"/>
    </g>
  </g>
  
  <!-- Comparison table -->
  <rect x="20" y="195" width="360" height="95" rx="10" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/>
  <g font-family="Arial, sans-serif" font-size="10">
    <!-- Headers -->
    <text x="110" y="215" text-anchor="middle" fill="#22c55e" font-weight="bold">Амфибии</text>
    <text x="290" y="215" text-anchor="middle" fill="#f97316" font-weight="bold">Рептилии</text>
    <line x1="200" y1="205" x2="200" y2="285" stroke="#cbd5e1" stroke-width="1"/>
    
    <!-- Comparison rows -->
    <text x="30" y="235" fill="#475569">Кожа:</text>
    <text x="110" y="235" text-anchor="middle" fill="#16a34a">влажная, без чешуи</text>
    <text x="290" y="235" text-anchor="middle" fill="#ea580c">сухая, с чешуёй</text>
    
    <text x="30" y="255" fill="#475569">Дыхание:</text>
    <text x="110" y="255" text-anchor="middle" fill="#16a34a">лёгкие + кожа</text>
    <text x="290" y="255" text-anchor="middle" fill="#ea580c">только лёгкие</text>
    
    <text x="30" y="275" fill="#475569">Размножение:</text>
    <text x="110" y="275" text-anchor="middle" fill="#16a34a">в воде (метаморфоз)</text>
    <text x="290" y="275" text-anchor="middle" fill="#ea580c">на суше (яйца)</text>
  </g>
</svg>