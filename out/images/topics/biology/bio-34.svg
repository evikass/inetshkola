  </defs>
  <rect width="400" height="250" fill="url(#bg34)" rx="20"/>
  <text x="200" y="30" font-family="Arial" font-size="18" font-weight="bold" fill="#2e7d32" text-anchor="middle">Пресмыкающиеся (Рептилии)</text>
