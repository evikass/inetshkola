  <path d="M180 155 L175 180 L165 175" stroke="#5d4037" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M230 155 L235 180 L245 175" stroke="#5d4037" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M260 155 L270 180 L280 175" stroke="#5d4037" stroke-width="6" fill="none" stroke-linecap="round"/>
  <!-- Чешуйки на спине -->
  <ellipse cx="170" cy="115" rx="8" ry="5" fill="#6d4c41"/>
  <ellipse cx="200" cy="115" rx="8" ry="5" fill="#6d4c41"/>
  <ellipse cx="230" cy="115" rx="8" ry="5" fill="#6d4c41"/>
  <ellipse cx="260" cy="120" rx="8" ry="5" fill="#6d4c41"/>
