  <text x="70" y="222" font-family="Arial" font-size="10" fill="#2e7d32" text-anchor="middle">Сухая кожа</text>
  <rect x="120" y="200" width="80" height="35" fill="#fff" stroke="#4caf50" stroke-width="2" rx="5"/>
