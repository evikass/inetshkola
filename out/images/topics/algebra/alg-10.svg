<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg10" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1d2b64"/>
      <stop offset="100%" style="stop-color:#f8cdda"/>
    </linearGradient>
    <linearGradient id="prog1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg10)"/>
  
  <!-- Arithmetic progression -->
  <g transform="translate(400, 140)">
    <text x="0" y="0" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#764ba2">Арифметическая:</text>
    <text x="0" y="50" text-anchor="middle" font-family="Georgia, serif" font-size="36" font-weight="bold" fill="#ffffff">aₙ = a₁ + (n−1)d</text>
    
    <!-- Visual sequence -->
    <g transform="translate(-180, 70)">
      <text x="0" y="0" font-family="Georgia, serif" font-size="28" fill="#667eea">2</text>
      <text x="50" y="0" font-family="Georgia, serif" font-size="28" fill="#ffffff">,</text>
      <text x="80" y="0" font-family="Georgia, serif" font-size="28" fill="#667eea">5</text>
      <text x="130" y="0" font-family="Georgia, serif" font-size="28" fill="#ffffff">,</text>
      <text x="160" y="0" font-family="Georgia, serif" font-size="28" fill="#667eea">8</text>
      <text x="210" y="0" font-family="Georgia, serif" font-size="28" fill="#ffffff">,</text>
      <text x="240" y="0" font-family="Georgia, serif" font-size="28" fill="#667eea">11</text>
      <text x="300" y="0" font-family="Georgia, serif" font-size="28" fill="#ffffff">,</text>
      <text x="330" y="0" font-family="Georgia, serif" font-size="28" fill="#764ba2">...</text>
    </g>
  </g>
  
  <!-- Geometric progression -->
  <g transform="translate(400, 300)">
    <text x="0" y="0" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#764ba2">Геометрическая:</text>
    <text x="0" y="50" text-anchor="middle" font-family="Georgia, serif" font-size="36" font-weight="bold" fill="#ffffff">bₙ = b₁ · qⁿ⁻¹</text>
    
    <!-- Visual sequence -->
    <g transform="translate(-150, 70)">
      <text x="0" y="0" font-family="Georgia, serif" font-size="28" fill="#667eea">2</text>
      <text x="40" y="0" font-family="Georgia, serif" font-size="28" fill="#ffffff">,</text>
      <text x="70" y="0" font-family="Georgia, serif" font-size="28" fill="#667eea">6</text>
      <text x="110" y="0" font-family="Georgia, serif" font-size="28" fill="#ffffff">,</text>
      <text x="140" y="0" font-family="Georgia, serif" font-size="28" fill="#667eea">18</text>
      <text x="200" y="0" font-family="Georgia, serif" font-size="28" fill="#ffffff">,</text>
      <text x="230" y="0" font-family="Georgia, serif" font-size="28" fill="#667eea">54</text>
      <text x="290" y="0" font-family="Georgia, serif" font-size="28" fill="#ffffff">,</text>
      <text x="320" y="0" font-family="Georgia, serif" font-size="28" fill="#764ba2">...</text>
    </g>
  </g>
  
  <!-- Sum formulas -->
  <g transform="translate(650, 180)">
    <rect x="-80" y="-30" width="160" height="60" rx="8" fill="#ffffff" fill-opacity="0.1"/>
    <text x="0" y="10" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#667eea">Sₙ = n(a₁+aₙ)/2</text>
  </g>
  
  <!-- Decorative elements -->
  <circle cx="100" cy="80" r="25" fill="#667eea" opacity="0.2"/>
  <circle cx="700" cy="400" r="35" fill="#764ba2" opacity="0.15"/>
  
  <!-- Title -->
  <text x="400" y="480" text-anchor="middle" font-family="Georgia, serif" font-size="24" font-weight="bold" fill="#ffffff">Прогрессии</text>
</svg>