<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg8" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#141e30"/>
      <stop offset="100%" style="stop-color:#243b55"/>
    </linearGradient>
    <linearGradient id="ineq1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f7971e"/>
      <stop offset="100%" style="stop-color:#ffd200"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg8)"/>
  
  <!-- Inequality symbols -->
  <g transform="translate(400, 180)">
    <text x="-250" y="0" text-anchor="middle" font-family="Georgia, serif" font-size="80" font-weight="bold" fill="#f7971e">&gt;</text>
    <text x="-100" y="0" text-anchor="middle" font-family="Georgia, serif" font-size="80" font-weight="bold" fill="#ffd200">&lt;</text>
    <text x="50" y="0" text-anchor="middle" font-family="Georgia, serif" font-size="80" font-weight="bold" fill="#f7971e">≥</text>
    <text x="200" y="0" text-anchor="middle" font-family="Georgia, serif" font-size="80" font-weight="bold" fill="#ffd200">≤</text>
  </g>
  
  <!-- Number line with interval -->
  <g transform="translate(400, 300)">
    <line x1="-300" y1="0" x2="300" y2="0" stroke="#ffd200" stroke-width="3"/>
    <polygon points="300,0 280,-10 280,10" fill="#ffd200"/>
    
    <!-- Point -->
    <circle cx="-100" cy="0" r="8" fill="#f7971e"/>
    
    <!-- Interval -->
    <line x1="-100" y1="0" x2="250" y2="0" stroke="#f7971e" stroke-width="6" opacity="0.6"/>
    
    <!-- Parenthesis -->
    <path d="M -100 -30 Q -120 0 -100 30" fill="none" stroke="#ffd200" stroke-width="3"/>
  </g>
  
  <!-- Example -->
  <text x="400" y="380" text-anchor="middle" font-family="Georgia, serif" font-size="32" fill="#ffffff">2x − 5 &gt; 3  →  x &gt; 4</text>
  <text x="400" y="420" text-anchor="middle" font-family="Georgia, serif" font-size="24" fill="#f7971e">Ответ: (4; +∞)</text>
  
  <!-- Important note -->
  <rect x="100" y="430" width="600" height="40" rx="8" fill="#f7971e" fill-opacity="0.1"/>
  <text x="400" y="458" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#ffd200">При умножении на отрицательное число знак меняется!</text>
  
  <!-- Decorative elements -->
  <circle cx="100" cy="80" r="25" fill="#f7971e" opacity="0.2"/>
  <circle cx="700" cy="100" r="30" fill="#ffd200" opacity="0.15"/>
  
  <!-- Title -->
  <text x="400" y="480" text-anchor="middle" font-family="Georgia, serif" font-size="24" font-weight="bold" fill="#ffffff">Неравенства</text>
</svg>