<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="100%" style="stop-color:#302b63"/>
    </linearGradient>
    <linearGradient id="sys1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f093fb"/>
      <stop offset="100%" style="stop-color:#f5576c"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg2)"/>
  
  <!-- Grid -->
  <g stroke="#ffffff" stroke-opacity="0.08" stroke-width="1">
    <line x1="0" y1="125" x2="800" y2="125"/>
    <line x1="0" y1="250" x2="800" y2="250"/>
    <line x1="0" y1="375" x2="800" y2="375"/>
    <line x1="200" y1="0" x2="200" y2="500"/>
    <line x1="400" y1="0" x2="400" y2="500"/>
    <line x1="600" y1="0" x2="600" y2="500"/>
  </g>
  
  <!-- System brace -->
  <path d="M 180 120 Q 160 120 160 150 L 160 270 Q 160 300 180 300" fill="none" stroke="url(#sys1)" stroke-width="5"/>
  <path d="M 180 320 Q 160 320 160 350 L 160 380 Q 160 410 180 410" fill="none" stroke="url(#sys1)" stroke-width="5"/>
  
  <!-- Equations -->
  <text x="400" y="170" text-anchor="middle" font-family="Georgia, serif" font-size="48" font-weight="bold" fill="#f093fb">a₁x + b₁y = c₁</text>
  <text x="400" y="380" text-anchor="middle" font-family="Georgia, serif" font-size="48" font-weight="bold" fill="#f5576c">a₂x + b₂y = c₂</text>
  
  <!-- Decorative intersecting lines -->
  <g transform="translate(650, 250)">
    <line x1="-80" y1="-60" x2="80" y2="60" stroke="#f093fb" stroke-width="3" opacity="0.6"/>
    <line x1="-80" y1="60" x2="80" y2="-60" stroke="#f5576c" stroke-width="3" opacity="0.6"/>
    <circle cx="0" cy="0" r="8" fill="#ffffff"/>
  </g>
  
  <!-- Solution point -->
  <text x="650" y="350" text-anchor="middle" font-family="Georgia, serif" font-size="20" fill="#ffffff" opacity="0.8">(x₀; y₀)</text>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="80" r="25" fill="#f093fb" opacity="0.2"/>
  <circle cx="80" cy="450" r="35" fill="#f5576c" opacity="0.15"/>
  
  <!-- Title -->
  <text x="400" y="475" text-anchor="middle" font-family="Georgia, serif" font-size="24" font-weight="bold" fill="#ffffff">Системы уравнений</text>
</svg>