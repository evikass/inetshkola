<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg9" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2c003e"/>
      <stop offset="100%" style="stop-color:#512b58"/>
    </linearGradient>
    <linearGradient id="parab1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6a00"/>
      <stop offset="100%" style="stop-color:#ee0979"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg9)"/>
  
  <!-- Coordinate axes -->
  <g stroke="#ffffff" stroke-width="2" opacity="0.5">
    <line x1="400" y1="50" x2="400" y2="450"/>
    <line x1="50" y1="300" x2="750" y2="300"/>
    <!-- Arrows -->
    <polygon points="400,50 390,70 410,70" fill="#ffffff" opacity="0.5"/>
    <polygon points="750,300 730,290 730,310" fill="#ffffff" opacity="0.5"/>
  </g>
  
  <!-- Axis labels -->
  <text x="420" y="70" font-family="Georgia, serif" font-size="20" fill="#ffffff" opacity="0.7">y</text>
  <text x="760" y="305" font-family="Georgia, serif" font-size="20" fill="#ffffff" opacity="0.7">x</text>
  
  <!-- Parabola -->
  <path d="M 150 50 Q 400 500 650 50" fill="none" stroke="url(#parab1)" stroke-width="5"/>
  
  <!-- Vertex -->
  <circle cx="400" cy="300" r="8" fill="#ff6a00"/>
  <text x="430" y="320" font-family="Georgia, serif" font-size="18" fill="#ff6a00">вершина</text>
  
  <!-- Formula -->
  <text x="400" y="400" text-anchor="middle" font-family="Georgia, serif" font-size="48" font-weight="bold" fill="#ffffff">y = ax² + bx + c</text>
  
  <!-- a > 0 and a < 0 parabolas hint -->
  <g transform="translate(150, 130)">
    <path d="M 0 50 Q 30 0 60 50" fill="none" stroke="#ff6a00" stroke-width="2" opacity="0.6"/>
    <text x="30" y="70" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#ff6a00">a &gt; 0</text>
  </g>
  
  <g transform="translate(550, 130)">
    <path d="M 0 0 Q 30 50 60 0" fill="none" stroke="#ee0979" stroke-width="2" opacity="0.6"/>
    <text x="30" y="70" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#ee0979">a &lt; 0</text>
  </g>
  
  <!-- Decorative elements -->
  <circle cx="100" cy="100" r="30" fill="#ff6a00" opacity="0.15"/>
  <circle cx="700" cy="420" r="35" fill="#ee0979" opacity="0.15"/>
  
  <!-- Title -->
  <text x="400" y="480" text-anchor="middle" font-family="Georgia, serif" font-size="24" font-weight="bold" fill="#ffffff">Квадратичная функция</text>
</svg>