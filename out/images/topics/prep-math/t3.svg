<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150">
  <defs>
    <linearGradient id="mathBg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="200" height="150" fill="url(#mathBg3)" rx="15"/>
  
  <!-- Balance scale -->
  <rect x="95" y="25" width="10" height="60" fill="#FCD34D"/>
  <rect x="70" y="85" width="60" height="10" rx="3" fill="#F59E0B"/>
  
  <!-- Left pan -->
  <line x1="75" y1="85" x2="40" y2="60" stroke="#FCD34D" stroke-width="3"/>
  <ellipse cx="40" cy="65" rx="25" ry="10" fill="#FBBF24"/>
  
  <!-- Right pan -->
  <line x1="125" y1="85" x2="160" y2="60" stroke="#FCD34D" stroke-width="3"/>
  <ellipse cx="160" cy="65" rx="25" ry="10" fill="#FBBF24"/>
  
  <!-- Items on left - more -->
  <circle cx="30" cy="58" r="10" fill="#F87171"/>
  <circle cx="45" cy="60" r="10" fill="#F87171"/>
  <circle cx="38" cy="45" r="10" fill="#F87171"/>
  
  <!-- Items on right - less -->
  <circle cx="160" cy="58" r="10" fill="#34D399"/>
  
  <!-- Greater than sign -->
  <text x="100" y="60" font-family="Arial" font-size="40" font-weight="bold" fill="white" text-anchor="middle">&gt;</text>
  
  <!-- Text -->
  <text x="40" y="120" font-family="Arial" font-size="14" font-weight="bold" fill="#FEF3C7" text-anchor="middle">3</text>
  <text x="160" y="120" font-family="Arial" font-size="14" font-weight="bold" fill="#FEF3C7" text-anchor="middle">1</text>
  
  <!-- Equals -->
  <line x1="80" y1="130" x2="120" y2="130" stroke="#FEF3C7" stroke-width="4" stroke-linecap="round"/>
  <line x1="80" y1="140" x2="120" y2="140" stroke="#FEF3C7" stroke-width="4" stroke-linecap="round"/>
</svg>