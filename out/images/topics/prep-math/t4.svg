<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150">
  <defs>
    <linearGradient id="mathBg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="200" height="150" fill="url(#mathBg4)" rx="15"/>
  
  <!-- Question mark -->
  <text x="100" y="50" font-family="Arial" font-size="40" font-weight="bold" fill="#FEF3C7" text-anchor="middle">?</text>
  
  <!-- Pattern row -->
  <circle cx="30" cy="70" r="12" fill="#F87171"/>
  <circle cx="60" cy="70" r="12" fill="#34D399"/>
  <circle cx="90" cy="70" r="12" fill="#F87171"/>
  <circle cx="120" cy="70" r="12" fill="#34D399"/>
  <circle cx="150" cy="70" r="12" fill="#F87171"/>
  
  <!-- Arrow pointing to next -->
  <text x="175" y="75" font-size="20" fill="white">→</text>
  <circle cx="180" cy="70" r="10" fill="#34D399" opacity="0.5" stroke="white" stroke-width="2" stroke-dasharray="3,3"/>
  
  <!-- Find the odd one -->
  <rect x="20" y="95" width="30" height="30" rx="5" fill="#A78BFA"/>
  <rect x="55" y="95" width="30" height="30" rx="5" fill="#A78BFA"/>
  <rect x="90" y="95" width="30" height="30" rx="5" fill="#FBBF24"/>
  <rect x="125" y="95" width="30" height="30" rx="5" fill="#A78BFA"/>
  
  <!-- Check on odd one -->
  <circle cx="105" cy="110" r="20" fill="none" stroke="#4ADE80" stroke-width="3"/>
  
  <!-- Light bulb -->
  <text x="170" y="115" font-size="30">💡</text>
</svg>