<svg viewBox="0 0 300 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="peterSky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#60A5FA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#BFDBFE;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="nevaGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E40AF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shipGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#78350F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#92400E;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect x="0" y="0" width="300" height="130" fill="url(#peterSky)"/>

  <!-- Clouds -->
  <g fill="white" opacity="0.7">
    <ellipse cx="60" cy="30" rx="30" ry="15"/>
    <ellipse cx="85" cy="25" rx="25" ry="12"/>
    <ellipse cx="45" cy="28" rx="20" ry="10"/>
    <ellipse cx="230" cy="40" rx="35" ry="15"/>
    <ellipse cx="260" cy="35" rx="25" ry="12"/>
  </g>

  <!-- Neva River -->
  <rect x="0" y="130" width="300" height="70" fill="url(#nevaGrad)"/>
  <!-- River waves -->
  <g stroke="#60A5FA" stroke-width="1" fill="none" opacity="0.5">
    <path d="M 0 145 Q 20 140 40 145 Q 60 150 80 145"/>
    <path d="M 100 150 Q 120 145 140 150 Q 160 155 180 150"/>
    <path d="M 200 145 Q 220 140 240 145 Q 260 150 280 145"/>
  </g>

  <!-- Peter and Paul Fortress -->
  <g transform="translate(20, 50)">
    <!-- Fortress wall -->
    <rect x="0" y="50" width="80" height="30" fill="#E7E5E4"/>
    <!-- Peter and Paul Cathedral spire -->
    <rect x="30" y="25" width="20" height="55" fill="#FDE047"/>
    <polygon points="40,0 30,25 50,25" fill="#FDE047"/>
    <circle cx="40" cy="5" r="3" fill="#FBBF24"/>
    <!-- Angel on top -->
    <ellipse cx="40" cy="-5" rx="4" ry="5" fill="white"/>
    <line x1="36" y1="-5" x2="32" y2="-10" stroke="white" stroke-width="1"/>
    <line x1="44" y1="-5" x2="48" y2="-10" stroke="white" stroke-width="1"/>
    <!-- Wall towers -->
    <rect x="0" y="40" width="15" height="40" fill="#D4D4D8"/>
    <rect x="65" y="40" width="15" height="40" fill="#D4D4D8"/>
  </g>

  <!-- Ship (Shtandart style) -->
  <g transform="translate(150, 85)">
    <!-- Hull -->
    <path d="M 0 25 Q 10 35 50 35 Q 90 35 100 25 L 95 15 L 5 15 Z" fill="url(#shipGrad)"/>
    <!-- Deck -->
    <rect x="10" y="15" width="80" height="5" fill="#92400E"/>
    <!-- Masts -->
    <line x1="35" y1="15" x2="35" y2="-30" stroke="#78350F" stroke-width="4"/>
    <line x1="65" y1="15" x2="65" y2="-25" stroke="#78350F" stroke-width="4"/>
    <!-- Sails -->
    <polygon points="35,-25 35,5 60,5" fill="#FEF3C7"/>
    <polygon points="65,-20 65,5 50,5" fill="#FEF3C7"/>
    <polygon points="35,-20 35,-5 55,-5" fill="#FDE047" opacity="0.8"/>
    <!-- Flag -->
    <polygon points="65,-25 85,-20 65,-15" fill="#DC2626"/>
    <polygon points="65,-15 85,-10 65,-5" fill="#DC2626"/>
    <line x1="65" y1="-5" x2="65" y2="5" stroke="#DC2626" stroke-width="3"/>
    <!-- Cannons -->
    <g fill="#1F2937">
      <rect x="15" y="18" width="8" height="3" rx="1"/>
      <rect x="30" y="18" width="8" height="3" rx="1"/>
      <rect x="60" y="18" width="8" height="3" rx="1"/>
      <rect x="75" y="18" width="8" height="3" rx="1"/>
    </g>
  </g>

  <!-- Peter I -->
  <g transform="translate(5, 45)">
    <!-- Body -->
    <ellipse cx="25" cy="50" rx="15" ry="22" fill="#1E40AF"/>
    <!-- Coat -->
    <ellipse cx="25" cy="48" rx="12" ry="18" fill="#1E3A8A"/>
    <!-- Buttons -->
    <circle cx="25" cy="40" r="2" fill="#FDE047"/>
    <circle cx="25" cy="48" r="2" fill="#FDE047"/>
    <circle cx="25" cy="56" r="2" fill="#FDE047"/>
    <!-- Face -->
    <circle cx="25" cy="18" r="12" fill="#FBBF24"/>
    <!-- Eyes -->
    <circle cx="22" cy="16" r="2" fill="#1F2937"/>
    <circle cx="28" cy="16" r="2" fill="#1F2937"/>
    <!-- Mustache -->
    <path d="M 20 22 Q 25 25 30 22" stroke="#57534E" stroke-width="2" fill="none"/>
    <!-- Wig -->
    <ellipse cx="25" cy="8" rx="14" ry="8" fill="#57534E"/>
    <ellipse cx="12" cy="12" rx="5" ry="8" fill="#6B7280"/>
    <ellipse cx="38" cy="12" rx="5" ry="8" fill="#6B7280"/>
    <!-- Hat -->
    <ellipse cx="25" cy="-2" rx="15" ry="5" fill="#1F2937"/>
    <rect x="12" y="-12" width="26" height="12" fill="#1F2937"/>
    <!-- Axe/Compass (shipbuilding) -->
    <line x1="45" y1="35" x2="55" y2="55" stroke="#78350F" stroke-width="3"/>
    <polygon points="45,35 40,30 50,30" fill="#71717A"/>
    <!-- Imperator sash -->
    <line x1="15" y1="35" x2="35" y2="60" stroke="#FDE047" stroke-width="4"/>
  </g>

  <!-- Scroll with plans -->
  <g transform="translate(230, 20)">
    <rect x="0" y="0" width="50" height="35" rx="3" fill="#FEF3C7"/>
    <circle cx="5" cy="5" r="6" fill="#D97706"/>
    <circle cx="5" cy="30" r="6" fill="#D97706"/>
    <!-- Map lines -->
    <line x1="12" y1="10" x2="45" y2="10" stroke="#78350F" stroke-width="1"/>
    <line x1="12" y1="18" x2="40" y2="18" stroke="#78350F" stroke-width="1"/>
    <line x1="12" y1="26" x2="45" y2="26" stroke="#78350F" stroke-width="1"/>
    <!-- Compass rose -->
    <polygon points="30,17 33,22 30,27 27,22" fill="#DC2626"/>
  </g>

  <!-- Year and text -->
  <g transform="translate(110, 145)">
    <rect x="0" y="0" width="80" height="25" rx="5" fill="white" opacity="0.15"/>
    <text x="40" y="17" font-family="Georgia, serif" font-size="12" fill="white" text-anchor="middle" font-weight="bold">1703</text>
  </g>

  <!-- Title hint -->
  <text x="150" y="195" font-family="Georgia, serif" font-size="10" fill="#1E40AF" text-anchor="middle" font-style="italic">Пётр I. Санкт-Петербург</text>
</svg>