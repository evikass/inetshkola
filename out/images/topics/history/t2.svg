<svg viewBox="0 0 300 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="greeceSky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7DD3FC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#BAE6FD;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="marbleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FEF3C7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D4D4D8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="seaGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E40AF;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect x="0" y="0" width="300" height="140" fill="url(#greeceSky)"/>

  <!-- Clouds -->
  <g fill="white" opacity="0.8">
    <ellipse cx="50" cy="30" rx="25" ry="12"/>
    <ellipse cx="70" cy="25" rx="20" ry="10"/>
    <ellipse cx="35" cy="28" rx="15" ry="8"/>
    <ellipse cx="240" cy="40" rx="30" ry="15"/>
    <ellipse cx="265" cy="35" rx="20" ry="10"/>
  </g>

  <!-- Sea -->
  <rect x="0" y="140" width="300" height="60" fill="url(#seaGrad)"/>
  <!-- Waves -->
  <g stroke="#60A5FA" stroke-width="2" fill="none" opacity="0.5">
    <path d="M 0 150 Q 20 145 40 150 Q 60 155 80 150 Q 100 145 120 150"/>
    <path d="M 130 155 Q 150 150 170 155 Q 190 160 210 155 Q 230 150 250 155 Q 270 160 290 155"/>
  </g>

  <!-- Acropolis/Parthenon -->
  <g transform="translate(80, 50)">
    <!-- Base/Steps -->
    <rect x="0" y="85" width="140" height="8" fill="#D4D4D8"/>
    <rect x="5" y="78" width="130" height="8" fill="#E4E4E7"/>
    <rect x="10" y="72" width="120" height="7" fill="#D4D4D8"/>

    <!-- Columns -->
    <g fill="url(#marbleGrad)" stroke="#A1A1AA" stroke-width="1">
      <!-- Left columns -->
      <rect x="15" y="20" width="10" height="52" rx="1"/>
      <rect x="35" y="20" width="10" height="52" rx="1"/>
      <rect x="55" y="20" width="10" height="52" rx="1"/>
      <!-- Right columns -->
      <rect x="75" y="20" width="10" height="52" rx="1"/>
      <rect x="95" y="20" width="10" height="52" rx="1"/>
      <rect x="115" y="20" width="10" height="52" rx="1"/>
    </g>

    <!-- Column capitals (top) -->
    <g fill="#FEF3C7">
      <rect x="13" y="15" width="14" height="7" rx="2"/>
      <rect x="33" y="15" width="14" height="7" rx="2"/>
      <rect x="53" y="15" width="14" height="7" rx="2"/>
      <rect x="73" y="15" width="14" height="7" rx="2"/>
      <rect x="93" y="15" width="14" height="7" rx="2"/>
      <rect x="113" y="15" width="14" height="7" rx="2"/>
    </g>

    <!-- Pediment (triangular roof) -->
    <polygon points="70,0 0,20 140,20" fill="#FEF3C7" stroke="#D4D4D8" stroke-width="1"/>
    <!-- Pediment decoration -->
    <circle cx="70" cy="10" r="5" fill="#F59E0B" opacity="0.6"/>

    <!-- Entablature -->
    <rect x="10" y="20" width="120" height="5" fill="#E4E4E7"/>
  </g>

  <!-- Olive branch (wreath) -->
  <g transform="translate(20, 60)">
    <ellipse cx="25" cy="25" rx="22" ry="22" fill="none" stroke="#22C55E" stroke-width="3"/>
    <ellipse cx="25" cy="25" rx="18" ry="18" fill="none" stroke="#16A34A" stroke-width="2"/>
    <!-- Olive leaves -->
    <g fill="#22C55E">
      <ellipse cx="25" cy="5" rx="3" ry="6" transform="rotate(0, 25, 5)"/>
      <ellipse cx="40" cy="10" rx="3" ry="6" transform="rotate(45, 40, 10)"/>
      <ellipse cx="45" cy="25" rx="3" ry="6" transform="rotate(90, 45, 25)"/>
      <ellipse cx="40" cy="40" rx="3" ry="6" transform="rotate(135, 40, 40)"/>
      <ellipse cx="25" cy="45" rx="3" ry="6" transform="rotate(180, 25, 45)"/>
      <ellipse cx="10" cy="40" rx="3" ry="6" transform="rotate(225, 10, 40)"/>
      <ellipse cx="5" cy="25" rx="3" ry="6" transform="rotate(270, 5, 25)"/>
      <ellipse cx="10" cy="10" rx="3" ry="6" transform="rotate(315, 10, 10)"/>
    </g>
    <!-- Olives -->
    <circle cx="32" cy="8" r="3" fill="#166534"/>
    <circle cx="42" cy="32" r="3" fill="#166534"/>
    <circle cx="18" cy="42" r="3" fill="#166534"/>
    <circle cx="8" cy="18" r="3" fill="#166534"/>
  </g>

  <!-- Amphora (vase) -->
  <g transform="translate(250, 80)">
    <ellipse cx="20" cy="60" rx="15" ry="5" fill="#DC2626"/>
    <path d="M 5 25 Q 0 45 10 55 Q 15 60 20 60 Q 25 60 30 55 Q 40 45 35 25 Q 30 15 20 15 Q 10 15 5 25" fill="#DC2626"/>
    <!-- Handles -->
    <path d="M 5 30 Q -5 35 0 45 Q 5 40 5 35" fill="none" stroke="#B91C1C" stroke-width="3"/>
    <path d="M 35 30 Q 45 35 40 45 Q 35 40 35 35" fill="none" stroke="#B91C1C" stroke-width="3"/>
    <!-- Neck -->
    <rect x="14" y="5" width="12" height="12" fill="#DC2626"/>
    <ellipse cx="20" cy="5" rx="8" ry="3" fill="#B91C1C"/>
    <!-- Decoration -->
    <line x1="8" y1="35" x2="32" y2="35" stroke="#FBBF24" stroke-width="2"/>
    <ellipse cx="20" cy="45" rx="8" ry="4" fill="none" stroke="#FBBF24" stroke-width="1.5"/>
  </g>

  <!-- Greek helmet -->
  <g transform="translate(240, 20)">
    <path d="M 25 5 Q 5 10 5 30 Q 5 45 15 50 L 35 50 Q 45 45 45 30 Q 45 10 25 5" fill="#71717A"/>
    <path d="M 10 30 Q 5 35 8 45 Q 12 40 15 35" fill="#A1A1AA"/>
    <!-- Plume holder -->
    <rect x="23" y="0" width="4" height="8" fill="#52525B"/>
    <!-- Plume -->
    <path d="M 25 0 Q 20 -10 25 -15 Q 30 -10 25 0" fill="#DC2626"/>
    <!-- Eye holes -->
    <ellipse cx="15" cy="32" rx="5" ry="3" fill="#1F2937"/>
    <ellipse cx="35" cy="32" rx="5" ry="3" fill="#1F2937"/>
  </g>

  <!-- Temple at background (small) -->
  <g transform="translate(5, 90)" opacity="0.4">
    <rect x="0" y="20" width="50" height="30" fill="#D4D4D8"/>
    <polygon points="25,5 0,20 50,20" fill="#E4E4E7"/>
    <rect x="8" y="20" width="5" height="15" fill="#FEF3C7"/>
    <rect x="22" y="20" width="5" height="15" fill="#FEF3C7"/>
    <rect x="37" y="20" width="5" height="15" fill="#FEF3C7"/>
  </g>

  <!-- Owl (Athena's symbol) -->
  <g transform="translate(280, 135)">
    <ellipse cx="10" cy="12" rx="8" ry="10" fill="#78350F"/>
    <circle cx="7" cy="8" r="3" fill="#FDE047"/>
    <circle cx="13" cy="8" r="3" fill="#FDE047"/>
    <circle cx="7" cy="8" r="1.5" fill="#1F2937"/>
    <circle cx="13" cy="8" r="1.5" fill="#1F2937"/>
    <polygon points="10,12 7,15 13,15" fill="#D97706"/>
  </g>

  <!-- Mountains in background -->
  <polygon points="0,140 40,100 80,140" fill="#A1A1AA" opacity="0.3"/>
  <polygon points="60,140 100,95 140,140" fill="#D4D4D8" opacity="0.3"/>

  <!-- Boat on sea -->
  <g transform="translate(150, 155)">
    <path d="M 0 10 Q 10 0 30 10 Q 50 20 40 15 L 0 15 Z" fill="#78350F"/>
    <line x1="20" y1="10" x2="20" y2="-10" stroke="#78350F" stroke-width="2"/>
    <polygon points="20,-10 35,0 20,5" fill="#FEF3C7"/>
  </g>

  <!-- Title hint -->
  <text x="150" y="195" font-family="Georgia, serif" font-size="10" fill="#1E40AF" text-anchor="middle" font-style="italic">Древняя Греция</text>
</svg>