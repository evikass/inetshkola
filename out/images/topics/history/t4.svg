<svg viewBox="0 0 300 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="medievalSky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#818CF8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="castleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6B7280;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#374151;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bannerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#DC2626;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#991B1B;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect x="0" y="0" width="300" height="130" fill="url(#medievalSky)"/>

  <!-- Stars -->
  <g fill="white" opacity="0.6">
    <circle cx="30" cy="25" r="1"/>
    <circle cx="60" cy="15" r="1.5"/>
    <circle cx="100" cy="30" r="1"/>
    <circle cx="150" cy="20" r="1.5"/>
    <circle cx="200" cy="25" r="1"/>
    <circle cx="250" cy="15" r="1.5"/>
    <circle cx="280" cy="35" r="1"/>
  </g>

  <!-- Moon -->
  <circle cx="260" cy="40" r="20" fill="#FEF3C7"/>
  <circle cx="268" cy="35" r="18" fill="url(#medievalSky)"/>

  <!-- Ground -->
  <rect x="0" y="130" width="300" height="70" fill="#365314"/>
  <ellipse cx="150" cy="130" rx="200" ry="15" fill="#4D7C0F"/>

  <!-- Castle -->
  <g transform="translate(60, 30)">
    <!-- Main wall -->
    <rect x="0" y="50" width="180" height="60" fill="url(#castleGrad)"/>

    <!-- Left tower -->
    <rect x="-10" y="20" width="40" height="90" fill="#4B5563"/>
    <!-- Tower top (battlements) -->
    <rect x="-15" y="15" width="10" height="10" fill="#4B5563"/>
    <rect x="5" y="15" width="10" height="10" fill="#4B5563"/>
    <rect x="-5" y="5" width="30" height="15" fill="#6B7280"/>
    <!-- Tower window -->
    <rect x="5" y="40" width="10" height="20" rx="5" fill="#1F2937"/>

    <!-- Right tower -->
    <rect x="150" y="20" width="40" height="90" fill="#4B5563"/>
    <!-- Tower top (battlements) -->
    <rect x="145" y="15" width="10" height="10" fill="#4B5563"/>
    <rect x="165" y="15" width="10" height="10" fill="#4B5563"/>
    <rect x="155" y="5" width="30" height="15" fill="#6B7280"/>
    <!-- Tower window -->
    <rect x="165" y="40" width="10" height="20" rx="5" fill="#1F2937"/>

    <!-- Main gate -->
    <rect x="70" y="70" width="40" height="40" rx="20" fill="#1F2937"/>
    <!-- Gate details -->
    <line x1="90" y1="70" x2="90" y2="110" stroke="#374151" stroke-width="2"/>
    <circle cx="82" cy="95" r="2" fill="#F59E0B"/>
    <circle cx="98" cy="95" r="2" fill="#F59E0B"/>

    <!-- Battlements on wall -->
    <g fill="#6B7280">
      <rect x="40" y="45" width="8" height="10"/>
      <rect x="55" y="45" width="8" height="10"/>
      <rect x="120" y="45" width="8" height="10"/>
      <rect x="135" y="45" width="8" height="10"/>
    </g>

    <!-- Windows -->
    <rect x="30" y="70" width="8" height="15" rx="4" fill="#1F2937"/>
    <rect x="145" y="70" width="8" height="15" rx="4" fill="#1F2937"/>
  </g>

  <!-- Knight on horse -->
  <g transform="translate(10, 120)">
    <!-- Horse body -->
    <ellipse cx="35" cy="15" rx="25" ry="10" fill="#78350F"/>
    <!-- Horse head -->
    <ellipse cx="60" cy="8" rx="10" ry="6" fill="#92400E"/>
    <circle cx="65" cy="6" r="2" fill="#1F2937"/>
    <!-- Horse legs -->
    <rect x="15" y="20" width="4" height="15" fill="#78350F"/>
    <rect x="30" y="20" width="4" height="15" fill="#78350F"/>
    <rect x="45" y="20" width="4" height="15" fill="#78350F"/>
    <rect x="55" y="20" width="4" height="12" fill="#78350F"/>
    <!-- Tail -->
    <path d="M 10 15 Q 0 20 5 30" stroke="#57534E" stroke-width="3" fill="none"/>
    <!-- Knight body -->
    <ellipse cx="35" cy="0" rx="8" ry="10" fill="#6B7280"/>
    <!-- Knight head (helmet) -->
    <circle cx="35" cy="-12" r="7" fill="#9CA3AF"/>
    <rect x="30" y="-8" width="10" height="3" fill="#1F2937"/>
    <!-- Plume -->
    <path d="M 35 -18 L 35 -25" stroke="#DC2626" stroke-width="3"/>
    <ellipse cx="35" cy="-27" rx="3" ry="4" fill="#DC2626"/>
    <!-- Lance -->
    <line x1="45" y1="-5" x2="80" y2="-30" stroke="#D97706" stroke-width="3"/>
    <polygon points="80,-30 75,-25 85,-28" fill="#DC2626"/>
    <!-- Shield -->
    <ellipse cx="25" cy="0" rx="8" ry="12" fill="#DC2626"/>
    <path d="M 22 -5 L 28 -5 L 25 8 Z" fill="#FDE047"/>
  </g>

  <!-- Sword -->
  <g transform="translate(240, 60)">
    <rect x="15" y="0" width="4" height="50" fill="#D4D4D8"/>
    <rect x="8" y="48" width="18" height="6" fill="#F59E0B"/>
    <circle cx="17" cy="55" r="4" fill="#78350F"/>
    <polygon points="17,0 12,-15 17,-12 22,-15" fill="#D4D4D8"/>
  </g>

  <!-- Crown -->
  <g transform="translate(240, 10)">
    <path d="M 5 25 L 5 10 L 15 18 L 25 5 L 35 18 L 45 10 L 45 25 Z" fill="#FDE047"/>
    <circle cx="15" cy="18" r="3" fill="#EF4444"/>
    <circle cx="25" cy="12" r="3" fill="#3B82F6"/>
    <circle cx="35" cy="18" r="3" fill="#22C55E"/>
    <rect x="5" y="25" width="40" height="5" fill="#D97706"/>
  </g>

  <!-- Scroll -->
  <g transform="translate(200, 100)">
    <rect x="0" y="5" width="35" height="45" fill="#FEF3C7"/>
    <circle cx="5" cy="5" r="8" fill="#D97706"/>
    <circle cx="5" cy="50" r="8" fill="#D97706"/>
    <rect x="3" y="0" width="4" height="55" fill="#B45309"/>
    <!-- Text lines -->
    <line x1="12" y1="15" x2="32" y2="15" stroke="#78350F" stroke-width="1"/>
    <line x1="12" y1="22" x2="30" y2="22" stroke="#78350F" stroke-width="1"/>
    <line x1="12" y1="29" x2="32" y2="29" stroke="#78350F" stroke-width="1"/>
    <line x1="12" y1="36" x2="28" y2="36" stroke="#78350F" stroke-width="1"/>
    <!-- Seal -->
    <circle cx="25" cy="42" r="5" fill="#DC2626"/>
  </g>

  <!-- Dragon silhouette (small) -->
  <g transform="translate(280, 50)" opacity="0.3">
    <path d="M 0 20 Q 5 10 15 15 Q 20 10 25 15 L 30 5 L 25 15 Q 30 20 25 25 Q 20 30 10 25 Q 5 30 0 25 Z" fill="#1F2937"/>
  </g>

  <!-- Trees -->
  <g transform="translate(50, 125)">
    <rect x="8" y="5" width="4" height="15" fill="#78350F"/>
    <polygon points="10,0 0,15 20,15" fill="#166534"/>
  </g>
  <g transform="translate(170, 120)">
    <rect x="8" y="5" width="4" height="15" fill="#78350F"/>
    <polygon points="10,0 0,15 20,15" fill="#15803D"/>
  </g>

  <!-- Title hint -->
  <text x="150" y="195" font-family="Georgia, serif" font-size="10" fill="#4D7C0F" text-anchor="middle" font-style="italic">Средневековье</text>
</svg>