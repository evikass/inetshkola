<svg viewBox="0 0 300 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="napoleonSky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6B7280;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9CA3AF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="snowGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FEF3C7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E5E7EB;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="fireRed" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#EF4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F97316;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Sky with snow -->
  <rect x="0" y="0" width="300" height="130" fill="url(#napoleonSky)"/>

  <!-- Snowflakes -->
  <g fill="white" opacity="0.8">
    <circle cx="30" cy="20" r="2"/>
    <circle cx="60" cy="35" r="1.5"/>
    <circle cx="100" cy="15" r="2"/>
    <circle cx="150" cy="40" r="1.5"/>
    <circle cx="200" cy="25" r="2"/>
    <circle cx="250" cy="45" r="1.5"/>
    <circle cx="280" cy="20" r="2"/>
    <circle cx="45" cy="55" r="1"/>
    <circle cx="120" cy="50" r="1"/>
    <circle cx="180" cy="30" r="1"/>
    <circle cx="230" cy="60" r="1"/>
  </g>

  <!-- Snowy ground -->
  <rect x="0" y="130" width="300" height="70" fill="url(#snowGrad)"/>

  <!-- Moscow burning in distance -->
  <g transform="translate(180, 40)" opacity="0.4">
    <!-- Buildings silhouette -->
    <rect x="0" y="50" width="30" height="30" fill="#78350F"/>
    <rect x="40" y="40" width="25" height="40" fill="#78350F"/>
    <polygon points="52,25 40,40 65,40" fill="#92400E"/>
    <!-- Fire/smoke -->
    <ellipse cx="15" cy="40" rx="15" ry="20" fill="#EF4444" opacity="0.5"/>
    <ellipse cx="52" cy="30" rx="20" ry="25" fill="#F97316" opacity="0.4"/>
    <ellipse cx="30" cy="20" rx="25" ry="15" fill="#6B7280" opacity="0.5"/>
  </g>

  <!-- Russian soldiers -->
  <g transform="translate(20, 85)">
    <!-- Soldier 1 -->
    <ellipse cx="15" cy="35" rx="10" ry="15" fill="#1E40AF"/>
    <rect x="8" y="40" width="14" height="15" fill="#1E40AF"/>
    <circle cx="15" cy="18" r="8" fill="#FBBF24"/>
    <!-- Hat (shako) -->
    <rect x="10" y="8" width="10" height="12" fill="#1F2937"/>
    <ellipse cx="15" cy="6" rx="6" ry="3" fill="#1F2937"/>
    <!-- Musket -->
    <line x1="28" y1="20" x2="28" y2="55" stroke="#78350F" stroke-width="3"/>
    <rect x="24" y="48" width="8" height="5" fill="#6B7280"/>
  </g>

  <!-- Cossack -->
  <g transform="translate(60, 90)">
    <!-- Body -->
    <ellipse cx="15" cy="30" rx="10" ry="15" fill="#DC2626"/>
    <rect x="7" y="35" width="16" height="12" fill="#1F2937"/>
    <circle cx="15" cy="15" r="7" fill="#FBBF24"/>
    <!-- Papakha (hat) -->
    <ellipse cx="15" cy="7" rx="8" ry="4" fill="#1F2937"/>
    <rect x="9" y="2" width="12" height="6" fill="#374151"/>
    <!-- Lance -->
    <line x1="28" y1="10" x2="28" y2="50" stroke="#78350F" stroke-width="2"/>
    <polygon points="28,10 25,0 31,0" fill="#DC2626"/>
  </g>

  <!-- Kutuzov -->
  <g transform="translate(100, 75)">
    <!-- Body -->
    <ellipse cx="20" cy="45" rx="15" ry="22" fill="#1F2937"/>
    <ellipse cx="20" cy="42" rx="12" ry="18" fill="#374151"/>
    <!-- Face -->
    <circle cx="20" cy="18" r="12" fill="#FBBF24"/>
    <!-- Eye patch -->
    <ellipse cx="15" cy="16" rx="5" ry="4" fill="#1F2937"/>
    <circle cx="25" cy="16" r="2" fill="#1F2937"/>
    <!-- Hat -->
    <ellipse cx="20" cy="5" rx="14" ry="6" fill="#1F2937"/>
    <rect x="8" y="-5" width="24" height="12" fill="#374151"/>
    <!-- Epaulettes -->
    <ellipse cx="8" cy="30" rx="6" ry="4" fill="#FDE047"/>
    <ellipse cx="32" cy="30" rx="6" ry="4" fill="#FDE047"/>
    <!-- Order -->
    <circle cx="20" cy="35" r="5" fill="#FDE047"/>
    <circle cx="20" cy="35" r="3" fill="#EF4444"/>
    <!-- Telescope -->
    <line x1="38" y1="25" x2="55" y2="15" stroke="#6B7280" stroke-width="4"/>
    <circle cx="57" cy="14" r="5" fill="#6B7280"/>
  </g>

  <!-- Retreating French -->
  <g transform="translate(230, 95)" opacity="0.6">
    <!-- Soldier in cold -->
    <ellipse cx="12" cy="25" rx="8" ry="12" fill="#1E40AF"/>
    <circle cx="12" cy="10" r="7" fill="#FBBF24" opacity="0.7"/>
    <!-- Shako -->
    <rect x="6" y="0" width="12" height="12" fill="#1F2937"/>
    <!-- Wrapping in coat -->
    <path d="M 5 20 Q 0 30 5 35" stroke="#1E40AF" stroke-width="3" fill="none"/>
    <!-- Broken flag -->
    <line x1="25" y1="5" x2="25" y2="40" stroke="#78350F" stroke-width="2"/>
    <polygon points="25,5 35,10 25,15" fill="#EF4444" opacity="0.5"/>
  </g>

  <!-- Napoleon silhouette (small, retreating) -->
  <g transform="translate(270, 100)" opacity="0.4">
    <ellipse cx="10" cy="20" rx="6" ry="10" fill="#1E40AF"/>
    <circle cx="10" cy="8" r="5" fill="#FBBF24"/>
    <!-- Bicorne hat -->
    <ellipse cx="10" cy="3" rx="8" ry="3" fill="#1F2937" transform="rotate(15, 10, 3)"/>
  </g>

  <!-- Cannon -->
  <g transform="translate(150, 130)">
    <ellipse cx="20" cy="10" rx="15" ry="8" fill="#374151"/>
    <rect x="0" y="6" width="40" height="8" fill="#6B7280"/>
    <circle cx="10" cy="18" r="5" fill="#78350F"/>
    <circle cx="30" cy="18" r="5" fill="#78350F"/>
    <!-- Cannon barrel -->
    <ellipse cx="45" cy="10" rx="8" ry="5" fill="#4B5563"/>
    <rect x="35" y="7" width="20" height="6" fill="#6B7280"/>
  </g>

  <!-- Year -->
  <g transform="translate(130, 5)">
    <rect x="0" y="0" width="50" height="22" rx="5" fill="#DC2626" opacity="0.7"/>
    <text x="25" y="16" font-family="Georgia, serif" font-size="12" fill="white" text-anchor="middle" font-weight="bold">1812</text>
  </g>

  <!-- Title hint -->
  <text x="150" y="195" font-family="Georgia, serif" font-size="10" fill="#1E40AF" text-anchor="middle" font-style="italic">Отечественная война 1812</text>
</svg>