<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bgsoc" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5d4037"/>
      <stop offset="100%" style="stop-color:#6d4c41"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bgsoc)"/>
  
  <!-- Люди -->
  <circle cx="200" cy="200" r="30" fill="#ffcc80"/>
  <rect x="175" y="230" width="50" height="80" rx="10" fill="#90caf9"/>
  
  <circle cx="350" cy="200" r="30" fill="#ffcc80"/>
  <rect x="325" y="230" width="50" height="80" rx="10" fill="#ce93d8"/>
  
  <circle cx="500" cy="200" r="30" fill="#ffcc80"/>
  <rect x="475" y="230" width="50" height="80" rx="10" fill="#a5d6a7"/>
  
  <!-- Связи между людьми -->
  <line x1="230" y1="200" x2="320" y2="200" stroke="#ffffff" stroke-width="2" stroke-dasharray="5,5" opacity="0.5"/>
  <line x1="380" y1="200" x2="470" y2="200" stroke="#ffffff" stroke-width="2" stroke-dasharray="5,5" opacity="0.5"/>
  
  <!-- Здание (парламент) -->
  <rect x="580" y="180" width="150" height="100" fill="#8d6e63" opacity="0.5"/>
  <polygon points="580,180 655,120 730,180" fill="#a1887f" opacity="0.5"/>
  <rect x="640" y="220" width="30" height="60" fill="#5d4037" opacity="0.6"/>
  
  <!-- Весы (право) -->
  <g transform="translate(150, 400)">
    <line x1="0" y1="0" x2="100" y2="0" stroke="#d7ccc8" stroke-width="4"/>
    <line x1="50" y1="-50" x2="50" y2="0" stroke="#d7ccc8" stroke-width="3"/>
    <polygon points="0,0 -10,30 10,30" fill="#bcaaa4" opacity="0.7"/>
    <polygon points="100,0 90,30 110,30" fill="#bcaaa4" opacity="0.7"/>
  </g>
  
  <!-- Деньги (экономика) -->
  <text x="550" y="420" font-family="Georgia, serif" font-size="40" fill="#a1887f" opacity="0.6">₽$€</text>
  
  <text x="400" y="480" text-anchor="middle" font-family="Georgia, serif" font-size="24" font-weight="bold" fill="#ffffff">Обществознание</text>
</svg>