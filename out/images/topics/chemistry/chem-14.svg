<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="gasGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e0e7ff"/>
      <stop offset="100%" style="stop-color:#c7d2fe"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="300" fill="#f8fafc"/>
  
  <!-- Container with piston -->
  <rect x="60" y="80" width="200" height="120" rx="5" fill="url(#gasGrad)" stroke="#64748b" stroke-width="2"/>
  
  <!-- Piston -->
  <rect x="210" y="70" width="40" height="140" fill="#94a3b8" stroke="#64748b" stroke-width="2"/>
  <rect x="220" y="50" width="20" height="30" fill="#64748b"/>
  
  <!-- Gas particles -->
  <circle cx="90" cy="100" r="6" fill="#8b5cf6" opacity="0.8"/>
  <circle cx="130" cy="120" r="6" fill="#8b5cf6" opacity="0.8"/>
  <circle cx="170" cy="100" r="6" fill="#8b5cf6" opacity="0.8"/>
  <circle cx="110" cy="150" r="6" fill="#8b5cf6" opacity="0.8"/>
  <circle cx="150" cy="170" r="6" fill="#8b5cf6" opacity="0.8"/>
  <circle cx="190" cy="140" r="6" fill="#8b5cf6" opacity="0.8"/>
  
  <!-- Motion arrows -->
  <path d="M90 110 L90 130" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#garrow)"/>
  <path d="M130 130 L130 110" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#garrow)"/>
  <path d="M170 110 L170 130" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#garrow)"/>
  
  <!-- Pressure arrows -->
  <path d="M230 120 L260 120" stroke="#ef4444" stroke-width="2" marker-end="url(#parrow)"/>
  <path d="M230 150 L260 150" stroke="#ef4444" stroke-width="2" marker-end="url(#parrow)"/>
  <text x="290" y="140" font-family="Arial, sans-serif" font-size="12" fill="#ef4444">P</text>
  
  <!-- Formulas -->
  <rect x="290" y="80" width="100" height="40" rx="5" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="340" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#92400e">PV = nRT</text>
  
  <rect x="290" y="130" width="100" height="40" rx="5" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="340" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1e40af">V₁/T₁ = V₂/T₂</text>
  
  <rect x="290" y="180" width="100" height="40" rx="5" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="340" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#166534">P₁V₁ = P₂V₂</text>
  
  <!-- Temperature indicator -->
  <g transform="translate(60, 220)">
    <rect x="0" y="0" width="180" height="20" rx="10" fill="#e2e8f0"/>
    <rect x="0" y="0" width="60" height="20" rx="10" fill="#3b82f6"/>
    <text x="30" y="14" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">холодно</text>
    <text x="90" y="14" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#475569">T</text>
    <text x="150" y="14" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#ef4444">горячо</text>
  </g>
  
  <!-- Title -->
  <text x="160" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#475569">Газовые законы</text>
  
  <defs>
    <marker id="garrow" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <polygon points="0 0, 6 3, 0 6" fill="#a78bfa"/>
    </marker>
    <marker id="parrow" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <polygon points="0 0, 6 3, 0 6" fill="#ef4444"/>
    </marker>
  </defs>
</svg>