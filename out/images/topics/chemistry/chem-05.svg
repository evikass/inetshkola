<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="reactantGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <linearGradient id="productGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#14b8a6"/>
      <stop offset="100%" style="stop-color:#2dd4bf"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="300" fill="#f8fafc"/>
  
  <!-- Reactants box -->
  <rect x="20" y="80" width="130" height="80" rx="10" fill="url(#reactantGrad)" opacity="0.2" stroke="#8b5cf6" stroke-width="2"/>
  <text x="85" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#6d28d9">2H<tspan font-size="12" baseline-shift="sub">2</tspan></text>
  <text x="85" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#7c3aed">водород</text>
  
  <!-- Plus sign -->
  <text x="175" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" fill="#64748b">+</text>
  
  <!-- Oxygen box -->
  <rect x="200" y="80" width="70" height="80" rx="10" fill="url(#reactantGrad)" opacity="0.2" stroke="#8b5cf6" stroke-width="2"/>
  <text x="235" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#6d28d9">O<tspan font-size="12" baseline-shift="sub">2</tspan></text>
  <text x="235" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#7c3aed">кислород</text>
  
  <!-- Arrow -->
  <path d="M120 200 L280 200" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
  <defs><marker id="arrow" markerWidth="12" markerHeight="8" refX="10" refY="4" orient="auto">
    <polygon points="0 0, 12 4, 0 8" fill="#475569"/>
  </marker></defs>
  <text x="200" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#64748b">реакция</text>
  
  <!-- Product box -->
  <rect x="130" y="240" width="140" height="50" rx="10" fill="url(#productGrad)" opacity="0.2" stroke="#14b8a6" stroke-width="2"/>
  <text x="200" y="268" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#0f766e">2H<tspan font-size="12" baseline-shift="sub">2</tspan>O</text>
  <text x="280" y="268" font-family="Arial, sans-serif" font-size="14" fill="#14b8a6">вода</text>
  
  <!-- Flame indicator -->
  <g transform="translate(180, 160)">
    <ellipse cx="20" cy="20" rx="15" ry="20" fill="#fbbf24"/>
    <ellipse cx="20" cy="18" rx="10" ry="15" fill="#fde047"/>
    <ellipse cx="20" cy="15" rx="5" ry="8" fill="#fef3c7"/>
  </g>
  <text x="200" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#475569">Химическая реакция</text>
  
  <!-- Energy indicator -->
  <text x="320" y="180" font-family="Arial, sans-serif" font-size="11" fill="#d97706">+ энергия</text>
</svg>