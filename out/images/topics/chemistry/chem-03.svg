<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <radialGradient id="nucleusGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#b91c1c"/>
    </radialGradient>
    <radialGradient id="electronGrad" cx="30%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="300" fill="#f8fafc"/>
  
  <!-- Electron orbits -->
  <ellipse cx="200" cy="150" rx="120" ry="45" fill="none" stroke="#c7d2fe" stroke-width="2" stroke-dasharray="5,3"/>
  <ellipse cx="200" cy="150" rx="80" ry="120" fill="none" stroke="#c7d2fe" stroke-width="2" stroke-dasharray="5,3" transform="rotate(60, 200, 150)"/>
  <ellipse cx="200" cy="150" rx="80" ry="120" fill="none" stroke="#c7d2fe" stroke-width="2" stroke-dasharray="5,3" transform="rotate(-60, 200, 150)"/>
  
  <!-- Nucleus -->
  <circle cx="200" cy="150" r="35" fill="url(#nucleusGrad)"/>
  <!-- Protons and neutrons -->
  <circle cx="190" cy="140" r="10" fill="#fca5a5"/>
  <circle cx="210" cy="145" r="10" fill="#fca5a5"/>
  <circle cx="195" cy="160" r="10" fill="#fca5a5"/>
  <circle cx="205" cy="155" r="10" fill="#fef3c7"/>
  <circle cx="185" cy="158" r="10" fill="#fef3c7"/>
  
  <!-- Electrons -->
  <circle cx="320" cy="150" r="12" fill="url(#electronGrad)"/>
  <circle cx="80" cy="150" r="12" fill="url(#electronGrad)"/>
  <circle cx="260" cy="60" r="12" fill="url(#electronGrad)"/>
  <circle cx="140" cy="240" r="12" fill="url(#electronGrad)"/>
  <circle cx="260" cy="240" r="12" fill="url(#electronGrad)"/>
  <circle cx="140" cy="60" r="12" fill="url(#electronGrad)"/>
  
  <!-- Labels -->
  <text x="200" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">ядро</text>
  
  <!-- Legend -->
  <g transform="translate(20, 20)">
    <circle cx="10" cy="10" r="8" fill="#ef4444"/>
    <text x="25" y="14" font-family="Arial, sans-serif" font-size="11" fill="#475569">p+ протон</text>
    <circle cx="10" cy="30" r="8" fill="#fde047"/>
    <text x="25" y="34" font-family="Arial, sans-serif" font-size="11" fill="#475569">n⁰ нейтрон</text>
    <circle cx="10" cy="50" r="8" fill="#3b82f6"/>
    <text x="25" y="54" font-family="Arial, sans-serif" font-size="11" fill="#475569">e⁻ электрон</text>
  </g>
  
  <!-- Title -->
  <text x="200" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#475569">Строение атома</text>
</svg>