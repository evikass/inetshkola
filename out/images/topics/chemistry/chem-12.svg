<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="waterGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="300" fill="#f8fafc"/>
  
  <!-- Beaker -->
  <path d="M100 80 L100 220 Q100 240 120 240 L280 240 Q300 240 300 220 L300 80 Z" 
        fill="url(#waterGrad)" opacity="0.3" stroke="#94a3b8" stroke-width="2"/>
  
  <!-- Solute particles (dissolved) -->
  <circle cx="140" cy="180" r="8" fill="#ef4444"/>
  <circle cx="180" cy="200" r="8" fill="#ef4444"/>
  <circle cx="220" cy="160" r="8" fill="#ef4444"/>
  <circle cx="260" cy="190" r="8" fill="#ef4444"/>
  <circle cx="200" cy="220" r="8" fill="#ef4444"/>
  <circle cx="160" cy="140" r="8" fill="#ef4444"/>
  <circle cx="240" cy="140" r="8" fill="#ef4444"/>
  
  <!-- Water molecules -->
  <g opacity="0.5">
    <circle cx="130" cy="120" r="4" fill="#60a5fa"/>
    <circle cx="150" cy="160" r="4" fill="#60a5fa"/>
    <circle cx="190" cy="130" r="4" fill="#60a5fa"/>
    <circle cx="230" cy="170" r="4" fill="#60a5fa"/>
    <circle cx="270" cy="150" r="4" fill="#60a5fa"/>
    <circle cx="250" cy="210" r="4" fill="#60a5fa"/>
    <circle cx="170" cy="210" r="4" fill="#60a5fa"/>
    <circle cx="210" cy="190" r="4" fill="#60a5fa"/>
  </g>
  
  <!-- Labels -->
  <text x="200" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#475569">Раствор</text>
  
  <!-- Solute box -->
  <rect x="320" y="100" width="60" height="60" rx="8" fill="#f1f5f9" stroke="#ef4444" stroke-width="2"/>
  <circle cx="350" cy="130" r="10" fill="#ef4444"/>
  <text x="350" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#475569">Растворённое</text>
  <text x="350" y="193" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#475569">вещество</text>
  
  <!-- Solvent box -->
  <rect x="320" y="200" width="60" height="60" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <circle cx="340" cy="220" r="6" fill="#60a5fa"/>
  <circle cx="360" cy="240" r="6" fill="#60a5fa"/>
  <text x="350" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#475569">Растворитель</text>
  
  <!-- Plus arrow -->
  <text x="340" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#64748b">+</text>
  
  <!-- Arrow -->
  <path d="M80 270 L320 270" stroke="#94a3b8" stroke-width="2" stroke-dasharray="5,3"/>
</svg>