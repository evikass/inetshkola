<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="road" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2c3e50"/>
      <stop offset="100%" style="stop-color:#34495e"/>
    </linearGradient>
  </defs>
  
  <rect width="400" height="300" fill="url(#bg3)"/>
  
  <!-- Road -->
  <rect x="0" y="180" width="400" height="60" fill="url(#road)"/>
  <line x1="0" y1="210" x2="400" y2="210" stroke="#f1c40f" stroke-width="3" stroke-dasharray="30,20"/>
  
  <!-- Car -->
  <g transform="translate(80, 145)">
    <rect x="0" y="20" width="80" height="30" rx="5" fill="#e74c3c"/>
    <rect x="15" y="5" width="50" height="25" rx="8" fill="#c0392b"/>
    <rect x="20" y="10" width="18" height="15" rx="2" fill="#3498db" opacity="0.7"/>
    <rect x="42" y="10" width="18" height="15" rx="2" fill="#3498db" opacity="0.7"/>
    <circle cx="20" cy="50" r="12" fill="#2c3e50"/>
    <circle cx="20" cy="50" r="6" fill="#7f8c8d"/>
    <circle cx="60" cy="50" r="12" fill="#2c3e50"/>
    <circle cx="60" cy="50" r="6" fill="#7f8c8d"/>
    <animate attributeName="transform" attributeType="XML" type="translate" values="80,145;280,145;80,145" dur="4s" repeatCount="indefinite"/>
  </g>
  
  <!-- Distance markers -->
  <g fill="#fff" font-family="Arial, sans-serif" font-size="10">
    <line x1="50" y1="180" x2="50" y2="170" stroke="#00d9ff" stroke-width="2"/>
    <text x="50" y="165" text-anchor="middle">0</text>
    
    <line x1="150" y1="180" x2="150" y2="170" stroke="#00d9ff" stroke-width="2"/>
    <text x="150" y="165" text-anchor="middle">S₁</text>
    
    <line x1="250" y1="180" x2="250" y2="170" stroke="#00d9ff" stroke-width="2"/>
    <text x="250" y="165" text-anchor="middle">S₂</text>
    
    <line x1="350" y1="180" x2="350" y2="170" stroke="#00d9ff" stroke-width="2"/>
    <text x="350" y="165" text-anchor="middle">S₃</text>
  </g>
  
  <!-- Formula -->
  <g transform="translate(200, 70)">
    <rect x="-80" y="-25" width="160" height="50" rx="10" fill="#2c3e50" stroke="#3498db" stroke-width="2"/>
    <text x="0" y="8" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#fff">v = S / t</text>
  </g>
  
  <!-- Title -->
  <text x="200" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff">СКОРОСТЬ, ПУТЬ, ВРЕМЯ</text>
</svg>