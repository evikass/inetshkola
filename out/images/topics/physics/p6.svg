<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Background -->
  <rect width="400" height="300" fill="#0F172A"/>
  
  <!-- Pendulum pivot -->
  <rect x="175" y="20" width="50" height="10" rx="3" fill="#475569"/>
  
  <!-- Pendulum string -->
  <line x1="200" y1="30" x2="280" y2="150" stroke="#94A3B8" stroke-width="3">
    <animate attributeName="x2" values="120;280;120" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="y2" values="150;150;150" dur="2s" repeatCount="indefinite"/>
  </line>
  
  <!-- Pendulum bob -->
  <circle cx="280" cy="150" r="20" fill="#3B82F6">
    <animate attributeName="cx" values="120;280;120" dur="2s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Motion trail -->
  <ellipse cx="200" cy="160" rx="90" ry="20" fill="none" stroke="#3B82F6" stroke-width="1" stroke-dasharray="5,5" opacity="0.3"/>
  
  <!-- Equilibrium line -->
  <line x1="200" y1="30" x2="200" y2="180" stroke="#475569" stroke-width="1" stroke-dasharray="5,5"/>
  
  <!-- Spring -->
  <path d="M50,150 Q70,140 70,160 Q70,180 90,170 Q90,150 110,160 Q110,180 130,170 Q130,150 150,160" fill="none" stroke="#10B981" stroke-width="3"/>
  <circle cx="50" cy="150" r="10" fill="#10B981"/>
  <rect x="140" y="145" width="30" height="30" fill="#1E293B" stroke="#475569" stroke-width="2"/>
  
  <!-- Spring animation -->
  <circle cx="50" cy="150" r="10" fill="#10B981">
    <animate attributeName="cx" values="50;80;50" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Wave pattern -->
  <path d="M50,250 Q100,230 150,250 Q200,270 250,250 Q300,230 350,250" fill="none" stroke="#8B5CF6" stroke-width="2"/>
  <path d="M50,260 Q100,240 150,260 Q200,280 250,260 Q300,240 350,260" fill="none" stroke="#8B5CF6" stroke-width="2" opacity="0.5"/>
  
  <!-- Labels -->
  <text x="200" y="30" text-anchor="middle" fill="#E2E8F0" font-family="Arial" font-size="10">T = 2π√(l/g)</text>
  
  <!-- Title -->
  <text x="200" y="280" text-anchor="middle" fill="#E2E8F0" font-family="Arial, sans-serif" font-size="16" font-weight="bold">Колебания и волны</text>
</svg>