<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Background -->
  <rect width="400" height="300" fill="#0F172A"/>
  
  <!-- Nucleus -->
  <circle cx="200" cy="150" r="35" fill="#EF4444" opacity="0.8"/>
  <circle cx="185" cy="140" r="12" fill="#FCA5A5"/>
  <circle cx="215" cy="145" r="12" fill="#FCA5A5"/>
  <circle cx="195" cy="165" r="12" fill="#FCA5A5"/>
  
  <!-- Protons and neutrons labels -->
  <text x="185" y="144" text-anchor="middle" fill="#7F1D1D" font-family="Arial" font-size="8">p+</text>
  <text x="215" y="149" text-anchor="middle" fill="#7F1D1D" font-family="Arial" font-size="8">n</text>
  <text x="195" y="169" text-anchor="middle" fill="#7F1D1D" font-family="Arial" font-size="8">p+</text>
  
  <!-- Electron shells -->
  <circle cx="200" cy="150" r="70" fill="none" stroke="#3B82F6" stroke-width="1" stroke-dasharray="3,3"/>
  <circle cx="200" cy="150" r="100" fill="none" stroke="#3B82F6" stroke-width="1" stroke-dasharray="3,3"/>
  
  <!-- Electrons -->
  <circle cx="270" cy="150" r="8" fill="#60A5FA">
    <animateTransform attributeName="transform" type="rotate" from="0 200 150" to="360 200 150" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="130" cy="150" r="8" fill="#60A5FA">
    <animateTransform attributeName="transform" type="rotate" from="180 200 150" to="540 200 150" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="300" cy="150" r="8" fill="#A78BFA">
    <animateTransform attributeName="transform" type="rotate" from="0 200 150" to="360 200 150" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="100" cy="150" r="8" fill="#A78BFA">
    <animateTransform attributeName="transform" type="rotate" from="180 200 150" to="540 200 150" dur="5s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Alpha particle -->
  <circle cx="50" cy="150" r="12" fill="#EF4444"/>
  <text x="50" y="154" text-anchor="middle" fill="#FFFFFF" font-family="Arial" font-size="8">α</text>
  <line x1="65" y1="150" x2="100" y2="150" stroke="#EF4444" stroke-width="2" stroke-dasharray="5,3">
    <animate attributeName="stroke-dashoffset" values="0;-16" dur="0.5s" repeatCount="indefinite"/>
  </line>
  
  <!-- Energy waves -->
  <path d="M240,80 Q260,70 280,80 Q300,90 320,80" fill="none" stroke="#F59E0B" stroke-width="2">
    <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite"/>
  </path>
  
  <!-- Labels -->
  <text x="200" y="40" text-anchor="middle" fill="#E2E8F0" font-family="Arial, sans-serif" font-size="14">Строение атома</text>
  
  <!-- Legend -->
  <circle cx="50" cy="270" r="6" fill="#FCA5A5"/>
  <text x="65" y="274" fill="#94A3B8" font-family="Arial" font-size="11">Протоны и нейтроны</text>
  <circle cx="200" cy="270" r="6" fill="#60A5FA"/>
  <text x="215" y="274" fill="#94A3B8" font-family="Arial" font-size="11">Электроны</text>
  
  <!-- Title -->
  <text x="200" y="280" text-anchor="middle" fill="#E2E8F0" font-family="Arial, sans-serif" font-size="16" font-weight="bold">Атомное ядро</text>
</svg>