<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg19" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  
  <rect width="400" height="300" fill="url(#bg19)"/>
  
  <!-- Engine cylinder -->
  <g transform="translate(150, 70)">
    <!-- Cylinder -->
    <rect x="0" y="0" width="100" height="120" rx="5" fill="#2c3e50" stroke="#7f8c8d" stroke-width="2"/>
    
    <!-- Piston -->
    <rect x="5" y="30" width="90" height="25" fill="#95a5a6">
      <animate attributeName="y" values="30;60;60;30;30" dur="3s" repeatCount="indefinite"/>
    </rect>
    
    <!-- Connecting rod -->
    <line x1="50" y1="55" x2="50" y2="90" stroke="#bdc3c7" stroke-width="4">
      <animate attributeName="y1" values="55;85;85;55;55" dur="3s" repeatCount="indefinite"/>
    </line>
    
    <!-- Crankshaft -->
    <circle cx="50" cy="100" r="15" fill="#7f8c8d" stroke="#95a5a6" stroke-width="2">
      <animateTransform attributeName="transform" type="rotate" values="0 50 100;360 50 100" dur="3s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Gas/steam inside -->
    <ellipse cx="50" cy="15" rx="35" ry="12" fill="#e74c3c" opacity="0.5">
      <animate attributeName="ry" values="12;40;40;12;12" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="15;35;35;15;15" dur="3s" repeatCount="indefinite"/>
    </ellipse>
    
    <!-- Flame under cylinder -->
    <ellipse cx="30" cy="125" rx="12" ry="15" fill="#f39c12" opacity="0.8">
      <animate attributeName="ry" values="15;20;15" dur="0.5s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="50" cy="125" rx="15" ry="18" fill="#e74c3c" opacity="0.7">
      <animate attributeName="ry" values="18;25;18" dur="0.4s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="70" cy="125" rx="12" ry="15" fill="#f39c12" opacity="0.8">
      <animate attributeName="ry" values="15;20;15" dur="0.6s" repeatCount="indefinite"/>
    </ellipse>
    
    <!-- Labels -->
    <text x="50" y="-10" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e74c3c">Q₁ (нагреватель)</text>
    <text x="50" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#3498db">Q₂ (холодильник)</text>
  </g>
  
  <!-- Efficiency formula -->
  <g transform="translate(200, 50)">
    <rect x="-90" y="-18" width="180" height="36" rx="10" fill="#2c3e50" stroke="#2ecc71" stroke-width="2"/>
    <text x="0" y="8" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#fff">η = (Q₁-Q₂)/Q₁</text>
  </g>
  
  <!-- Carnot efficiency -->
  <text x="200" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#f1c40f">КПД Карно: η = (T₁-T₂)/T₁</text>
  
  <!-- Title -->
  <text x="200" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ffffff">ТЕПЛОВОЙ ДВИГАТЕЛЬ</text>
</svg>