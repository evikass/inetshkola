<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg24" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  
  <rect width="400" height="300" fill="url(#bg24)"/>
  
  <!-- Book/Study materials -->
  <g transform="translate(80, 100)">
    <!-- Open book -->
    <path d="M0,60 Q40,40 80,60 L80,0 Q40,20 0,0 Z" fill="#f1c40f" opacity="0.9"/>
    <path d="M80,60 Q120,40 160,60 L160,0 Q120,20 80,0 Z" fill="#f39c12" opacity="0.9"/>
    
    <!-- Lines on book -->
    <line x1="20" y1="25" x2="70" y2="30" stroke="#2c3e50" stroke-width="1"/>
    <line x1="20" y1="35" x2="70" y2="40" stroke="#2c3e50" stroke-width="1"/>
    <line x1="20" y1="45" x2="70" y2="50" stroke="#2c3e50" stroke-width="1"/>
    
    <line x1="90" y1="30" x2="140" y2="25" stroke="#2c3e50" stroke-width="1"/>
    <line x1="90" y1="40" x2="140" y2="35" stroke="#2c3e50" stroke-width="1"/>
    <line x1="90" y1="50" x2="140" y2="45" stroke="#2c3e50" stroke-width="1"/>
  </g>
  
  <!-- Formulas floating -->
  <g transform="translate(280, 90)">
    <rect x="-50" y="-25" width="100" height="30" rx="5" fill="#2c3e50" stroke="#3498db" stroke-width="1"/>
    <text x="0" y="-5" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#fff">F = ma</text>
    
    <rect x="-50" y="15" width="100" height="30" rx="5" fill="#2c3e50" stroke="#e74c3c" stroke-width="1"/>
    <text x="0" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#fff">E = mc²</text>
    
    <rect x="-50" y="55" width="100" height="30" rx="5" fill="#2c3e50" stroke="#2ecc71" stroke-width="1"/>
    <text x="0" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#fff">PV = nRT</text>
  </g>
  
  <!-- Checklist -->
  <g transform="translate(100, 180)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="12" fill="#fff">📋 Советы:</text>
    <text x="0" y="20" font-family="Arial, sans-serif" font-size="11" fill="#2ecc71">✓ Выучи все формулы</text>
    <text x="0" y="38" font-family="Arial, sans-serif" font-size="11" fill="#2ecc71">✓ Проверяй размерности</text>
    <text x="0" y="56" font-family="Arial, sans-serif" font-size="11" fill="#2ecc71">✓ Рисуй схемы и графики</text>
    <text x="0" y="74" font-family="Arial, sans-serif" font-size="11" fill="#f1c40f">⚡ Задания 24-32 — сложные!</text>
  </g>
  
  <!-- Trophy -->
  <g transform="translate(320, 180)">
    <text x="0" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="40">🏆</text>
    <text x="0" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#f1c40f">Удачи на ЕГЭ!</text>
  </g>
  
  <!-- Title -->
  <text x="200" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff">ПОДГОТОВКА К ЕГЭ ПО ФИЗИКЕ</text>
</svg>