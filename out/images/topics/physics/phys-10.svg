<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg10" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  
  <rect width="400" height="300" fill="url(#bg10)"/>
  
  <!-- Circuit -->
  <g transform="translate(50, 80)">
    <!-- Battery -->
    <rect x="0" y="40" width="20" height="60" fill="#2c3e50" stroke="#e74c3c" stroke-width="2"/>
    <line x1="5" y1="35" x2="15" y2="35" stroke="#e74c3c" stroke-width="3"/>
    <line x1="8" y1="105" x2="12" y2="105" stroke="#3498db" stroke-width="3"/>
    <text x="-10" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#e74c3c">U</text>
    
    <!-- Wires -->
    <line x1="10" y1="35" x2="10" y2="10" stroke="#f1c40f" stroke-width="2"/>
    <line x1="10" y1="10" x2="250" y2="10" stroke="#f1c40f" stroke-width="2"/>
    <line x1="250" y1="10" x2="250" y2="40" stroke="#f1c40f" stroke-width="2"/>
    
    <line x1="10" y1="105" x2="10" y2="130" stroke="#f1c40f" stroke-width="2"/>
    <line x1="10" y1="130" x2="250" y2="130" stroke="#f1c40f" stroke-width="2"/>
    <line x1="250" y1="130" x2="250" y2="100" stroke="#f1c40f" stroke-width="2"/>
    
    <!-- Resistor -->
    <rect x="230" y="40" width="40" height="60" fill="#8e44ad" stroke="#9b59b6" stroke-width="2"/>
    <text x="250" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#fff">R</text>
    
    <!-- Current flow arrows -->
    <polygon points="130,10 140,5 140,15" fill="#2ecc71">
      <animate attributeName="opacity" values="1;0.3;1" dur="0.5s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="130,130 120,125 120,135" fill="#2ecc71">
      <animate attributeName="opacity" values="1;0.3;1" dur="0.5s" repeatCount="indefinite"/>
    </polygon>
    
    <!-- Ammeter symbol -->
    <circle cx="130" cy="10" r="8" fill="#2c3e50" stroke="#2ecc71" stroke-width="2"/>
    <text x="130" y="14" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2ecc71">A</text>
  </g>
  
  <!-- Formula -->
  <g transform="translate(200, 50)">
    <rect x="-60" y="-20" width="120" height="40" rx="10" fill="#2c3e50" stroke="#f1c40f" stroke-width="2"/>
    <text x="0" y="8" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#fff">I = U/R</text>
  </g>
  
  <!-- Labels -->
  <text x="80" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#e74c3c">U — напряжение (В)</text>
  <text x="200" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2ecc71">I — сила тока (А)</text>
  <text x="320" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#9b59b6">R — сопротивление (Ом)</text>
  
  <!-- Title -->
  <text x="200" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ffffff">ЗАКОН ОМА</text>
</svg>