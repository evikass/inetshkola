<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg21" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  
  <rect width="400" height="300" fill="url(#bg21)"/>
  
  <!-- Einstein portrait silhouette -->
  <g transform="translate(80, 80)">
    <!-- Head outline -->
    <ellipse cx="50" cy="50" rx="40" ry="50" fill="#2c3e50"/>
    
    <!-- Hair (wild Einstein hair) -->
    <path d="M20,30 Q10,10 30,5 Q50,-5 70,5 Q90,10 80,30" fill="#ecf0f1"/>
    <path d="M15,40 Q5,25 20,20" fill="none" stroke="#ecf0f1" stroke-width="3"/>
    <path d="M85,40 Q95,25 80,20" fill="none" stroke="#ecf0f1" stroke-width="3"/>
    
    <!-- Mustache -->
    <path d="M35,70 Q50,80 65,70" fill="none" stroke="#bdc3c7" stroke-width="3"/>
  </g>
  
  <!-- E=mc² formula (main focus) -->
  <g transform="translate(280, 100)">
    <rect x="-60" y="-40" width="120" height="80" rx="15" fill="#2c3e50" stroke="#f1c40f" stroke-width="3"/>
    <text x="0" y="-5" text-anchor="middle" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#fff">E</text>
    <text x="-25" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#fff">= mc²</text>
  </g>
  
  <!-- Atom explosion effect -->
  <g transform="translate(280, 100)">
    <!-- Energy rays -->
    <line x1="65" y1="-50" x2="90" y2="-80" stroke="#f1c40f" stroke-width="2" opacity="0.7">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="0.5s" repeatCount="indefinite"/>
    </line>
    <line x1="75" y1="-30" x2="110" y2="-40" stroke="#e74c3c" stroke-width="2" opacity="0.6">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="0.4s" repeatCount="indefinite"/>
    </line>
    <line x1="75" y1="30" x2="110" y2="40" stroke="#e74c3c" stroke-width="2" opacity="0.6">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="0.6s" repeatCount="indefinite"/>
    </line>
    <line x1="65" y1="50" x2="90" y2="80" stroke="#f39c12" stroke-width="2" opacity="0.7">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="0.55s" repeatCount="indefinite"/>
    </line>
  </g>
  
  <!-- Variables -->
  <g transform="translate(100, 200)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="14" fill="#f1c40f">E — энергия (Дж)</text>
    <text x="0" y="25" font-family="Arial, sans-serif" font-size="14" fill="#fff">m — масса (кг)</text>
    <text x="0" y="50" font-family="Arial, sans-serif" font-size="14" fill="#3498db">c — скорость света (3·10⁸ м/с)</text>
  </g>
  
  <!-- Title -->
  <text x="200" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ffffff">УРАВНЕНИЕ ЭЙНШТЕЙНА</text>
  <text x="200" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#888">Эквивалентность массы и энергии</text>
</svg>