<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A855F7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EC4899;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="200" height="150" fill="url(#bg2)" rx="15"/>
  
  <!-- Notebook page -->
  <rect x="30" y="25" width="100" height="100" rx="5" fill="#FEF3C7" stroke="#D97706" stroke-width="2"/>
  
  <!-- Lined paper lines -->
  <line x1="40" y1="45" x2="120" y2="45" stroke="#FCD34D" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="40" y1="65" x2="120" y2="65" stroke="#FCD34D" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="40" y1="85" x2="120" y2="85" stroke="#FCD34D" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="40" y1="105" x2="120" y2="105" stroke="#FCD34D" stroke-width="1" stroke-dasharray="3,3"/>
  
  <!-- Letter elements -->
  <line x1="50" y1="40" x2="50" y2="60" stroke="#DC2626" stroke-width="3" stroke-linecap="round"/>
  <line x1="70" y1="40" x2="70" y2="60" stroke="#DC2626" stroke-width="3" stroke-linecap="round"/>
  <line x1="90" y1="40" x2="110" y2="40" stroke="#DC2626" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Letter A constructed -->
  <text x="55" y="98" font-family="Arial" font-size="35" font-weight="bold" fill="#7C3AED">А</text>
  
  <!-- Pencil -->
  <g transform="translate(145, 70) rotate(30)">
    <rect x="0" y="0" width="8" height="35" fill="#FCD34D" rx="2"/>
    <polygon points="4,35 0,48 8,48" fill="#FBBF24"/>
    <rect x="0" y="0" width="8" height="6" fill="#EC4899" rx="2"/>
  </g>
</svg>