<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A855F7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EC4899;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="200" height="150" fill="url(#bg4)" rx="15"/>
  
  <!-- Wave line pattern -->
  <path d="M20 60 Q40 40 60 60 Q80 80 100 60 Q120 40 140 60 Q160 80 180 60" 
        fill="none" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <path d="M20 90 Q40 70 60 90 Q80 110 100 90 Q120 70 140 90 Q160 110 180 90" 
        fill="none" stroke="#FDE68A" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  
  <!-- Straight lines -->
  <line x1="30" y1="30" x2="30" y2="130" stroke="white" stroke-width="3"/>
  <line x1="50" y1="30" x2="90" y2="30" stroke="white" stroke-width="3"/>
  <line x1="170" y1="30" x2="170" y2="130" stroke="#FDE68A" stroke-width="3"/>
  
  <!-- Diagonal lines -->
  <line x1="110" y1="30" x2="150" y2="70" stroke="white" stroke-width="3"/>
  <line x1="130" y1="30" x2="90" y2="70" stroke="#FDE68A" stroke-width="3"/>
  
  <!-- Pattern sample -->
  <rect x="20" y="105" width="160" height="30" rx="5" fill="rgba(255,255,255,0.2)"/>
  <text x="30" y="125" font-size="18" fill="white">~ ~ ~ _ | _ ~ ~ ~</text>
</svg>