<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#2d5a87"/>
    </linearGradient>
    <linearGradient id="globe1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90d9"/>
      <stop offset="100%" style="stop-color:#2d6bb5"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="url(#bg1)" rx="12"/>
  
  <!-- Globe -->
  <circle cx="200" cy="140" r="70" fill="url(#globe1)" stroke="#6bb3f0" stroke-width="3"/>
  
  <!-- Continents on globe -->
  <ellipse cx="175" cy="120" rx="25" ry="20" fill="#5cb85c" opacity="0.8"/>
  <ellipse cx="220" cy="145" rx="20" ry="15" fill="#5cb85c" opacity="0.8"/>
  <ellipse cx="185" cy="165" rx="15" ry="10" fill="#5cb85c" opacity="0.8"/>
  
  <!-- Globe stand -->
  <rect x="190" y="210" width="20" height="30" fill="#8b4513"/>
  <ellipse cx="200" cy="245" rx="35" ry="8" fill="#a0522d"/>
  
  <!-- Latitude/longitude lines -->
  <ellipse cx="200" cy="140" rx="70" ry="25" fill="none" stroke="#6bb3f0" stroke-width="1" opacity="0.5"/>
  <ellipse cx="200" cy="140" rx="50" ry="70" fill="none" stroke="#6bb3f0" stroke-width="1" opacity="0.5"/>
  
  <!-- Books -->
  <rect x="50" y="200" width="60" height="50" fill="#e74c3c" rx="3" transform="rotate(-10 80 225)"/>
  <rect x="55" y="195" width="60" height="50" fill="#3498db" rx="3" transform="rotate(-5 85 220)"/>
  <rect x="60" y="190" width="60" height="50" fill="#2ecc71" rx="3"/>
  
  <!-- Compass -->
  <circle cx="330" cy="100" r="35" fill="#f5f5dc" stroke="#8b4513" stroke-width="3"/>
  <polygon points="330,70 335,100 330,95 325,100" fill="#e74c3c"/>
  <polygon points="330,130 335,100 330,105 325,100" fill="#333"/>
  <text x="330" y="68" text-anchor="middle" font-size="10" fill="#333" font-weight="bold">N</text>
  <text x="330" y="138" text-anchor="middle" font-size="10" fill="#333" font-weight="bold">S</text>
  <text x="358" y="103" text-anchor="middle" font-size="10" fill="#333" font-weight="bold">E</text>
  <text x="302" y="103" text-anchor="middle" font-size="10" fill="#333" font-weight="bold">W</text>
  
  <!-- Magnifying glass -->
  <circle cx="330" cy="200" r="25" fill="none" stroke="#c0c0c0" stroke-width="6"/>
  <line x1="348" y1="218" x2="370" y2="240" stroke="#8b4513" stroke-width="8" stroke-linecap="round"/>
  
  <!-- Text label -->
  <text x="200" y="280" text-anchor="middle" font-size="18" fill="#ffffff" font-weight="bold">География</text>
</svg>