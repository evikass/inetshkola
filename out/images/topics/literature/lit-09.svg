<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg9" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FBE9E7"/>
      <stop offset="100%" style="stop-color:#FFCCBC"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg9)" rx="20"/>
  
  <!-- Gogol portrait frame -->
  <g transform="translate(60, 60)">
    <rect x="0" y="0" width="160" height="200" fill="#5D4037" rx="5"/>
    <rect x="8" y="8" width="144" height="184" fill="#FFFEF9"/>
    <!-- Face -->
    <ellipse cx="80" cy="70" rx="35" ry="45" fill="#FFCCBC"/>
    <!-- Distinctive nose -->
    <ellipse cx="80" cy="80" rx="12" ry="18" fill="#FFAB91"/>
    <!-- Hair -->
    <path d="M45 40 Q50 20 80 15 Q110 20 115 40 Q110 35 80 30 Q50 35 45 40" fill="#4E342E"/>
    <!-- Side hair over ears -->
    <ellipse cx="50" cy="55" rx="12" ry="20" fill="#4E342E"/>
    <ellipse cx="110" cy="55" rx="12" ry="20" fill="#4E342E"/>
    <!-- Eyes -->
    <circle cx="65" cy="60" r="5" fill="white"/>
    <circle cx="95" cy="60" r="5" fill="white"/>
    <circle cx="65" cy="60" r="2" fill="#1A1A1A"/>
    <circle cx="95" cy="60" r="2" fill="#1A1A1A"/>
    <!-- Mustache -->
    <path d="M60 100 Q80 110 100 100" stroke="#4E342E" stroke-width="4" fill="none"/>
    <!-- Collar -->
    <path d="M50 120 L80 140 L110 120 L110 170 L50 170 Z" fill="#1A1A1A"/>
    <!-- Neck scarf -->
    <polygon points="70,125 80,145 90,125" fill="#E65100"/>
  </g>
  
  <!-- Viy character (demon with heavy eyelids) -->
  <g transform="translate(550, 150)">
    <!-- Body -->
    <ellipse cx="0" cy="80" rx="60" ry="50" fill="#455A64"/>
    <!-- Head -->
    <ellipse cx="0" cy="20" rx="45" ry="40" fill="#546E7A"/>
    <!-- Heavy eyelids -->
    <ellipse cx="-15" cy="10" rx="15" ry="20" fill="#37474F"/>
    <ellipse cx="15" cy="10" rx="15" ry="20" fill="#37474F"/>
    <!-- Eyes under lids -->
    <circle cx="-15" cy="15" r="8" fill="#FF5722"/>
    <circle cx="15" cy="15" r="8" fill="#FF5722"/>
    <circle cx="-15" cy="15" r="3" fill="#1A1A1A"/>
    <circle cx="15" cy="15" r="3" fill="#1A1A1A"/>
    <!-- Iron fork -->
    <rect x="60" y="-20" width="8" height="150" fill="#78909C"/>
    <rect x="55" y="-30" width="18" height="15" fill="#607D8B"/>
    <rect x="52" y="-55" width="6" height="30" fill="#78909C"/>
    <rect x="63" y="-55" width="6" height="30" fill="#78909C"/>
    <rect x="74" y="-55" width="6" height="30" fill="#78909C"/>
  </g>
  
  <!-- Taras Bulba - Cossack -->
  <g transform="translate(350, 300)">
    <!-- Head -->
    <circle cx="0" cy="0" r="30" fill="#FFCCBC"/>
    <!-- Cossack hairstyle (oseledets) -->
    <ellipse cx="0" cy="-15" rx="25" ry="10" fill="#5D4037"/>
    <path d="M-5 -25 Q0 -50 5 -25" fill="#3E2723"/>
    <!-- Mustache -->
    <path d="M-25 5 Q0 20 25 5" stroke="#3E2723" stroke-width="5" fill="none"/>
    <!-- Eyes -->
    <circle cx="-10" cy="-5" r="4" fill="#1A1A1A"/>
    <circle cx="10" cy="-5" r="4" fill="#1A1A1A"/>
    <!-- Cossack outfit -->
    <rect x="-25" y="25" width="50" height="60" fill="#E65100"/>
    <ellipse cx="0" cy="30" rx="25" ry="10" fill="#BF360C"/>
  </g>
  
  <!-- Dead Souls - carriage -->
  <g transform="translate(650, 350)">
    <!-- Carriage body -->
    <rect x="0" y="0" width="80" height="50" fill="#5D4037" rx="5"/>
    <rect x="5" y="5" width="30" height="25" fill="#8D6E63"/>
    <rect x="45" y="5" width="30" height="25" fill="#8D6E63"/>
    <!-- Wheels -->
    <circle cx="20" cy="60" r="20" fill="#3E2723"/>
    <circle cx="20" cy="60" r="5" fill="#795548"/>
    <circle cx="70" cy="60" r="20" fill="#3E2723"/>
    <circle cx="70" cy="60" r="5" fill="#795548"/>
    <!-- Horse -->
    <ellipse cx="130" cy="30" rx="40" ry="25" fill="#795548"/>
    <ellipse cx="160" cy="10" rx="20" ry="15" fill="#795548"/>
  </g>
  
  <!-- Overcoat (Shinel) -->
  <g transform="translate(280, 150)">
    <path d="M0 0 L-30 120 L30 120 Z" fill="#37474F"/>
    <path d="M-30 120 L-50 200 L50 200 L30 120 Z" fill="#455A64"/>
    <ellipse cx="0" cy="10" rx="15" ry="10" fill="#263238"/>
    <!-- Collar -->
    <path d="M-20 0 L0 -20 L20 0" fill="#546E7A"/>
  </g>
  
  <!-- Nose (famous story) -->
  <g transform="translate(180, 350)">
    <ellipse cx="0" cy="0" rx="25" ry="35" fill="#FFAB91"/>
    <ellipse cx="0" cy="-10" rx="15" ry="8" fill="#FF8A65"/>
    <!-- Nostrils -->
    <ellipse cx="-6" cy="5" rx="4" ry="6" fill="#D7CCC8"/>
    <ellipse cx="6" cy="5" rx="4" ry="6" fill="#D7CCC8"/>
    <!-- Walking legs -->
    <rect x="-15" y="35" width="8" height="25" fill="#5D4037"/>
    <rect x="7" y="35" width="8" height="25" fill="#5D4037"/>
  </g>
  
  <!-- Title -->
  <rect x="280" y="430" width="240" height="50" fill="rgba(93,64,42,0.9)" rx="10"/>
  <text x="400" y="462" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="white">Н.В. Гоголь</text>
</svg>