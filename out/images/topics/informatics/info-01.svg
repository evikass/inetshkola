<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bginfo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#37474f"/>
      <stop offset="100%" style="stop-color:#455a64"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bginfo)"/>
  
  <!-- Монитор -->
  <rect x="250" y="120" width="300" height="200" rx="10" fill="#263238" stroke="#78909c" stroke-width="3"/>
  <rect x="270" y="140" width="260" height="160" fill="#1b5e20" opacity="0.9"/>
  
  <!-- Код на экране -->
  <text x="290" y="180" font-family="monospace" font-size="14" fill="#4caf50">print("Hello!")</text>
  <text x="290" y="205" font-family="monospace" font-size="14" fill="#81c784">for i in range(10):</text>
  <text x="310" y="230" font-family="monospace" font-size="14" fill="#a5d6a7">print(i)</text>
  <text x="290" y="255" font-family="monospace" font-size="14" fill="#c8e6c9"># комментарий</text>
  
  <!-- Подставка монитора -->
  <rect x="370" y="320" width="60" height="30" fill="#455a64"/>
  <rect x="340" y="350" width="120" height="10" rx="3" fill="#546e7a"/>
  
  <!-- Двоичный код -->
  <text x="80" y="150" font-family="monospace" font-size="18" fill="#4caf50" opacity="0.7">10110</text>
  <text x="600" y="200" font-family="monospace" font-size="16" fill="#81c784" opacity="0.6">01001</text>
  <text x="650" y="350" font-family="monospace" font-size="18" fill="#4caf50" opacity="0.5">11010</text>
  
  <!-- Чип -->
  <rect x="100" y="300" width="80" height="60" rx="5" fill="#78909c" opacity="0.5"/>
  <rect x="115" y="315" width="50" height="30" fill="#455a64" opacity="0.8"/>
  <line x1="90" y1="310" x2="100" y2="310" stroke="#90a4ae" stroke-width="3"/>
  <line x1="90" y1="330" x2="100" y2="330" stroke="#90a4ae" stroke-width="3"/>
  <line x1="90" y1="350" x2="100" y2="350" stroke="#90a4ae" stroke-width="3"/>
  
  <text x="400" y="480" text-anchor="middle" font-family="Georgia, serif" font-size="24" font-weight="bold" fill="#ffffff">Информатика</text>
</svg>