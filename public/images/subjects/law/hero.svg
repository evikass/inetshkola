<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="lawBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E3A8A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E40AF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FCD34D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D97706;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#lawBg)" opacity="0.15"/>

  <!-- Scales of Justice (larger, centered) -->
  <g transform="translate(50, 25)">
    <!-- Stand base -->
    <rect x="45" y="110" width="10" height="8" rx="2" fill="#92400E"/>
    <rect x="35" y="115" width="30" height="6" rx="2" fill="#78350F"/>
    <!-- Pole -->
    <rect x="47" y="35" width="6" height="80" fill="#92400E"/>
    <!-- Balance beam -->
    <rect x="5" y="35" width="90" height="6" rx="2" fill="url(#goldGrad)"/>
    <!-- Center pivot decoration -->
    <circle cx="50" cy="38" r="10" fill="#F59E0B" stroke="#D97706" stroke-width="2"/>
    <circle cx="50" cy="38" r="5" fill="#FBBF24"/>
    <!-- Left chain and pan -->
    <line x1="15" y1="41" x2="15" y2="70" stroke="#D97706" stroke-width="2"/>
    <ellipse cx="15" cy="75" rx="20" ry="6" fill="#FCD34D" stroke="#D97706" stroke-width="1.5"/>
    <path d="M 0 68 Q 15 80 30 68" fill="none" stroke="#D97706" stroke-width="1.5"/>
    <!-- Left weight -->
    <rect x="8" y="62" width="14" height="10" rx="2" fill="#4B5563"/>
    <!-- Right chain and pan -->
    <line x1="85" y1="41" x2="85" y2="70" stroke="#D97706" stroke-width="2"/>
    <ellipse cx="85" cy="75" rx="20" ry="6" fill="#FCD34D" stroke="#D97706" stroke-width="1.5"/>
    <path d="M 70 68 Q 85 80 100 68" fill="none" stroke="#D97706" stroke-width="1.5"/>
    <!-- Right weight (equal) -->
    <rect x="78" y="62" width="14" height="10" rx="2" fill="#4B5563"/>
  </g>

  <!-- Constitution book -->
  <g transform="translate(15, 135)">
    <rect x="0" y="0" width="45" height="35" rx="3" fill="#1E40AF"/>
    <rect x="3" y="3" width="39" height="29" fill="#DBEAFE" opacity="0.2"/>
    <line x1="22" y1="5" x2="22" y2="30" stroke="#3B82F6" stroke-width="2"/>
    <!-- Text -->
    <rect x="6" y="8" width="12" height="2" fill="white" opacity="0.6"/>
    <rect x="6" y="13" width="10" height="2" fill="white" opacity="0.5"/>
    <rect x="26" y="8" width="12" height="2" fill="white" opacity="0.6"/>
    <rect x="26" y="13" width="14" height="2" fill="white" opacity="0.5"/>
    <!-- Star -->
    <polygon points="22,22 24,26 28,26 25,29 26,33 22,30 18,33 19,29 16,26 20,26" fill="#FBBF24"/>
  </g>

  <!-- Gavel -->
  <g transform="translate(140, 130)">
    <!-- Handle -->
    <rect x="25" y="35" width="6" height="30" rx="2" fill="#92400E" transform="rotate(-35, 28, 50)"/>
    <!-- Head -->
    <rect x="0" y="20" width="35" height="15" rx="3" fill="#78350F"/>
    <rect x="3" y="23" width="29" height="9" rx="2" fill="#92400E"/>
    <!-- Sound block -->
    <ellipse cx="17" cy="50" rx="22" ry="6" fill="#78350F"/>
  </g>

  <!-- Paragraph symbol -->
  <text x="165" y="55" font-family="Georgia, serif" font-size="28" fill="#F59E0B" opacity="0.8">§</text>

  <!-- Article number -->
  <g transform="translate(130, 70)">
    <rect x="0" y="0" width="40" height="25" rx="4" fill="white" opacity="0.15"/>
    <text x="20" y="18" font-family="Arial" font-size="14" fill="white" text-anchor="middle">Ст. 1</text>
  </g>

  <!-- Equality symbol -->
  <g transform="translate(75, 160)">
    <rect x="0" y="0" width="35" height="8" rx="2" fill="#FBBF24"/>
    <rect x="0" y="12" width="35" height="8" rx="2" fill="#FBBF24"/>
  </g>

  <!-- Decorative stars -->
  <polygon points="30,50 32,56 38,56 33,60 35,66 30,62 25,66 27,60 22,56 28,56" fill="#FBBF24" opacity="0.7"/>
  <polygon points="175,95 176,99 180,99 177,102 178,106 175,103 172,106 173,102 170,99 174,99" fill="#FCD34D" opacity="0.6"/>

  <!-- Decorative dots -->
  <circle cx="50" cy="25" r="2" fill="#60A5FA" opacity="0.5"/>
  <circle cx="150" cy="25" r="2" fill="#60A5FA" opacity="0.5"/>
</svg>