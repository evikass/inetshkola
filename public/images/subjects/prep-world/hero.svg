<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="prepWorldBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22C55E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#14B8A6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="url(#prepWorldBg)" rx="20"/>
  
  <!-- Sun -->
  <circle cx="320" cy="70" r="40" fill="#FCD34D"/>
  <g stroke="#FCD34D" stroke-width="3" stroke-linecap="round">
    <line x1="320" y1="15" x2="320" y2="5"/>
    <line x1="320" y1="125" x2="320" y2="135"/>
    <line x1="265" y1="70" x2="255" y2="70"/>
    <line x1="375" y1="70" x2="385" y2="70"/>
    <line x1="280" y1="30" x2="273" y2="23"/>
    <line x1="360" y1="110" x2="367" y2="117"/>
    <line x1="280" y1="110" x2="273" y2="117"/>
    <line x1="360" y1="30" x2="367" y2="23"/>
  </g>
  
  <!-- Mountains -->
  <polygon points="30,200 100,100 170,200" fill="#4ADE80"/>
  <polygon points="100,200 180,90 260,200" fill="#22C55E"/>
  <polygon points="50,200 90,140 130,200" fill="#86EFAC"/>
  
  <!-- Trees -->
  <g transform="translate(270, 140)">
    <rect x="15" y="30" width="10" height="30" fill="#A16207"/>
    <polygon points="20,0 0,35 40,35" fill="#16A34A"/>
    <polygon points="20,15 5,40 35,40" fill="#22C55E"/>
  </g>
  
  <g transform="translate(310, 155)">
    <rect x="10" y="20" width="8" height="25" fill="#A16207"/>
    <polygon points="14,0 0,25 28,25" fill="#16A34A"/>
  </g>
  
  <!-- Flowers -->
  <g transform="translate(60, 220)">
    <circle cx="0" cy="0" r="8" fill="#F472B6"/>
    <circle cx="0" cy="0" r="4" fill="#FDE047"/>
  </g>
  <g transform="translate(90, 235)">
    <circle cx="0" cy="0" r="6" fill="#C084FC"/>
    <circle cx="0" cy="0" r="3" fill="#FDE047"/>
  </g>
  <g transform="translate(330, 235)">
    <circle cx="0" cy="0" r="7" fill="#FB923C"/>
    <circle cx="0" cy="0" r="3" fill="#FDE047"/>
  </g>
  
  <!-- Cloud -->
  <g transform="translate(60, 50)">
    <ellipse cx="30" cy="30" rx="30" ry="20" fill="white" opacity="0.9"/>
    <ellipse cx="55" cy="25" rx="25" ry="18" fill="white" opacity="0.9"/>
    <ellipse cx="75" cy="32" rx="20" ry="15" fill="white" opacity="0.9"/>
  </g>
  
  <!-- Butterfly -->
  <g transform="translate(150, 160) scale(0.8)">
    <ellipse cx="0" cy="0" rx="15" ry="10" fill="#E879F9" transform="rotate(-30)"/>
    <ellipse cx="0" cy="0" rx="15" ry="10" fill="#E879F9" transform="rotate(30)"/>
    <ellipse cx="0" cy="15" rx="10" ry="8" fill="#F0ABFC" transform="rotate(-30)"/>
    <ellipse cx="0" cy="15" rx="10" ry="8" fill="#F0ABFC" transform="rotate(30)"/>
    <ellipse cx="0" cy="7" rx="3" ry="12" fill="#581C87"/>
  </g>
  
  <!-- Bird -->
  <g transform="translate(200, 80)">
    <ellipse cx="0" cy="0" rx="12" ry="8" fill="#EF4444"/>
    <polygon points="12,-2 25,0 12,2" fill="#FBBF24"/>
    <circle cx="-5" cy="-2" r="2" fill="black"/>
  </g>
</svg>