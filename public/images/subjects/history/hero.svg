<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="histBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#B45309;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#92400E;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="url(#histBg)" rx="20"/>
  
  <!-- Decorative circles -->
  <circle cx="50" cy="50" r="30" fill="#FCD34D" opacity="0.3"/>
  <circle cx="350" cy="250" r="40" fill="#D97706" opacity="0.3"/>
  
  <!-- Ancient scroll -->
  <rect x="60" y="80" width="120" height="160" fill="#FEF3C7"/>
  <ellipse cx="60" cy="80" rx="10" ry="30" fill="#D97706"/>
  <ellipse cx="60" cy="240" rx="10" ry="30" fill="#D97706"/>
  <ellipse cx="180" cy="80" rx="10" ry="30" fill="#D97706"/>
  <ellipse cx="180" cy="240" rx="10" ry="30" fill="#D97706"/>
  
  <!-- Text lines on scroll -->
  <g stroke="#92400E" stroke-width="2" opacity="0.5">
    <line x1="75" y1="100" x2="165" y2="100"/>
    <line x1="75" y1="120" x2="165" y2="120"/>
    <line x1="75" y1="140" x2="165" y2="140"/>
    <line x1="75" y1="160" x2="150" y2="160"/>
    <line x1="75" y1="180" x2="165" y2="180"/>
    <line x1="75" y1="200" x2="155" y2="200"/>
    <line x1="75" y1="220" x2="140" y2="220"/>
  </g>
  
  <!-- Knight helmet -->
  <g transform="translate(250, 60)">
    <ellipse cx="40" cy="60" rx="35" ry="45" fill="#6B7280"/>
    <rect x="10" y="30" width="60" height="70" fill="#9CA3AF" rx="10"/>
    <rect x="20" y="50" width="40" height="25" fill="#1F2937" rx="5"/>
    <!-- Visor slits -->
    <line x1="25" y1="57" x2="55" y2="57" stroke="#4B5563" stroke-width="3"/>
    <line x1="25" y1="65" x2="55" y2="65" stroke="#4B5563" stroke-width="3"/>
    <!-- Plume -->
    <path d="M40 15 Q30 0 40 -15 Q50 0 40 15" fill="#EF4444"/>
    <path d="M40 15 Q45 -5 60 5 Q50 15 40 15" fill="#DC2626"/>
  </g>
  
  <!-- Castle -->
  <g transform="translate(220, 160)">
    <rect x="0" y="40" width="120" height="80" fill="#78716C"/>
    <rect x="10" y="0" width="25" height="60" fill="#A8A29E"/>
    <polygon points="22.5,-20 0,0 45,0" fill="#57534E"/>
    <rect x="85" y="10" width="25" height="50" fill="#A8A29E"/>
    <polygon points="97.5,-10 75,10 120,10" fill="#57534E"/>
    <rect x="45" y="60" width="30" height="60" fill="#44403C"/>
    <!-- Battlements -->
    <rect x="5" y="-5" width="10" height="10" fill="#A8A29E"/>
    <rect x="25" y="-5" width="10" height="10" fill="#A8A29E"/>
    <rect x="85" y="5" width="10" height="10" fill="#A8A29E"/>
    <rect x="105" y="5" width="10" height="10" fill="#A8A29E"/>
  </g>
  
  <!-- Hourglass -->
  <g transform="translate(30, 170)">
    <polygon points="20,0 0,0 10,30 0,60 20,60 10,30" fill="#D97706"/>
    <polygon points="10,30 0,60 20,60" fill="#FEF3C7"/>
    <rect x="0" y="0" width="20" height="5" fill="#78350F"/>
    <rect x="0" y="55" width="20" height="5" fill="#78350F"/>
    <!-- Sand -->
    <polygon points="5,35 15,35 10,55" fill="#FCD34D"/>
    <ellipse cx="10" cy="20" rx="5" ry="3" fill="#FCD34D"/>
  </g>
  
  <!-- Crown -->
  <g transform="translate(290, 20)">
    <polygon points="0,30 10,10 20,25 30,0 40,25 50,10 60,30" fill="#FCD34D"/>
    <polygon points="0,30 60,30 55,40 5,40" fill="#FBBF24"/>
    <circle cx="15" cy="35" r="4" fill="#EF4444"/>
    <circle cx="30" cy="35" r="4" fill="#3B82F6"/>
    <circle cx="45" cy="35" r="4" fill="#22C55E"/>
  </g>
  
  <!-- Ancient vase -->
  <g transform="translate(200, 80)">
    <ellipse cx="25" cy="50" rx="20" ry="30" fill="#DC2626"/>
    <ellipse cx="25" cy="25" rx="12" ry="5" fill="#B91C1C"/>
    <path d="M15 25 Q5 25 5 15" fill="none" stroke="#DC2626" stroke-width="5"/>
    <path d="M35 25 Q45 25 45 15" fill="none" stroke="#DC2626" stroke-width="5"/>
    <!-- Greek pattern -->
    <rect x="8" y="35" width="34" height="8" fill="#FEF3C7"/>
    <g fill="#B91C1C">
      <rect x="10" y="37" width="4" height="4"/>
      <rect x="20" y="37" width="4" height="4"/>
      <rect x="30" y="37" width="4" height="4"/>
    </g>
  </g>
  
  <!-- Compass -->
  <g transform="translate(340, 120)">
    <circle cx="0" cy="0" r="25" fill="#FEF3C7" stroke="#92400E" stroke-width="2"/>
    <polygon points="0,-20 5,0 0,20 -5,0" fill="#DC2626"/>
    <polygon points="0,20 5,0 0,-20 -5,0" fill="#FFFFFF"/>
    <circle cx="0" cy="0" r="5" fill="#92400E"/>
    <text x="-5" y="-12" font-family="Arial" font-size="10" fill="#1F2937">N</text>
  </g>
  
  <!-- Stars -->
  <polygon points="160,20 163,28 172,28 165,33 168,42 160,36 152,42 155,33 148,28 157,28" fill="#FCD34D"/>
  <polygon points="50,280 53,286 60,286 55,290 57,297 50,293 43,297 45,290 40,286 47,286" fill="#FBBF24"/>
</svg>