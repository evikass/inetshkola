<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="artBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EC4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F472B6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="url(#artBg)" rx="20"/>
  
  <!-- Paint splashes -->
  <circle cx="50" cy="50" r="25" fill="#EF4444" opacity="0.6"/>
  <circle cx="350" cy="60" r="30" fill="#3B82F6" opacity="0.5"/>
  <circle cx="380" cy="250" r="35" fill="#22C55E" opacity="0.5"/>
  <circle cx="30" cy="270" r="28" fill="#FCD34D" opacity="0.6"/>
  
  <!-- Easel -->
  <rect x="150" y="80" width="100" height="120" fill="#92400E" rx="3"/>
  <rect x="155" y="85" width="90" height="110" fill="#FEF3C7"/>
  
  <!-- Painting on easel -->
  <rect x="165" y="95" width="70" height="90" fill="#FFFFFF"/>
  <!-- Simple landscape painting -->
  <rect x="165" y="95" width="70" height="40" fill="#7DD3FC"/>
  <circle cx="220" cy="110" r="10" fill="#FCD34D"/>
  <polygon points="180,135 200,105 220,135" fill="#22C55E"/>
  <polygon points="210,135 235,100 260,135" fill="#16A34A"/>
  <rect x="165" y="135" width="70" height="50" fill="#86EFAC"/>
  
  <!-- Easel legs -->
  <line x1="160" y1="200" x2="130" y2="280" stroke="#78350F" stroke-width="8"/>
  <line x1="240" y1="200" x2="270" y2="280" stroke="#78350F" stroke-width="8"/>
  <line x1="200" y1="200" x2="200" y2="280" stroke="#78350F" stroke-width="8"/>
  
  <!-- Palette -->
  <ellipse cx="80" cy="180" rx="45" ry="30" fill="#D97706"/>
  <ellipse cx="80" cy="180" rx="35" ry="22" fill="#92400E"/>
  <circle cx="50" cy="165" r="8" fill="#EF4444"/>
  <circle cx="75" cy="155" r="7" fill="#FCD34D"/>
  <circle cx="100" cy="160" r="8" fill="#3B82F6"/>
  <circle cx="110" cy="185" r="7" fill="#22C55E"/>
  <circle cx="95" cy="200" r="6" fill="#A855F7"/>
  <circle cx="65" cy="195" r="7" fill="#F97316"/>
  <!-- Thumb hole -->
  <ellipse cx="55" cy="185" rx="8" ry="12" fill="url(#artBg)"/>
  
  <!-- Paint brushes -->
  <g transform="translate(300, 120) rotate(20)">
    <rect x="0" y="0" width="8" height="60" fill="#D97706"/>
    <polygon points="0,0 8,0 4,-15" fill="#EF4444"/>
  </g>
  <g transform="translate(320, 100) rotate(-10)">
    <rect x="0" y="0" width="8" height="55" fill="#92400E"/>
    <polygon points="0,0 8,0 4,-12" fill="#3B82F6"/>
  </g>
  <g transform="translate(340, 130) rotate(35)">
    <rect x="0" y="0" width="8" height="50" fill="#78350F"/>
    <polygon points="0,0 8,0 4,-10" fill="#22C55E"/>
  </g>
  
  <!-- Color pencils -->
  <g transform="translate(30, 120)">
    <rect x="0" y="0" width="8" height="50" fill="#EF4444"/>
    <polygon points="0,0 8,0 4,-10" fill="#FECACA"/>
  </g>
  <g transform="translate(42, 125)">
    <rect x="0" y="0" width="8" height="50" fill="#3B82F6"/>
    <polygon points="0,0 8,0 4,-10" fill="#BFDBFE"/>
  </g>
  <g transform="translate(54, 120)">
    <rect x="0" y="0" width="8" height="50" fill="#22C55E"/>
    <polygon points="0,0 8,0 4,-10" fill="#BBF7D0"/>
  </g>
  
  <!-- Paint tube -->
  <rect x="310" y="220" width="40" height="20" fill="#EF4444" rx="5"/>
  <rect x="310" y="225" width="10" height="10" fill="#DC2626"/>
  <text x="325" y="235" font-family="Arial, sans-serif" font-size="8" fill="#FFF">Red</text>
  
  <!-- Cup with water -->
  <rect x="260" y="230" width="30" height="35" fill="#BFDBFE" rx="3"/>
  <ellipse cx="275" cy="233" rx="15" ry="5" fill="#7DD3FC"/>
  
  <!-- Stars -->
  <polygon points="370,80 374,88 383,88 376,94 379,103 370,97 361,103 364,94 357,88 366,88" fill="#FCD34D"/>
  <polygon points="120,50 123,56 130,56 125,60 127,67 120,63 113,67 115,60 110,56 117,56" fill="#FBBF24"/>
  
  <!-- Rainbow -->
  <g transform="translate(130, 50)">
    <path d="M0,50 Q40,-20 80,50" fill="none" stroke="#EF4444" stroke-width="8"/>
    <path d="M5,50 Q40,-10 75,50" fill="none" stroke="#F97316" stroke-width="8"/>
    <path d="M10,50 Q40,0 70,50" fill="none" stroke="#FCD34D" stroke-width="8"/>
    <path d="M15,50 Q40,10 65,50" fill="none" stroke="#22C55E" stroke-width="8"/>
    <path d="M20,50 Q40,20 60,50" fill="none" stroke="#3B82F6" stroke-width="8"/>
    <path d="M25,50 Q40,30 55,50" fill="none" stroke="#A855F7" stroke-width="8"/>
  </g>
</svg>