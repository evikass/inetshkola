<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="prepMathBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="url(#prepMathBg)" rx="20"/>
  
  <!-- Decorative elements -->
  <circle cx="60" cy="60" r="25" fill="#DBEAFE" opacity="0.3"/>
  <circle cx="340" cy="240" r="35" fill="#A5F3FC" opacity="0.3"/>
  
  <!-- Number blocks -->
  <g transform="translate(60, 80)">
    <!-- Block 1 -->
    <rect x="0" y="0" width="70" height="70" rx="15" fill="#FEF3C7" stroke="#F59E0B" stroke-width="3"/>
    <text x="35" y="52" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="#D97706" text-anchor="middle">1</text>
    
    <!-- Block 2 -->
    <rect x="85" y="0" width="70" height="70" rx="15" fill="#FEE2E2" stroke="#EF4444" stroke-width="3"/>
    <text x="120" y="52" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="#DC2626" text-anchor="middle">2</text>
    
    <!-- Block 3 -->
    <rect x="170" y="0" width="70" height="70" rx="15" fill="#D1FAE5" stroke="#10B981" stroke-width="3"/>
    <text x="205" y="52" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="#059669" text-anchor="middle">3</text>
    
    <!-- Block 4 -->
    <rect x="255" y="0" width="70" height="70" rx="15" fill="#E0E7FF" stroke="#6366F1" stroke-width="3"/>
    <text x="290" y="52" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="#4F46E5" text-anchor="middle">4</text>
  </g>
  
  <!-- Counting items -->
  <g transform="translate(80, 180)">
    <!-- Apples -->
    <circle cx="25" cy="30" r="25" fill="#F87171"/>
    <text x="25" y="38" font-size="24" text-anchor="middle">🍎</text>
    
    <circle cx="95" cy="30" r="25" fill="#F87171"/>
    <text x="95" y="38" font-size="24" text-anchor="middle">🍎</text>
    
    <circle cx="165" cy="30" r="25" fill="#F87171"/>
    <text x="165" y="38" font-size="24" text-anchor="middle">🍎</text>
    
    <circle cx="235" cy="30" r="25" fill="#F87171"/>
    <text x="235" y="38" font-size="24" text-anchor="middle">🍎</text>
    
    <circle cx="305" cy="30" r="25" fill="#F87171"/>
    <text x="305" y="38" font-size="24" text-anchor="middle">🍎</text>
  </g>
  
  <!-- Numbers below items -->
  <text x="105" y="260" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white" text-anchor="middle">1</text>
  <text x="175" y="260" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white" text-anchor="middle">2</text>
  <text x="245" y="260" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white" text-anchor="middle">3</text>
  <text x="315" y="260" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white" text-anchor="middle">4</text>
  <text x="385" y="260" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white" text-anchor="middle">5</text>
</svg>