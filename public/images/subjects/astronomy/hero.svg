<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="astroBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E1B4B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#312E81;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="planetGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D97706;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="sunGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FDE047;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F59E0B;stop-opacity:1" />
    </radialGradient>
  </defs>

  <!-- Background circle (night sky) -->
  <circle cx="100" cy="100" r="95" fill="url(#astroBg)" opacity="0.3"/>

  <!-- Stars -->
  <circle cx="30" cy="30" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="170" cy="40" r="2" fill="white" opacity="0.9"/>
  <circle cx="150" cy="25" r="1" fill="white" opacity="0.7"/>
  <circle cx="45" cy="60" r="1" fill="white" opacity="0.6"/>
  <circle cx="180" cy="80" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="20" cy="100" r="1" fill="white" opacity="0.7"/>
  <circle cx="160" cy="150" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="40" cy="170" r="1" fill="white" opacity="0.6"/>
  <circle cx="130" cy="180" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="85" cy="20" r="1" fill="white" opacity="0.8"/>
  <circle cx="60" cy="45" r="0.8" fill="white" opacity="0.5"/>

  <!-- Saturn with rings -->
  <g transform="translate(130, 70)">
    <ellipse cx="0" cy="0" rx="45" ry="10" fill="none" stroke="#D97706" stroke-width="4" opacity="0.6" transform="rotate(-20)"/>
    <circle cx="0" cy="0" r="22" fill="url(#planetGrad)"/>
    <ellipse cx="0" cy="0" rx="45" ry="10" fill="none" stroke="#FCD34D" stroke-width="3" opacity="0.7" transform="rotate(-20)" clip-path="inset(0 0 50% 0)"/>
    <!-- Planet bands -->
    <ellipse cx="0" cy="-5" rx="20" ry="3" fill="#FBBF24" opacity="0.4"/>
    <ellipse cx="0" cy="5" rx="18" ry="2" fill="#D97706" opacity="0.3"/>
  </g>

  <!-- Telescope -->
  <g transform="translate(20, 100)">
    <!-- Tripod -->
    <line x1="25" y1="50" x2="10" y2="85" stroke="#6B7280" stroke-width="3"/>
    <line x1="25" y1="50" x2="40" y2="85" stroke="#6B7280" stroke-width="3"/>
    <line x1="25" y1="50" x2="25" y2="75" stroke="#6B7280" stroke-width="3"/>
    <!-- Tube -->
    <rect x="15" y="15" width="40" height="15" rx="3" fill="#4B5563" transform="rotate(-30, 35, 22)"/>
    <circle cx="50" cy="5" r="10" fill="#374151" stroke="#1F2937" stroke-width="2"/>
    <circle cx="50" cy="5" r="6" fill="#1E40AF" opacity="0.5"/>
    <!-- Eyepiece -->
    <rect x="5" y="35" width="15" height="8" rx="2" fill="#374151"/>
  </g>

  <!-- Moon -->
  <g transform="translate(40, 35)">
    <circle cx="15" cy="15" r="18" fill="#E5E7EB"/>
    <circle cx="10" cy="10" r="4" fill="#D1D5DB" opacity="0.6"/>
    <circle cx="20" cy="18" r="3" fill="#D1D5DB" opacity="0.5"/>
    <circle cx="12" cy="22" r="2" fill="#D1D5DB" opacity="0.4"/>
  </g>

  <!-- Sun -->
  <circle cx="170" cy="160" r="15" fill="url(#sunGrad)"/>
  <!-- Sun rays -->
  <g stroke="#FDE047" stroke-width="2" opacity="0.7">
    <line x1="170" y1="140" x2="170" y2="132"/>
    <line x1="170" y1="180" x2="170" y2="188"/>
    <line x1="150" y1="160" x2="142" y2="160"/>
    <line x1="190" y1="160" x2="198" y2="160"/>
    <line x1="155" y1="145" x2="150" y2="140"/>
    <line x1="185" y1="145" x2="190" y2="140"/>
    <line x1="155" y1="175" x2="150" y2="180"/>
    <line x1="185" y1="175" x2="190" y2="180"/>
  </g>

  <!-- Orbit path -->
  <ellipse cx="100" cy="140" rx="55" ry="20" fill="none" stroke="#818CF8" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>

  <!-- Small planet on orbit -->
  <circle cx="45" cy="135" r="6" fill="#3B82F6"/>

  <!-- Constellation (Big Dipper hint) -->
  <g fill="#A5B4FC" opacity="0.8">
    <circle cx="75" cy="175" r="2"/>
    <circle cx="85" cy="172" r="2"/>
    <circle cx="95" cy="170" r="2"/>
    <circle cx="105" cy="175" r="2"/>
    <circle cx="115" cy="178" r="2"/>
    <circle cx="120" cy="168" r="2"/>
    <circle cx="110" cy="162" r="2"/>
  </g>
  <g stroke="#A5B4FC" stroke-width="1" opacity="0.4">
    <line x1="75" y1="175" x2="85" y2="172"/>
    <line x1="85" y1="172" x2="95" y2="170"/>
    <line x1="95" y1="170" x2="105" y2="175"/>
    <line x1="105" y1="175" x2="115" y2="178"/>
    <line x1="115" y1="178" x2="120" y2="168"/>
    <line x1="120" y1="168" x2="110" y2="162"/>
  </g>

  <!-- Rocket -->
  <g transform="translate(5, 55)">
    <ellipse cx="12" cy="25" rx="6" ry="15" fill="#EF4444"/>
    <polygon points="12,5 6,18 18,18" fill="#EF4444"/>
    <circle cx="12" cy="20" r="3" fill="#60A5FA"/>
    <polygon points="4,35 8,28 8,38" fill="#F97316"/>
    <polygon points="20,35 16,28 16,38" fill="#F97316"/>
    <!-- Flame -->
    <ellipse cx="12" cy="42" rx="4" ry="8" fill="#FBBF24" opacity="0.8"/>
    <ellipse cx="12" cy="45" rx="2" ry="5" fill="#FEF3C7" opacity="0.9"/>
  </g>
</svg>