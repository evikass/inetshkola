<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="infoBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="url(#infoBg)" rx="20"/>
  
  <!-- Decorative circles -->
  <circle cx="50" cy="50" r="30" fill="#A5B4FC" opacity="0.3"/>
  <circle cx="350" cy="250" r="40" fill="#C4B5FD" opacity="0.3"/>
  
  <!-- Monitor -->
  <rect x="80" y="60" width="240" height="150" rx="15" fill="#1E293B" stroke="#475569" stroke-width="4"/>
  <rect x="95" y="75" width="210" height="110" rx="8" fill="#0F172A"/>
  
  <!-- Screen content - code -->
  <text x="110" y="105" font-family="monospace" font-size="14" fill="#22D3EE">&lt;html&gt;</text>
  <text x="125" y="125" font-family="monospace" font-size="14" fill="#A78BFA">&lt;body&gt;</text>
  <text x="140" y="145" font-family="monospace" font-size="14" fill="#4ADE80">Hello!</text>
  <text x="125" y="165" font-family="monospace" font-size="14" fill="#A78BFA">&lt;/body&gt;</text>
  <text x="110" y="185" font-family="monospace" font-size="14" fill="#22D3EE">&lt;/html&gt;</text>
  
  <!-- Monitor stand -->
  <rect x="175" y="210" width="50" height="20" fill="#475569"/>
  <rect x="150" y="230" width="100" height="10" rx="5" fill="#475569"/>
  
  <!-- Keyboard -->
  <rect x="120" y="250" width="160" height="30" rx="5" fill="#334155" stroke="#475569" stroke-width="2"/>
  <g fill="#64748B">
    <rect x="130" y="258" width="15" height="12" rx="2"/>
    <rect x="150" y="258" width="15" height="12" rx="2"/>
    <rect x="170" y="258" width="15" height="12" rx="2"/>
    <rect x="190" y="258" width="15" height="12" rx="2"/>
    <rect x="210" y="258" width="15" height="12" rx="2"/>
    <rect x="230" y="258" width="15" height="12" rx="2"/>
    <rect x="250" y="258" width="20" height="12" rx="2"/>
  </g>
  
  <!-- Binary decoration -->
  <text x="40" y="150" font-family="monospace" font-size="12" fill="#A5B4FC" opacity="0.5">101</text>
  <text x="40" y="170" font-family="monospace" font-size="12" fill="#A5B4FC" opacity="0.5">010</text>
  <text x="330" y="120" font-family="monospace" font-size="12" fill="#C4B5FD" opacity="0.5">110</text>
  <text x="330" y="140" font-family="monospace" font-size="12" fill="#C4B5FD" opacity="0.5">001</text>
</svg>