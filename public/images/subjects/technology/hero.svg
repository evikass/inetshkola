<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="techBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EA580C;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="url(#techBg)" rx="20"/>
  
  <!-- Decorative elements -->
  <circle cx="50" cy="50" r="25" fill="#FED7AA" opacity="0.3"/>
  <circle cx="350" cy="250" r="35" fill="#FDBA74" opacity="0.3"/>
  
  <!-- Workbench -->
  <rect x="50" y="180" width="300" height="15" rx="3" fill="#78350F"/>
  <rect x="70" y="195" width="20" height="80" fill="#92400E"/>
  <rect x="310" y="195" width="20" height="80" fill="#92400E"/>
  
  <!-- Hammer -->
  <g transform="translate(80, 100) rotate(-30)">
    <rect x="0" y="0" width="12" height="70" rx="3" fill="#A16207"/>
    <rect x="-15" y="-25" width="45" height="30" rx="5" fill="#71717A"/>
    <rect x="-15" y="-25" width="45" height="10" rx="3" fill="#52525B"/>
  </g>
  
  <!-- Saw -->
  <g transform="translate(170, 80)">
    <rect x="0" y="0" width="100" height="15" rx="3" fill="#A1A1AA"/>
    <rect x="0" y="0" width="15" height="15" rx="3" fill="#71717A"/>
    <!-- Saw teeth -->
    <g fill="#52525B">
      <polygon points="15,15 20,22 25,15"/>
      <polygon points="25,15 30,22 35,15"/>
      <polygon points="35,15 40,22 45,15"/>
      <polygon points="45,15 50,22 55,15"/>
      <polygon points="55,15 60,22 65,15"/>
      <polygon points="65,15 70,22 75,15"/>
      <polygon points="75,15 80,22 85,15"/>
      <polygon points="85,15 90,22 95,15"/>
      <polygon points="95,15 100,22 100,15"/>
    </g>
    <rect x="100" y="-5" width="40" height="25" rx="5" fill="#A16207"/>
  </g>
  
  <!-- Wrench -->
  <g transform="translate(300, 100) rotate(20)">
    <path d="M0,30 L0,60 Q0,70 10,70 L20,70 Q30,70 30,60 L30,30 Q45,25 45,10 Q45,-10 25,-10 L25,5 L15,5 L15,-10 Q-5,-10 -5,10 Q-5,25 0,30" fill="#71717A"/>
    <circle cx="20" cy="5" r="5" fill="#52525B"/>
  </g>
  
  <!-- Nails/Screws -->
  <g transform="translate(70, 150)">
    <rect x="0" y="0" width="4" height="20" fill="#71717A"/>
    <circle cx="2" cy="0" r="5" fill="#A1A1AA"/>
  </g>
  <g transform="translate(90, 155)">
    <rect x="0" y="0" width="4" height="18" fill="#71717A"/>
    <circle cx="2" cy="0" r="5" fill="#A1A1AA"/>
  </g>
  
  <!-- Wood piece -->
  <rect x="180" y="140" width="80" height="35" rx="3" fill="#D97706"/>
  <line x1="185" y1="150" x2="255" y2="150" stroke="#B45309" stroke-width="1"/>
  <line x1="185" y1="160" x2="255" y2="160" stroke="#B45309" stroke-width="1"/>
  
  <!-- Pencil -->
  <g transform="translate(320, 160) rotate(-10)">
    <rect x="0" y="0" width="8" height="50" fill="#FCD34D"/>
    <polygon points="0,50 4,65 8,50" fill="#FBBF24"/>
    <rect x="0" y="0" width="8" height="10" fill="#F472B6"/>
  </g>
</svg>