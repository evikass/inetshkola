<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="chemBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0891B2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0E7490;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="url(#chemBg)" rx="20"/>
  
  <!-- Decorative circles -->
  <circle cx="50" cy="50" r="30" fill="#22D3EE" opacity="0.4"/>
  <circle cx="350" cy="250" r="40" fill="#06B6D4" opacity="0.4"/>
  
  <!-- Test tubes -->
  <g transform="translate(50, 80)">
    <rect x="0" y="0" width="20" height="70" fill="#E0F2FE" rx="2"/>
    <ellipse cx="10" cy="70" rx="10" ry="5" fill="#E0F2FE"/>
    <rect x="2" y="40" width="16" height="30" fill="#22C55E" opacity="0.7"/>
    
    <rect x="30" y="10" width="20" height="60" fill="#E0F2FE" rx="2"/>
    <ellipse cx="40" cy="70" rx="10" ry="5" fill="#E0F2FE"/>
    <rect x="32" y="30" width="16" height="40" fill="#3B82F6" opacity="0.7"/>
    
    <rect x="60" y="5" width="20" height="65" fill="#E0F2FE" rx="2"/>
    <ellipse cx="70" cy="70" rx="10" ry="5" fill="#E0F2FE"/>
    <rect x="62" y="20" width="16" height="50" fill="#EF4444" opacity="0.7"/>
  </g>
  
  <!-- Beaker -->
  <g transform="translate(150, 130)">
    <path d="M0,0 L0,80 Q0,100 20,100 L60,100 Q80,100 80,80 L80,0 Z" fill="#E0F2FE"/>
    <rect x="0" y="0" width="80" height="10" fill="#CFD9E8"/>
    <rect x="5" y="50" width="70" height="50" fill="#A855F7" opacity="0.6"/>
    <!-- Bubbles -->
    <circle cx="25" cy="70" r="4" fill="#C4B5FD"/>
    <circle cx="50" cy="65" r="3" fill="#C4B5FD"/>
    <circle cx="60" cy="75" r="5" fill="#C4B5FD"/>
  </g>
  
  <!-- Flask with bubbles -->
  <g transform="translate(260, 100)">
    <path d="M20,0 L20,40 L0,90 Q0,110 20,110 L50,110 Q70,110 70,90 L50,40 L50,0 Z" fill="#E0F2FE"/>
    <rect x="15" y="0" width="40" height="15" fill="#CFD9E8"/>
    <ellipse cx="35" cy="90" rx="30" ry="20" fill="#22D3EE" opacity="0.6"/>
    <!-- Bubbles -->
    <circle cx="25" cy="80" r="5" fill="#A5F3FC"/>
    <circle cx="45" cy="75" r="4" fill="#A5F3FC"/>
    <circle cx="35" cy="85" r="3" fill="#A5F3FC"/>
  </g>
  
  <!-- Periodic table element -->
  <g transform="translate(340, 50)">
    <rect x="0" y="0" width="50" height="60" fill="#FEF3C7" stroke="#92400E" stroke-width="2" rx="3"/>
    <text x="5" y="18" font-family="Arial" font-size="12" fill="#92400E">1</text>
    <text x="25" y="45" font-family="Arial Black" font-size="24" fill="#B45309" text-anchor="middle">H</text>
    <text x="25" y="55" font-family="Arial" font-size="8" fill="#92400E" text-anchor="middle">Hydrogen</text>
  </g>
  
  <!-- Molecule -->
  <g transform="translate(100, 200)">
    <circle cx="0" cy="30" r="15" fill="#EF4444"/>
    <circle cx="40" cy="0" r="12" fill="#FFFFFF"/>
    <circle cx="40" cy="60" r="12" fill="#FFFFFF"/>
    <line x1="10" y1="20" x2="30" y2="10" stroke="#9CA3AF" stroke-width="4"/>
    <line x1="10" y1="40" x2="30" y2="50" stroke="#9CA3AF" stroke-width="4"/>
    <text x="-3" y="35" font-family="Arial" font-size="12" fill="#FFF" font-weight="bold">O</text>
    <text x="35" y="5" font-family="Arial" font-size="10" fill="#1F2937" font-weight="bold">H</text>
    <text x="35" y="65" font-family="Arial" font-size="10" fill="#1F2937" font-weight="bold">H</text>
  </g>
  
  <!-- DNA-like structure -->
  <g transform="translate(200, 220)">
    <path d="M0,0 Q15,10 30,0 Q45,-10 60,0" fill="none" stroke="#A78BFA" stroke-width="3"/>
    <path d="M0,15 Q15,5 30,15 Q45,25 60,15" fill="none" stroke="#C4B5FD" stroke-width="3"/>
    <circle cx="15" cy="5" r="4" fill="#8B5CF6"/>
    <circle cx="45" cy="5" r="4" fill="#A78BFA"/>
    <circle cx="0" cy="7" r="4" fill="#C4B5FD"/>
    <circle cx="30" cy="7" r="4" fill="#DDD6FE"/>
    <circle cx="60" cy="7" r="4" fill="#C4B5FD"/>
  </g>
  
  <!-- Safety goggles -->
  <g transform="translate(280, 200)">
    <ellipse cx="20" cy="20" rx="25" ry="18" fill="#67E8F9" stroke="#0891B2" stroke-width="3"/>
    <ellipse cx="70" cy="20" rx="25" ry="18" fill="#67E8F9" stroke="#0891B2" stroke-width="3"/>
    <line x1="45" y1="20" x2="45" y2="20" stroke="#0891B2" stroke-width="8"/>
    <line x1="0" y1="10" x2="-10" y2="5" stroke="#0891B2" stroke-width="3"/>
    <line x1="90" y1="10" x2="100" y2="5" stroke="#0891B2" stroke-width="3"/>
  </g>
  
  <!-- Bubbles floating -->
  <circle cx="320" cy="150" r="8" fill="#A5F3FC" opacity="0.6"/>
  <circle cx="340" cy="170" r="5" fill="#A5F3FC" opacity="0.5"/>
  <circle cx="350" cy="140" r="6" fill="#A5F3FC" opacity="0.7"/>
  
  <!-- Stars -->
  <polygon points="180,70 183,76 190,76 185,80 187,87 180,83 173,87 175,80 170,76 177,76" fill="#FCD34D"/>
  <polygon points="50,250 53,256 60,256 55,260 57,267 50,263 43,267 45,260 40,256 47,256" fill="#FBBF24"/>
</svg>