<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="numGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FCD34D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F59E0B;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="url(#bgGrad)" rx="20"/>
  
  <!-- Decorative circles -->
  <circle cx="50" cy="50" r="30" fill="#818CF8" opacity="0.3"/>
  <circle cx="350" cy="250" r="40" fill="#A78BFA" opacity="0.3"/>
  <circle cx="380" cy="50" r="25" fill="#C4B5FD" opacity="0.4"/>
  
  <!-- Numbers -->
  <text x="60" y="100" font-family="Arial Black, sans-serif" font-size="48" fill="url(#numGrad)" font-weight="bold">1</text>
  <text x="120" y="80" font-family="Arial Black, sans-serif" font-size="36" fill="#FCD34D" font-weight="bold">2</text>
  <text x="170" y="110" font-family="Arial Black, sans-serif" font-size="52" fill="#FBBF24" font-weight="bold">3</text>
  <text x="240" y="90" font-family="Arial Black, sans-serif" font-size="40" fill="#F59E0B" font-weight="bold">4</text>
  <text x="300" y="100" font-family="Arial Black, sans-serif" font-size="44" fill="#FCD34D" font-weight="bold">5</text>
  
  <!-- Shapes -->
  <!-- Circle -->
  <circle cx="80" cy="200" r="35" fill="#34D399" opacity="0.9"/>
  <circle cx="80" cy="200" r="25" fill="#6EE7B7"/>
  
  <!-- Triangle -->
  <polygon points="160,165 200,235 120,235" fill="#F472B6" opacity="0.9"/>
  <polygon points="160,180 185,220 135,220" fill="#F9A8D4"/>
  
  <!-- Square -->
  <rect x="230" y="165" width="70" height="70" fill="#60A5FA" opacity="0.9" rx="5"/>
  <rect x="245" y="180" width="40" height="40" fill="#93C5FD" rx="3"/>
  
  <!-- Math symbols -->
  <text x="330" y="190" font-family="Arial, sans-serif" font-size="50" fill="#FBBF24">+</text>
  <text x="360" y="230" font-family="Arial, sans-serif" font-size="50" fill="#FB923C">−</text>
  
  <!-- Stars -->
  <polygon points="50,270 55,280 65,280 57,287 60,297 50,290 40,297 43,287 35,280 45,280" fill="#FCD34D"/>
  <polygon points="350,140 354,148 363,148 356,154 359,163 350,157 341,163 344,154 337,148 346,148" fill="#FCD34D"/>
  
  <!-- Calculator icon -->
  <rect x="150" y="240" width="50" height="40" fill="#1E1B4B" rx="5" opacity="0.8"/>
  <rect x="155" y="245" width="40" height="15" fill="#4ADE80" rx="2"/>
  <circle cx="162" cy="270" r="3" fill="#FFF"/>
  <circle cx="175" cy="270" r="3" fill="#FFF"/>
  <circle cx="188" cy="270" r="3" fill="#FFF"/>
</svg>