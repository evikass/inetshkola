<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg15" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f2027"/>
      <stop offset="100%" style="stop-color:#2c5364"/>
    </linearGradient>
    <linearGradient id="exp1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f5af19"/>
      <stop offset="100%" style="stop-color:#f12711"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg15)"/>
  
  <!-- Main exponential -->
  <text x="400" y="150" text-anchor="middle" font-family="Georgia, serif" font-size="64" font-weight="bold" fill="#ffffff">a<tspan baseline-shift="super" font-size="36">x</tspan> = b</text>
  
  <!-- Solution -->
  <text x="400" y="230" text-anchor="middle" font-family="Georgia, serif" font-size="36" fill="#f5af19">x = log<tspan baseline-shift="sub" font-size="20">a</tspan> b</text>
  
  <!-- Properties -->
  <g transform="translate(400, 300)">
    <text x="0" y="0" text-anchor="middle" font-family="Georgia, serif" font-size="24" fill="#ffffff">a<tspan baseline-shift="super" font-size="16">x</tspan> · a<tspan baseline-shift="super" font-size="16">y</tspan> = a<tspan baseline-shift="super" font-size="16">x+y</tspan></text>
    <text x="0" y="45" text-anchor="middle" font-family="Georgia, serif" font-size="24" fill="#ffffff">a<tspan baseline-shift="super" font-size="16">x</tspan> ÷ a<tspan baseline-shift="super" font-size="16">y</tspan> = a<tspan baseline-shift="super" font-size="16">x-y</tspan></text>
    <text x="0" y="90" text-anchor="middle" font-family="Georgia, serif" font-size="24" fill="#ffffff">(a<tspan baseline-shift="super" font-size="16">x</tspan>)<tspan baseline-shift="super" font-size="16">y</tspan> = a<tspan baseline-shift="super" font-size="16">xy</tspan></text>
  </g>
  
  <!-- Example -->
  <g transform="translate(650, 150)">
    <rect x="-80" y="-50" width="160" height="100" rx="10" fill="#ffffff" fill-opacity="0.1"/>
    <text x="0" y="-10" text-anchor="middle" font-family="Georgia, serif" font-size="28" fill="#f5af19">2<tspan baseline-shift="super" font-size="18">x</tspan> = 8</text>
    <text x="0" y="30" text-anchor="middle" font-family="Georgia, serif" font-size="24" fill="#ffffff">x = 3</text>
  </g>
  
  <!-- Decorative exponential curve hint -->
  <path d="M 100 400 Q 200 380 250 350 Q 350 280 500 150 Q 600 80 700 50" fill="none" stroke="#f5af19" stroke-width="3" opacity="0.4"/>
  
  <!-- Decorative elements -->
  <circle cx="100" cy="80" r="25" fill="#f5af19" opacity="0.2"/>
  <circle cx="700" cy="420" r="35" fill="#f12711" opacity="0.15"/>
  
  <!-- Title -->
  <text x="400" y="480" text-anchor="middle" font-family="Georgia, serif" font-size="24" font-weight="bold" fill="#ffffff">Показательные уравнения</text>
</svg>