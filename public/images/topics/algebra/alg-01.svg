<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="eq1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4facfe"/>
      <stop offset="100%" style="stop-color:#00f2fe"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg1)"/>
  
  <!-- Grid lines -->
  <g stroke="#ffffff" stroke-opacity="0.1" stroke-width="1">
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="100" y1="0" x2="100" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="500"/>
    <line x1="300" y1="0" x2="300" y2="500"/>
    <line x1="400" y1="0" x2="400" y2="500"/>
    <line x1="500" y1="0" x2="500" y2="500"/>
    <line x1="600" y1="0" x2="600" y2="500"/>
    <line x1="700" y1="0" x2="700" y2="500"/>
  </g>
  
  <!-- Main equation -->
  <text x="400" y="200" text-anchor="middle" font-family="Georgia, serif" font-size="72" font-weight="bold" fill="url(#eq1)">ax + b = 0</text>
  
  <!-- Solution steps -->
  <text x="400" y="300" text-anchor="middle" font-family="Georgia, serif" font-size="36" fill="#4facfe" opacity="0.8">x = −b/a</text>
  
  <!-- Decorative elements -->
  <circle cx="100" cy="100" r="30" fill="#4facfe" opacity="0.2"/>
  <circle cx="700" cy="400" r="40" fill="#00f2fe" opacity="0.15"/>
  <circle cx="650" cy="80" r="20" fill="#4facfe" opacity="0.3"/>
  
  <!-- Balance scale symbol -->
  <g transform="translate(400, 420)">
    <line x1="-60" y1="0" x2="60" y2="0" stroke="#00f2fe" stroke-width="4"/>
    <line x1="0" y1="-40" x2="0" y2="0" stroke="#00f2fe" stroke-width="3"/>
    <polygon points="-60,0 -70,30 -50,30" fill="#4facfe" opacity="0.6"/>
    <polygon points="60,0 50,30 70,30" fill="#4facfe" opacity="0.6"/>
  </g>
  
  <!-- Title -->
  <text x="400" y="480" text-anchor="middle" font-family="Georgia, serif" font-size="24" font-weight="bold" fill="#ffffff">Линейные уравнения</text>
</svg>