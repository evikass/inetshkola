<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3c72"/>
      <stop offset="100%" style="stop-color:#2a5298"/>
    </linearGradient>
    <linearGradient id="poly1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#74ebd5"/>
      <stop offset="100%" style="stop-color:#acb6e5"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg5)"/>
  
  <!-- Monomial box -->
  <rect x="80" y="120" width="280" height="120" rx="15" fill="#ffffff" fill-opacity="0.1" stroke="#74ebd5" stroke-width="2"/>
  <text x="220" y="160" text-anchor="middle" font-family="Georgia, serif" font-size="20" fill="#74ebd5">Одночлен</text>
  <text x="220" y="210" text-anchor="middle" font-family="Georgia, serif" font-size="48" font-weight="bold" fill="#ffffff">3x²y</text>
  
  <!-- Plus sign -->
  <text x="400" y="200" text-anchor="middle" font-family="Georgia, serif" font-size="72" font-weight="bold" fill="#acb6e5">+</text>
  
  <!-- Monomial 2 -->
  <rect x="440" y="120" width="280" height="120" rx="15" fill="#ffffff" fill-opacity="0.1" stroke="#acb6e5" stroke-width="2"/>
  <text x="580" y="160" text-anchor="middle" font-family="Georgia, serif" font-size="20" fill="#acb6e5">Одночлен</text>
  <text x="580" y="210" text-anchor="middle" font-family="Georgia, serif" font-size="48" font-weight="bold" fill="#ffffff">5xy²</text>
  
  <!-- Equals -->
  <text x="400" y="320" text-anchor="middle" font-family="Georgia, serif" font-size="60" font-weight="bold" fill="#74ebd5">=</text>
  
  <!-- Polynomial -->
  <rect x="200" y="350" width="400" height="80" rx="15" fill="url(#poly1)" fill-opacity="0.2" stroke="url(#poly1)" stroke-width="3"/>
  <text x="400" y="405" text-anchor="middle" font-family="Georgia, serif" font-size="36" font-weight="bold" fill="#ffffff">Многочлен: 3x²y + 5xy²</text>
  
  <!-- Decorative elements -->
  <circle cx="100" cy="80" r="30" fill="#74ebd5" opacity="0.2"/>
  <circle cx="700" cy="450" r="40" fill="#acb6e5" opacity="0.15"/>
  
  <!-- Degree indicators -->
  <text x="220" y="260" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#ffffff" opacity="0.6">степень: 3</text>
  <text x="580" y="260" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#ffffff" opacity="0.6">степень: 3</text>
  
  <!-- Title -->
  <text x="400" y="480" text-anchor="middle" font-family="Georgia, serif" font-size="24" font-weight="bold" fill="#ffffff">Многочлены</text>
</svg>