<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg12" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1f1c2c"/>
      <stop offset="100%" style="stop-color:#928dab"/>
    </linearGradient>
    <linearGradient id="log1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f953c6"/>
      <stop offset="100%" style="stop-color:#b91d73"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg12)"/>
  
  <!-- Main logarithm -->
  <text x="400" y="150" text-anchor="middle" font-family="Georgia, serif" font-size="72" font-weight="bold" fill="#ffffff">log<tspan baseline-shift="sub" font-size="36">a</tspan> b = c</text>
  
  <!-- Definition -->
  <text x="400" y="220" text-anchor="middle" font-family="Georgia, serif" font-size="28" fill="#f953c6">aᶜ = b</text>
  
  <!-- Properties -->
  <g transform="translate(400, 300)">
    <text x="0" y="0" text-anchor="middle" font-family="Georgia, serif" font-size="24" fill="#ffffff">log<tspan baseline-shift="sub" font-size="14">a</tspan> (xy) = log<tspan baseline-shift="sub" font-size="14">a</tspan> x + log<tspan baseline-shift="sub" font-size="14">a</tspan> y</text>
    <text x="0" y="45" text-anchor="middle" font-family="Georgia, serif" font-size="24" fill="#ffffff">log<tspan baseline-shift="sub" font-size="14">a</tspan> (x/y) = log<tspan baseline-shift="sub" font-size="14">a</tspan> x − log<tspan baseline-shift="sub" font-size="14">a</tspan> y</text>
    <text x="0" y="90" text-anchor="middle" font-family="Georgia, serif" font-size="24" fill="#ffffff">log<tspan baseline-shift="sub" font-size="14">a</tspan> xⁿ = n · log<tspan baseline-shift="sub" font-size="14">a</tspan> x</text>
  </g>
  
  <!-- Special logs -->
  <g transform="translate(150, 420)">
    <text x="0" y="0" font-family="Georgia, serif" font-size="20" fill="#f953c6">ln x = log<tspan baseline-shift="sub" font-size="12">e</tspan> x</text>
    <text x="0" y="35" font-family="Georgia, serif" font-size="16" fill="#ffffff" opacity="0.7">(натуральный)</text>
  </g>
  
  <g transform="translate(450, 420)">
    <text x="0" y="0" font-family="Georgia, serif" font-size="20" fill="#b91d73">lg x = log<tspan baseline-shift="sub" font-size="12">10</tspan> x</text>
    <text x="0" y="35" font-family="Georgia, serif" font-size="16" fill="#ffffff" opacity="0.7">(десятичный)</text>
  </g>
  
  <!-- Decorative elements -->
  <circle cx="100" cy="80" r="25" fill="#f953c6" opacity="0.2"/>
  <circle cx="700" cy="400" r="35" fill="#b91d73" opacity="0.15"/>
  
  <!-- Title -->
  <text x="400" y="480" text-anchor="middle" font-family="Georgia, serif" font-size="24" font-weight="bold" fill="#ffffff">Логарифмы</text>
</svg>