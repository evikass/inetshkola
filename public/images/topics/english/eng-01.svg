<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bgeng" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1565c0"/>
      <stop offset="100%" style="stop-color:#1976d2"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bgeng)"/>
  
  <!-- Буквы ABC -->
  <text x="150" y="180" font-family="Georgia, serif" font-size="100" font-weight="bold" fill="#ffffff" opacity="0.9">A</text>
  <text x="300" y="250" font-family="Georgia, serif" font-size="90" font-weight="bold" fill="#64b5f6" opacity="0.85">B</text>
  <text x="450" y="200" font-family="Georgia, serif" font-size="110" font-weight="bold" fill="#ffffff" opacity="0.88">C</text>
  
  <!-- Флаг UK (упрощённый) -->
  <rect x="550" y="120" width="180" height="120" fill="#0d47a1" opacity="0.8"/>
  <line x1="550" y1="180" x2="730" y2="180" stroke="#ffffff" stroke-width="8"/>
  <line x1="640" y1="120" x2="640" y2="240" stroke="#ffffff" stroke-width="8"/>
  <line x1="550" y1="180" x2="730" y2="180" stroke="#ff0000" stroke-width="4"/>
  <line x1="640" y1="120" x2="640" y2="240" stroke="#ff0000" stroke-width="4"/>
  
  <!-- Диалог -->
  <rect x="100" y="320" width="250" height="80" rx="15" fill="#ffffff" opacity="0.15"/>
  <text x="130" y="370" font-family="Georgia, serif" font-size="22" fill="#ffffff" opacity="0.8">Hello!</text>
  
  <rect x="400" y="350" width="280" height="70" rx="15" fill="#64b5f6" opacity="0.2"/>
  <text x="430" y="395" font-family="Georgia, serif" font-size="20" fill="#ffffff" opacity="0.7">How are you?</text>
  
  <!-- Декоративные элементы -->
  <circle cx="100" cy="80" r="30" fill="#64b5f6" opacity="0.2"/>
  <circle cx="700" cy="430" r="40" fill="#ffffff" opacity="0.1"/>
  
  <text x="400" y="480" text-anchor="middle" font-family="Georgia, serif" font-size="24" font-weight="bold" fill="#ffffff">English</text>
</svg>