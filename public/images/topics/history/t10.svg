<svg viewBox="0 0 300 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cathSky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FDE68A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FEF3C7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldDome" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#D97706;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FDE047;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FEF3C7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenDome" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#22C55E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#15803D;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect x="0" y="0" width="300" height="130" fill="url(#cathSky)"/>

  <!-- Ground -->
  <rect x="0" y="130" width="300" height="70" fill="#365314"/>

  <!-- Winter Palace -->
  <g transform="translate(20, 50)">
    <!-- Main building -->
    <rect x="0" y="30" width="120" height="50" fill="#BAE6FD"/>
    <!-- Columns -->
    <g fill="#E0F2FE">
      <rect x="5" y="35" width="6" height="40"/>
      <rect x="20" y="35" width="6" height="40"/>
      <rect x="35" y="35" width="6" height="40"/>
      <rect x="50" y="35" width="6" height="40"/>
      <rect x="65" y="35" width="6" height="40"/>
      <rect x="80" y="35" width="6" height="40"/>
      <rect x="95" y="35" width="6" height="40"/>
      <rect x="110" y="35" width="6" height="40"/>
    </g>
    <!-- Windows -->
    <g fill="#1E40AF">
      <rect x="10" y="45" width="10" height="15" rx="5"/>
      <rect x="30" y="45" width="10" height="15" rx="5"/>
      <rect x="55" y="45" width="10" height="15" rx="5"/>
      <rect x="80" y="45" width="10" height="15" rx="5"/>
      <rect x="100" y="45" width="10" height="15" rx="5"/>
    </g>
    <!-- Roof -->
    <rect x="0" y="25" width="120" height="8" fill="#6B7280"/>
    <!-- Decorative top -->
    <rect x="0" y="22" width="120" height="5" fill="#FDE047"/>
  </g>

  <!-- St. Isaac's Cathedral -->
  <g transform="translate(160, 20)">
    <!-- Base -->
    <rect x="20" y="70" width="80" height="40" fill="#E7E5E4"/>
    <!-- Portico columns -->
    <g fill="#D4D4D8">
      <rect x="15" y="50" width="5" height="60"/>
      <rect x="30" y="50" width="5" height="60"/>
      <rect x="45" y="50" width="5" height="60"/>
      <rect x="60" y="50" width="5" height="60"/>
      <rect x="75" y="50" width="5" height="60"/>
      <rect x="90" y="50" width="5" height="60"/>
      <rect x="100" y="50" width="5" height="60"/>
    </g>
    <!-- Main dome -->
    <ellipse cx="60" cy="35" rx="30" ry="25" fill="url(#goldDome)"/>
    <!-- Dome details -->
    <ellipse cx="60" cy="30" rx="20" ry="15" fill="none" stroke="#D97706" stroke-width="1"/>
    <!-- Small domes -->
    <ellipse cx="25" cy="55" rx="10" ry="8" fill="url(#goldDome)"/>
    <ellipse cx="95" cy="55" rx="10" ry="8" fill="url(#goldDome)"/>
    <!-- Cross on main dome -->
    <line x1="60" y1="10" x2="60" y2="-5" stroke="#D97706" stroke-width="3"/>
    <line x1="55" y1="0" x2="65" y2="0" stroke="#D97706" stroke-width="3"/>
  </g>

  <!-- Catherine II -->
  <g transform="translate(5, 50)">
    <!-- Dress -->
    <ellipse cx="25" cy="55" rx="20" ry="30" fill="#7C3AED"/>
    <!-- Decorations -->
    <ellipse cx="25" cy="50" rx="16" ry="25" fill="#8B5CF6"/>
    <!-- Sash -->
    <line x1="10" y1="40" x2="40" y2="65" stroke="#FDE047" stroke-width="4"/>
    <!-- Face -->
    <circle cx="25" cy="18" r="12" fill="#FBBF24"/>
    <!-- Eyes -->
    <circle cx="22" cy="16" r="2" fill="#1F2937"/>
    <circle cx="28" cy="16" r="2" fill="#1F2937"/>
    <!-- Hair -->
    <ellipse cx="25" cy="8" rx="14" ry="10" fill="#78350F"/>
    <!-- Tiara/Crown -->
    <path d="M 12 5 L 15 -5 L 20 0 L 25 -8 L 30 0 L 35 -5 L 38 5" fill="#FDE047"/>
    <circle cx="25" cy="-5" r="3" fill="#EF4444"/>
    <!-- Imperial crown -->
    <ellipse cx="25" cy="-12" rx="12" ry="6" fill="#FDE047"/>
    <polygon points="25,-20 18,-12 32,-12" fill="#FDE047"/>
    <line x1="25" y1="-20" x2="25" y2="-28" stroke="#D97706" stroke-width="2"/>
    <circle cx="25" cy="-28" r="4" fill="#EF4444"/>
    <!-- Fan -->
    <g transform="translate(42, 45)">
      <path d="M 0 0 Q 15 -25 30 0" fill="#FDE68A"/>
      <line x1="0" y1="0" x2="15" y2="-20" stroke="#D97706" stroke-width="1"/>
      <line x1="30" y1="0" x2="15" y2="-20" stroke="#D97706" stroke-width="1"/>
    </g>
    <!-- Order of St. Catherine -->
    <circle cx="20" cy="45" r="5" fill="#EF4444"/>
    <circle cx="20" cy="45" r="3" fill="#FDE047"/>
  </g>

  <!-- Book/Scroll (Nakaz) -->
  <g transform="translate(240, 30)">
    <rect x="0" y="0" width="45" height="55" rx="3" fill="#FEF3C7"/>
    <circle cx="5" cy="5" r="6" fill="#D97706"/>
    <circle cx="5" cy="50" r="6" fill="#D97706"/>
    <!-- Text lines -->
    <line x1="12" y1="12" x2="40" y2="12" stroke="#78350F" stroke-width="1"/>
    <line x1="12" y1="20" x2="38" y2="20" stroke="#78350F" stroke-width="1"/>
    <line x1="12" y1="28" x2="40" y2="28" stroke="#78350F" stroke-width="1"/>
    <line x1="12" y1="36" x2="35" y2="36" stroke="#78350F" stroke-width="1"/>
    <line x1="12" y1="44" x2="40" y2="44" stroke="#78350F" stroke-width="1"/>
    <!-- Seal -->
    <circle cx="30" cy="45" r="5" fill="#DC2626"/>
  </g>

  <!-- Eagle (double-headed) -->
  <g transform="translate(260, 90)">
    <ellipse cx="15" cy="15" rx="12" ry="8" fill="#D97706"/>
    <circle cx="15" cy="12" r="4" fill="#D97706"/>
    <!-- Left head -->
    <ellipse cx="5" cy="8" rx="5" ry="6" fill="#D97706"/>
    <polygon points="0,5 -3,0 3,3" fill="#D97706"/>
    <!-- Right head -->
    <ellipse cx="25" cy="8" rx="5" ry="6" fill="#D97706"/>
    <polygon points="30,5 33,0 27,3" fill="#D97706"/>
    <!-- Wings -->
    <path d="M 5 15 Q -5 25 5 35" stroke="#D97706" stroke-width="3" fill="none"/>
    <path d="M 25 15 Q 35 25 25 35" stroke="#D97706" stroke-width="3" fill="none"/>
    <!-- Crowns -->
    <circle cx="5" cy="2" r="3" fill="#FDE047"/>
    <circle cx="25" cy="2" r="3" fill="#FDE047"/>
    <circle cx="15" cy="0" r="4" fill="#FDE047"/>
  </g>

  <!-- Title hint -->
  <text x="150" y="195" font-family="Georgia, serif" font-size="10" fill="#7C3AED" text-anchor="middle" font-style="italic">Екатерина II. Просвещение</text>
</svg>