<svg viewBox="0 0 300 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="rusSky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7DD3FC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#BAE6FD;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="woodGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#92400E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#78350F;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="domeGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#D97706;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FDE047;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect x="0" y="0" width="300" height="140" fill="url(#rusSky)"/>

  <!-- Sun -->
  <circle cx="50" cy="35" r="22" fill="#FDE047" opacity="0.9"/>

  <!-- Ground -->
  <rect x="0" y="140" width="300" height="60" fill="#365314"/>
  <ellipse cx="150" cy="140" rx="200" ry="12" fill="#4D7C0F"/>

  <!-- Dnieper River -->
  <path d="M 0 155 Q 40 145 80 160 Q 130 175 180 155 Q 230 135 280 150 Q 300 155 300 155 L 300 200 L 0 200 Z" fill="#3B82F6"/>
  <!-- River shine -->
  <path d="M 30 160 Q 50 155 70 162" stroke="#60A5FA" stroke-width="2" fill="none" opacity="0.5"/>

  <!-- Kiev/Church (St. Sophia style) -->
  <g transform="translate(100, 40)">
    <!-- Main building -->
    <rect x="20" y="50" width="80" height="50" fill="#E7E5E4"/>
    <!-- Central dome -->
    <ellipse cx="60" cy="45" rx="20" ry="15" fill="url(#domeGrad)"/>
    <rect x="55" y="42" width="10" height="8" fill="#D97706"/>
    <circle cx="60" cy="38" r="3" fill="#FDE047"/>
    <line x1="60" y1="35" x2="60" y2="28" stroke="#D97706" stroke-width="2"/>
    <path d="M 57 28 L 60 22 L 63 28" fill="#FDE047"/>
    <!-- Side domes -->
    <ellipse cx="30" cy="55" rx="12" ry="10" fill="#FDE047"/>
    <circle cx="30" cy="50" r="2" fill="#D97706"/>
    <ellipse cx="90" cy="55" rx="12" ry="10" fill="#FDE047"/>
    <circle cx="90" cy="50" r="2" fill="#D97706"/>
    <!-- Windows -->
    <rect x="45" y="60" width="10" height="20" rx="5" fill="#1E40AF"/>
    <rect x="65" y="60" width="10" height="20" rx="5" fill="#1E40AF"/>
    <!-- Entrance -->
    <rect x="50" y="80" width="20" height="20" rx="10" fill="#78350F"/>
    <!-- Decorative arches -->
    <path d="M 20 95 L 20 50 L 100 50 L 100 95" fill="none" stroke="#D97706" stroke-width="2"/>
  </g>

  <!-- Wooden fort/Kremlin wall -->
  <g transform="translate(15, 70)">
    <!-- Log wall -->
    <rect x="0" y="50" width="60" height="30" fill="url(#woodGrad)"/>
    <!-- Horizontal logs texture -->
    <line x1="0" y1="58" x2="60" y2="58" stroke="#78350F" stroke-width="1"/>
    <line x1="0" y1="66" x2="60" y2="66" stroke="#78350F" stroke-width="1"/>
    <line x1="0" y1="74" x2="60" y2="74" stroke="#78350F" stroke-width="1"/>
    <!-- Tower -->
    <rect x="45" y="25" width="20" height="55" fill="#92400E"/>
    <polygon points="55,10 42,25 68,25" fill="#DC2626"/>
    <!-- Tower window -->
    <rect x="50" y="35" width="8" height="12" rx="4" fill="#1F2937"/>
  </g>

  <!-- Prince on horse -->
  <g transform="translate(220, 95)">
    <!-- Horse -->
    <ellipse cx="25" cy="20" rx="22" ry="10" fill="#78350F"/>
    <ellipse cx="48" cy="15" rx="8" ry="5" fill="#92400E"/>
    <circle cx="52" cy="12" r="2" fill="#1F2937"/>
    <!-- Legs -->
    <rect x="10" y="25" width="4" height="15" fill="#78350F"/>
    <rect x="25" y="25" width="4" height="15" fill="#78350F"/>
    <rect x="38" y="25" width="4" height="12" fill="#78350F"/>
    <!-- Tail -->
    <path d="M 3 20 Q -5 25 0 35" stroke="#57534E" stroke-width="3" fill="none"/>
    <!-- Prince body -->
    <ellipse cx="25" cy="8" rx="7" ry="9" fill="#DC2626"/>
    <!-- Prince head -->
    <circle cx="25" cy="-5" r="6" fill="#FBBF24"/>
    <!-- Hat -->
    <ellipse cx="25" cy="-12" rx="8" ry="4" fill="#DC2626"/>
    <rect x="23" y="-18" width="4" height="6" fill="#FDE047"/>
    <!-- Shield -->
    <ellipse cx="15" cy="5" rx="6" ry="10" fill="#DC2626"/>
    <ellipse cx="15" cy="5" rx="4" ry="6" fill="#FDE047"/>
  </g>

  <!-- Birch trees -->
  <g transform="translate(250, 100)">
    <rect x="8" y="10" width="4" height="40" fill="#FEF3C7"/>
    <ellipse cx="10" cy="5" rx="8" ry="10" fill="#22C55E"/>
    <!-- Birch marks -->
    <line x1="9" y1="20" x2="11" y2="18" stroke="#1F2937" stroke-width="1"/>
    <line x1="9" y1="30" x2="11" y2="28" stroke="#1F2937" stroke-width="1"/>
  </g>

  <!-- Warrior with shield -->
  <g transform="translate(5, 115)">
    <ellipse cx="15" cy="18" rx="6" ry="8" fill="#71717A"/>
    <circle cx="15" cy="8" r="5" fill="#FBBF24"/>
    <ellipse cx="25" cy="18" rx="8" ry="12" fill="#DC2626"/>
    <path d="M 20 10 L 35 0" stroke="#92400E" stroke-width="3"/>
  </g>

  <!-- Pagan idol (small) -->
  <g transform="translate(275, 130)">
    <rect x="0" y="5" width="10" height="15" fill="#78350F"/>
    <circle cx="5" cy="2" r="4" fill="#92400E"/>
    <circle cx="3" cy="1" r="1" fill="#1F2937"/>
    <circle cx="7" cy="1" r="1" fill="#1F2937"/>
  </g>

  <!-- Birds -->
  <g fill="#1F2937" opacity="0.4">
    <path d="M 180 25 Q 185 20 190 25"/>
    <path d="M 200 35 Q 205 30 210 35"/>
  </g>

  <!-- Title hint -->
  <text x="150" y="195" font-family="Georgia, serif" font-size="10" fill="#4D7C0F" text-anchor="middle" font-style="italic">Древняя Русь</text>
</svg>