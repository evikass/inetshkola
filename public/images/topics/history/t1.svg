<svg viewBox="0 0 300 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FEF3C7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FBBF24;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sandGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FCD34D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pyramidGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FBBF24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B45309;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="nileGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1D4ED8;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect x="0" y="0" width="300" height="130" fill="url(#skyGrad)"/>

  <!-- Sun -->
  <circle cx="260" cy="45" r="28" fill="#FDE047"/>
  <circle cx="260" cy="45" r="22" fill="#FEF9C3"/>
  <!-- Sun rays -->
  <g stroke="#FDE047" stroke-width="2" opacity="0.6">
    <line x1="260" y1="10" x2="260" y2="0"/>
    <line x1="260" y1="80" x2="260" y2="90"/>
    <line x1="225" y1="45" x2="215" y2="45"/>
    <line x1="295" y1="45" x2="305" y2="45"/>
  </g>

  <!-- Desert/Sand -->
  <rect x="0" y="130" width="300" height="70" fill="url(#sandGrad)"/>
  <ellipse cx="150" cy="130" rx="180" ry="20" fill="#F59E0B" opacity="0.3"/>

  <!-- Great Pyramid (back) -->
  <polygon points="220,130 280,130 250,60" fill="#D97706"/>
  <polygon points="220,130 250,60 250,130" fill="#B45309"/>

  <!-- Great Pyramid (front/main) -->
  <polygon points="100,130 200,130 150,25" fill="url(#pyramidGrad)"/>
  <!-- Pyramid face shading -->
  <polygon points="100,130 150,25 150,130" fill="#B45309"/>
  <!-- Pyramid blocks/texture -->
  <line x1="115" y1="110" x2="185" y2="110" stroke="#92400E" stroke-width="1" opacity="0.5"/>
  <line x1="125" y1="90" x2="175" y2="90" stroke="#92400E" stroke-width="1" opacity="0.5"/>
  <line x1="135" y1="70" x2="165" y2="70" stroke="#92400E" stroke-width="1" opacity="0.5"/>
  <!-- Entrance -->
  <polygon points="145,100 155,100 155,115 150,120 145,115" fill="#1F2937"/>

  <!-- Small pyramid -->
  <polygon points="40,130 80,130 60,80" fill="#FCD34D"/>
  <polygon points="40,130 60,80 60,130" fill="#D97706"/>

  <!-- Sphinx -->
  <g transform="translate(15, 115)">
    <!-- Body -->
    <ellipse cx="35" cy="12" rx="25" ry="8" fill="#D97706"/>
    <!-- Head -->
    <rect x="50" y="-5" width="15" height="18" rx="3" fill="#FBBF24"/>
    <!-- Face -->
    <rect x="53" y="-2" width="9" height="10" fill="#FCD34D"/>
    <!-- Headdress -->
    <polygon points="65,-5 72,-8 72,3 65,0" fill="#D97706"/>
    <!-- Paws -->
    <rect x="10" y="8" width="15" height="5" rx="2" fill="#B45309"/>
    <rect x="5" y="8" width="15" height="5" rx="2" fill="#B45309"/>
  </g>

  <!-- Nile River -->
  <path d="M 0 160 Q 50 150 80 165 Q 120 180 160 160 Q 200 140 250 165 Q 280 175 300 160 L 300 200 L 0 200 Z" fill="url(#nileGrad)"/>
  <!-- River shine -->
  <path d="M 50 165 Q 80 170 100 165" stroke="#60A5FA" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M 180 160 Q 210 165 240 162" stroke="#60A5FA" stroke-width="2" fill="none" opacity="0.5"/>

  <!-- Palm trees -->
  <g transform="translate(260, 105)">
    <rect x="3" y="10" width="4" height="25" fill="#78350F"/>
    <ellipse cx="5" cy="8" rx="12" ry="6" fill="#22C55E"/>
    <ellipse cx="-5" cy="12" rx="8" ry="4" fill="#16A34A"/>
    <ellipse cx="15" cy="12" rx="8" ry="4" fill="#16A34A"/>
  </g>

  <g transform="translate(10, 90)">
    <rect x="3" y="10" width="3" height="20" fill="#78350F"/>
    <ellipse cx="5" cy="8" rx="10" ry="5" fill="#22C55E"/>
    <ellipse cx="-3" cy="11" rx="6" ry="3" fill="#16A34A"/>
    <ellipse cx="13" cy="11" rx="6" ry="3" fill="#16A34A"/>
  </g>

  <!-- Hieroglyphics panel -->
  <g transform="translate(180, 35)">
    <rect x="0" y="0" width="50" height="40" rx="3" fill="#FEF3C7" stroke="#D97706" stroke-width="2"/>
    <!-- Hieroglyph symbols -->
    <circle cx="12" cy="12" r="5" fill="#B45309"/>
    <path d="M 25 8 L 30 18 L 20 18 Z" fill="#B45309"/>
    <rect x="35" y="8" width="8" height="12" fill="#B45309"/>
    <path d="M 8 25 Q 12 20 16 25 Q 20 30 16 35 Q 12 40 8 35 Q 4 30 8 25" fill="#B45309"/>
    <circle cx="30" cy="30" r="4" stroke="#B45309" stroke-width="2" fill="none"/>
    <path d="M 38 25 L 38 35 M 35 30 L 42 30" stroke="#B45309" stroke-width="2"/>
  </g>

  <!-- Camel silhouette (small) -->
  <g transform="translate(70, 145)" opacity="0.6">
    <ellipse cx="15" cy="5" rx="12" ry="5" fill="#78350F"/>
    <circle cx="28" cy="0" r="4" fill="#78350F"/>
    <line x1="25" y1="4" x2="25" y2="12" stroke="#78350F" stroke-width="2"/>
    <line x1="20" y1="4" x2="20" y2="12" stroke="#78350F" stroke-width="2"/>
    <line x1="10" y1="4" x2="10" y2="12" stroke="#78350F" stroke-width="2"/>
    <line x1="5" y1="4" x2="5" y2="12" stroke="#78350F" stroke-width="2"/>
    <!-- Humps -->
    <ellipse cx="10" cy="0" rx="5" ry="4" fill="#78350F"/>
    <ellipse cx="18" cy="1" rx="4" ry="3" fill="#78350F"/>
  </g>

  <!-- Birds -->
  <g fill="#1F2937" opacity="0.5">
    <path d="M 30 30 Q 35 25 40 30 Q 35 28 30 30"/>
    <path d="M 45 35 Q 50 30 55 35 Q 50 33 45 35"/>
    <path d="M 55 25 Q 60 20 65 25 Q 60 23 55 25"/>
  </g>

  <!-- Title hint -->
  <text x="150" y="195" font-family="Georgia, serif" font-size="10" fill="#92400E" text-anchor="middle" font-style="italic">Древний Египет</text>
</svg>