<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250">
  <defs>
    <linearGradient id="bg24" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0f2f1"/>
      <stop offset="100%" style="stop-color:#b2dfdb"/>
    </linearGradient>
  </defs>
  <rect width="400" height="250" fill="url(#bg24)" rx="20"/>
  <text x="200" y="30" font-family="Arial" font-size="18" font-weight="bold" fill="#00695c" text-anchor="middle">Лишайники - симбиоз</text>
  <!-- Структура лишайника -->
  <ellipse cx="200" cy="140" rx="120" ry="60" fill="#fff" stroke="#4db6ac" stroke-width="2"/>
  <!-- Верхний коровой слой (гриб) -->
  <path d="M80 140 Q120 100 200 100 Q280 100 320 140" fill="#795548" stroke="#5d4037" stroke-width="2"/>
  <!-- Слой водорослей -->
  <rect x="90" y="115" width="220" height="20" fill="#81c784" opacity="0.7"/>
  <circle cx="120" cy="125" r="8" fill="#4caf50"/>
  <circle cx="160" cy="125" r="6" fill="#66bb6a"/>
  <circle cx="200" cy="125" r="8" fill="#4caf50"/>
  <circle cx="240" cy="125" r="7" fill="#66bb6a"/>
  <circle cx="280" cy="125" r="6" fill="#4caf50"/>
  <!-- Грибные гифы -->
  <line x1="100" y1="140" x2="100" y2="180" stroke="#8d6e63" stroke-width="1"/>
  <line x1="130" y1="140" x2="130" y2="190" stroke="#8d6e63" stroke-width="1"/>
  <line x1="160" y1="140" x2="160" y2="185" stroke="#8d6e63" stroke-width="1"/>
  <line x1="190" y1="140" x2="190" y2="195" stroke="#8d6e63" stroke-width="1"/>
  <line x1="220" y1="140" x2="220" y2="185" stroke="#8d6e63" stroke-width="1"/>
  <line x1="250" y1="140" x2="250" y2="190" stroke="#8d6e63" stroke-width="1"/>
  <line x1="280" y1="140" x2="280" y2="180" stroke="#8d6e63" stroke-width="1"/>
  <!-- Нижний коровой слой -->
  <path d="M80 140 Q120 180 200 180 Q280 180 320 140" fill="#a1887f" stroke="#8d6e63" stroke-width="2"/>
  <!-- Легенды -->
  <rect x="50" y="210" width="20" height="15" fill="#795548"/>
  <text x="80" y="222" font-family="Arial" font-size="11" fill="#5d4037">Гриб</text>
  <rect x="140" y="210" width="20" height="15" fill="#81c784"/>
  <text x="170" y="222" font-family="Arial" font-size="11" fill="#2e7d32">Водоросль</text>
  <!-- Стрелка симбиоза -->
  <path d="M280 210 L300 210" stroke="#009688" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M320 210 L340 210" stroke="#009688" stroke-width="2" marker-start="url(#arrow)"/>
  <text x="340" y="222" font-family="Arial" font-size="11" fill="#00695c">Симбиоз</text>
</svg>