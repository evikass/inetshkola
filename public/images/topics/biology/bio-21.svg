<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250">
  <defs>
    <linearGradient id="bg21" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fce4ec"/>
      <stop offset="100%" style="stop-color:#f8bbd9"/>
    </linearGradient>
  </defs>
  <rect width="400" height="250" fill="url(#bg21)" rx="20"/>
  <text x="200" y="30" font-family="Arial" font-size="18" font-weight="bold" fill="#c2185b" text-anchor="middle">Клеточное строение</text>
  <!-- Клетка 1 - животная -->
  <ellipse cx="100" cy="130" rx="70" ry="55" fill="#fff" stroke="#e91e63" stroke-width="3"/>
  <ellipse cx="100" cy="130" rx="25" ry="20" fill="#f48fb1"/>
  <circle cx="100" cy="130" r="8" fill="#c2185b"/>
  <ellipse cx="70" cy="110" rx="15" ry="8" fill="#ce93d8"/>
  <ellipse cx="130" cy="150" rx="12" ry="6" fill="#80cbc4"/>
  <circle cx="80" cy="150" r="5" fill="#ffcc80"/>
  <circle cx="120" cy="115" r="4" fill="#ffcc80"/>
  <text x="100" y="210" font-family="Arial" font-size="12" fill="#c2185b" text-anchor="middle">Животная клетка</text>
  <!-- Клетка 2 - растительная -->
  <rect x="200" y="75" width="140" height="110" fill="#fff" stroke="#4caf50" stroke-width="3" rx="5"/>
  <ellipse cx="270" cy="130" rx="25" ry="20" fill="#a5d6a7"/>
  <circle cx="270" cy="130" r="8" fill="#2e7d32"/>
  <rect x="220" y="90" width="25" height="15" fill="#81c784" rx="3"/>
  <rect x="295" y="150" width="30" height="20" fill="#66bb6a" rx="3"/>
  <circle cx="250" cy="160" r="10" fill="#fff9c4" stroke="#fdd835" stroke-width="2"/>
  <text x="270" y="210" font-family="Arial" font-size="12" fill="#2e7d32" text-anchor="middle">Растительная клетка</text>
  <!-- Митохондрия декоративная -->
  <ellipse cx="50" cy="230" rx="30" ry="12" fill="#ffab91"/>
  <path d="M30 230 Q40 225 50 230 Q60 235 70 230" stroke="#ff7043" stroke-width="2" fill="none"/>
