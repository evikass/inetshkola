<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Background -->
  <rect width="400" height="300" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="200" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#475569">Растение: вегетативные органы</text>
  
  <!-- Complete plant -->
  <g transform="translate(150, 40)">
    <!-- Flower -->
    <g transform="translate(50, 0)">
      <circle cx="0" cy="0" r="8" fill="#fbbf24"/>
      <ellipse cx="-15" cy="0" rx="12" ry="6" fill="#ec4899"/>
      <ellipse cx="15" cy="0" rx="12" ry="6" fill="#ec4899"/>
      <ellipse cx="0" cy="-15" rx="6" ry="12" fill="#ec4899"/>
      <ellipse cx="0" cy="15" rx="6" ry="12" fill="#ec4899"/>
    </g>
    
    <!-- Stem -->
    <rect x="45" y="25" width="10" height="100" fill="#22c55e"/>
    
    <!-- Leaves -->
    <ellipse cx="25" cy="50" rx="25" ry="10" fill="#4ade80" transform="rotate(-30, 25, 50)"/>
    <ellipse cx="75" cy="70" rx="25" ry="10" fill="#4ade80" transform="rotate(30, 75, 70)"/>
    <ellipse cx="20" cy="90" rx="20" ry="8" fill="#4ade80" transform="rotate(-40, 20, 90)"/>
    
    <!-- Roots -->
    <path d="M50 125 L50 180" stroke="#92400e" stroke-width="4"/>
    <path d="M50 140 L30 170" stroke="#92400e" stroke-width="3"/>
    <path d="M50 150 L70 175" stroke="#92400e" stroke-width="3"/>
    <path d="M50 160 L40 185" stroke="#92400e" stroke-width="2"/>
    <path d="M50 165 L65 190" stroke="#92400e" stroke-width="2"/>
    <path d="M30 170 L20 185" stroke="#92400e" stroke-width="2"/>
    <path d="M70 175 L80 190" stroke="#92400e" stroke-width="2"/>
  </g>
  
  <!-- Labels -->
  <g font-family="Arial, sans-serif" font-size="11">
    <!-- Flower label -->
    <line x1="200" y1="40" x2="300" y2="35" stroke="#ec4899" stroke-width="1"/>
    <text x="305" y="40" fill="#ec4899">Цветок 🌸</text>
    <text x="305" y="53" fill="#be185d" font-size="9">размножение</text>
    
    <!-- Leaf label -->
    <line x1="230" y1="100" x2="300" y2="90" stroke="#22c55e" stroke-width="1"/>
    <text x="305" y="95" fill="#22c55e">Лист 🍃</text>
    <text x="305" y="108" fill="#16a34a" font-size="9">фотосинтез</text>
    
    <!-- Stem label -->
    <line x1="195" y1="130" x2="100" y2="120" stroke="#16a34a" stroke-width="1"/>
    <text x="20" y="125" fill="#16a34a">Стебель 🌿</text>
    <text x="20" y="138" fill="#15803d" font-size="9">проводит вещества</text>
    
    <!-- Root label -->
    <line x1="200" y1="200" x2="100" y2="210" stroke="#92400e" stroke-width="1"/>
    <text x="20" y="215" fill="#92400e">Корень 🌱</text>
    <text x="20" y="228" fill="#78350f" font-size="9">всасывает воду</text>
  </g>
  
  <!-- Photosynthesis equation -->
  <rect x="20" y="250" width="360" height="40" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="200" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#166534">
    6CO₂ + 6H₂O + свет → C₆H₁₂O₆ + 6O₂
  </text>
</svg>