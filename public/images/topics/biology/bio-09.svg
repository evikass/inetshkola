<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Background -->
  <rect width="400" height="300" fill="#fef2f2"/>
  
  <!-- Title -->
  <text x="200" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#475569">Кровеносная система ❤️</text>
  
  <!-- Heart center -->
  <g transform="translate(150, 70)">
    <!-- Heart shape -->
    <path d="M50 30 C20 0 -20 30 10 70 L50 120 L90 70 C120 30 80 0 50 30" fill="#ef4444" stroke="#dc2626" stroke-width="3"/>
    
    <!-- Dividing line -->
    <line x1="50" y1="30" x2="50" y2="110" stroke="#b91c1c" stroke-width="2"/>
    
    <!-- Chambers -->
    <text x="25" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">ПЖ</text>
    <text x="75" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">ЛЖ</text>
    <text x="25" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">ПП</text>
    <text x="75" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">ЛП</text>
  </g>
  
  <!-- Pulmonary circulation (small circle) -->
  <g transform="translate(100, 20)">
    <!-- Lungs -->
    <ellipse cx="50" cy="50" rx="30" ry="40" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
    <ellipse cx="150" cy="50" rx="30" ry="40" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
    
    <!-- Arrows to lungs -->
    <path d="M140 110 L100 75" stroke="#3b82f6" stroke-width="3" marker-end="url(#blueArrow)"/>
    <path d="M160 110 L200 75" stroke="#3b82f6" stroke-width="3" marker-end="url(#blueArrow)"/>
    
    <!-- Arrows from lungs -->
    <path d="M100 40 L145 70" stroke="#ef4444" stroke-width="3" marker-end="url(#redArrow)"/>
    <path d="M150 40 L155 70" stroke="#ef4444" stroke-width="3" marker-end="url(#redArrow)"/>
    
    <text x="100" y="20" font-family="Arial, sans-serif" font-size="10" fill="#3b82f6">Лёгкие</text>
  </g>
  
  <!-- Systemic circulation (large circle) -->
  <g transform="translate(0, 180)">
    <!-- Body -->
    <ellipse cx="200" cy="30" rx="180" ry="20" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
    <text x="200" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#92400e">Организм (все органы и ткани)</text>
    
    <!-- Aorta arrow -->
    <path d="M210 85 L210 60" stroke="#ef4444" stroke-width="4" marker-end="url(#redArrow)"/>
    <text x="230" y="75" font-family="Arial, sans-serif" font-size="9" fill="#ef4444">артерии</text>
    
    <!-- Vena cava arrow -->
    <path d="M190 60 L190 85" stroke="#3b82f6" stroke-width="4" marker-end="url(#blueArrow)"/>
    <text x="150" y="75" font-family="Arial, sans-serif" font-size="9" fill="#3b82f6">вены</text>
  </g>
  
  <!-- Arrows definitions -->
  <defs>
    <marker id="redArrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
    <marker id="blueArrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
  </defs>
  
  <!-- Legend -->
  <g transform="translate(20, 250)">
    <rect x="0" y="0" width="360" height="40" rx="8" fill="white" stroke="#e5e7eb" stroke-width="1"/>
    <circle cx="30" cy="20" r="8" fill="#ef4444"/>
    <text x="45" y="24" font-family="Arial, sans-serif" font-size="10" fill="#475569">Артериальная кровь (O₂)</text>
    <circle cx="200" cy="20" r="8" fill="#3b82f6"/>
    <text x="215" y="24" font-family="Arial, sans-serif" font-size="10" fill="#475569">Венозная кровь (CO₂)</text>
  </g>
</svg>