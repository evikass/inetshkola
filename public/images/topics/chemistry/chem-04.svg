<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <radialGradient id="oxygenGrad" cx="30%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#b91c1c"/>
    </radialGradient>
    <radialGradient id="hydrogenGrad" cx="30%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="300" fill="#f8fafc"/>
  
  <!-- Central Oxygen atom -->
  <circle cx="200" cy="130" r="40" fill="url(#oxygenGrad)"/>
  <text x="200" y="137" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white">O</text>
  
  <!-- Hydrogen atoms -->
  <circle cx="120" cy="200" r="28" fill="url(#hydrogenGrad)"/>
  <text x="120" y="207" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white">H</text>
  
  <circle cx="280" cy="200" r="28" fill="url(#hydrogenGrad)"/>
  <text x="280" y="207" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white">H</text>
  
  <!-- Covalent bonds -->
  <line x1="165" y1="155" x2="140" y2="175" stroke="#64748b" stroke-width="6" stroke-linecap="round"/>
  <line x1="235" y1="155" x2="260" y2="175" stroke="#64748b" stroke-width="6" stroke-linecap="round"/>
  
  <!-- Bond angle indicator -->
  <path d="M150 190 A50 50 0 0 1 250 190" fill="none" stroke="#9ca3af" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="200" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">104.5°</text>
  
  <!-- Lone pairs (electron clouds) -->
  <ellipse cx="175" cy="95" rx="15" ry="8" fill="#fecaca" opacity="0.7"/>
  <ellipse cx="225" cy="95" rx="15" ry="8" fill="#fecaca" opacity="0.7"/>
  
  <!-- Formula -->
  <text x="200" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#475569">H<tspan font-size="14" baseline-shift="sub">2</tspan>O — вода</text>
  
  <!-- Legend -->
  <g transform="translate(20, 20)">
    <circle cx="10" cy="10" r="8" fill="#ef4444"/>
    <text x="25" y="14" font-family="Arial, sans-serif" font-size="11" fill="#475569">Кислород (O)</text>
    <circle cx="10" cy="30" r="8" fill="#3b82f6"/>
    <text x="25" y="34" font-family="Arial, sans-serif" font-size="11" fill="#475569">Водород (H)</text>
  </g>
</svg>