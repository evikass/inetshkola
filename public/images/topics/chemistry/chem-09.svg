<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <radialGradient id="oxidizedGrad" cx="30%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </radialGradient>
    <radialGradient id="reducedGrad" cx="30%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#b91c1c"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="300" fill="#f8fafc"/>
  
  <!-- Left atom (oxidized - loses electrons) -->
  <g transform="translate(80, 120)">
    <circle cx="0" cy="0" r="50" fill="url(#reducedGrad)"/>
    <text x="0" y="5" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white">Zn</text>
    <text x="0" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#475569">цинк</text>
  </g>
  
  <!-- Electron transfer arrow -->
  <g transform="translate(140, 60)">
    <path d="M0 60 Q60 -20 120 60" fill="none" stroke="#fbbf24" stroke-width="3" stroke-dasharray="5,3"/>
    <polygon points="120,55 130,60 120,65" fill="#fbbf24"/>
    <text x="60" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#d97706">2e⁻</text>
  </g>
  
  <!-- Right atom (reduced - gains electrons) -->
  <g transform="translate(250, 120)">
    <circle cx="0" cy="0" r="50" fill="url(#oxidizedGrad)"/>
    <text x="0" y="5" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white">Cu</text>
    <text x="0" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#475569">медь</text>
    <circle cx="30" cy="-30" r="10" fill="#fbbf24" opacity="0.8"/>
    <circle cx="45" cy="-15" r="10" fill="#fbbf24" opacity="0.8"/>
  </g>
  
  <!-- Oxidation labels -->
  <text x="80" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#b91c1c">Окисление</text>
  <text x="80" y="248" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#ef4444">отдаёт e⁻</text>
  
  <!-- Reduction labels -->
  <text x="250" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1d4ed8">Восстановление</text>
  <text x="250" y="248" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#3b82f6">принимает e⁻</text>
  
  <!-- Title -->
  <text x="200" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#475569">Окислительно-восстановительная реакция</text>
  
  <!-- Equation -->
  <text x="200" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#64748b">Zn + Cu²⁺ → Zn²⁺ + Cu</text>
</svg>