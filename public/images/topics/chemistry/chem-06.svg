<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Background -->
  <rect width="400" height="300" fill="#f8fafc"/>
  
  <!-- Periodic table grid -->
  <g transform="translate(15, 20)">
    <!-- Row 1 -->
    <rect x="0" y="0" width="35" height="35" rx="4" fill="#ef4444"/>
    <text x="17" y="18" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">H</text>
    <text x="17" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#fecaca">1</text>
    
    <rect x="305" y="0" width="35" height="35" rx="4" fill="#8b5cf6"/>
    <text x="322" y="18" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">He</text>
    <text x="322" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#ddd6fe">2</text>
    
    <!-- Row 2 -->
    <rect x="0" y="40" width="35" height="35" rx="4" fill="#f97316"/>
    <text x="17" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">Li</text>
    <text x="17" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#fed7aa">3</text>
    
    <rect x="40" y="40" width="35" height="35" rx="4" fill="#a3a3a3"/>
    <text x="57" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">Be</text>
    
    <rect x="85" y="40" width="35" height="35" rx="4" fill="#22c55e"/>
    <text x="102" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">B</text>
    
    <rect x="130" y="40" width="35" height="35" rx="4" fill="#10b981"/>
    <text x="147" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">C</text>
    
    <rect x="175" y="40" width="35" height="35" rx="4" fill="#14b8a6"/>
    <text x="192" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">N</text>
    
    <rect x="220" y="40" width="35" height="35" rx="4" fill="#06b6d4"/>
    <text x="237" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">O</text>
    
    <rect x="265" y="40" width="35" height="35" rx="4" fill="#0ea5e9"/>
    <text x="282" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">F</text>
    
    <rect x="305" y="40" width="35" height="35" rx="4" fill="#8b5cf6"/>
    <text x="322" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">Ne</text>
    
    <!-- Row 3 -->
    <rect x="0" y="80" width="35" height="35" rx="4" fill="#f97316"/>
    <text x="17" y="98" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">Na</text>
    
    <rect x="40" y="80" width="35" height="35" rx="4" fill="#a3a3a3"/>
    <text x="57" y="98" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">Mg</text>
    
    <rect x="85" y="80" width="35" height="35" rx="4" fill="#eab308"/>
    <text x="102" y="98" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">Al</text>
    
    <rect x="130" y="80" width="35" height="35" rx="4" fill="#22c55e"/>
    <text x="147" y="98" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">Si</text>
    
    <rect x="175" y="80" width="35" height="35" rx="4" fill="#22c55e"/>
    <text x="192" y="98" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">P</text>
    
    <rect x="220" y="80" width="35" height="35" rx="4" fill="#22c55e"/>
    <text x="237" y="98" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">S</text>
    
    <rect x="265" y="80" width="35" height="35" rx="4" fill="#22c55e"/>
    <text x="282" y="98" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">Cl</text>
    
    <rect x="305" y="80" width="35" height="35" rx="4" fill="#8b5cf6"/>
    <text x="322" y="98" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">Ar</text>
  </g>
  
  <!-- Legend -->
  <g transform="translate(20, 210)">
    <rect x="0" y="0" width="15" height="15" rx="2" fill="#ef4444"/>
    <text x="22" y="12" font-family="Arial, sans-serif" font-size="10" fill="#475569">Водород</text>
    
    <rect x="80" y="0" width="15" height="15" rx="2" fill="#f97316"/>
    <text x="102" y="12" font-family="Arial, sans-serif" font-size="10" fill="#475569">Металлы</text>
    
    <rect x="165" y="0" width="15" height="15" rx="2" fill="#22c55e"/>
    <text x="187" y="12" font-family="Arial, sans-serif" font-size="10" fill="#475569">Неметаллы</text>
    
    <rect x="260" y="0" width="15" height="15" rx="2" fill="#8b5cf6"/>
    <text x="282" y="12" font-family="Arial, sans-serif" font-size="10" fill="#475569">Благородные газы</text>
  </g>
  
  <!-- Title -->
  <text x="200" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#475569">Периодическая система элементов</text>
</svg>