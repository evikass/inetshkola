<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Background -->
  <rect width="400" height="300" fill="#f8fafc"/>
  
  <!-- Benzene ring -->
  <g transform="translate(120, 80)">
    <!-- Hexagon outline -->
    <polygon points="80,0 150,40 150,120 80,160 10,120 10,40" fill="none" stroke="#7c3aed" stroke-width="3"/>
    <!-- Double bonds (alternating) -->
    <line x1="25" y1="50" x2="25" y2="110" stroke="#7c3aed" stroke-width="2"/>
    <line x1="135" y1="50" x2="135" y2="110" stroke="#7c3aed" stroke-width="2"/>
    <line x1="50" y1="145" x2="110" y2="145" stroke="#7c3aed" stroke-width="2"/>
    <!-- Inner circle (delocalized electrons) -->
    <circle cx="80" cy="80" r="40" fill="none" stroke="#a78bfa" stroke-width="2" stroke-dasharray="8,4"/>
  </g>
  
  <!-- Carbon atoms at vertices -->
  <circle cx="200" cy="80" r="12" fill="#475569"/>
  <text x="200" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">C</text>
  
  <circle cx="270" cy="120" r="12" fill="#475569"/>
  <text x="270" y="124" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">C</text>
  
  <circle cx="270" cy="200" r="12" fill="#475569"/>
  <text x="270" y="204" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">C</text>
  
  <circle cx="200" cy="240" r="12" fill="#475569"/>
  <text x="200" y="244" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">C</text>
  
  <circle cx="130" cy="200" r="12" fill="#475569"/>
  <text x="130" y="204" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">C</text>
  
  <circle cx="130" cy="120" r="12" fill="#475569"/>
  <text x="130" y="124" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">C</text>
  
  <!-- Hydrogen atoms -->
  <g>
    <line x1="200" y1="68" x2="200" y2="45" stroke="#94a3b8" stroke-width="2"/>
    <circle cx="200" cy="35" r="8" fill="#60a5fa"/>
    <text x="200" y="39" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="white">H</text>
    
    <line x1="282" y1="120" x2="305" y2="120" stroke="#94a3b8" stroke-width="2"/>
    <circle cx="315" cy="120" r="8" fill="#60a5fa"/>
    <text x="315" y="124" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="white">H</text>
    
    <line x1="282" y1="200" x2="305" y2="200" stroke="#94a3b8" stroke-width="2"/>
    <circle cx="315" cy="200" r="8" fill="#60a5fa"/>
    <text x="315" y="204" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="white">H</text>
    
    <line x1="200" y1="252" x2="200" y2="275" stroke="#94a3b8" stroke-width="2"/>
    <circle cx="200" cy="285" r="8" fill="#60a5fa"/>
    <text x="200" y="289" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="white">H</text>
    
    <line x1="118" y1="200" x2="95" y2="200" stroke="#94a3b8" stroke-width="2"/>
    <circle cx="85" cy="200" r="8" fill="#60a5fa"/>
    <text x="85" y="204" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="white">H</text>
    
    <line x1="118" y1="120" x2="95" y2="120" stroke="#94a3b8" stroke-width="2"/>
    <circle cx="85" cy="120" r="8" fill="#60a5fa"/>
    <text x="85" y="124" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="white">H</text>
  </g>
  
  <!-- Formula -->
  <text x="350" y="40" font-family="Arial, sans-serif" font-size="14" fill="#475569">C<tspan font-size="10" baseline-shift="sub">6</tspan>H<tspan font-size="10" baseline-shift="sub">6</tspan></text>
  <text x="350" y="60" font-family="Arial, sans-serif" font-size="11" fill="#64748b">бензол</text>
  
  <!-- Title -->
  <text x="40" y="40" font-family="Arial, sans-serif" font-size="16" fill="#475569">Бензольное кольцо</text>
  <text x="40" y="58" font-family="Arial, sans-serif" font-size="11" fill="#64748b">основа органической химии</text>
</svg>