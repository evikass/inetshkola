<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="decompGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#ea580c"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="300" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="200" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#475569">Реакция разложения</text>
  
  <!-- Left molecule -->
  <g transform="translate(50, 100)">
    <rect x="0" y="0" width="100" height="60" rx="10" fill="url(#decompGrad)"/>
    <text x="50" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="white">AB</text>
  </g>
  
  <!-- Arrow -->
  <path d="M170 130 L230 130" stroke="#475569" stroke-width="3" marker-end="url(#arrowhead2)"/>
  <defs><marker id="arrowhead2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
  </marker></defs>
  
  <!-- Result molecules -->
  <g transform="translate(250, 100)">
    <circle cx="30" cy="30" r="25" fill="#3b82f6"/>
    <text x="30" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="white">A</text>
    
    <circle cx="90" cy="30" r="25" fill="#ef4444"/>
    <text x="90" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="white">B</text>
  </g>
  
  <!-- Example -->
  <text x="200" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#64748b">Пример:</text>
  <text x="200" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#ea580c">CaCO₃ → CaO + CO₂</text>
  
  <!-- Description -->
  <text x="200" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8">Из сложного вещества — простые</text>
</svg>