<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Background -->
  <rect width="400" height="300" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="200" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#475569">Спирты и их свойства</text>
  
  <!-- Ethanol molecule -->
  <g transform="translate(30, 60)">
    <text x="80" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#64748b">Этанол</text>
    
    <!-- C chain -->
    <circle cx="40" cy="60" r="18" fill="#475569"/>
    <text x="40" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">C</text>
    
    <circle cx="80" cy="60" r="18" fill="#475569"/>
    <text x="80" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">C</text>
    
    <!-- OH group -->
    <circle cx="120" cy="60" r="18" fill="#ef4444"/>
    <text x="120" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">O</text>
    
    <circle cx="145" cy="80" r="12" fill="#60a5fa"/>
    <text x="145" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">H</text>
    
    <!-- Bonds -->
    <line x1="58" y1="60" x2="62" y2="60" stroke="#94a3b8" stroke-width="2"/>
    <line x1="98" y1="60" x2="102" y2="60" stroke="#94a3b8" stroke-width="2"/>
    <line x1="130" y1="70" x2="138" y2="78" stroke="#94a3b8" stroke-width="2"/>
    
    <text x="80" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#64748b">C₂H₅OH</text>
  </g>
  
  <!-- Glycerol molecule -->
  <g transform="translate(200, 60)">
    <text x="100" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#64748b">Глицерин</text>
    
    <!-- C chain -->
    <circle cx="40" cy="60" r="15" fill="#475569"/>
    <circle cx="80" cy="60" r="15" fill="#475569"/>
    <circle cx="120" cy="60" r="15" fill="#475569"/>
    
    <!-- OH groups -->
    <circle cx="40" cy="95" r="12" fill="#ef4444"/>
    <text x="40" y="99" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="white">OH</text>
    
    <circle cx="80" cy="95" r="12" fill="#ef4444"/>
    <text x="80" y="99" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="white">OH</text>
    
    <circle cx="120" cy="95" r="12" fill="#ef4444"/>
    <text x="120" y="99" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="white">OH</text>
    
    <!-- Bonds -->
    <line x1="40" y1="75" x2="40" y2="83" stroke="#94a3b8" stroke-width="2"/>
    <line x1="80" y1="75" x2="80" y2="83" stroke="#94a3b8" stroke-width="2"/>
    <line x1="120" y1="75" x2="120" y2="83" stroke="#94a3b8" stroke-width="2"/>
    
    <text x="80" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#64748b">C₃H₅(OH)₃</text>
  </g>
  
  <!-- Properties box -->
  <rect x="30" y="180" width="340" height="100" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="200" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#92400e">Свойства спиртов:</text>
  <text x="200" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#78350f">• Горят: C₂H₅OH + 3O₂ → 2CO₂ + 3H₂O</text>
  <text x="200" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#78350f">• Окисляются до альдегидов</text>
  <text x="200" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#78350f">• Взаимодействуют с металлами</text>
</svg>