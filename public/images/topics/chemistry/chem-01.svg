<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="flaskGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="tubeGrad1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#14b8a6;stop-opacity:0.7"/>
      <stop offset="100%" style="stop-color:#0d9488;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="tubeGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f472b6;stop-opacity:0.7"/>
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="tubeGrad3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:0.7"/>
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="300" fill="#f8fafc"/>
  
  <!-- Flask -->
  <path d="M140 60 L140 120 L100 200 Q95 220 110 230 L190 230 Q205 220 200 200 L160 120 L160 60 Z" 
        fill="url(#flaskGrad)" stroke="#7c3aed" stroke-width="3"/>
  <ellipse cx="150" cy="60" rx="12" ry="6" fill="#a78bfa" stroke="#7c3aed" stroke-width="2"/>
  <!-- Bubbles -->
  <circle cx="130" cy="180" r="5" fill="#c4b5fd" opacity="0.7"/>
  <circle cx="160" cy="190" r="4" fill="#c4b5fd" opacity="0.6"/>
  <circle cx="145" cy="200" r="3" fill="#c4b5fd" opacity="0.5"/>
  
  <!-- Test Tube 1 -->
  <rect x="230" y="80" width="25" height="100" rx="12" fill="url(#tubeGrad1)" stroke="#0f766e" stroke-width="2"/>
  <ellipse cx="242" cy="80" rx="12" ry="4" fill="#5eead4" stroke="#0f766e" stroke-width="1"/>
  
  <!-- Test Tube 2 -->
  <rect x="270" y="90" width="25" height="90" rx="12" fill="url(#tubeGrad2)" stroke="#db2777" stroke-width="2"/>
  <ellipse cx="282" cy="90" rx="12" ry="4" fill="#f9a8d4" stroke="#db2777" stroke-width="1"/>
  
  <!-- Test Tube 3 -->
  <rect x="310" y="85" width="25" height="95" rx="12" fill="url(#tubeGrad3)" stroke="#d97706" stroke-width="2"/>
  <ellipse cx="322" cy="85" rx="12" ry="4" fill="#fde047" stroke="#d97706" stroke-width="1"/>
  
  <!-- Stand -->
  <rect x="70" y="230" width="180" height="8" rx="2" fill="#64748b"/>
  <rect x="255" y="185" width="90" height="8" rx="2" fill="#64748b"/>
  
  <!-- Molecule decoration -->
  <circle cx="340" cy="50" r="12" fill="#a78bfa"/>
  <circle cx="360" cy="70" r="10" fill="#5eead4"/>
  <circle cx="325" cy="75" r="8" fill="#f9a8d4"/>
  <line x1="340" y1="50" x2="360" y2="70" stroke="#94a3b8" stroke-width="2"/>
  <line x1="340" y1="50" x2="325" y2="75" stroke="#94a3b8" stroke-width="2"/>
  
  <!-- Title -->
  <text x="200" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#475569">Химия</text>
</svg>