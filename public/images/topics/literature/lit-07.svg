<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg7" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF3E0"/>
      <stop offset="100%" style="stop-color:#FFE0B2"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg7)" rx="20"/>
  
  <!-- Large question mark -->
  <text x="350" y="200" font-family="Georgia, serif" font-size="300" fill="#FF9800" opacity="0.2">?</text>
  
  <!-- Riddle scroll -->
  <g transform="translate(100, 100)">
    <rect x="0" y="0" width="280" height="120" fill="#FFFEF9"/>
    <ellipse cx="0" cy="60" rx="15" ry="70" fill="#FFE082"/>
    <ellipse cx="280" cy="60" rx="15" ry="70" fill="#FFE082"/>
    <text x="140" y="50" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#E65100">"Сидит девица в темнице,</text>
    <text x="140" y="75" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#E65100">а коса на улице"</text>
    <text x="140" y="110" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#FF6F00">Ответ: ???</text>
  </g>
  
  <!-- Carrot (answer) -->
  <g transform="translate(600, 300)">
    <!-- Carrot body -->
    <path d="M0 0 L-15 80 L15 80 Z" fill="#FF9800"/>
    <ellipse cx="0" cy="0" rx="20" ry="15" fill="#4CAF50"/>
    <!-- Leaves -->
    <path d="M0 -15 Q-20 -50 -10 -60 Q0 -40 0 -15" fill="#66BB6A"/>
    <path d="M0 -15 Q0 -55 10 -65 Q10 -40 0 -15" fill="#66BB6A"/>
    <path d="M0 -15 Q20 -45 15 -55 Q5 -35 0 -15" fill="#66BB6A"/>
    <!-- Face on carrot -->
    <circle cx="-5" cy="30" r="3" fill="#E65100"/>
    <circle cx="5" cy="30" r="3" fill="#E65100"/>
    <path d="M-5 50 Q0 55 5 50" stroke="#E65100" stroke-width="2" fill="none"/>
  </g>
  
  <!-- Thinking person -->
  <g transform="translate(200, 320)">
    <!-- Head -->
    <circle cx="0" cy="0" r="30" fill="#FFCC80"/>
    <!-- Hair -->
    <ellipse cx="0" cy="-20" rx="30" ry="15" fill="#5D4037"/>
    <!-- Eyes -->
    <circle cx="-10" cy="-5" r="4" fill="white"/>
    <circle cx="10" cy="-5" r="4" fill="white"/>
    <circle cx="-10" cy="-5" r="2" fill="#1A1A1A"/>
    <circle cx="10" cy="-5" r="2" fill="#1A1A1A"/>
    <!-- Thinking expression -->
    <path d="M-5 10 Q0 15 5 10" stroke="#795548" stroke-width="2" fill="none"/>
    <!-- Body -->
    <rect x="-20" y="30" width="40" height="50" fill="#3F51B5"/>
    <!-- Thought bubble -->
    <circle cx="50" cy="-20" r="5" fill="#FFFEF9" stroke="#90A4AE"/>
    <circle cx="65" cy="-35" r="8" fill="#FFFEF9" stroke="#90A4AE"/>
    <ellipse cx="90" cy="-55" rx="30" ry="20" fill="#FFFEF9" stroke="#90A4AE"/>
    <text x="90" y="-50" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#E65100">Морковь!</text>
  </g>
  
  <!-- More riddle items -->
  <!-- Lock (another riddle answer) -->
  <g transform="translate(700, 180)">
    <rect x="-15" y="0" width="30" height="40" fill="#78909C" rx="3"/>
    <circle cx="0" cy="20" r="5" fill="#37474F"/>
    <path d="M-12 -5 Q-12 -25 0 -25 Q12 -25 12 -5" stroke="#78909C" stroke-width="6" fill="none"/>
  </g>
  
  <!-- Candle -->
  <g transform="translate(500, 100)">
    <rect x="-8" y="0" width="16" height="50" fill="#FFF8E1"/>
    <ellipse cx="0" cy="0" rx="10" ry="5" fill="#FFECB3"/>
    <!-- Flame -->
    <ellipse cx="0" cy="-15" rx="8" ry="15" fill="#FF9800"/>
    <ellipse cx="0" cy="-15" rx="5" ry="10" fill="#FFEB3B"/>
    <ellipse cx="0" cy="-12" rx="2" ry="5" fill="#FFFEF9"/>
  </g>
  
  <!-- Light bulbs (ideas) -->
  <g transform="translate(150, 380)">
    <circle cx="0" cy="0" r="20" fill="#FFEB3B" opacity="0.8"/>
    <rect x="-8" y="15" width="16" height="10" fill="#9E9E9E"/>
    <line x1="-5" y1="20" x2="5" y2="20" stroke="#757575" stroke-width="1"/>
    <line x1="-5" y1="23" x2="5" y2="23" stroke="#757575" stroke-width="1"/>
  </g>
  
  <!-- Title -->
  <rect x="320" y="440" width="160" height="45" fill="rgba(230,81,0,0.9)" rx="10"/>
  <text x="400" y="468" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="white">Загадки</text>
</svg>