<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E3F2FD"/>
      <stop offset="100%" style="stop-color:#BBDEFB"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg4)" rx="20"/>
  
  <!-- Large quotation mark -->
  <text x="60" y="150" font-family="Georgia, serif" font-size="200" fill="#1976D2" opacity="0.3">"</text>
  <text x="650" y="400" font-family="Georgia, serif" font-size="200" fill="#1976D2" opacity="0.3">"</text>
  
  <!-- Scroll/ribbon with proverb -->
  <g transform="translate(150, 120)">
    <path d="M0 30 Q250 0 500 30 L500 80 Q250 50 0 80 Z" fill="#FFF8E1" stroke="#DAA520" stroke-width="2"/>
    <text x="250" y="65" text-anchor="middle" font-family="Georgia, serif" font-size="18" font-style="italic" fill="#1565C0">"Без труда не выловишь</text>
    <text x="250" y="90" text-anchor="middle" font-family="Georgia, serif" font-size="18" font-style="italic" fill="#1565C0">и рыбку из пруда"</text>
    <!-- Ribbon ends -->
    <polygon points="-30,30 0,20 0,80 -30,70" fill="#DAA520"/>
    <polygon points="530,30 500,20 500,80 530,70" fill="#DAA520"/>
  </g>
  
  <!-- Fisher with rod (illustration of proverb) -->
  <g transform="translate(200, 280)">
    <!-- Person -->
    <circle cx="0" cy="0" r="20" fill="#FFCC80"/>
    <rect x="-15" y="20" width="30" height="50" fill="#1976D2"/>
    <!-- Hat -->
    <ellipse cx="0" cy="-15" rx="25" ry="8" fill="#795548"/>
    <rect x="-15" y="-30" width="30" height="15" fill="#795548"/>
    <!-- Fishing rod -->
    <line x1="15" y1="10" x2="150" y2="-80" stroke="#795548" stroke-width="4"/>
    <!-- Line -->
    <line x1="150" y1="-80" x2="120" y2="80" stroke="#90A4AE" stroke-width="1.5"/>
    <!-- Fish on hook -->
    <ellipse cx="120" cy="90" rx="25" ry="15" fill="#FF9800"/>
    <polygon points="145,90 165,80 165,100" fill="#FF9800"/>
    <circle cx="110" cy="88" r="4" fill="#1A1A1A"/>
  </g>
  
  <!-- Water/waves -->
  <g transform="translate(300, 380)">
    <path d="M0 20 Q30 0 60 20 Q90 40 120 20 Q150 0 180 20 Q210 40 240 20 Q270 0 300 20" stroke="#42A5F5" stroke-width="3" fill="none"/>
    <path d="M-50 40 Q-20 20 10 40 Q40 60 70 40 Q100 20 130 40 Q160 60 190 40 Q220 20 250 40" stroke="#64B5F6" stroke-width="2" fill="none" opacity="0.7"/>
  </g>
  
  <!-- Wise owl -->
  <g transform="translate(650, 180)">
    <!-- Body -->
    <ellipse cx="0" cy="30" rx="40" ry="50" fill="#795548"/>
    <!-- Head -->
    <circle cx="0" cy="-15" r="35" fill="#8D6E63"/>
    <!-- Ear tufts -->
    <polygon points="-30,-45 -20,-25 -40,-25" fill="#795548"/>
    <polygon points="30,-45 20,-25 40,-25" fill="#795548"/>
    <!-- Face disk -->
    <ellipse cx="0" cy="-10" rx="25" ry="20" fill="#D7CCC8"/>
    <!-- Eyes -->
    <circle cx="-10" cy="-15" r="10" fill="#FFD700"/>
    <circle cx="10" cy="-15" r="10" fill="#FFD700"/>
    <circle cx="-10" cy="-15" r="5" fill="#1A1A1A"/>
    <circle cx="10" cy="-15" r="5" fill="#1A1A1A"/>
    <!-- Beak -->
    <polygon points="0,-5 -5,5 5,5" fill="#FF9800"/>
    <!-- Book under wing -->
    <rect x="30" y="20" width="40" height="50" fill="#E3F2FD" stroke="#1976D2" stroke-width="2" transform="rotate(15)"/>
  </g>
  
  <!-- Title -->
  <rect x="280" y="440" width="240" height="45" fill="rgba(21,101,192,0.9)" rx="10"/>
  <text x="400" y="468" text-anchor="middle" font-family="Georgia, serif" font-size="20" font-weight="bold" fill="white">Пословицы</text>
</svg>