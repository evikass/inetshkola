<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150">
  <defs>
    <linearGradient id="mathBg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="200" height="150" fill="url(#mathBg2)" rx="15"/>
  
  <!-- Large numbers 0-9 -->
  <text x="25" y="50" font-family="Arial" font-size="32" font-weight="bold" fill="#FEF3C7">0</text>
  <text x="55" y="50" font-family="Arial" font-size="32" font-weight="bold" fill="#FEE2E2">1</text>
  <text x="85" y="50" font-family="Arial" font-size="32" font-weight="bold" fill="#D1FAE5">2</text>
  <text x="115" y="50" font-family="Arial" font-size="32" font-weight="bold" fill="#E0E7FF">3</text>
  <text x="145" y="50" font-family="Arial" font-size="32" font-weight="bold" fill="#FCE7F3">4</text>
  <text x="170" y="50" font-family="Arial" font-size="32" font-weight="bold" fill="#FEF3C7">5</text>
  
  <!-- Puzzle pieces with numbers -->
  <rect x="20" y="70" width="45" height="40" rx="8" fill="#FCD34D" stroke="#F59E0B" stroke-width="2"/>
  <text x="42" y="98" font-family="Arial" font-size="22" font-weight="bold" fill="#92400E" text-anchor="middle">6</text>
  
  <rect x="75" y="70" width="45" height="40" rx="8" fill="#A78BFA" stroke="#7C3AED" stroke-width="2"/>
  <text x="97" y="98" font-family="Arial" font-size="22" font-weight="bold" fill="white" text-anchor="middle">7</text>
  
  <rect x="130" y="70" width="45" height="40" rx="8" fill="#34D399" stroke="#059669" stroke-width="2"/>
  <text x="152" y="98" font-family="Arial" font-size="22" font-weight="bold" fill="white" text-anchor="middle">8</text>
  
  <!-- Swan shape for 2 -->
  <text x="60" y="140" font-size="35" fill="white">🦢</text>
  <text x="100" y="140" font-family="Arial" font-size="24" font-weight="bold" fill="#FEF3C7">≈ 2</text>
  
  <!-- Snowman for 8 -->
  <text x="140" y="140" font-size="30" fill="white">⛄</text>
</svg>