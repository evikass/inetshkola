<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150">
  <defs>
    <linearGradient id="mathBg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="200" height="150" fill="url(#mathBg1)" rx="15"/>
  
  <!-- Number blocks 1-5 top row -->
  <rect x="15" y="20" width="30" height="35" rx="8" fill="#FEF3C7"/>
  <text x="30" y="45" font-family="Arial" font-size="24" font-weight="bold" fill="#D97706" text-anchor="middle">1</text>
  
  <rect x="50" y="20" width="30" height="35" rx="8" fill="#FEE2E2"/>
  <text x="65" y="45" font-family="Arial" font-size="24" font-weight="bold" fill="#DC2626" text-anchor="middle">2</text>
  
  <rect x="85" y="20" width="30" height="35" rx="8" fill="#D1FAE5"/>
  <text x="100" y="45" font-family="Arial" font-size="24" font-weight="bold" fill="#059669" text-anchor="middle">3</text>
  
  <rect x="120" y="20" width="30" height="35" rx="8" fill="#E0E7FF"/>
  <text x="135" y="45" font-family="Arial" font-size="24" font-weight="bold" fill="#4F46E5" text-anchor="middle">4</text>
  
  <rect x="155" y="20" width="30" height="35" rx="8" fill="#FCE7F3"/>
  <text x="170" y="45" font-family="Arial" font-size="24" font-weight="bold" fill="#DB2777" text-anchor="middle">5</text>
  
  <!-- Counting items -->
  <circle cx="35" cy="90" r="18" fill="#F87171"/>
  <text x="35" y="96" font-size="18" text-anchor="middle">🍎</text>
  
  <circle cx="70" cy="90" r="18" fill="#F87171"/>
  <text x="70" y="96" font-size="18" text-anchor="middle">🍎</text>
  
  <circle cx="105" cy="90" r="18" fill="#F87171"/>
  <text x="105" y="96" font-size="18" text-anchor="middle">🍎</text>
  
  <!-- Hand counting -->
  <text x="150" y="95" font-size="40">✋</text>
  
  <!-- Numbers below -->
  <text x="35" y="130" font-family="Arial" font-size="16" font-weight="bold" fill="white" text-anchor="middle">1</text>
  <text x="70" y="130" font-family="Arial" font-size="16" font-weight="bold" fill="white" text-anchor="middle">2</text>
  <text x="105" y="130" font-family="Arial" font-size="16" font-weight="bold" fill="white" text-anchor="middle">3</text>
</svg>