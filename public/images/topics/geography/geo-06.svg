<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="ocean6" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#006994"/>
      <stop offset="100%" style="stop-color:#003366"/>
    </linearGradient>
    <linearGradient id="wave" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4db8ff"/>
      <stop offset="100%" style="stop-color:#0066cc"/>
    </linearGradient>
  </defs>
  
  <!-- Ocean background -->
  <rect width="400" height="300" fill="url(#ocean6)" rx="12"/>
  
  <!-- Wave patterns -->
  <path d="M 0 100 Q 50 80 100 100 Q 150 120 200 100 Q 250 80 300 100 Q 350 120 400 100" fill="none" stroke="#4db8ff" stroke-width="3" opacity="0.5"/>
  <path d="M 0 150 Q 50 130 100 150 Q 150 170 200 150 Q 250 130 300 150 Q 350 170 400 150" fill="none" stroke="#4db8ff" stroke-width="3" opacity="0.4"/>
  <path d="M 0 200 Q 50 180 100 200 Q 150 220 200 200 Q 250 180 300 200 Q 350 220 400 200" fill="none" stroke="#4db8ff" stroke-width="3" opacity="0.3"/>
  
  <!-- Pacific Ocean -->
  <ellipse cx="100" cy="130" rx="70" ry="45" fill="none" stroke="#ffd700" stroke-width="3"/>
  <text x="100" y="125" text-anchor="middle" font-size="12" fill="#ffd700" font-weight="bold">Тихий</text>
  <text x="100" y="140" text-anchor="middle" font-size="10" fill="#ffd700">(самый большой)</text>
  
  <!-- Atlantic Ocean -->
  <ellipse cx="200" cy="100" rx="50" ry="35" fill="none" stroke="#ff6347" stroke-width="3"/>
  <text x="200" y="95" text-anchor="middle" font-size="11" fill="#ff6347" font-weight="bold">Атлантический</text>
  <text x="200" y="108" text-anchor="middle" font-size="9" fill="#ff6347">(второй)</text>
  
  <!-- Indian Ocean -->
  <ellipse cx="320" cy="140" rx="45" ry="35" fill="none" stroke="#ff69b4" stroke-width="3"/>
  <text x="320" y="135" text-anchor="middle" font-size="11" fill="#ff69b4" font-weight="bold">Индийский</text>
  <text x="320" y="148" text-anchor="middle" font-size="9" fill="#ff69b4">(тёплый)</text>
  
  <!-- Arctic Ocean -->
  <ellipse cx="200" cy="50" rx="60" ry="25" fill="none" stroke="#87ceeb" stroke-width="3"/>
  <text x="200" y="45" text-anchor="middle" font-size="10" fill="#87ceeb" font-weight="bold">Северный Ледовитый</text>
  <text x="200" y="58" text-anchor="middle" font-size="9" fill="#87ceeb">(самый холодный)</text>
  
  <!-- Ships -->
  <g transform="translate(60, 180)">
    <path d="M 0 20 L 10 0 L 20 20 Z" fill="#8b4513"/>
    <rect x="8" y="20" width="4" height="15" fill="#8b4513"/>
    <path d="M 10 20 Q 0 25 0 30 Q 10 35 20 30 Q 20 25 10 20" fill="#a0522d"/>
  </g>
  
  <g transform="translate(280, 200)">
    <path d="M 0 20 L 10 0 L 20 20 Z" fill="#8b4513"/>
    <rect x="8" y="20" width="4" height="15" fill="#8b4513"/>
    <path d="M 10 20 Q 0 25 0 30 Q 10 35 20 30 Q 20 25 10 20" fill="#a0522d"/>
  </g>
  
  <!-- Whale -->
  <ellipse cx="180" cy="220" rx="30" ry="15" fill="#4682b4"/>
  <path d="M 150 220 Q 140 210 135 220" fill="#4682b4"/>
  <circle cx="200" cy="215" r="3" fill="#000"/>
  <path d="M 155 230 Q 145 245 160 240" fill="#4682b4"/>
  
  <!-- Fish -->
  <ellipse cx="320" cy="240" rx="15" ry="8" fill="#ffa500"/>
  <path d="M 335 240 L 345 230 L 345 250 Z" fill="#ffa500"/>
  
  <!-- Coral/Seaweed -->
  <path d="M 50 290 Q 45 270 55 260 Q 50 250 60 240" fill="none" stroke="#ff6b6b" stroke-width="4"/>
  <path d="M 350 290 Q 355 270 345 260 Q 350 250 340 240" fill="none" stroke="#20b2aa" stroke-width="4"/>
  
  <!-- Text label -->
  <text x="200" y="280" text-anchor="middle" font-size="18" fill="#ffffff" font-weight="bold">Океаны Земли</text>
</svg>