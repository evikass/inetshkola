<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg10" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#2d5a87"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="url(#bg10)" rx="12"/>
  
  <!-- Russia map outline (simplified)) -->
  <path d="M 20 100 Q 30 80 60 85 Q 100 70 150 75 Q 200 60 250 70 Q 300 65 350 80 Q 380 90 390 100 
           Q 385 130 370 150 Q 350 170 320 175 Q 280 185 240 180 Q 200 190 160 185 Q 120 190 80 180 
           Q 50 175 30 160 Q 15 140 20 100" 
        fill="#4a90d9" stroke="#6bb3f0" stroke-width="2"/>
  
  <!-- Major cities -->
  <circle cx="80" cy="130" r="6" fill="#ffd700"/>
  <text x="80" y="145" text-anchor="middle" font-size="8" fill="#ffffff">Москва</text>
  
  <circle cx="130" cy="95" r="5" fill="#ffd700"/>
  <text x="130" y="88" text-anchor="middle" font-size="7" fill="#ffffff">Санкт-Петербург</text>
  
  <circle cx="340" cy="120" r="5" fill="#ffd700"/>
  <text x="340" y="133" text-anchor="middle" font-size="7" fill="#ffffff">Владивосток</text>
  
  <circle cx="280" cy="100" r="4" fill="#ffd700"/>
  <text x="280" y="93" text-anchor="middle" font-size="7" fill="#ffffff">Иркутск</text>
  
  <circle cx="180" cy="90" r="4" fill="#ffd700"/>
  <text x="180" y="83" text-anchor="middle" font-size="7" fill="#ffffff">Екатеринбург</text>
  
  <circle cx="200" cy="110" r="4" fill="#ffd700"/>
  <text x="200" y="103" text-anchor="middle" font-size="7" fill="#ffffff">Новосибирск</text>
  
  <!-- Rivers -->
  <path d="M 80 130 Q 120 140 160 135 Q 200 130 240 140 Q 280 145 320 135" 
        fill="none" stroke="#4db8ff" stroke-width="2" opacity="0.7"/>
  <text x="180" y="150" text-anchor="middle" font-size="7" fill="#4db8ff">Волга</text>
  
  <path d="M 180 90 Q 200 95 220 100 Q 250 105 280 100" 
        fill="none" stroke="#4db8ff" stroke-width="1.5" opacity="0.7"/>
  
  <!-- Mountain ranges -->
  <path d="M 220 160 L 230 145 L 240 160 L 250 140 L 260 160 L 270 148 L 280 160" 
        fill="none" stroke="#ffffff" stroke-width="2"/>
  <text x="250" y="175" text-anchor="middle" font-size="7" fill="#ffffff">Урал</text>
  
  <!-- Kamchatka -->
  <path d="M 360 85 Q 375 70 385 80 Q 390 90 385 100" 
        fill="#4a90d9" stroke="#6bb3f0" stroke-width="1"/>
  
  <!-- Crimea -->
  <ellipse cx="100" cy="165" rx="12" ry="8" fill="#4a90d9" stroke="#6bb3f0" stroke-width="1"/>
  
  <!-- Russian flag -->
  <rect x="30" y="200" width="60" height="15" fill="#ffffff"/>
  <rect x="30" y="215" width="60" height="15" fill="#0039a6"/>
  <rect x="30" y="230" width="60" height="15" fill="#d52b1e"/>
  
  <!-- Statistics -->
  <rect x="110" y="195" width="130" height="65" fill="#1a252f" rx="5" opacity="0.8"/>
  <text x="175" y="212" text-anchor="middle" font-size="10" fill="#ffffff" font-weight="bold">Россия</text>
  <text x="120" y="228" font-size="8" fill="#95a5a6">Площадь:</text>
  <text x="200" y="228" font-size="8" fill="#ffd700">17 млн км²</text>
  <text x="120" y="242" font-size="8" fill="#95a5a6">Население:</text>
  <text x="200" y="242" font-size="8" fill="#ffd700">146 млн</text>
  <text x="120" y="256" font-size="8" fill="#95a5a6">Столица:</text>
  <text x="200" y="256" font-size="8" fill="#ffd700">Москва</text>
  
  <!-- Kremlin silhouette -->
  <rect x="280" y="200" width="80" height="60" fill="#1a252f" rx="3" opacity="0.8"/>
  <!-- Kremlin towers -->
  <rect x="290" y="220" width="8" height="30" fill="#8b0000"/>
  <polygon points="294,220 288,210 300,210" fill="#8b0000"/>
  <rect x="310" y="215" width="10" height="35" fill="#8b0000"/>
  <polygon points="315,215 307,205 323,205" fill="#8b0000"/>
  <rect x="330" y="220" width="8" height="30" fill="#8b0000"/>
  <polygon points="334,220 328,210 340,210" fill="#8b0000"/>
  <!-- Star -->
  <polygon points="315,195 317,202 325,202 319,207 321,215 315,210 309,215 311,207 305,202 313,202" fill="#ffd700"/>
  
  <!-- Text label -->
  <text x="200" y="30" text-anchor="middle" font-size="18" fill="#ffffff" font-weight="bold">География России</text>
</svg>