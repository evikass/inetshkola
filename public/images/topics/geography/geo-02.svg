<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="space" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a2e"/>
      <stop offset="100%" style="stop-color:#1a1a4e"/>
    </linearGradient>
    <radialGradient id="earth2" cx="40%" cy="40%" r="60%">
      <stop offset="0%" style="stop-color:#6bb3f0"/>
      <stop offset="50%" style="stop-color:#4a90d9"/>
      <stop offset="100%" style="stop-color:#2d6bb5"/>
    </radialGradient>
    <radialGradient id="sun2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffff00"/>
      <stop offset="100%" style="stop-color:#ffa500"/>
    </radialGradient>
  </defs>
  
  <!-- Space background -->
  <rect width="400" height="300" fill="url(#space)" rx="12"/>
  
  <!-- Stars -->
  <circle cx="50" cy="30" r="2" fill="#ffffff"/>
  <circle cx="100" cy="60" r="1.5" fill="#ffffff"/>
  <circle cx="150" cy="25" r="1" fill="#ffffff"/>
  <circle cx="320" cy="40" r="2" fill="#ffffff"/>
  <circle cx="370" cy="70" r="1.5" fill="#ffffff"/>
  <circle cx="30" cy="100" r="1" fill="#ffffff"/>
  <circle cx="380" cy="150" r="2" fill="#ffffff"/>
  <circle cx="60" cy="200" r="1.5" fill="#ffffff"/>
  <circle cx="350" cy="250" r="1" fill="#ffffff"/>
  <circle cx="280" cy="30" r="1.5" fill="#ffffff"/>
  <circle cx="20" cy="250" r="2" fill="#ffffff"/>
  
  <!-- Sun -->
  <circle cx="60" cy="60" r="40" fill="url(#sun2)"/>
  <!-- Sun rays -->
  <line x1="60" y1="10" x2="60" y2="0" stroke="#ffa500" stroke-width="3"/>
  <line x1="60" y1="110" x2="60" y2="120" stroke="#ffa500" stroke-width="3"/>
  <line x1="10" y1="60" x2="0" y2="60" stroke="#ffa500" stroke-width="3"/>
  <line x1="110" y1="60" x2="120" y2="60" stroke="#ffa500" stroke-width="3"/>
  <line x1="25" y1="25" x2="18" y2="18" stroke="#ffa500" stroke-width="3"/>
  <line x1="95" y1="95" x2="102" y2="102" stroke="#ffa500" stroke-width="3"/>
  
  <!-- Orbits -->
  <ellipse cx="60" cy="150" rx="180" ry="120" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.3" stroke-dasharray="5,5"/>
  
  <!-- Earth -->
  <circle cx="250" cy="150" r="55" fill="url(#earth2)"/>
  <!-- Continents -->
  <ellipse cx="235" cy="130" rx="20" ry="15" fill="#5cb85c" opacity="0.8"/>
  <ellipse cx="265" cy="155" rx="18" ry="12" fill="#5cb85c" opacity="0.8"/>
  <ellipse cx="240" cy="175" rx="12" ry="8" fill="#5cb85c" opacity="0.8"/>
  
  <!-- Atmosphere glow -->
  <circle cx="250" cy="150" r="60" fill="none" stroke="#6bb3f0" stroke-width="3" opacity="0.5"/>
  
  <!-- Moon -->
  <circle cx="320" cy="120" r="15" fill="#c0c0c0"/>
  <circle cx="315" cy="115" r="3" fill="#a0a0a0"/>
  <circle cx="325" cy="125" r="2" fill="#a0a0a0"/>
  
  <!-- Other planets -->
  <circle cx="350" cy="200" r="10" fill="#e74c3c" opacity="0.7"/>
  <circle cx="370" cy="180" r="8" fill="#f39c12" opacity="0.7"/>
  
  <!-- Text label -->
  <text x="200" y="280" text-anchor="middle" font-size="18" fill="#ffffff" font-weight="bold">Земля в космосе</text>
</svg>