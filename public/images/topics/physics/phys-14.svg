<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg14" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  
  <rect width="400" height="300" fill="url(#bg14)"/>
  
  <!-- Pendulum -->
  <g transform="translate(200, 30)">
    <!-- Pivot point -->
    <circle cx="0" cy="0" r="8" fill="#7f8c8d"/>
    
    <!-- String -->
    <line x1="0" y1="0" x2="0" y2="120" stroke="#bdc3c7" stroke-width="2" transform="rotate(-20)">
      <animateTransform attributeName="transform" type="rotate" values="-20;20;-20" dur="2s" repeatCount="indefinite"/>
    </line>
    
    <!-- Bob -->
    <circle cx="-40" cy="112" r="20" fill="#3498db">
      <animate attributeName="cx" values="-40;40;-40" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Amplitude markers -->
  <g transform="translate(200, 170)">
    <line x1="-60" y1="0" x2="60" y2="0" stroke="#2c3e50" stroke-width="1" stroke-dasharray="5,5"/>
    <line x1="-50" y1="-5" x2="-50" y2="5" stroke="#e74c3c" stroke-width="2"/>
    <line x1="50" y1="-5" x2="50" y2="5" stroke="#e74c3c" stroke-width="2"/>
    <text x="0" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e74c3c">A — амплитуда</text>
  </g>
  
  <!-- Period -->
  <g transform="translate(200, 200)">
    <path d="M-80,0 Q-60,-30 -40,0 Q-20,30 0,0 Q20,-30 40,0 Q60,30 80,0" fill="none" stroke="#2ecc71" stroke-width="2"/>
    <text x="0" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2ecc71">T — период</text>
  </g>
  
  <!-- Formulas -->
  <g transform="translate(200, 55)">
    <rect x="-140" y="-20" width="130" height="40" rx="8" fill="#2c3e50" stroke="#3498db" stroke-width="2"/>
    <text x="-75" y="8" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#fff">T = 2π√(l/g)</text>
    
    <rect x="10" y="-20" width="130" height="40" rx="8" fill="#2c3e50" stroke="#2ecc71" stroke-width="2"/>
    <text x="75" y="8" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#fff">ν = 1/T (Гц)</text>
  </g>
  
  <!-- Title -->
  <text x="200" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ffffff">КОЛЕБАНИЯ МАЯТНИКА</text>
  <text x="200" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#888">Период не зависит от массы!</text>
</svg>