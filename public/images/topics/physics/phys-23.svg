<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg23" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  
  <rect width="400" height="300" fill="url(#bg23)"/>
  
  <!-- Nucleus with binding energy visualization -->
  <g transform="translate(200, 130)">
    <!-- Outer glow (binding energy) -->
    <circle cx="0" cy="0" r="70" fill="#3498db" opacity="0.1">
      <animate attributeName="r" values="70;75;70" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="60" fill="#3498db" opacity="0.2">
      <animate attributeName="r" values="60;65;60" dur="2s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Nucleons -->
    <!-- Protons (red) -->
    <circle cx="-20" cy="-20" r="18" fill="#e74c3c"/>
    <circle cx="20" cy="-15" r="18" fill="#e74c3c"/>
    <circle cx="0" cy="20" r="18" fill="#e74c3c"/>
    
    <!-- Neutrons (blue) -->
    <circle cx="15" cy="15" r="18" fill="#3498db"/>
    <circle cx="-15" cy="10" r="18" fill="#3498db"/>
    <circle cx="5" cy="-25" r="18" fill="#3498db"/>
    
    <!-- Labels on nucleons -->
    <text x="-20" y="-15" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff">p</text>
    <text x="20" y="-10" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff">p</text>
    <text x="0" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff">p</text>
    <text x="15" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff">n</text>
    <text x="-15" y="15" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff">n</text>
    <text x="5" y="-20" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff">n</text>
    
    <!-- Energy bonds -->
    <line x1="-20" y1="-20" x2="5" y2="-25" stroke="#f1c40f" stroke-width="2" opacity="0.6"/>
    <line x1="20" y1="-15" x2="5" y2="-25" stroke="#f1c40f" stroke-width="2" opacity="0.6"/>
    <line x1="-20" y1="-20" x2="-15" y2="10" stroke="#f1c40f" stroke-width="2" opacity="0.6"/>
    <line x1="0" y1="20" x2="15" y2="15" stroke="#f1c40f" stroke-width="2" opacity="0.6"/>
    <line x1="0" y1="20" x2="-15" y2="10" stroke="#f1c40f" stroke-width="2" opacity="0.6"/>
  </g>
  
  <!-- Mass defect visualization -->
  <g transform="translate(80, 60)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="12" fill="#e74c3c">Σm(нуклонов) ></text>
    <text x="0" y="18" font-family="Arial, sans-serif" font-size="12" fill="#2ecc71">m(ядра)</text>
    <text x="0" y="40" font-family="Arial, sans-serif" font-size="11" fill="#888">Дефект массы: Δm</text>
  </g>
  
  <!-- Formula -->
  <g transform="translate(200, 50)">
    <rect x="-80" y="-20" width="160" height="40" rx="10" fill="#2c3e50" stroke="#f1c40f" stroke-width="2"/>
    <text x="0" y="8" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#fff">Eсв = Δm·c²</text>
  </g>
  
  <!-- Labels -->
  <text x="320" y="70" font-family="Arial, sans-serif" font-size="11" fill="#e74c3c">● протоны (+)</text>
  <text x="320" y="90" font-family="Arial, sans-serif" font-size="11" fill="#3498db">● нейтроны (0)</text>
  <text x="320" y="110" font-family="Arial, sans-serif" font-size="11" fill="#f1c40f">— энергия связи</text>
  
  <!-- Title -->
  <text x="200" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ffffff">ЭНЕРГИЯ СВЯЗИ ЯДРА</text>
  <text x="200" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#888">Удельная энергия: Eуд = Eсв/A</text>
</svg>