<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Background -->
  <rect width="400" height="300" fill="#0F172A"/>
  
  <!-- Prism -->
  <polygon points="200,50 100,200 300,200" fill="#1E293B" stroke="#60A5FA" stroke-width="2"/>
  
  <!-- White light entering -->
  <line x1="30" y1="120" x2="150" y2="150" stroke="#FFFFFF" stroke-width="4"/>
  
  <!-- Spectrum emerging -->
  <line x1="250" y1="150" x2="370" y2="100" stroke="#FF0000" stroke-width="3"/>
  <line x1="250" y1="155" x2="370" y2="115" stroke="#FF7F00" stroke-width="3"/>
  <line x1="250" y1="160" x2="370" y2="130" stroke="#FFFF00" stroke-width="3"/>
  <line x1="250" y1="165" x2="370" y2="145" stroke="#00FF00" stroke-width="3"/>
  <line x1="250" y1="170" x2="370" y2="160" stroke="#0000FF" stroke-width="3"/>
  <line x1="250" y1="175" x2="370" y2="175" stroke="#4B0082" stroke-width="3"/>
  <line x1="250" y1="180" x2="370" y2="190" stroke="#9400D3" stroke-width="3"/>
  
  <!-- Refracted ray inside prism -->
  <line x1="150" y1="150" x2="250" y2="165" stroke="#E2E8F0" stroke-width="2" opacity="0.5"/>
  
  <!-- Labels -->
  <text x="60" y="110" fill="#FFFFFF" font-family="Arial" font-size="10">Белый свет</text>
  <text x="320" y="80" fill="#EF4444" font-family="Arial" font-size="9">Кр.</text>
  <text x="330" y="100" fill="#F97316" font-family="Arial" font-size="9">Ор.</text>
  <text x="340" y="120" fill="#FACC15" font-family="Arial" font-size="9">Жёл.</text>
  <text x="345" y="140" fill="#22C55E" font-family="Arial" font-size="9">Зел.</text>
  <text x="350" y="158" fill="#3B82F6" font-family="Arial" font-size="9">Гол.</text>
  <text x="345" y="175" fill="#8B5CF6" font-family="Arial" font-size="9">Син.</text>
  <text x="335" y="195" fill="#A855F7" font-family="Arial" font-size="9">Фио.</text>
  
  <!-- Title -->
  <text x="200" y="280" text-anchor="middle" fill="#E2E8F0" font-family="Arial, sans-serif" font-size="16" font-weight="bold">Дисперсия света</text>
  
  <!-- Prism label -->
  <text x="200" y="180" text-anchor="middle" fill="#60A5FA" font-family="Arial" font-size="12">Призма</text>
</svg>