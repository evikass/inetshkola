<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  
  <rect width="400" height="300" fill="url(#bg5)"/>
  
  <!-- Container -->
  <rect x="100" y="100" width="200" height="120" rx="5" fill="#2c3e50" stroke="#3498db" stroke-width="2"/>
  
  <!-- Molecules - animated -->
  <g>
    <!-- Cold molecules (slow) -->
    <circle cx="130" cy="130" r="5" fill="#3498db">
      <animate attributeName="cx" values="130;140;130;120;130" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="130;125;135;130;130" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="160" cy="150" r="5" fill="#3498db">
      <animate attributeName="cx" values="160;155;165;160;160" dur="3.5s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="150;155;145;150;150" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="140" cy="180" r="5" fill="#3498db">
      <animate attributeName="cx" values="140;145;135;140;140" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="180;175;185;180;180" dur="4s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Hot molecules (fast) -->
    <circle cx="250" cy="130" r="5" fill="#e74c3c">
      <animate attributeName="cx" values="250;270;230;260;250" dur="0.5s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="130;120;140;125;130" dur="0.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="270" cy="160" r="5" fill="#e74c3c">
      <animate attributeName="cx" values="270;260;280;265;270" dur="0.4s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="160;150;170;155;160" dur="0.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="260" cy="190" r="5" fill="#e74c3c">
      <animate attributeName="cx" values="260;275;245;270;260" dur="0.45s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="190;180;200;185;190" dur="0.45s" repeatCount="indefinite"/>
    </circle>
    <circle cx="280" cy="140" r="5" fill="#e74c3c">
      <animate attributeName="cx" values="280;265;290;270;280" dur="0.35s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="140;135;145;130;140" dur="0.35s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Labels -->
  <text x="140" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#3498db">Холодные</text>
  <text x="140" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#3498db">(медленные)</text>
  
  <text x="260" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#e74c3c">Горячие</text>
  <text x="260" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e74c3c">(быстрые)</text>
  
  <!-- Formula -->
  <g transform="translate(200, 60)">
    <rect x="-70" y="-20" width="140" height="40" rx="10" fill="#2c3e50" stroke="#e74c3c" stroke-width="2"/>
    <text x="0" y="8" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#fff">U = 3/2 kT</text>
  </g>
  
  <!-- Title -->
  <text x="200" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ffffff">ВНУТРЕННЯЯ ЭНЕРГИЯ</text>
</svg>