<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Background -->
  <rect width="400" height="300" fill="#0F172A"/>
  
  <!-- Battery -->
  <rect x="50" y="100" width="30" height="80" rx="3" fill="#1E293B" stroke="#475569" stroke-width="2"/>
  <rect x="55" y="90" width="20" height="15" fill="#475569"/>
  <text x="65" y="145" text-anchor="middle" fill="#EF4444" font-family="Arial" font-size="10">−</text>
  <text x="65" y="125" text-anchor="middle" fill="#EF4444" font-family="Arial" font-size="10">+</text>
  
  <!-- Wires -->
  <path d="M80,110 L150,110 L150,80 L250,80 L250,110 L320,110" fill="none" stroke="#F59E0B" stroke-width="3"/>
  <path d="M80,170 L150,170 L150,200 L250,200 L250,170 L320,170" fill="none" stroke="#3B82F6" stroke-width="3"/>
  
  <!-- Ammeter -->
  <circle cx="200" cy="80" r="20" fill="#1E293B" stroke="#60A5FA" stroke-width="2"/>
  <text x="200" y="85" text-anchor="middle" fill="#60A5FA" font-family="Arial" font-size="12">A</text>
  
  <!-- Resistor -->
  <rect x="290" y="100" width="60" height="80" rx="5" fill="#1E293B" stroke="#475569" stroke-width="2"/>
  <path d="M300,110 L310,120 L320,100 L330,120 L340,100 L340,160 L330,180 L320,160 L310,180 L300,160" fill="none" stroke="#EF4444" stroke-width="2"/>
  
  <!-- Current flow arrows -->
  <polygon points="180,75 190,80 180,85" fill="#F59E0B">
    <animate attributeName="opacity" values="1;0.3;1" dur="1s" repeatCount="indefinite"/>
  </polygon>
  <polygon points="220,75 230,80 220,85" fill="#F59E0B">
    <animate attributeName="opacity" values="1;0.3;1" dur="1s" repeatCount="indefinite" begin="0.3s"/>
  </polygon>
  
  <!-- Electrons moving -->
  <circle cx="150" cy="110" r="5" fill="#60A5FA">
    <animate attributeName="cx" values="80;320" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="250" cy="200" r="5" fill="#60A5FA">
    <animate attributeName="cx" values="320;80" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Title -->
  <text x="200" y="280" text-anchor="middle" fill="#E2E8F0" font-family="Arial, sans-serif" font-size="16" font-weight="bold">Электрическая цепь</text>
  
  <!-- Formula -->
  <text x="200" y="255" text-anchor="middle" fill="#94A3B8" font-family="Arial" font-size="14">I = U / R</text>
</svg>