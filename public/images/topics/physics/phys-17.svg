<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg17" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  
  <rect width="400" height="300" fill="url(#bg17)"/>
  
  <!-- Colliding balls -->
  <g transform="translate(200, 130)">
    <!-- Ball 1 - before -->
    <circle cx="-80" cy="0" r="25" fill="#e74c3c">
      <animate attributeName="cx" values="-80;-30;-80" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="-80" y="5" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#fff">m₁</text>
    
    <!-- Velocity arrow 1 -->
    <line x1="-55" y1="0" x2="-35" y2="0" stroke="#f1c40f" stroke-width="3">
      <animate attributeName="x1" values="-55;-5;-55" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="-35;15;-35" dur="2s" repeatCount="indefinite"/>
    </line>
    <polygon points="-35,0 -45,-6 -45,6" fill="#f1c40f">
      <animate attributeName="points" values="-35,0 -45,-6 -45,6;15,0 5,-6 5,6;-35,0 -45,-6 -45,6" dur="2s" repeatCount="indefinite"/>
    </polygon>
    <text x="-45" y="-10" font-family="Arial, sans-serif" font-size="10" fill="#f1c40f">v₁</text>
    
    <!-- Ball 2 - before (stationary) -->
    <circle cx="40" cy="0" r="20" fill="#3498db">
      <animate attributeName="cx" values="40;50;40" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="40" y="5" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#fff">m₂</text>
    
    <!-- After collision arrows -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0" dur="2s" repeatCount="indefinite"/>
      <line x1="-10" y1="0" x2="-40" y2="0" stroke="#e74c3c" stroke-width="2"/>
      <polygon points="-40,0 -30,-5 -30,5" fill="#e74c3c"/>
      <line x1="60" y1="0" x2="100" y2="0" stroke="#3498db" stroke-width="2"/>
      <polygon points="100,0 90,-5 90,5" fill="#3498db"/>
    </g>
  </g>
  
  <!-- Formula -->
  <g transform="translate(200, 55)">
    <rect x="-100" y="-20" width="200" height="40" rx="10" fill="#2c3e50" stroke="#2ecc71" stroke-width="2"/>
    <text x="0" y="8" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#fff">m₁v₁ + m₂v₂ = const</text>
  </g>
  
  <!-- Explanation -->
  <text x="200" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#f1c40f">До столкновения:</text>
  <text x="200" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#fff">Σp = m₁v₁ + m₂v₂</text>
  
  <!-- Title -->
  <text x="200" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ffffff">ЗАКОН СОХРАНЕНИЯ ИМПУЛЬСА</text>
</svg>