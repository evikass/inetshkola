<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg18" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  
  <rect width="400" height="300" fill="url(#bg18)"/>
  
  <!-- Gas container with piston -->
  <g transform="translate(100, 80)">
    <!-- Container -->
    <rect x="0" y="30" width="150" height="100" fill="none" stroke="#3498db" stroke-width="3"/>
    
    <!-- Gas molecules -->
    <circle cx="30" cy="60" r="6" fill="#e74c3c">
      <animate attributeName="cx" values="30;50;20;40;30" dur="0.8s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="60;80;70;50;60" dur="0.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="70" cy="90" r="6" fill="#e74c3c">
      <animate attributeName="cx" values="70;90;60;80;70" dur="0.6s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="90;70;100;80;90" dur="0.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="50" cy="50" r="6" fill="#e74c3c">
      <animate attributeName="cx" values="50;30;70;40;50" dur="0.7s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="50;70;60;90;50" dur="0.7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="100" cy="80" r="6" fill="#e74c3c">
      <animate attributeName="cx" values="100;80;110;90;100" dur="0.9s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="80;100;70;90;80" dur="0.9s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Piston -->
    <rect x="140" y="30" width="30" height="100" fill="#7f8c8d"/>
    <rect x="145" y="40" width="20" height="80" fill="#95a5a6"/>
    
    <!-- Pressure arrows -->
    <line x1="160" y1="60" x2="180" y2="60" stroke="#f1c40f" stroke-width="2"/>
    <polygon points="180,60 172,55 172,65" fill="#f1c40f"/>
    <line x1="160" y1="100" x2="180" y2="100" stroke="#f1c40f" stroke-width="2"/>
    <polygon points="180,100 172,95 172,105" fill="#f1c40f"/>
  </g>
  
  <!-- Variables -->
  <g transform="translate(300, 90)">
    <circle cx="0" cy="0" r="15" fill="#3498db"/>
    <text x="0" y="5" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#fff">P</text>
    <text x="25" y="5" font-family="Arial, sans-serif" font-size="12" fill="#3498db">— давление</text>
    
    <circle cx="0" cy="40" r="15" fill="#2ecc71"/>
    <text x="0" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#fff">V</text>
    <text x="25" y="45" font-family="Arial, sans-serif" font-size="12" fill="#2ecc71">— объём</text>
    
    <circle cx="0" cy="80" r="15" fill="#e74c3c"/>
    <text x="0" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#fff">T</text>
    <text x="25" y="85" font-family="Arial, sans-serif" font-size="12" fill="#e74c3c">— температура</text>
  </g>
  
  <!-- Formula -->
  <g transform="translate(200, 55)">
    <rect x="-70" y="-20" width="140" height="40" rx="10" fill="#2c3e50" stroke="#f1c40f" stroke-width="2"/>
    <text x="0" y="8" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#fff">PV = nRT</text>
  </g>
  
  <!-- Title -->
  <text x="200" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ffffff">УРАВНЕНИЕ СОСТОЯНИЯ ИДЕАЛЬНОГО ГАЗА</text>
  <text x="200" y="255" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#888">Уравнение Менделеева-Клапейрона</text>
  <text x="200" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#888">R = 8,31 Дж/(моль·К)</text>
</svg>