<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg15" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  
  <rect width="400" height="300" fill="url(#bg15)"/>
  
  <!-- Atom model -->
  <g transform="translate(200, 130)">
    <!-- Orbits -->
    <ellipse cx="0" cy="0" rx="80" ry="30" fill="none" stroke="#3498db" stroke-width="1.5" opacity="0.4" transform="rotate(-30)"/>
    <ellipse cx="0" cy="0" rx="80" ry="30" fill="none" stroke="#3498db" stroke-width="1.5" opacity="0.4" transform="rotate(30)"/>
    <ellipse cx="0" cy="0" rx="80" ry="30" fill="none" stroke="#3498db" stroke-width="1.5" opacity="0.4" transform="rotate(90)"/>
    
    <!-- Nucleus with protons and neutrons -->
    <circle cx="0" cy="0" r="25" fill="#e74c3c" opacity="0.8"/>
    <circle cx="-8" cy="-5" r="8" fill="#ff6b6b"/>
    <circle cx="8" cy="5" r="8" fill="#c0392b"/>
    <circle cx="5" cy="-8" r="8" fill="#ff8e8e"/>
    <circle cx="-5" cy="8" r="8" fill="#e74c3c"/>
    
    <!-- Proton/Neutron labels -->
    <text x="-8" y="-2" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#fff">p+</text>
    <text x="8" y="8" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#fff">n</text>
    
    <!-- Electrons -->
    <circle cx="70" cy="-15" r="8" fill="#3498db">
      <animate attributeName="cx" values="70;-70;-70;70;70" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="-15;-15;15;15;-15" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="-70" cy="15" r="8" fill="#3498db">
      <animate attributeName="cx" values="-70;70;70;-70;-70" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="15;15;-15;-15;15" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="-60" r="8" fill="#3498db">
      <animate attributeName="cy" values="-60;60;60;-60;-60" dur="2.5s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Labels -->
  <g transform="translate(320, 90)">
    <circle cx="0" cy="0" r="6" fill="#e74c3c"/>
    <text x="15" y="5" font-family="Arial, sans-serif" font-size="10" fill="#e74c3c">протоны (+)</text>
  </g>
  <g transform="translate(320, 115)">
    <circle cx="0" cy="0" r="6" fill="#ff8e8e"/>
    <text x="15" y="5" font-family="Arial, sans-serif" font-size="10" fill="#ff8e8e">нейтроны (0)</text>
  </g>
  <g transform="translate(320, 140)">
    <circle cx="0" cy="0" r="6" fill="#3498db"/>
    <text x="15" y="5" font-family="Arial, sans-serif" font-size="10" fill="#3498db">электроны (-)</text>
  </g>
  
  <!-- Atomic notation -->
  <g transform="translate(80, 200)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="24" fill="#fff">ᴬ</text>
    <text x="10" y="8" font-family="Arial, sans-serif" font-size="24" fill="#fff">ₙ</text>
    <text x="25" y="5" font-family="Arial, sans-serif" font-size="24" fill="#fff">X</text>
    <text x="0" y="30" font-family="Arial, sans-serif" font-size="10" fill="#888">A — массовое число</text>
    <text x="0" y="45" font-family="Arial, sans-serif" font-size="10" fill="#888">n — заряд ядра</text>
  </g>
  
  <!-- Title -->
  <text x="200" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff">СТРОЕНИЕ АТОМА</text>
  <text x="200" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#888">Атом нейтрален: число протонов = числу электронов</text>
</svg>